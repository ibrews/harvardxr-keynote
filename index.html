<script>
/* ═══════════════════════════════════════════════════════════════════════
   PRESENTATION CONFIG — EDIT THIS SECTION TO CHANGE CONTENT
   ═══════════════════════════════════════════════════════════════════════
   Each section = a year of Agile Lens (2016–2025).
   Contains 1-3 case study slides → then a lesson slide.

   To swap a project: change title/subtitle/img/bullets in the cases array.
   To swap an image:   replace the img URL (or "" for gradient placeholder).
   To change a lesson: edit the lesson.title and lesson.tagline.
   ═══════════════════════════════════════════════════════════════════════ */
const SECTIONS = [
  {
    year: 2016, accent: 'teal',
    cases: [
      { title:'Four Seasons Lake Austin — The Spike Tape Story', subtitle:'A 5¢ solution to a $5,000 problem',
        img:'https://website-ivory-omega-78.vercel.app/portfolio/four-seasons-holodeck.jpg',
        bullets:['Mid-experience, guests sit in a physical chair that also exists in VR. Jonathan asked: "If only there was a way to make sure the chair was placed in exactly the right spot every time…"','Kevin Laibson: "Jonathan, I can\'t wait for you to meet our thousand-year-old invention — spike tape."','"It\'s not a VR experience that is similar to theater. It\'s a theater experience that has VR in it." — Kevin'] },
      { title:'The Shed @ Hudson Yards', subtitle:'Our first major VR architecture project',
        img:'https://website-ivory-omega-78.vercel.app/portfolio/the-shed.png',
        bullets:['Custom AR & VR walkthroughs for a $475M cultural venue','Parametric design options explored in real-time VR','We weren\'t doing film. We weren\'t doing games. We were doing stagecraft.'] },
    ],
    lesson: { title:'VR Is Theater.\nNot Film. Not Games.', tagline:'Film hands you cuts, wide shots, and montage to control where the audience looks. Games demand controller literacy and active participation. Theater is spatial, live, and trusts an audience to look anywhere they want — exactly like VR. Stop borrowing from cinema. Start borrowing from stagecraft.', tags:'Four Seasons · Christmas Carol VR · Stage Presence · RSC' },
  },
  {
    year: 2017, accent: 'purple',
    cases: [
      { title:'High Fidelity Live VR — The Improv Test', subtitle:'When the avatar arm breaks, what does an actor do?',
        img:'',
        bullets:['2019: Philip Rosedale asks Alex to assemble a NYC live-VR super-team. Alex\'s instinct: "I don\'t want CS graduates. I want theater people."','Improv-trained actors yes-and a broken avatar arm into the scene like it was intentional. Shakespeare-trained actors freeze and ask "can we fix my arm?"','In a live VR show there is no "check the gate, let\'s shoot another take." Live is live. Theater people get this in their bones.'] },
      { title:'Four Seasons — The 10-Studio Bake-Off', subtitle:'Pure Blink won on visuals. Agile Lens won on methodology.',
        img:'https://website-ivory-omega-78.vercel.app/portfolio/four-seasons-holodeck.jpg',
        bullets:['Jonathan pitched the same brief to 10 different studios. He hired two: Pure Blink for visual fidelity, Agile Lens for our particular method of problem-solving.','Diverse teams don\'t win on what they ship. They win on how they think.','Architects, theater directors, lighting designers, motion capture artists, choreographers — in the same room as engineers.'] },
    ],
    lesson: { title:'The Best XR Teams Look\nNothing Like Tech Teams', tagline:'XR is too new to have native experts, so we build them from everywhere. But don\'t go to zero on traditional engineers either — our early years without dedicated devs cost us in source control, QA, and project discipline. The principle is theater-first, engineering-second. Never engineering-zero.', tags:'Stage Presence · High Fidelity 2019 · Fisher Dachs Associates · Fisher Marantz Stone' },
  },
  {
    year: 2018, accent: 'amber',
    cases: [
      { title:'Infinite Reality → AI Dickens', subtitle:'Paid client work becomes internal R&D becomes published research',
        img:'',
        bullets:['London Tech Week 2023: Infinite Reality hires us to build a talking metahuman car salesman. We learn the Inworld + mocap pipeline on their dime.','We turn it into AI Dickens — an LLM-driven Charles Dickens who handles pre-show audience onboarding for Christmas Carol VR, then theatrically hands off to the human Ari Tarr at showtime.','That R&D became "Directing AI Performers" — a Contemporary Theatre Review paper. Cash cow funded our IP.'] },
      { title:'Intel Project Arena', subtitle:'Enterprise marketing pays for the art',
        img:'https://website-ivory-omega-78.vercel.app/portfolio/intel-project-arena.png',
        bullets:['Virtual arena showcasing Core i9 capabilities to thousands of attendees','Big-budget enterprise work pays the salaries — and stocks the war chest','City of Apparition, Salle d\'Or, Christmas Carol — none of those passion projects exist without the archviz that bankrolls them'] },
    ],
    lesson: { title:'Know Which Work Pays\nthe Bills. Do Both.', tagline:'Real estate visualization pays our salaries. VR theater and mixed-reality art installations make us worth hiring. The trick isn\'t picking one — it\'s building a cash cow specifically so you can bankroll the ambitious, low-margin work that nobody else will fund. You need both, or you eventually lose both.', tags:'Infinite Reality · Christmas Carol · Diriyah Gate · City of Apparition · Salle d\'Or' },
  },
  {
    year: 2019, accent: 'teal',
    cases: [
      { title:'Four Seasons — The 17-Person Chain', subtitle:'How a single client found us through a chain of 17 people',
        img:'',
        bullets:['Kim Bauman Larson → Paul Debevec → Jeff Model → Matthew Bannister → Jeff Powers → Jonathan. Roughly 17 people independently said "you should talk to Alex."','We never pitched Jonathan. We never sent a deck. We never made a cold call. He found us anyway.','That\'s the blessing. Now the curse: we have no business development muscle. Zero. We can\'t pitch because we\'ve never had to.'] },
      { title:'Royal Caribbean — Be The Second Studio', subtitle:'When the first team taps out, we\'re the call',
        img:'',
        bullets:['Framestore and Build had built the heavy PC-VR experience. Royal Caribbean needed it standalone, multiplayer, on a cruise ship.','We took it from "running on a dev workstation" to "running on a cruise ship." Same pattern as SK-II and Kiehl\'s.','Sometimes being sought-after means being the rescue call. That\'s a niche too.'] },
    ],
    lesson: { title:'Being Sought-After Is\na Blessing and a Curse', tagline:'Disney, the Kennedy Center, the Royal Shakespeare Company — they all found us. That\'s incredible. It also means we\'ve never had to learn how to sell. Inbound is feast-or-famine: when work shows up it\'s great, but no one calls when no one calls. Being sought-after and being able to pitch are different skills. Only one compounds.', tags:'Disney · Kennedy Center · RSC · Royal Caribbean · SK-II · Kiehl\'s' },
  },
  {
    year: 2020, accent: 'rose',
    cases: [
      { title:'October 2022 — The $60K Ask', subtitle:'The moment Agile Lens became a real company',
        img:'',
        bullets:['I was giving the longest talk of Unreal Fest 2022. Simultaneously running Waldorf Astoria solo. June had left for a German training company. I was burning out.','When Jonathan started the Four Seasons conversation, I mustered the courage for the first time to say: "Yes — but only if you pay us $60,000 up front for one month of R&D."','I didn\'t know he was talking to 9 other studios. He said yes. That retainer paid for June\'s first full-time role. Agile Lens stopped being me + contractors and became a real studio.'] },
      { title:'Samsung 2018 — The Counter-Example', subtitle:'$19,000 for a month of hard work',
        img:'',
        bullets:['No retainer. No R&D phase. I pretended I had all the answers because I thought asking for a discovery period made me look weak.','We finished the project. We undercharged by an order of magnitude. I burned out three contractors who were waiting on Samsung to pay us.','Every "what should I have done differently" answer points to one practice: ask for the deposit first.'] },
    ],
    lesson: { title:'Require a Deposit.\nBefore You Write a Line of Code.', tagline:'The single best operational decision we ever made. The first check separates the curious from the committed, gives you runway to actually staff the work, and buys you the right to say "we\'re not sure yet" instead of pretending you have all the answers. It filters out tire-kickers, protects the team from scope creep, and means your R&D never happens on your own dime.', tags:'Four Seasons · Samsung 360 · Weapons Free' },
  },
  {
    year: 2021, accent: 'purple',
    cases: [
      { title:'Christmas Carol VR — The ATL Upsell', subtitle:'A small ask becomes our annual flagship',
        img:'https://website-ivory-omega-78.vercel.app/portfolio/xmas-carol.jpg',
        bullets:['Actors Theatre Louisville asked us for production assets — metahumans and some good videos. Not a VR project.','We did the R&D, then flipped the brief: "As long as we\'re building sets and characters and costumes for you — how about we just do a full VR production?"','That upsell became our annual production, our R&D vehicle, the SIGGRAPH multi-avatar paper, and the AI Dickens lineage. None of it happens without that R&D-first phase.'] },
      { title:'Space Opera & Salle d\'Or', subtitle:'"I don\'t know if this is possible, but…"',
        img:'',
        bullets:['8+ co-located players in a 30×30 LBVR space with live actors and branching narrative. Mixed reality immersive ruin in MR ("Sleep No More meets The Little Prince").','Both projects started with the client saying "we don\'t know if this is possible." We said: "honestly, us neither — let\'s find out together."','Phase 1 was pure R&D. The client paid for us to figure it out. That\'s the deal.'] },
    ],
    lesson: { title:'Protect Time for\n"We\'re Not Sure Either"', tagline:'Our most common brief starts with "I don\'t know if this is possible, but…" The honest answer is "us neither — let\'s find out together." That only works if Phase 1 of every project is explicitly dedicated to R&D, with the discovery budget baked into the contract from day one. The wrong move is pretending you already have the answers.', tags:'Christmas Carol VR · AI Dickens · SIGGRAPH Multi-Avatar · Space Opera · Salle d\'Or' },
  },
  {
    year: 2022, accent: 'amber',
    cases: [
      { title:'The Unreal Engine Bet', subtitle:'Specialist focus in a market full of tourists',
        img:'',
        bullets:['Going all-in on Unreal Engine — including Gold Authorized Instructor certification — wasn\'t a technical decision. It was a five-year bet on which skills would still be valuable.','Every studio that chased the latest shiny (NFTs, then "the metaverse," then generative AI) lost their XR muscle memory. We didn\'t.','The companies that quit XR became our clients\' second studios. We were the first call.'] },
      { title:'Waldorf Astoria Miami', subtitle:'Luxury archviz with a live mocap host',
        img:'',
        bullets:['Rokoko motion capture pipeline running inside an archviz tour. A virtual host walks prospective residents through the space.','The client found us after a SIGGRAPH talk I gave entirely about Christmas Carol — they wanted to inject our live performance system into archviz.','One paid talk about theater work generated an enterprise archviz client. Specialist reputation compounds in unexpected directions.'] },
    ],
    lesson: { title:'Your Tool Choices Are\nBusiness Strategy', tagline:'Going all-in on Unreal Engine wasn\'t a technical decision — it was a five-year bet on which skills would still be valuable. Every major pipeline choice has a long tail. The corollary: be a specialist, not a tourist. The companies that chased every shiny new platform are gone. We\'re still here because we doubled down when everyone else was pivoting.', tags:'Unreal Engine · Waldorf Astoria · Christmas Carol' },
  },
  {
    year: 2023, accent: 'teal',
    cases: [
      { title:'Stage Presence × RSC — The Script in the Hand', subtitle:'Don\'t reinvent the wheel. Adapt what already works.',
        img:'',
        bullets:['Actors rehearse in a 1:1 LIDAR-scanned Swan Theatre in VR. We tried virtual scripts on spring arms, attached to wrists, floating in space.','Every actor wanted the same thing: a script they could hold in their hand and put down on the floor when they needed both hands free. Same as paper.','VR UX is best when it adapts existing spatial workflows 1:1 — not when it tries to reinvent them. Theater knows how scripts work.'] },
      { title:'Four Seasons Lake Austin', subtitle:'Spatial design that had to feel like luxury, not a tech demo',
        img:'https://website-ivory-omega-78.vercel.app/portfolio/four-seasons-holodeck.jpg',
        bullets:['$300M of amenities in an 82×65-foot wireless holodeck','Optitrack + Antilatency: room-scale multi-user, no tether','Theatrical staging — sightlines, audience focus direction, the orange floating into view at the right moment — driven by people who think spatially first'] },
    ],
    lesson: { title:'Spatial Design Is\nIts Own Discipline', tagline:'It\'s not UX with depth. The best spatial thinkers we\'ve hired came from theater, not software — because they already understood blocking, sightlines, presence, and audience agency. Stop borrowing screen-design patterns. Stop reinventing wheels that already work. Hire for spatial thinking directly.', tags:'Stage Presence · RSC · Four Seasons · Onboard XR' },
  },
  {
    year: 2024, accent: 'purple',
    cases: [
      { title:'The Holodeck 98% Incident', subtitle:'A 98 at Harvard isn\'t something you apologize for',
        img:'',
        bullets:['On a recent holodeck project, one of our partners was about to lead the witness — apologize to the client for the 2% of imperfections we could see but they couldn\'t.','The client\'s response when they saw the experience: "This is amazing. My only notes are about our own work, not yours."','We had to remind ourselves: this is already the best VR experience this client will ever have had in their life. Don\'t teach them to see flaws they wouldn\'t notice on their own.'] },
      { title:'Body of Mine', subtitle:'Full-body VR — Producers Guild Innovation Award',
        img:'https://website-ivory-omega-78.vercel.app/portfolio/body-of-mine.jpg',
        bullets:['Body, face, and eye tracking — inhabit another gender','BAFTA, SXSW, Games for Change recognition','We could see every imperfection. The audience saw a transformative experience.'] },
    ],
    lesson: { title:'Perfect Is the Enemy of Best.\nDon\'t Tell the Client About the Gap.', tagline:'It takes 20% of the time to get 80% of the way there, and 80% of the time to chase the last 20% — and most of that last 20% is invisible to anyone without your trained eye. If you\'re already shipping the best work in the industry, stop apologizing for the difference between 98 and 100. The audience experiences "best they\'ve ever seen." Let them.', tags:'Holodeck Anywhere · Body of Mine · Royal Caribbean' },
  },
  {
    year: 2025, accent: 'rose',
    cases: [
      { title:'Your Mind, Girls — The Scope Creep Story', subtitle:'How $0 of revenue funded a genuinely excellent piece',
        img:'',
        bullets:['Hope Hutman approached us asking for a small blueprint script. We said yes, planning to hand it off and take a small credit.','Each yes spawned 5 new problems. Sony Mocopi was the new shiny in the room. We thought we were killing two birds. Kevin: "We were just being sat on by a giant bird."','We ended up as full co-producers. 30 people in headsets watching a real actor in a virtual space. Beautiful work. Zero dollars.'] },
      { title:'Multi-Avatar Performance (SIGGRAPH 2025)', subtitle:'When discipline pays off',
        img:'',
        bullets:['One actor plays all roles in Christmas Carol VR — abandoned avatars frozen in pose on stage','Third-person self-monitoring system solves the "many bodies" problem','Tightly scoped, properly funded, published at SIGGRAPH. The opposite of Your Mind, Girls.'] },
    ],
    lesson: { title:'Complex Projects Are Thrilling —\nand Perfect Breeding Grounds for Scope Creep', tagline:'The most dangerous projects are the ones that hit the bullseye of everything you\'ve been wanting to try. New hardware in the room (Sony Mocopi for us) plus a brief that fits your ambitions plus a creative collaborator you like = sunk cost fallacy by month two. The fix isn\'t saying no to thrilling projects. It\'s saying yes only with hard scope boundaries before the work starts.', tags:'Your Mind, Girls · Sony Mocopi · SIGGRAPH 2025 · Christmas Carol' },
  },
];

const BONUS = { year:2026, title:'The Demo Will Break.\nBudget for It.',
  tagline:'In ten years — at Harvard, at SIGGRAPH, at the Kennedy Center — something has gone wrong every single time. A headset dies. The Wi-Fi drops. A character\'s head detaches from their body mid-show. The audience doesn\'t remember the glitch. They remember how the moment made them feel.' };
</script>

<style>

#slide-grid::-webkit-scrollbar-thumb{background:rgba(0,212,255,.3);border-radius:2px}
.sg-thumb{flex:0 0 auto;min-width:64px;height:46px;border:1px solid rgba(255,255,255,.12);border-radius:6px;background:rgba(255,255,255,.03);padding:5px 8px;cursor:pointer;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:2px;font-family:var(--font);transition:all .15s;position:relative}
.sg-thumb:hover{background:rgba(0,212,255,.12);border-color:rgba(0,212,255,.4);transform:translateY(-2px)}
.sg-thumb.active{background:rgba(0,212,255,.18);border-color:var(--teal);box-shadow:0 0 12px rgba(0,212,255,.3)}
.sg-num{font-size:.62rem;font-weight:600;color:rgba(255,255,255,.55);letter-spacing:.05em}
.sg-thumb.active .sg-num{color:var(--teal)}
.sg-label{font-size:.52rem;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.sg-thumb.active .sg-label{color:rgba(0,212,255,.7)}
.sg-thumb.sg-cover{background:rgba(124,58,237,.06);border-color:rgba(124,58,237,.2)}
.sg-thumb.sg-bonus{background:rgba(245,158,11,.06);border-color:rgba(245,158,11,.2)}
.sg-thumb.sg-bonus.active{background:rgba(245,158,11,.18);border-color:var(--amber);box-shadow:0 0 12px rgba(245,158,11,.3)}
.sg-thumb.sg-bonus.active .sg-num,.sg-thumb.sg-bonus.active .sg-label{color:var(--amber)}
.sg-thumb.sg-map{background:rgba(167,139,250,.06);border-color:rgba(167,139,250,.2)}
.sg-thumb.sg-close{background:rgba(244,63,94,.06);border-color:rgba(244,63,94,.2)}

/* Close — sized for 1920×1080 projector */
.close-ey{font-size:clamp(.7rem,1.4vw,1.05rem);font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:var(--amber);margin-bottom:36px;opacity:.85}
.close-title{font-size:clamp(3.2rem,7.5vw,7.5rem);font-weight:700;letter-spacing:-.03em;line-height:1;background:linear-gradient(130deg,#fff 20%,#fde68a 60%,#f59e0b 90%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:28px}
.close-sub{font-size:clamp(1.1rem,2vw,1.7rem);color:var(--dim);margin-bottom:56px}
.contact-row{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.contact-pill{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:48px;padding:14px 28px;font-size:clamp(.95rem,1.3vw,1.2rem)}
.contact-pill .lbl{opacity:.4;font-size:clamp(.65rem,.9vw,.85rem);text-transform:uppercase;letter-spacing:.1em}

/* HUD */
#counter{position:fixed;top:32px;right:48px;z-index:20;font-size:clamp(.72rem,1vw,.95rem);font-weight:500;letter-spacing:.12em;color:rgba(255,255,255,.25)}
#brand{position:fixed;bottom:28px;left:48px;z-index:20;font-size:clamp(.68rem,.95vw,.9rem);font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.18)}
.nav-arrows{position:fixed;bottom:24px;right:160px;z-index:20;display:flex;gap:10px}
.nav-btn{width:46px;height:46px;border:1px solid rgba(255,255,255,.18);border-radius:10px;background:rgba(255,255,255,.03);color:rgba(255,255,255,.5);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(8px)}
.nav-btn:hover{background:rgba(0,212,255,.12);border-color:rgba(0,212,255,.3);color:var(--teal)}

@keyframes fistPump{0%{transform:translateY(0)}30%{transform:translateY(-14px) scale(1.15)}50%{transform:translateY(-18px) scale(1.2)}70%{transform:translateY(-14px) scale(1.15)}100%{transform:translateY(0)}}
@media(max-width:900px){.case-slide{flex-direction:column;text-align:center}.case-image{flex:none;width:85%;max-width:none;margin:0 auto}.case-bl li{text-align:left}}

/* ── Annotation overlay ── */
#anno-toggle,#move-toggle{position:fixed;top:24px;z-index:1000;border:1px solid rgba(0,212,255,.4);color:var(--teal);font-family:var(--font);font-size:.66rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;padding:8px 14px;border-radius:6px;cursor:pointer;backdrop-filter:blur(8px);transition:all .2s;background:rgba(0,212,255,.1)}
#anno-toggle{left:24px}
#move-toggle{left:148px;border-color:rgba(245,158,11,.4);color:var(--amber);background:rgba(245,158,11,.1)}
#anno-toggle:hover{background:rgba(0,212,255,.2)}
#move-toggle:hover{background:rgba(245,158,11,.2)}
#anno-toggle.active{background:var(--amber);color:#060810;border-color:var(--amber)}
#move-toggle.active{background:var(--rose);color:#060810;border-color:var(--rose)}
body.annotate-mode *:not(#anno-panel):not(#anno-panel *):not(#anno-toggle):not(#move-toggle):not(#slide-grid):not(#slide-grid *):not(#slide-grid-zone):hover{outline:2px dashed var(--teal)!important;outline-offset:2px;cursor:crosshair!important}
body.move-mode .slide.active *:not(#anno-toggle):not(#move-toggle):hover{outline:2px dashed var(--amber)!important;outline-offset:2px;cursor:move!important}
body.move-mode .slide.active *{user-select:none}
.dragging{opacity:.85!important;outline:2px solid var(--amber)!important}
#anno-panel{position:fixed;top:70px;left:24px;z-index:1001;width:320px;max-height:70vh;background:rgba(10,12,24,.96);border:1px solid rgba(0,212,255,.3);border-radius:10px;padding:16px;font-family:var(--font);font-size:.78rem;color:var(--text);backdrop-filter:blur(12px);overflow-y:auto;display:none}
#anno-panel.visible{display:block}
#anno-panel h3{font-size:.68rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--teal);margin-bottom:10px}
#anno-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;max-height:300px;overflow-y:auto}
.anno-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:8px 10px;font-size:.72rem;line-height:1.4}
.anno-item .anno-meta{font-size:.6rem;color:var(--dim);margin-bottom:4px;font-weight:500}
.anno-item .anno-rm{float:right;color:var(--rose);cursor:pointer;font-size:.68rem;opacity:.6;margin-left:6px}
.anno-item .anno-rm:hover{opacity:1}
.anno-actions{display:flex;gap:8px}
.anno-btn{flex:1;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);color:var(--teal);font-family:var(--font);font-size:.65rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:8px;border-radius:5px;cursor:pointer;transition:all .15s}
.anno-btn:hover{background:rgba(0,212,255,.2)}
.anno-btn.danger{color:var(--rose);border-color:rgba(244,63,94,.3);background:rgba(244,63,94,.06)}
.anno-btn.danger:hover{background:rgba(244,63,94,.15)}
#anno-prompt{position:fixed;z-index:1002;background:rgba(10,12,24,.98);border:1px solid var(--teal);border-radius:8px;padding:12px;display:none;flex-direction:column;gap:8px;width:280px;backdrop-filter:blur(12px)}
#anno-prompt.visible{display:flex}
#anno-prompt .anno-target{font-size:.62rem;color:var(--dim);font-family:monospace;word-break:break-all}
#anno-prompt textarea{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--text);font-family:var(--font);font-size:.78rem;padding:8px;border-radius:5px;resize:vertical;min-height:60px;outline:none}
#anno-prompt textarea:focus{border-color:var(--teal)}
#anno-prompt .anno-prompt-actions{display:flex;gap:6px;justify-content:flex-end}
#anno-empty{color:var(--dim);font-size:.7rem;font-style:italic;text-align:center;padding:14px 0}
#anno-toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--teal);color:#060810;padding:10px 18px;border-radius:6px;font-size:.72rem;font-weight:600;letter-spacing:.05em;z-index:1003;opacity:0;transition:opacity .3s;pointer-events:none}
#anno-toast.show{opacity:1}
</style>
</head>
<body>
<div class="bg"><div class="bg-gradient"></div><canvas id="stars"></canvas></div>
<div id="deck"></div>
<div id="tracker"><svg id="tracker-svg" viewBox="0 0 120 120"></svg></div>
<div id="counter"></div>
<div id="brand">Agile Lens · HXR 2026</div>
<div class="nav-arrows"><button class="nav-btn" id="btn-prev">←</button><button class="nav-btn" id="btn-next">→</button></div>

<!-- Slide jump grid (hover bottom of screen to reveal) -->
<div id="slide-grid-zone"></div>
<div id="slide-grid"></div>

<!-- Annotation overlay -->
<button id="anno-toggle" title="Toggle annotation mode (A)">📝 Annotate</button>
<button id="move-toggle" title="Toggle move mode (M) — drag elements to reposition them">✋ Move Mode</button>
<div id="anno-panel">
  <h3>Annotations</h3>
  <div id="anno-list"></div>
  <div class="anno-actions">
    <button class="anno-btn" id="anno-export">📋 Copy All</button>
    <button class="anno-btn danger" id="anno-clear">Clear</button>
  </div>
</div>
<div id="anno-prompt">
  <div class="anno-target" id="anno-target-text"></div>
  <textarea id="anno-text" placeholder="What should change?"></textarea>
  <div class="anno-prompt-actions">
    <button class="anno-btn" id="anno-cancel" style="flex:0">Cancel</button>
    <button class="anno-btn" id="anno-save" style="flex:0">Save</button>
  </div>
</div>
<div id="anno-toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════════════════
   ENGINE — slide generation, navigation, monocle tracker, map animation
   ═══════════════════════════════════════════════════════════════════════ */

// Stars
const cv=document.getElementById('stars'),sc=cv.getContext('2d');let st=[];
function initS(){cv.width=innerWidth;cv.height=innerHeight;st=Array.from({length:110},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height*.6,r:Math.random()*1.2+.2,o:Math.random()*.4+.05,d:(Math.random()-.5)*.013}))}
function drawS(){sc.clearRect(0,0,cv.width,cv.height);st.forEach(s=>{sc.beginPath();sc.arc(s.x,s.y,s.r,0,Math.PI*2);sc.fillStyle=`rgba(210,225,255,${s.o})`;sc.fill();s.o+=s.d;if(s.o<.04||s.o>.55)s.d*=-1});requestAnimationFrame(drawS)}
initS();drawS();addEventListener('resize',initS);

const deck=document.getElementById('deck'),allSlides=[],lessonIdxs=[];

// ── Build cover ──
const cov=document.createElement('div');cov.className='slide active';cov.dataset.type='cover';
cov.innerHTML=`<div class="event-tag">HXR · Harvard XR Conference · April 11, 2026</div>
<h1 class="talk-title">10 Lessons<br>from 10 Years</h1>
<p class="talk-subtitle">Running an XR Enterprise Studio</p>
<div class="speaker-card"><div><div class="speaker-name">Alex Coulombe</div><div class="speaker-co">CEO, Agile Lens</div></div><div class="card-sep"></div><div class="event-detail">Closing Keynote<br>Gund Hall, Harvard</div></div>`;
deck.appendChild(cov);allSlides.push(cov);

// ── Build sections ──
SECTIONS.forEach((sec,si)=>{
  const ac=sec.accent!=='teal'?` accent-${sec.accent}`:'';
  sec.cases.forEach((c,ci)=>{
    const s=document.createElement('div');s.className=`slide case-slide${ac}`;s.dataset.type='case';s.dataset.year=sec.year;s.dataset.section=si;
    const img=c.img?`<img src="${c.img}" alt="${c.title}" loading="lazy">`:`<div class="ph">Image TBD</div>`;
    s.innerHTML=`<div class="case-image">${img}</div><div class="case-content">
      <div class="case-ytag">${sec.year} · Case Study ${ci+1}/${sec.cases.length}</div>
      <h2 class="case-title">${c.title}</h2><p class="case-sub">${c.subtitle}</p>
      <ul class="case-bl">${c.bullets.map(b=>`<li>${b}</li>`).join('')}</ul></div>`;
    deck.appendChild(s);allSlides.push(s);
  });
  const ls=document.createElement('div');ls.className=`slide slide-lesson${ac}`;ls.dataset.type='lesson';ls.dataset.year=sec.year;ls.dataset.section=si;ls.dataset.ln=si+1;
  ls.innerHTML=`<div class="year-ghost">${sec.year}</div>
    <div class="lesson-ey"><span class="ey-yr">${sec.year}</span><span class="ey-sep">·</span><span class="ey-badge">Lesson ${String(si+1).padStart(2,'0')} / 10</span></div>
    <h2 class="lesson-title">${sec.lesson.title}</h2><p class="lesson-tagline">${sec.lesson.tagline}</p>
    ${sec.lesson.tags?`<div class="lesson-tags">${sec.lesson.tags}</div>`:''}<div class="lesson-rule"></div>`;
  deck.appendChild(ls);allSlides.push(ls);lessonIdxs.push(allSlides.length-1);
});

// ── Bonus ──
const bon=document.createElement('div');bon.className='slide slide-lesson slide-bonus';bon.dataset.type='bonus';bon.dataset.year=2026;
bon.innerHTML=`<div class="year-ghost">2026</div><div class="lesson-ey"><span class="ey-yr">2026</span><span class="ey-sep">·</span><span class="ey-badge" style="color:var(--amber)">BONUS LESSON</span></div>
<h2 class="lesson-title">${BONUS.title}</h2><p class="lesson-tagline">${BONUS.tagline}</p><div class="lesson-rule" style="background:var(--amber)"></div>`;
deck.appendChild(bon);allSlides.push(bon);

// ── Map ──
const mapS=document.createElement('div');mapS.className='slide slide-map';mapS.dataset.type='map';
mapS.innerHTML=`<div class="map-label">The Journey, Mapped</div><svg id="map-svg" viewBox="0 0 1000 600"></svg>`;
deck.appendChild(mapS);allSlides.push(mapS);

// ── Close ──
const cls=document.createElement('div');cls.className='slide';cls.dataset.type='close';
cls.innerHTML=`<div class="close-ey">Thank You · HXR 2026</div><h2 class="close-title">Let's Keep<br>Building</h2><p class="close-sub">Ten years in. Just getting started.</p>
<div class="contact-row"><div class="contact-pill"><span class="lbl">Studio</span>Agile Lens</div><div class="contact-pill"><span class="lbl">Web</span>agilelens.com</div><div class="contact-pill"><span class="lbl">X / IG</span>@agile_lens</div></div>`;
deck.appendChild(cls);allSlides.push(cls);

const total=allSlides.length;let current=0;const counterEl=document.getElementById('counter');

// ── Nav ──
function updateHUD(){counterEl.textContent=`${String(current+1).padStart(2,'0')} / ${String(total).padStart(2,'0')}`;updateTracker()}
let animating=false;
function goTo(n){
  if(n<0||n>=total||n===current||animating)return;
  animating=true;const fwd=n>current;
  const p=allSlides[current],nx=allSlides[n];
  // Ensure no stale active slides
  allSlides.forEach(s=>{if(s!==p&&s!==nx){s.classList.remove('active');s.style.animation='';s.style.cssText=''}});
  // Exit previous
  p.classList.remove('active');
  p.style.animation=(fwd?'slideOutFwd':'slideOutBwd')+' .45s cubic-bezier(.4,0,.2,1) forwards';
  setTimeout(()=>{p.style.animation='';p.style.cssText=''},500);
  // Enter next
  nx.style.animation=(fwd?'slideInFwd':'slideInBwd')+' .5s cubic-bezier(.4,0,.2,1) forwards';
  nx.classList.add('active');
  current=n;updateHUD();
  if(allSlides[current].dataset.type==='map')setTimeout(startMap,400);
  setTimeout(()=>{animating=false},520);
}
document.getElementById('btn-prev').addEventListener('click',()=>goTo(current-1));
document.getElementById('btn-next').addEventListener('click',()=>goTo(current+1));
document.addEventListener('keydown',e=>{
  // Don't intercept keys when typing in inputs (annotation textarea)
  if(['INPUT','TEXTAREA'].includes(document.activeElement?.tagName))return;
  // Forward: arrows, space, PageDown, N, period (most clickers send PageDown)
  if(['ArrowRight','ArrowDown',' ','PageDown','n','N'].includes(e.key)){e.preventDefault();goTo(current+1)}
  // Backward: arrows, PageUp, P
  if(['ArrowLeft','ArrowUp','PageUp','p','P'].includes(e.key)){e.preventDefault();goTo(current-1)}
  if(e.key==='Home'){e.preventDefault();goTo(0)}
  if(e.key==='End'){e.preventDefault();goTo(total-1)}
});

// ── Slide jump grid ──
const sgEl=document.getElementById('slide-grid');
const sgZone=document.getElementById('slide-grid-zone');
allSlides.forEach((s,i)=>{
  const t=document.createElement('div');
  const type=s.dataset.type;
  t.className='sg-thumb sg-'+type;
  t.dataset.idx=i;
  let label='';
  if(type==='cover')label='Cover';
  else if(type==='case')label=s.dataset.year+' ▸';
  else if(type==='lesson')label='L'+s.dataset.ln+' '+s.dataset.year;
  else if(type==='bonus')label='★ Bonus';
  else if(type==='map')label='Map';
  else if(type==='close')label='Thank You';
  t.innerHTML=`<div class="sg-num">${String(i+1).padStart(2,'0')}</div><div class="sg-label">${label}</div>`;
  t.addEventListener('click',()=>goTo(i));
  sgEl.appendChild(t);
});

// Reveal grid on hover at bottom of screen
let sgHideTimer;
function sgShow(){clearTimeout(sgHideTimer);sgEl.classList.add('visible')}
function sgHide(){sgHideTimer=setTimeout(()=>sgEl.classList.remove('visible'),300)}
sgZone.addEventListener('mouseenter',sgShow);
sgEl.addEventListener('mouseenter',sgShow);
sgEl.addEventListener('mouseleave',sgHide);
sgZone.addEventListener('mouseleave',sgHide);

// Keep active thumb highlighted (hook into updateHUD).
// Don't call updateHUD() here — trackerEl (used by updateTracker) is declared
// later in this script, so calling it now would throw a TDZ error and halt
// the rest of the script. The original updateHUD() call below (after the
// monocle tracker setup) initializes everything safely.
const _origUpdateHUD=updateHUD;
updateHUD=function(){
  _origUpdateHUD();
  sgEl.querySelectorAll('.sg-thumb').forEach((t,i)=>t.classList.toggle('active',i===current));
  // Auto-scroll active thumb into view
  const active=sgEl.querySelector('.sg-thumb.active');
  if(active&&sgEl.classList.contains('visible'))active.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});
};
let tx=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX},{passive:true});
document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50)goTo(current+(dx<0?1:-1))},{passive:true});

// ── Monocle tracker ──
const trackerEl=document.getElementById('tracker'),tsvg=document.getElementById('tracker-svg');
const TCX=54,TCY=50,TR=34;
function svgE(t,a){const e=document.createElementNS('http://www.w3.org/2000/svg',t);if(a)Object.entries(a).forEach(([k,v])=>e.setAttribute(k,v));return e}

(function buildTracker(){
  tsvg.appendChild(svgE('circle',{cx:TCX,cy:TCY,r:TR,fill:'none',stroke:'rgba(255,255,255,.08)','stroke-width':'1.5'}));
  const cordEnd={x:TCX+TR+14,y:TCY+TR+16};
  tsvg.appendChild(svgE('path',{d:`M${TCX+TR} ${TCY} Q${TCX+TR+9} ${TCY+TR*.6} ${cordEnd.x} ${cordEnd.y}`,fill:'none',stroke:'rgba(245,158,11,.15)','stroke-width':'1.5','stroke-linecap':'round'}));
  tsvg.appendChild(svgE('circle',{cx:cordEnd.x,cy:cordEnd.y,r:'3',fill:'none',stroke:'rgba(245,158,11,.3)','stroke-width':'1',id:'tb'}));
  for(let i=0;i<10;i++){const a=(-90+i*36)*Math.PI/180;tsvg.appendChild(svgE('circle',{cx:TCX+TR*Math.cos(a),cy:TCY+TR*Math.sin(a),r:'2.5',fill:'rgba(255,255,255,.12)',id:`td${i}`}))}
  // avatar (little person)
  const ag=svgE('g',{id:'tav'});
  ag.appendChild(svgE('circle',{cx:0,cy:-5,r:'3.2',fill:'#fcd9b6'})); // head
  ag.appendChild(svgE('rect',{x:'-2.5',y:'-2',width:'5',height:'7',rx:'1.5',fill:'var(--teal)'})); // body
  ag.appendChild(svgE('rect',{x:'-3.5',y:'-9',width:'7',height:'3',rx:'1',fill:'#8B5E3C',id:'tav-hair'})); // hair
  tsvg.appendChild(ag);
})();

function updateTracker(){
  const type=allSlides[current].dataset.type;
  const show=type==='case'||type==='lesson'||type==='bonus';
  trackerEl.classList.toggle('visible',show);if(!show)return;
  const si=parseInt(allSlides[current].dataset.section??-1);
  const isBonus=type==='bonus';
  // lesson dots
  for(let i=0;i<10;i++){
    const d=document.getElementById(`td${i}`);
    const past=i<si||(i===si&&type==='lesson')||isBonus;
    d.setAttribute('fill',past?'rgba(0,212,255,.65)':i===si?'rgba(0,212,255,.35)':'rgba(255,255,255,.12)');
    d.setAttribute('r',i===si&&!isBonus?'3.5':'2.5');
  }
  document.getElementById('tb').setAttribute('fill',isBonus?'rgba(245,158,11,.7)':'none');
  // avatar position
  const av=document.getElementById('tav');
  const hair=document.getElementById('tav-hair');
  // beard after 2020
  const yr=parseInt(allSlides[current].dataset.year||2016);
  hair.setAttribute('fill', yr>=2020?'#6B4226':'#8B5E3C'); // darker = beardier era
  if(isBonus){
    av.setAttribute('transform',`translate(${TCX+TR+14},${TCY+TR+10})`);
  } else {
    const idx=Math.max(0,Math.min(si,9));
    const a=(-90+idx*36)*Math.PI/180;
    av.setAttribute('transform',`translate(${TCX+TR*Math.cos(a)},${TCY+TR*Math.sin(a)-6})`);
  }
}
updateHUD();

// ── Map animation ──
// Monocle geometry: ring center, radius, cord attachment at ~5 o'clock, bonus at eyepiece circle
const LSHORT=SECTIONS.map(s=>s.lesson.title.replace('\n',' '));
const MX=440,MY=260,MR=195;
// Cord attaches at ~5 o'clock on the ring (150° from 12 = angle 60° in our system)
const CORD_ANGLE=55*Math.PI/180; // between nodes 4 and 5 on the ring
const CORD_A={x:MX+MR*Math.cos(CORD_ANGLE), y:MY+MR*Math.sin(CORD_ANGLE)}; // ~553,420
const CORD_B={x:CORD_A.x+95, y:CORD_A.y+100}; // bonus eyepiece ~648,520
function mPos(i){const a=(-90+i*36)*Math.PI/180;return{x:MX+MR*Math.cos(a),y:MY+MR*Math.sin(a)}}

// Constellation line pairs (connecting non-adjacent nodes for star pattern)
const CONSTELLATION_LINES=[[0,3],[1,5],[2,7],[3,8],[4,9],[5,0],[6,1],[7,2],[8,4],[9,6]];

// Monocle logo overlay geometry (to align monocle-white.png with the circle)
// The monocle PNG is 852×877, ring center at ~(410,385), ring outer radius ~380px
// We align the ring's CENTER stroke (not inner edge) with our constellation circle
const LOGO_SCALE=MR/355;
const LOGO_W=852*LOGO_SCALE, LOGO_H=877*LOGO_SCALE;
const LOGO_X=MX-410*LOGO_SCALE, LOGO_Y=MY-385*LOGO_SCALE;

let mapDone=false;
function startMap(){
  if(mapDone)return;mapDone=true;
  const svg=document.getElementById('map-svg');svg.innerHTML='';
  const CIRC=2*Math.PI*MR;

  // defs
  const defs=svgE('defs');
  const f=svgE('filter',{id:'gl',x:'-40%',y:'-40%',width:'180%',height:'180%'});
  f.appendChild(svgE('feGaussianBlur',{stdDeviation:'3',result:'b'}));
  const mg=svgE('feMerge');mg.appendChild(svgE('feMergeNode',{in:'b'}));mg.appendChild(svgE('feMergeNode',{in:'SourceGraphic'}));
  f.appendChild(mg);defs.appendChild(f);
  // softer glow for constellation lines
  const f2=svgE('filter',{id:'gl2',x:'-50%',y:'-50%',width:'200%',height:'200%'});
  f2.appendChild(svgE('feGaussianBlur',{stdDeviation:'1.5',result:'b2'}));
  const mg2=svgE('feMerge');mg2.appendChild(svgE('feMergeNode',{in:'b2'}));mg2.appendChild(svgE('feMergeNode',{in:'SourceGraphic'}));
  f2.appendChild(mg2);defs.appendChild(f2);
  svg.appendChild(defs);

  // Monocle logo image (hidden, fades in at the end as the "reveal")
  const logoImg=svgE('image',{href:'monocle-white.png',x:LOGO_X,y:LOGO_Y,width:LOGO_W,height:LOGO_H,opacity:'0'});
  logoImg.style.transition='opacity 1.8s ease-in';
  svg.appendChild(logoImg);

  // Faint guide circle
  svg.appendChild(svgE('circle',{cx:MX,cy:MY,r:MR,fill:'none',stroke:'rgba(0,212,255,.05)','stroke-width':'1'}));

  // Constellation lines (thin, connecting non-adjacent nodes — appear with a delay)
  const constLines=[];
  CONSTELLATION_LINES.forEach(([a,b])=>{
    const pa=mPos(a),pb=mPos(b);
    const line=svgE('line',{x1:pa.x,y1:pa.y,x2:pb.x,y2:pb.y,stroke:'rgba(0,212,255,.06)','stroke-width':'0.5',filter:'url(#gl2)',opacity:'0'});
    line.style.transition='opacity .6s';
    svg.appendChild(line);
    constLines.push(line);
  });

  // Animated ring (draws clockwise from top)
  const ring=svgE('circle',{cx:MX,cy:MY,r:MR,fill:'none',stroke:'rgba(0,212,255,.55)','stroke-width':'1.8',
    'stroke-dasharray':CIRC,'stroke-dashoffset':CIRC,'stroke-linecap':'round',
    transform:`rotate(-90 ${MX} ${MY})`,filter:'url(#gl)'});
  svg.appendChild(ring);

  // Cord path (from ~5 o'clock on ring to bonus eyepiece)
  const cordCtrl={x:CORD_A.x+55,y:CORD_A.y+60};
  const cord=svgE('path',{d:`M${CORD_A.x} ${CORD_A.y} Q${cordCtrl.x} ${cordCtrl.y} ${CORD_B.x} ${CORD_B.y}`,
    fill:'none',stroke:'rgba(245,158,11,.55)','stroke-width':'1.8',
    'stroke-dasharray':'200','stroke-dashoffset':'200','stroke-linecap':'round',filter:'url(#gl)'});
  svg.appendChild(cord);

  // Year nodes (on the ring)
  const nEls=[];
  for(let i=0;i<10;i++){
    const p=mPos(i),dx=p.x-MX,dy=p.y-MY,len=Math.hypot(dx,dy);
    const lx=p.x+(dx/len)*34,ly=p.y+(dy/len)*34;
    const anc=p.x>MX+20?'start':p.x<MX-20?'end':'middle';
    const g=svgE('g',{opacity:'0',class:'recap-pill'});g.style.transition='opacity .4s';g.dataset.lesson=i;
    // star glow
    g.appendChild(svgE('circle',{cx:p.x,cy:p.y,r:'16',fill:'rgba(0,212,255,.02)',stroke:'rgba(0,212,255,.08)','stroke-width':'0.5'}));
    // center star
    g.appendChild(svgE('circle',{cx:p.x,cy:p.y,r:'4.5',fill:'rgba(0,212,255,.15)',stroke:'rgba(0,212,255,.65)','stroke-width':'1.5'}));
    // year label
    const yr=svgE('text',{x:lx,y:ly-(p.y<MY?12:0),'text-anchor':anc,fill:'rgba(0,212,255,.8)',
      'font-family':'Space Grotesk,sans-serif','font-size':'10.5','font-weight':'600','letter-spacing':'1.2'});
    yr.textContent=2016+i;g.appendChild(yr);
    // lesson label
    const tt=svgE('text',{x:lx,y:ly+(p.y<MY?3:14),'text-anchor':anc,fill:'rgba(255,255,255,.38)',
      'font-family':'Space Grotesk,sans-serif','font-size':'8','font-weight':'400'});
    tt.textContent=LSHORT[i];g.appendChild(tt);
    g.addEventListener('click',()=>{if(lessonIdxs[i]!==undefined)goTo(lessonIdxs[i])});
    svg.appendChild(g);nEls.push(g);
  }

  // Bonus node (the eyepiece circle of the monocle)
  const bG=svgE('g',{opacity:'0'});bG.style.transition='opacity .5s';
  bG.appendChild(svgE('circle',{cx:CORD_B.x,cy:CORD_B.y,r:'18',fill:'rgba(245,158,11,.02)',stroke:'rgba(245,158,11,.1)','stroke-width':'0.5'}));
  bG.appendChild(svgE('circle',{cx:CORD_B.x,cy:CORD_B.y,r:'6',fill:'rgba(245,158,11,.15)',stroke:'rgba(245,158,11,.65)','stroke-width':'1.5'}));
  const bYr=svgE('text',{x:CORD_B.x+22,y:CORD_B.y-5,'text-anchor':'start',fill:'rgba(245,158,11,.85)',
    'font-family':'Space Grotesk,sans-serif','font-size':'10.5','font-weight':'600','letter-spacing':'1.2'});
  bYr.textContent='2026';bG.appendChild(bYr);
  const bTt=svgE('text',{x:CORD_B.x+22,y:CORD_B.y+10,'text-anchor':'start',fill:'rgba(255,255,255,.35)',
    'font-family':'Space Grotesk,sans-serif','font-size':'8'});
  bTt.textContent='The Demo Will Break';bG.appendChild(bTt);
  svg.appendChild(bG);

  // Center text
  const cL=svgE('text',{x:MX,y:MY-4,'text-anchor':'middle','dominant-baseline':'middle',fill:'rgba(255,255,255,0)',
    'font-family':'Space Grotesk,sans-serif','font-size':'20','font-weight':'600','letter-spacing':'4'});
  cL.textContent='AGILE LENS';svg.appendChild(cL);
  const cS=svgE('text',{x:MX,y:MY+20,'text-anchor':'middle','dominant-baseline':'middle',fill:'rgba(255,255,255,0)',
    'font-family':'Space Grotesk,sans-serif','font-size':'10','font-weight':'400','letter-spacing':'2.5'});
  cS.textContent='2016 – 2026';svg.appendChild(cS);

  // Avatar (fist pump celebration — appears in center at the end)
  const avG=svgE('g',{opacity:'0',id:'map-av'});avG.style.transition='opacity .6s';
  avG.appendChild(svgE('circle',{cx:MX,cy:MY-70,r:'9',fill:'#fcd9b6'}));
  avG.appendChild(svgE('rect',{x:MX-7,y:MY-61,width:'14',height:'18',rx:'3',fill:'#a78bfa'}));
  avG.appendChild(svgE('rect',{x:MX-9,y:MY-81,width:'18',height:'7',rx:'2',fill:'#6B4226'}));
  avG.appendChild(svgE('rect',{x:MX-5,y:MY-64,width:'10',height:'4',rx:'2',fill:'#5C3D1F'}));
  avG.appendChild(svgE('line',{x1:MX+7,y1:MY-56,x2:MX+16,y2:MY-80,stroke:'#fcd9b6','stroke-width':'3.5','stroke-linecap':'round'}));
  avG.appendChild(svgE('circle',{cx:MX+17,cy:MY-82,r:'4',fill:'#fcd9b6'}));
  avG.appendChild(svgE('line',{x1:MX-3,y1:MY-43,x2:MX-6,y2:MY-30,stroke:'#4a5568','stroke-width':'3.5','stroke-linecap':'round'}));
  avG.appendChild(svgE('line',{x1:MX+3,y1:MY-43,x2:MX+6,y2:MY-30,stroke:'#4a5568','stroke-width':'3.5','stroke-linecap':'round'}));
  svg.appendChild(avG);

  // ── Animation sequence ──
  const DLY=300, CDUR=3200, STP=CDUR/10;

  // 1. Ring draws (0.3s – 3.5s)
  let rs=null;
  function aR(ts){if(!rs)rs=ts;const p=Math.min((ts-rs)/CDUR,1);const e=p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;ring.setAttribute('stroke-dashoffset',CIRC*(1-e));if(p<1)requestAnimationFrame(aR)}
  setTimeout(()=>requestAnimationFrame(aR),DLY);

  // 2. Nodes appear as ring passes through (star by star)
  nEls.forEach((g,i)=>setTimeout(()=>{g.style.opacity='1'},DLY+i*STP+80));

  // 3. Constellation lines fade in after their nodes appear
  constLines.forEach((line,i)=>{
    const [a,b]=CONSTELLATION_LINES[i];
    const t=DLY+Math.max(a,b)*STP+200;
    setTimeout(()=>{line.style.opacity='1'},t);
  });

  // 4. Cord draws after ring completes
  const cStart=DLY+CDUR+250;
  let cs2=null;
  function aC(ts){if(!cs2)cs2=ts;const p=Math.min((ts-cs2)/800,1);cord.setAttribute('stroke-dashoffset',200*(1-p));if(p<1)requestAnimationFrame(aC)}
  setTimeout(()=>requestAnimationFrame(aC),cStart);

  // 5. Bonus node appears
  setTimeout(()=>{bG.style.opacity='1'},cStart+800);

  // 6. Center text fades in
  setTimeout(()=>{
    cL.setAttribute('fill','rgba(255,255,255,.65)');cL.style.transition='fill 1s';
    cS.setAttribute('fill','rgba(255,255,255,.22)');cS.style.transition='fill 1s';
  },cStart+1100);

  // 7. Monocle logo fades in behind everything (the constellation IS the logo — reveal moment)
  setTimeout(()=>{ logoImg.style.opacity='0.09'; },cStart+1500);

  // 8. Avatar celebration
  setTimeout(()=>{avG.style.opacity='1';avG.style.animation='fistPump .65s ease-in-out'},cStart+2000);
}

/* ═══════════════════════════════════════════════════════════════════════
   ANNOTATION OVERLAY — click elements to leave notes, export as markdown
   ═══════════════════════════════════════════════════════════════════════ */
const ANNO_KEY = 'hxr-keynote-annotations';
let annoMode = false;
let pendingTarget = null;

function annoLoad(){ try{return JSON.parse(localStorage.getItem(ANNO_KEY)||'[]')}catch(e){return []} }
function annoSave(arr){ localStorage.setItem(ANNO_KEY, JSON.stringify(arr)) }

function annoToast(msg){
  const t=document.getElementById('anno-toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

// Build a stable selector for an element
function annoSelector(el){
  if(el.id) return '#'+el.id;
  const path=[];
  let cur=el, depth=0;
  while(cur && cur!==document.body && depth<5){
    let part=cur.tagName.toLowerCase();
    if(cur.id){ part='#'+cur.id; path.unshift(part); break; }
    if(cur.classList.length){
      const cls=Array.from(cur.classList).filter(c=>!['active','exit-fwd','exit-bwd'].includes(c)).slice(0,2).join('.');
      if(cls) part+='.'+cls;
    }
    // nth-of-type if siblings exist
    const sibs=Array.from(cur.parentNode?.children||[]).filter(s=>s.tagName===cur.tagName);
    if(sibs.length>1){ part+=':nth-of-type('+(sibs.indexOf(cur)+1)+')'; }
    path.unshift(part);
    cur=cur.parentElement; depth++;
  }
  return path.join(' > ');
}

// Get slide context (year/type) for the element if it lives inside a slide
function annoContext(el){
  const slide=el.closest('.slide');
  if(!slide) return null;
  const type=slide.dataset.type||'?';
  const year=slide.dataset.year||'';
  return year ? `${type} ${year}` : type;
}

function annoRender(){
  const list=document.getElementById('anno-list');
  const items=annoLoad();
  if(items.length===0){
    list.innerHTML='<div id="anno-empty">No annotations yet.<br>Click any element on the page.</div>';
    return;
  }
  list.innerHTML=items.map((a,i)=>`
    <div class="anno-item">
      <span class="anno-rm" data-i="${i}">×</span>
      <div class="anno-meta">${a.context||'—'} · <code>${a.selector}</code></div>
      <div>${a.text.replace(/</g,'&lt;')}</div>
    </div>`).join('');
  list.querySelectorAll('.anno-rm').forEach(b=>b.addEventListener('click',e=>{
    const i=+e.target.dataset.i;
    const arr=annoLoad(); arr.splice(i,1); annoSave(arr); annoRender();
  }));
}

function annoToggleMode(on){
  annoMode = on===undefined ? !annoMode : on;
  document.body.classList.toggle('annotate-mode',annoMode);
  document.getElementById('anno-toggle').classList.toggle('active',annoMode);
  document.getElementById('anno-toggle').textContent=annoMode?'✕ Exit Annotate':'📝 Annotate';
  document.getElementById('anno-panel').classList.toggle('visible',annoMode);
  if(annoMode) annoRender();
  if(!annoMode) document.getElementById('anno-prompt').classList.remove('visible');
}

document.getElementById('anno-toggle').addEventListener('click',()=>annoToggleMode());

// Keyboard shortcut: A toggles annotate mode
document.addEventListener('keydown',e=>{
  if(e.key==='a'||e.key==='A'){
    if(['INPUT','TEXTAREA'].includes(document.activeElement?.tagName))return;
    e.preventDefault(); annoToggleMode();
  }
});

// Click handler in annotate mode
document.addEventListener('click',e=>{
  if(!annoMode)return;
  // Ignore clicks on the annotation UI itself
  if(e.target.closest('#anno-toggle')||e.target.closest('#anno-panel')||e.target.closest('#anno-prompt')||e.target.closest('#anno-toast'))return;
  e.preventDefault(); e.stopPropagation();
  pendingTarget=e.target;
  const sel=annoSelector(e.target);
  const ctx=annoContext(e.target);
  document.getElementById('anno-target-text').textContent=(ctx?ctx+' → ':'')+sel;
  const prompt=document.getElementById('anno-prompt');
  // Position prompt near click
  const x=Math.min(e.clientX+10, innerWidth-300);
  const y=Math.min(e.clientY+10, innerHeight-200);
  prompt.style.left=x+'px'; prompt.style.top=y+'px';
  prompt.classList.add('visible');
  document.getElementById('anno-text').value='';
  setTimeout(()=>document.getElementById('anno-text').focus(),50);
},true);

document.getElementById('anno-cancel').addEventListener('click',()=>{
  document.getElementById('anno-prompt').classList.remove('visible');
  pendingTarget=null;
});

document.getElementById('anno-save').addEventListener('click',()=>{
  const text=document.getElementById('anno-text').value.trim();
  if(!text||!pendingTarget)return;
  const arr=annoLoad();
  arr.push({
    selector: annoSelector(pendingTarget),
    context: annoContext(pendingTarget),
    text,
    timestamp: new Date().toISOString()
  });
  annoSave(arr);
  document.getElementById('anno-prompt').classList.remove('visible');
  pendingTarget=null;
  annoRender();
  annoToast('Annotation saved');
});

// Cmd/Ctrl+Enter to save in textarea
document.getElementById('anno-text').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&(e.metaKey||e.ctrlKey)){ e.preventDefault(); document.getElementById('anno-save').click(); }
  if(e.key==='Escape'){ document.getElementById('anno-cancel').click(); }
});

document.getElementById('anno-export').addEventListener('click',()=>{
  const arr=annoLoad();
  if(arr.length===0){ annoToast('Nothing to copy'); return; }
  const md='# Keynote Annotations\n\n'+arr.map((a,i)=>
    `## ${i+1}. ${a.context||'—'}\n**Selector:** \`${a.selector}\`\n**Note:** ${a.text}\n`
  ).join('\n');
  navigator.clipboard.writeText(md).then(()=>annoToast(`Copied ${arr.length} annotation${arr.length>1?'s':''} to clipboard`));
});

document.getElementById('anno-clear').addEventListener('click',()=>{
  if(!confirm('Clear all annotations?'))return;
  annoSave([]); annoRender(); annoToast('Cleared');
});

/* ═══════════════════════════════════════════════════════════════════════
   MOVE MODE — drag any element to reposition; deltas saved as annotations
   ═══════════════════════════════════════════════════════════════════════ */
let moveMode=false;
let dragEl=null, dragStart=null;
const elDeltas=new Map(); // element -> {dx, dy}

function moveModeToggle(on){
  moveMode = on===undefined ? !moveMode : on;
  // Can't have both modes at once
  if(moveMode && annoMode) annoToggleMode(false);
  document.body.classList.toggle('move-mode', moveMode);
  document.getElementById('move-toggle').classList.toggle('active', moveMode);
  document.getElementById('move-toggle').textContent = moveMode ? '✕ Exit Move' : '✋ Move Mode';
  if(moveMode){
    annoToast('Move mode: drag any element. Release to save offset as annotation.');
  } else if(elDeltas.size>0){
    annoToast('Move mode off. Drags saved as annotations. Refresh to reset positions.');
  }
}

document.getElementById('move-toggle').addEventListener('click',()=>moveModeToggle());

document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA'].includes(document.activeElement?.tagName))return;
  if(e.key==='m'||e.key==='M'){ e.preventDefault(); moveModeToggle(); }
});

document.addEventListener('mousedown',e=>{
  if(!moveMode)return;
  if(e.target.closest('#move-toggle')||e.target.closest('#anno-toggle')||e.target.closest('#slide-grid')||e.target.closest('#slide-grid-zone')||e.target.closest('#anno-panel')||e.target.closest('#anno-prompt'))return;
  e.preventDefault(); e.stopPropagation();
  dragEl = e.target;
  const existing = elDeltas.get(dragEl) || {dx:0, dy:0};
  dragStart = { x:e.clientX, y:e.clientY, ix:existing.dx, iy:existing.dy };
  dragEl.classList.add('dragging');
}, true);

document.addEventListener('mousemove',e=>{
  if(!dragEl)return;
  const dx = dragStart.ix + (e.clientX - dragStart.x);
  const dy = dragStart.iy + (e.clientY - dragStart.y);
  elDeltas.set(dragEl, {dx, dy});
  // Apply transform — works for fixed, absolute, AND relative/static elements
  const existingTransform = dragEl.dataset.origTransform || '';
  if(!dragEl.dataset.origTransform){
    dragEl.dataset.origTransform = getComputedStyle(dragEl).transform === 'none' ? '' : getComputedStyle(dragEl).transform;
  }
  dragEl.style.transform = `${dragEl.dataset.origTransform} translate(${dx}px, ${dy}px)`;
}, true);

document.addEventListener('mouseup',e=>{
  if(!dragEl)return;
  const delta = elDeltas.get(dragEl);
  dragEl.classList.remove('dragging');
  if(delta && (Math.abs(delta.dx)>3 || Math.abs(delta.dy)>3)){
    const sel = annoSelector(dragEl);
    const ctx = annoContext(dragEl);
    const arr = annoLoad();
    // Look for an existing move annotation for this element and replace it
    const existing = arr.findIndex(a => a.type==='move' && a.selector===sel);
    const note = {
      selector: sel,
      context: ctx,
      text: `MOVE by Δ(${delta.dx>=0?'+':''}${Math.round(delta.dx)}px, ${delta.dy>=0?'+':''}${Math.round(delta.dy)}px) from current position`,
      timestamp: new Date().toISOString(),
      type: 'move',
      delta: {dx:Math.round(delta.dx), dy:Math.round(delta.dy)},
    };
    if(existing >= 0) arr[existing] = note; else arr.push(note);
    annoSave(arr);
    annoToast(`Saved: move ${sel} Δ(${Math.round(delta.dx)},${Math.round(delta.dy)})`);
    annoRender();
  }
  dragEl = null; dragStart = null;
}, true);
</script>
