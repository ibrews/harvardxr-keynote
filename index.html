<script>
/* ═══════════════════════════════════════════════════════════════════════
   PRESENTATION CONFIG — EDIT THIS SECTION TO CHANGE CONTENT
   ═══════════════════════════════════════════════════════════════════════
   Each section = a year of Agile Lens (2016–2025).
   Contains 1-3 case study slides → then a lesson slide.

   To swap a project: change title/subtitle/img/bullets in the cases array.
   To swap an image:   replace the img URL (or "" for gradient placeholder).
   To change a lesson: edit the lesson.title and lesson.tagline.
   ═══════════════════════════════════════════════════════════════════════ */
const SECTIONS = [
  {
    year: 2016, accent: 'teal',
    cases: [
      { title:'Four Seasons Lake Austin — The Spike Tape Story', subtitle:'A 5¢ solution to a $5,000 problem',
        img:'https://website-ivory-omega-78.vercel.app/portfolio/four-seasons-holodeck.jpg',
        bullets:['Mid-experience, guests sit in a physical chair that also exists in VR. Jonathan asked: "If only there was a way to make sure the chair was placed in exactly the right spot every time…"','Kevin Laibson: "Jonathan, I can\'t wait for you to meet our thousand-year-old invention — spike tape."','"It\'s not a VR experience that is similar to theater. It\'s a theater experience that has VR in it." — Kevin'] },
      { title:'The Shed @ Hudson Yards', subtitle:'Our first major VR architecture project',
        img:'https://website-ivory-omega-78.vercel.app/portfolio/the-shed.png',
        bullets:['Custom AR & VR walkthroughs for a $475M cultural venue','Parametric design options explored in real-time VR','We weren\'t doing film. We weren\'t doing games. We were doing stagecraft.'] },
    ],
    lesson: { title:'VR Is Theater.\nNot Film. Not Games.', tagline:'Film hands you cuts, wide shots, and montage to control where the audience looks. Games demand controller literacy and active participation. Theater is spatial, live, and trusts an audience to look anywhere they want — exactly like VR. Stop borrowing from cinema. Start borrowing from stagecraft.', tags:'Four Seasons · Christmas Carol VR · Stage Presence · RSC' },
  },
  {
    year: 2017, accent: 'purple',
    cases: [
      { title:'High Fidelity Live VR — The Improv Test', subtitle:'When the avatar arm breaks, what does an actor do?',
        img:'',
        bullets:['2019: Philip Rosedale asks Alex to assemble a NYC live-VR super-team. Alex\'s instinct: "I don\'t want CS graduates. I want theater people."','Improv-trained actors yes-and a broken avatar arm into the scene like it was intentional. Shakespeare-trained actors freeze and ask "can we fix my arm?"','In a live VR show there is no "check the gate, let\'s shoot another take." Live is live. Theater people get this in their bones.'] },
      { title:'Four Seasons — The 10-Studio Bake-Off', subtitle:'Pure Blink won on visuals. Agile Lens won on methodology.',
        img:'https://website-ivory-omega-78.vercel.app/portfolio/four-seasons-holodeck.jpg',
        bullets:['Jonathan pitched the same brief to 10 different studios. He hired two: Pure Blink for visual fidelity, Agile Lens for our particular method of problem-solving.','Diverse teams don\'t win on what they ship. They win on how they think.','Architects, theater directors, lighting designers, motion capture artists, choreographers — in the same room as engineers.'] },
    ],
    lesson: { title:'The Best XR Teams Look\nNothing Like Tech Teams', tagline:'XR is too new to have native experts, so we build them from everywhere. But don\'t go to zero on traditional engineers either — our early years without dedicated devs cost us in source control, QA, and project discipline. The principle is theater-first, engineering-second. Never engineering-zero.', tags:'Stage Presence · High Fidelity 2019 · Fisher Dachs Associates · Fisher Marantz Stone' },
  },
  {
    year: 2018, accent: 'amber',
    cases: [
      { title:'Infinite Reality → AI Dickens', subtitle:'Paid client work becomes internal R&D becomes published research',
        img:'',
        bullets:['London Tech Week 2023: Infinite Reality hires us to build a talking metahuman car salesman. We learn the Inworld + mocap pipeline on their dime.','We turn it into AI Dickens — an LLM-driven Charles Dickens who handles pre-show audience onboarding for Christmas Carol VR, then theatrically hands off to the human Ari Tarr at showtime.','That R&D became "Directing AI Performers" — a Contemporary Theatre Review paper. Cash cow funded our IP.'] },
      { title:'Intel Project Arena', subtitle:'Enterprise marketing pays for the art',
        img:'https://website-ivory-omega-78.vercel.app/portfolio/intel-project-arena.png',
        bullets:['Virtual arena showcasing Core i9 capabilities to thousands of attendees','Big-budget enterprise work pays the salaries — and stocks the war chest','City of Apparition, Salle d\'Or, Christmas Carol — none of those passion projects exist without the archviz that bankrolls them'] },
    ],
    lesson: { title:'Know Which Work Pays\nthe Bills. Do Both.', tagline:'Real estate visualization pays our salaries. VR theater and mixed-reality art installations make us worth hiring. The trick isn\'t picking one — it\'s building a cash cow specifically so you can bankroll the ambitious, low-margin work that nobody else will fund. You need both, or you eventually lose both.', tags:'Infinite Reality · Christmas Carol · Diriyah Gate · City of Apparition · Salle d\'Or' },
  },
  {
    year: 2019, accent: 'teal',
    cases: [
      { title:'Four Seasons — The 17-Person Chain', subtitle:'How a single client found us through a chain of 17 people',
        img:'',
        bullets:['Kim Bauman Larson → Paul Debevec → Jeff Model → Matthew Bannister → Jeff Powers → Jonathan. Roughly 17 people independently said "you should talk to Alex."','We never pitched Jonathan. We never sent a deck. We never made a cold call. He found us anyway.','That\'s the blessing. Now the curse: we have no business development muscle. Zero. We can\'t pitch because we\'ve never had to.'] },
      { title:'Royal Caribbean — Be The Second Studio', subtitle:'When the first team taps out, we\'re the call',
        img:'',
        bullets:['Framestore and Build had built the heavy PC-VR experience. Royal Caribbean needed it standalone, multiplayer, on a cruise ship.','We took it from "running on a dev workstation" to "running on a cruise ship." Same pattern as SK-II and Kiehl\'s.','Sometimes being sought-after means being the rescue call. That\'s a niche too.'] },
    ],
    lesson: { title:'Being Sought-After Is\na Blessing and a Curse', tagline:'Disney, the Kennedy Center, the Royal Shakespeare Company — they all found us. That\'s incredible. It also means we\'ve never had to learn how to sell. Inbound is feast-or-famine: when work shows up it\'s great, but no one calls when no one calls. Being sought-after and being able to pitch are different skills. Only one compounds.', tags:'Disney · Kennedy Center · RSC · Royal Caribbean · SK-II · Kiehl\'s' },
  },
  {
    year: 2020, accent: 'rose',
    cases: [
      { title:'October 2022 — The $60K Ask', subtitle:'The moment Agile Lens became a real company',
        img:'',
        bullets:['I was giving the longest talk of Unreal Fest 2022. Simultaneously running Waldorf Astoria solo. June had left for a German training company. I was burning out.','When Jonathan started the Four Seasons conversation, I mustered the courage for the first time to say: "Yes — but only if you pay us $60,000 up front for one month of R&D."','I didn\'t know he was talking to 9 other studios. He said yes. That retainer paid for June\'s first full-time role. Agile Lens stopped being me + contractors and became a real studio.'] },
      { title:'Samsung 2018 — The Counter-Example', subtitle:'$19,000 for a month of hard work',
        img:'',
        bullets:['No retainer. No R&D phase. I pretended I had all the answers because I thought asking for a discovery period made me look weak.','We finished the project. We undercharged by an order of magnitude. I burned out three contractors who were waiting on Samsung to pay us.','Every "what should I have done differently" answer points to one practice: ask for the deposit first.'] },
    ],
    lesson: { title:'Require a Deposit.\nBefore You Write a Line of Code.', tagline:'The single best operational decision we ever made. The first check separates the curious from the committed, gives you runway to actually staff the work, and buys you the right to say "we\'re not sure yet" instead of pretending you have all the answers. It filters out tire-kickers, protects the team from scope creep, and means your R&D never happens on your own dime.', tags:'Four Seasons · Samsung 360 · Weapons Free' },
  },
  {
    year: 2021, accent: 'purple',
    cases: [
      { title:'Christmas Carol VR — The ATL Upsell', subtitle:'A small ask becomes our annual flagship',
        img:'https://website-ivory-omega-78.vercel.app/portfolio/xmas-carol.jpg',
        bullets:['Actors Theatre Louisville asked us for production assets — metahumans and some good videos. Not a VR project.','We did the R&D, then flipped the brief: "As long as we\'re building sets and characters and costumes for you — how about we just do a full VR production?"','That upsell became our annual production, our R&D vehicle, the SIGGRAPH multi-avatar paper, and the AI Dickens lineage. None of it happens without that R&D-first phase.'] },
      { title:'Space Opera & Salle d\'Or', subtitle:'"I don\'t know if this is possible, but…"',
        img:'',
        bullets:['8+ co-located players in a 30×30 LBVR space with live actors and branching narrative. Mixed reality immersive ruin in MR ("Sleep No More meets The Little Prince").','Both projects started with the client saying "we don\'t know if this is possible." We said: "honestly, us neither — let\'s find out together."','Phase 1 was pure R&D. The client paid for us to figure it out. That\'s the deal.'] },
    ],
    lesson: { title:'Protect Time for\n"We\'re Not Sure Either"', tagline:'Our most common brief starts with "I don\'t know if this is possible, but…" The honest answer is "us neither — let\'s find out together." That only works if Phase 1 of every project is explicitly dedicated to R&D, with the discovery budget baked into the contract from day one. The wrong move is pretending you already have the answers.', tags:'Christmas Carol VR · AI Dickens · SIGGRAPH Multi-Avatar · Space Opera · Salle d\'Or' },
  },
  {
    year: 2022, accent: 'amber',
    cases: [
      { title:'The Unreal Engine Bet', subtitle:'Specialist focus in a market full of tourists',
        img:'',
        bullets:['Going all-in on Unreal Engine — including Gold Authorized Instructor certification — wasn\'t a technical decision. It was a five-year bet on which skills would still be valuable.','Every studio that chased the latest shiny (NFTs, then "the metaverse," then generative AI) lost their XR muscle memory. We didn\'t.','The companies that quit XR became our clients\' second studios. We were the first call.'] },
      { title:'Waldorf Astoria Miami', subtitle:'Luxury archviz with a live mocap host',
        img:'',
        bullets:['Rokoko motion capture pipeline running inside an archviz tour. A virtual host walks prospective residents through the space.','The client found us after a SIGGRAPH talk I gave entirely about Christmas Carol — they wanted to inject our live performance system into archviz.','One paid talk about theater work generated an enterprise archviz client. Specialist reputation compounds in unexpected directions.'] },
    ],
    lesson: { title:'Your Tool Choices Are\nBusiness Strategy', tagline:'Going all-in on Unreal Engine wasn\'t a technical decision — it was a five-year bet on which skills would still be valuable. Every major pipeline choice has a long tail. The corollary: be a specialist, not a tourist. The companies that chased every shiny new platform are gone. We\'re still here because we doubled down when everyone else was pivoting.', tags:'Unreal Engine · Waldorf Astoria · Christmas Carol' },
  },
  {
    year: 2023, accent: 'teal',
    cases: [
      { title:'Stage Presence × RSC — The Script in the Hand', subtitle:'Don\'t reinvent the wheel. Adapt what already works.',
        img:'',
        bullets:['Actors rehearse in a 1:1 LIDAR-scanned Swan Theatre in VR. We tried virtual scripts on spring arms, attached to wrists, floating in space.','Every actor wanted the same thing: a script they could hold in their hand and put down on the floor when they needed both hands free. Same as paper.','VR UX is best when it adapts existing spatial workflows 1:1 — not when it tries to reinvent them. Theater knows how scripts work.'] },
      { title:'Four Seasons Lake Austin', subtitle:'Spatial design that had to feel like luxury, not a tech demo',
        img:'https://website-ivory-omega-78.vercel.app/portfolio/four-seasons-holodeck.jpg',
        bullets:['$300M of amenities in an 82×65-foot wireless holodeck','Optitrack + Antilatency: room-scale multi-user, no tether','Theatrical staging — sightlines, audience focus direction, the orange floating into view at the right moment — driven by people who think spatially first'] },
    ],
    lesson: { title:'Spatial Design Is\nIts Own Discipline', tagline:'It\'s not UX with depth. The best spatial thinkers we\'ve hired came from theater, not software — because they already understood blocking, sightlines, presence, and audience agency. Stop borrowing screen-design patterns. Stop reinventing wheels that already work. Hire for spatial thinking directly.', tags:'Stage Presence · RSC · Four Seasons · Onboard XR' },
  },
  {
    year: 2024, accent: 'purple',
    cases: [
      { title:'The Holodeck 98% Incident', subtitle:'A 98 at Harvard isn\'t something you apologize for',
        img:'',
        bullets:['On a recent holodeck project, one of our partners was about to lead the witness — apologize to the client for the 2% of imperfections we could see but they couldn\'t.','The client\'s response when they saw the experience: "This is amazing. My only notes are about our own work, not yours."','We had to remind ourselves: this is already the best VR experience this client will ever have had in their life. Don\'t teach them to see flaws they wouldn\'t notice on their own.'] },
      { title:'Body of Mine', subtitle:'Full-body VR — Producers Guild Innovation Award',
        img:'https://website-ivory-omega-78.vercel.app/portfolio/body-of-mine.jpg',
        bullets:['Body, face, and eye tracking — inhabit another gender','BAFTA, SXSW, Games for Change recognition','We could see every imperfection. The audience saw a transformative experience.'] },
    ],
    lesson: { title:'Perfect Is the Enemy of Best.\nDon\'t Tell the Client About the Gap.', tagline:'It takes 20% of the time to get 80% of the way there, and 80% of the time to chase the last 20% — and most of that last 20% is invisible to anyone without your trained eye. If you\'re already shipping the best work in the industry, stop apologizing for the difference between 98 and 100. The audience experiences "best they\'ve ever seen." Let them.', tags:'Holodeck Anywhere · Body of Mine · Royal Caribbean' },
  },
  {
    year: 2025, accent: 'rose',
    cases: [
      { title:'Your Mind, Girls — The Scope Creep Story', subtitle:'How $0 of revenue funded a genuinely excellent piece',
        img:'',
        bullets:['Hope Hutman approached us asking for a small blueprint script. We said yes, planning to hand it off and take a small credit.','Each yes spawned 5 new problems. Sony Mocopi was the new shiny in the room. We thought we were killing two birds. Kevin: "We were just being sat on by a giant bird."','We ended up as full co-producers. 30 people in headsets watching a real actor in a virtual space. Beautiful work. Zero dollars.'] },
      { title:'Multi-Avatar Performance (SIGGRAPH 2025)', subtitle:'When discipline pays off',
        img:'',
        bullets:['One actor plays all roles in Christmas Carol VR — abandoned avatars frozen in pose on stage','Third-person self-monitoring system solves the "many bodies" problem','Tightly scoped, properly funded, published at SIGGRAPH. The opposite of Your Mind, Girls.'] },
    ],
    lesson: { title:'Complex Projects Are Thrilling —\nand Perfect Breeding Grounds for Scope Creep', tagline:'The most dangerous projects are the ones that hit the bullseye of everything you\'ve been wanting to try. New hardware in the room (Sony Mocopi for us) plus a brief that fits your ambitions plus a creative collaborator you like = sunk cost fallacy by month two. The fix isn\'t saying no to thrilling projects. It\'s saying yes only with hard scope boundaries before the work starts.', tags:'Your Mind, Girls · Sony Mocopi · SIGGRAPH 2025 · Christmas Carol' },
  },
];

const BONUS = { year:2026, title:'The Demo Will Break.\nBudget for It.',
  tagline:'In ten years — at Harvard, at SIGGRAPH, at the Kennedy Center — something has gone wrong every single time. A headset dies. The Wi-Fi drops. A character\'s head detaches from their body mid-show. The audience doesn\'t remember the glitch. They remember how the moment made them feel.' };
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060810;--teal:#00d4ff;--purple:#a78bfa;--amber:#f59e0b;--rose:#f43f5e;--text:#f0f4ff;--dim:rgba(240,244,255,.45);--font:'Space Grotesk',system-ui,sans-serif}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font)}

.bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg-gradient{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 15% 50%,rgba(124,58,237,.18) 0%,transparent 55%),radial-gradient(ellipse 60% 70% at 85% 20%,rgba(0,212,255,.12) 0%,transparent 55%),linear-gradient(180deg,#060810 0%,#0b0820 50%,#060810 100%)}
canvas#stars{position:absolute;inset:0}

#deck{position:relative;z-index:1;width:100%;height:100%;overflow:hidden}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:clamp(40px,5vw,80px);text-align:center;opacity:0;pointer-events:none}
.slide.active{opacity:1;pointer-events:all}
@keyframes slideInFwd{from{opacity:0;transform:translateX(6%) scale(.97)}to{opacity:1;transform:none}}
@keyframes slideInBwd{from{opacity:0;transform:translateX(-6%) scale(.97)}to{opacity:1;transform:none}}
@keyframes slideOutFwd{from{opacity:1;transform:none}to{opacity:0;transform:translateX(-6%) scale(.97)}}
@keyframes slideOutBwd{from{opacity:1;transform:none}to{opacity:0;transform:translateX(6%) scale(.97)}}

/* Cover */
.event-tag{font-size:clamp(.7rem,1.4vw,1.05rem);font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:var(--teal);margin-bottom:36px;opacity:.85}
.talk-title{font-size:clamp(3.2rem,8vw,8.5rem);font-weight:700;line-height:1;letter-spacing:-.03em;background:linear-gradient(130deg,#fff 20%,#a5d8ff 55%,#9b8cff 85%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:24px}
.talk-subtitle{font-size:clamp(1.1rem,2.4vw,1.9rem);font-weight:400;color:var(--dim);margin-bottom:64px}
.speaker-card{display:flex;align-items:center;gap:24px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:80px;padding:18px 40px;backdrop-filter:blur(12px)}
.speaker-name{font-size:clamp(1rem,1.4vw,1.4rem);font-weight:600}.speaker-co{font-size:clamp(.78rem,1.1vw,1.05rem);color:var(--dim);margin-top:3px}
.card-sep{width:1px;height:48px;background:rgba(255,255,255,.15)}
.event-detail{font-size:clamp(.78rem,1.1vw,1.05rem);color:var(--dim);line-height:1.6}

/* Case study — sized for 1920×1080 projector */
.case-slide{flex-direction:row;gap:clamp(36px,4.5vw,90px);text-align:left;padding:clamp(50px,5vw,110px) clamp(80px,9vw,180px)}
.case-image{flex:0 0 44%;max-width:780px;aspect-ratio:16/10;border-radius:18px;overflow:hidden}
.case-image img{width:100%;height:100%;object-fit:cover;display:block}
.case-image .ph{width:100%;height:100%;background:linear-gradient(135deg,rgba(0,212,255,.12),rgba(124,58,237,.12));display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.12);font-size:.85rem;letter-spacing:.1em;text-transform:uppercase}
.case-content{flex:1;display:flex;flex-direction:column;justify-content:center;gap:12px}
.case-ytag{font-size:clamp(.65rem,.95vw,.95rem);font-weight:600;letter-spacing:.25em;text-transform:uppercase;color:var(--teal);opacity:.6}
.case-title{font-size:clamp(1.8rem,3.6vw,3.8rem);font-weight:700;letter-spacing:-.02em;line-height:1.1}
.case-sub{font-size:clamp(.95rem,1.4vw,1.4rem);color:var(--dim);margin-bottom:14px}
.case-bl{list-style:none;display:flex;flex-direction:column;gap:14px}
.case-bl li{font-size:clamp(.92rem,1.3vw,1.3rem);color:rgba(240,244,255,.7);line-height:1.55;padding-left:24px;position:relative}
.case-bl li::before{content:'';position:absolute;left:0;top:.65em;width:7px;height:7px;border-radius:50%;background:var(--teal);opacity:.6}
.accent-purple .case-ytag{color:var(--purple)}.accent-purple .case-bl li::before{background:var(--purple)}
.accent-amber .case-ytag{color:var(--amber)}.accent-amber .case-bl li::before{background:var(--amber)}
.accent-rose .case-ytag{color:var(--rose)}.accent-rose .case-bl li::before{background:var(--rose)}

/* Lesson — sized for 1920×1080 projector */
.slide-lesson{padding-bottom:clamp(80px,10vh,140px)}
.year-ghost{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(10rem,24vw,26rem);font-weight:700;letter-spacing:-.06em;line-height:1;color:rgba(255,255,255,.028);pointer-events:none;user-select:none}
.lesson-ey{display:flex;align-items:center;justify-content:center;gap:14px;font-size:clamp(.7rem,1.1vw,1rem);font-weight:600;letter-spacing:.26em;text-transform:uppercase;margin-bottom:30px}
.ey-yr{color:rgba(255,255,255,.4)}.ey-sep{color:rgba(255,255,255,.15)}.ey-badge{color:var(--teal)}
.lesson-title{font-size:clamp(2.4rem,5.8vw,6.2rem);font-weight:700;letter-spacing:-.025em;line-height:1.06;max-width:1300px;margin-bottom:32px;white-space:pre-line}
.lesson-tagline{font-size:clamp(1rem,1.7vw,1.6rem);color:var(--dim);max-width:880px;line-height:1.7}
.lesson-rule{width:64px;height:4px;border-radius:2px;background:var(--teal);margin:32px auto 0;opacity:.7}
.lesson-tags{margin-top:18px;font-size:clamp(.6rem,.9vw,.85rem);font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.18)}
.accent-purple .ey-badge{color:var(--purple)}.accent-purple .lesson-rule{background:var(--purple)}
.accent-amber .ey-badge{color:var(--amber)}.accent-amber .lesson-rule{background:var(--amber)}
.accent-rose .ey-badge{color:var(--rose)}.accent-rose .lesson-rule{background:var(--rose)}
.slide-bonus .ey-badge{color:var(--amber)}.slide-bonus .lesson-rule{background:var(--amber)}.slide-bonus .year-ghost{color:rgba(245,158,11,.04)}

/* Monocle tracker */
#tracker{position:fixed;bottom:24px;right:24px;z-index:25;width:clamp(120px,9vw,170px);height:clamp(120px,9vw,170px);opacity:0;transition:opacity .4s;pointer-events:none}
#tracker.visible{opacity:1}
#tracker svg{width:100%;height:100%}

/* Map */
.slide-map{padding:clamp(20px,2.5vw,48px)}
.map-label{font-size:clamp(.7rem,1.1vw,1rem);font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:16px}
#map-svg{width:100%;height:100%;max-height:84vh}
.recap-pill{cursor:pointer}
.recap-pill:hover circle:first-child{fill:rgba(0,212,255,.12)!important}

/* Slide grid (jump-to-slide hover strip) */
#slide-grid-zone{position:fixed;bottom:0;left:0;right:0;height:38px;z-index:35;pointer-events:auto}
#slide-grid{position:fixed;bottom:0;left:0;right:0;z-index:36;padding:14px 24px 18px;background:linear-gradient(180deg,transparent 0%,rgba(6,8,16,.92) 50%,rgba(6,8,16,.98) 100%);backdrop-filter:blur(10px);display:flex;gap:6px;overflow-x:auto;overflow-y:hidden;justify-content:flex-start;flex-wrap:nowrap;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);scrollbar-width:thin}
#slide-grid.visible{transform:translateY(0)}
#slide-grid::-webkit-scrollbar{height:4px}
#slide-grid::-webkit-scrollbar-thumb{background:rgba(0,212,255,.3);border-radius:2px}
.sg-thumb{flex:0 0 auto;min-width:64px;height:46px;border:1px solid rgba(255,255,255,.12);border-radius:6px;background:rgba(255,255,255,.03);padding:5px 8px;cursor:pointer;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:2px;font-family:var(--font);transition:all .15s;position:relative}
.sg-thumb:hover{background:rgba(0,212,255,.12);border-color:rgba(0,212,255,.4);transform:translateY(-2px)}
.sg-thumb.active{background:rgba(0,212,255,.18);border-color:var(--teal);box-shadow:0 0 12px rgba(0,212,255,.3)}
.sg-num{font-size:.62rem;font-weight:600;color:rgba(255,255,255,.55);letter-spacing:.05em}
.sg-thumb.active .sg-num{color:var(--teal)}
.sg-label{font-size:.52rem;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.sg-thumb.active .sg-label{color:rgba(0,212,255,.7)}
.sg-thumb.sg-cover{background:rgba(124,58,237,.06);border-color:rgba(124,58,237,.2)}
.sg-thumb.sg-bonus{background:rgba(245,158,11,.06);border-color:rgba(245,158,11,.2)}
.sg-thumb.sg-bonus.active{background:rgba(245,158,11,.18);border-color:var(--amber);box-shadow:0 0 12px rgba(245,158,11,.3)}
.sg-thumb.sg-bonus.active .sg-num,.sg-thumb.sg-bonus.active .sg-label{color:var(--amber)}
.sg-thumb.sg-map{background:rgba(167,139,250,.06);border-color:rgba(167,139,250,.2)}
.sg-thumb.sg-close{background:rgba(244,63,94,.06);border-color:rgba(244,63,94,.2)}

/* Close — sized for 1920×1080 projector */
.close-ey{font-size:clamp(.7rem,1.4vw,1.05rem);font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:var(--amber);margin-bottom:36px;opacity:.85}
.close-title{font-size:clamp(3.2rem,7.5vw,7.5rem);font-weight:700;letter-spacing:-.03em;line-height:1;background:linear-gradient(130deg,#fff 20%,#fde68a 60%,#f59e0b 90%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:28px}
.close-sub{font-size:clamp(1.1rem,2vw,1.7rem);color:var(--dim);margin-bottom:56px}
.contact-row{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.contact-pill{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:48px;padding:14px 28px;font-size:clamp(.95rem,1.3vw,1.2rem)}
.contact-pill .lbl{opacity:.4;font-size:clamp(.65rem,.9vw,.85rem);text-transform:uppercase;letter-spacing:.1em}

/* HUD */
#counter{position:fixed;top:32px;right:48px;z-index:20;font-size:clamp(.72rem,1vw,.95rem);font-weight:500;letter-spacing:.12em;color:rgba(255,255,255,.25)}
#brand{position:fixed;bottom:28px;left:48px;z-index:20;font-size:clamp(.68rem,.95vw,.9rem);font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.18)}
.nav-arrows{position:fixed;bottom:24px;right:160px;z-index:20;display:flex;gap:10px}
.nav-btn{width:46px;height:46px;border:1px solid rgba(255,255,255,.18);border-radius:10px;background:rgba(255,255,255,.03);color:rgba(255,255,255,.5);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(8px)}
.nav-btn:hover{background:rgba(0,212,255,.12);border-color:rgba(0,212,255,.3);color:var(--teal)}

/* ── Presentation mode — H key hides every UI element so the projector
   shows only the slide content. Toggle off again to restore. ── */
body.presentation-mode #counter,
body.presentation-mode #brand,
body.presentation-mode .nav-arrows,
body.presentation-mode #tracker,
body.presentation-mode #slide-grid,
body.presentation-mode #slide-grid-zone,
body.presentation-mode #anno-toggle,
body.presentation-mode #move-toggle,
body.presentation-mode #anno-panel,
body.presentation-mode #move-hud,
body.presentation-mode #anno-prompt {
  display: none !important;
}

/* ── Intro slides (Alex + Agile Lens) ── */
.slide-lens { padding:0!important; overflow:hidden; }
.slide-lens svg { position:absolute; inset:0; width:100%; height:100%; }
.slide-venn { padding:0!important; overflow:hidden; }
.slide-venn svg { position:absolute; inset:0; width:100%; height:100%; }
@keyframes vennShake {
  0%,100% { transform:var(--venn-base); }
  10% { transform:var(--venn-base) translate(3px,-2px) rotate(1.5deg); }
  30% { transform:var(--venn-base) translate(-4px,2px) rotate(-2deg); }
  50% { transform:var(--venn-base) translate(2px,3px) rotate(1deg); }
  70% { transform:var(--venn-base) translate(-3px,-1px) rotate(-1.5deg); }
  90% { transform:var(--venn-base) translate(1px,-2px) rotate(.5deg); }
}
.slide-intro { padding: clamp(40px,5vw,100px) clamp(60px,8vw,160px); }
.intro-grid { display:flex; align-items:center; gap:clamp(40px,5vw,90px); width:100%; max-width:1500px; }
.intro-stage { flex:0 0 42%; max-width:560px; aspect-ratio:1/1; position:relative; }
.intro-stage svg { width:100%; height:100%; }
.intro-content { flex:1; text-align:left; }
.intro-eyebrow {
  font-size:clamp(.7rem,1.2vw,1rem); font-weight:600; letter-spacing:.3em;
  text-transform:uppercase; color:var(--teal); margin-bottom:24px;
}
.intro-title {
  font-size:clamp(2.6rem,5.5vw,5.2rem); font-weight:700; line-height:1.02;
  letter-spacing:-.02em; margin-bottom:24px;
  background:linear-gradient(130deg,#fff 20%,#a5d8ff 55%,#9b8cff 90%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.intro-sub {
  font-size:clamp(1rem,1.6vw,1.4rem); color:var(--dim); line-height:1.55;
  margin-bottom:32px; max-width:600px;
}
.intro-stats { display:flex; gap:20px; flex-wrap:wrap; }
.intro-stat {
  background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.12);
  border-radius:12px; padding:18px 28px; min-width:170px;
}
.intro-stat .num {
  display:block; font-size:clamp(1.4rem,2.2vw,2rem); font-weight:700;
  color:var(--teal); letter-spacing:-.02em; margin-bottom:6px;
}
.intro-stat .lbl {
  display:block;
  font-size:clamp(.62rem,.85vw,.78rem); font-weight:500; letter-spacing:.16em;
  text-transform:uppercase; color:rgba(255,255,255,.5); white-space:nowrap;
}
.intro-purple .intro-eyebrow { color:var(--purple); }
.intro-purple .intro-stat .num { color:var(--purple); }

/* Mario power-up animation for the Alex intro stage */
@keyframes introWalk {
  0%   { transform: translate(-180px, 0); }
  100% { transform: translate(160px, 0); }
}
@keyframes introJumpUp {
  0%   { transform: translate(160px, 0)    scale(1,1); }
  30%  { transform: translate(160px, -20px) scale(.95, 1.05); }
  100% { transform: translate(160px, -95px) scale(1,1); }
}
@keyframes introFallDown {
  0%   { transform: translate(160px, -95px) scale(1.5); }
  100% { transform: translate(160px, 0)     scale(1.5); }
}
@keyframes introHeadsetBob {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-8px); }
}
@keyframes introHeadsetGrab {
  0%   { opacity: 1; transform: translateY(0)   scale(1); }
  40%  { opacity: 1; transform: translateY(-6px) scale(1.4); }
  100% { opacity: 0; transform: translateY(-30px) scale(0); }
}
/* Power-up keyframes preserve the translate(160px, 0) end-state of introJump
   so the avatar grows in place at the headset block instead of snapping
   back to the origin. */
@keyframes introPowerUp {
  0%   { transform: translate(160px, -95px) scale(1);    filter: brightness(1); }
  30%  { transform: translate(160px, -95px) scale(1.2);  filter: brightness(1.7); }
  55%  { transform: translate(160px, -95px) scale(.95);  filter: brightness(1.3); }
  100% { transform: translate(160px, -95px) scale(1.5);  filter: brightness(1); }
}
/* Particle burst — flies outward using per-element --tx/--ty CSS vars.
   Pops up to full scale briefly then tapers out as it travels. */
@keyframes introSparkle {
  0%   { opacity: 0; transform: translate(0, 0)                                    scale(.3); }
  10%  { opacity: 1; transform: translate(calc(var(--tx) * .15), calc(var(--ty) * .15)) scale(1.6); }
  50%  { opacity: 1; transform: translate(calc(var(--tx) * .6),  calc(var(--ty) * .6))  scale(1); }
  100% { opacity: 0; transform: translate(var(--tx), var(--ty))                     scale(.3); }
}

/* Screen flash — white overlay pops on hit, fades fast */
@keyframes introFlash {
  0%   { opacity: 0; }
  8%   { opacity: .75; }
  100% { opacity: 0; }
}
.intro-stage .stage-floor {
  fill: rgba(0,212,255,.12); stroke: rgba(0,212,255,.3); stroke-width: 1;
}
.intro-stage .stage-walker { transform-origin: center bottom; }
#alex-intro-anim { transform-box: fill-box; transform-origin: center bottom; }
.intro-stage .headset-block { transform-origin: center; }

/* Avatar arm frame toggle — DOWN visible by default, UP hidden. Adding the
   `arm-up` class to the avatar root flips them. The fistPumpFrames animation
   below toggles `visibility` on a schedule to create a 2-frame pump. */
.avatar .av-arms-up { visibility: hidden; }
.avatar.arm-up .av-arms-down { visibility: hidden; }
.avatar.arm-up .av-arms-up { visibility: visible; }

/* 2-frame fist pump — alternates arm-down / arm-up via animation that toggles
   visibility instantly at each keyframe (no interpolation between states). */
@keyframes fistPumpFrames {
  0%, 49.9%   { opacity: 1; }
  50%, 100%   { opacity: 1; }
}
.avatar .av-arms-down { animation: armDownFrames 0.6s steps(1, end) infinite; }
.avatar .av-arms-up   { animation: armUpFrames   0.6s steps(1, end) infinite; }
@keyframes armDownFrames {
  0%, 49% { visibility: visible; }
  50%, 100% { visibility: hidden; }
}
@keyframes armUpFrames {
  0%, 49% { visibility: hidden; }
  50%, 100% { visibility: visible; }
}
/* Pause the cycling unless the avatar is "pumping" */
.avatar:not(.pumping) .av-arms-down { animation: none; visibility: visible; }
.avatar:not(.pumping) .av-arms-up   { animation: none; visibility: hidden; }
.avatar.pumping.arm-up-only .av-arms-down { visibility: hidden; }
.avatar.pumping.arm-up-only .av-arms-up   { visibility: visible; animation: none; }

/* Heroic jump for the map-slide avatar — squash, leap, peak, land, settle */
@keyframes mapHeroJump {
  0%   { transform: translateY(0)    scale(1, 1); }
  10%  { transform: translateY(4px)  scale(1.08, .9); }
  25%  { transform: translateY(-30px) scale(.94, 1.08); }
  45%  { transform: translateY(-55px) scale(1, 1); }
  60%  { transform: translateY(-45px) scale(1, 1); }
  80%  { transform: translateY(2px)  scale(1.1, .88); }
  100% { transform: translateY(0)    scale(1, 1); }
}
/* Pokemon evolution flash — white overlay blinks faster and faster */
@keyframes evoFlash {
  0%   { opacity:0 }
  5%   { opacity:.7 } 8%   { opacity:0 }
  15%  { opacity:.8 } 19%  { opacity:0 }
  28%  { opacity:.85 } 32%  { opacity:0 }
  40%  { opacity:.9 } 43%  { opacity:.1 }
  50%  { opacity:.95 } 52%  { opacity:.15 }
  58%  { opacity:1 } 60%  { opacity:.2 }
  65%  { opacity:1 } 66%  { opacity:.3 }
  71%  { opacity:1 } 72%  { opacity:.4 }
  77%  { opacity:1 } 78%  { opacity:.5 }
  82%  { opacity:1 } 83%  { opacity:.6 }
  87%  { opacity:1 }
  100% { opacity:0 }
}
/* Evolution silhouette glow — the sprite becomes a white silhouette mid-flash */
@keyframes evoGlow {
  0%   { filter:brightness(1) }
  40%  { filter:brightness(1) }
  50%  { filter:brightness(8) saturate(0) }
  85%  { filter:brightness(8) saturate(0) }
  100% { filter:brightness(1) }
}
/* Evolution particle burst */
@keyframes evoBurst {
  0%   { opacity:0; transform:translate(0,0) scale(.5) }
  15%  { opacity:1; transform:translate(calc(var(--tx)*.2),calc(var(--ty)*.2)) scale(1.5) }
  60%  { opacity:1; transform:translate(calc(var(--tx)*.7),calc(var(--ty)*.7)) scale(1) }
  100% { opacity:0; transform:translate(var(--tx),var(--ty)) scale(.2) }
}
/* UE5 power-up — from x=0, block at y=140 so jump goes higher (-130px) */
@keyframes ue5JumpUp {
  0%   { transform: translate(0, 0)     scale(1.5); }
  25%  { transform: translate(0, -20px) scale(1.4, 1.6); }
  100% { transform: translate(0, -130px) scale(1.5); }
}
@keyframes ue5PowerUp {
  0%   { transform: translate(0, -130px) scale(1.5);  filter: brightness(1); }
  30%  { transform: translate(0, -130px) scale(1.8);  filter: brightness(1.7); }
  55%  { transform: translate(0, -130px) scale(1.4);  filter: brightness(1.3); }
  100% { transform: translate(0, -130px) scale(2);    filter: brightness(1); }
}
@keyframes ue5FallDown {
  0%   { transform: translate(0, -130px) scale(2); }
  100% { transform: translate(0, 0)      scale(2); }
}
/* Firework particle — radial fly-out with ease, scale up briefly then fade */
@keyframes fwParticle {
  0%   { transform: translate(0, 0) scale(.4); opacity: 1; }
  15%  { transform: translate(calc(var(--tx) * .2), calc(var(--ty) * .2)) scale(1.1); opacity: 1; }
  60%  { transform: translate(calc(var(--tx) * .8), calc(var(--ty) * .8)) scale(.8); opacity: .85; }
  100% { transform: translate(var(--tx), var(--ty)) scale(.2); opacity: 0; }
}
@media(max-width:900px){.case-slide{flex-direction:column;text-align:center}.case-image{flex:none;width:85%;max-width:none;margin:0 auto}.case-bl li{text-align:left}}

/* ── Annotation overlay ── */
#anno-toggle,#move-toggle{position:fixed;top:24px;z-index:1000;border:1px solid rgba(0,212,255,.4);color:var(--teal);font-family:var(--font);font-size:.66rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;padding:8px 14px;border-radius:6px;cursor:pointer;backdrop-filter:blur(8px);transition:all .2s;background:rgba(0,212,255,.1)}
#anno-toggle{left:24px}
#move-toggle{left:148px;border-color:rgba(245,158,11,.4);color:var(--amber);background:rgba(245,158,11,.1)}
#anno-toggle:hover{background:rgba(0,212,255,.2)}
#move-toggle:hover{background:rgba(245,158,11,.2)}
#anno-toggle.active{background:var(--amber);color:#060810;border-color:var(--amber)}
#move-toggle.active{background:var(--rose);color:#060810;border-color:var(--rose)}

/* Move-mode HUD with undo/redo + modifier hints */
#move-hud{position:fixed;top:24px;left:280px;z-index:1000;display:none;align-items:center;gap:8px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);border-radius:8px;padding:6px 12px;backdrop-filter:blur(8px)}
#move-hud.visible{display:flex}
#move-hud .mh-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.7);font-family:var(--font);font-size:.62rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:6px 10px;border-radius:5px;cursor:pointer;transition:all .15s}
#move-hud .mh-btn:hover:not(:disabled){background:rgba(245,158,11,.2);border-color:rgba(245,158,11,.4);color:var(--amber)}
#move-hud .mh-btn:disabled{opacity:.3;cursor:not-allowed}
#move-hud .mh-hint{font-family:var(--font);font-size:.6rem;font-weight:500;letter-spacing:.08em;color:rgba(255,255,255,.45);padding:0 4px}
#move-hud .mh-hint kbd{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:3px;padding:1px 5px;font-family:inherit;font-size:.92em;color:var(--amber)}
body.annotate-mode *:not(#anno-panel):not(#anno-panel *):not(#anno-toggle):not(#move-toggle):not(#slide-grid):not(#slide-grid *):not(#slide-grid-zone):hover{outline:2px dashed var(--teal)!important;outline-offset:2px;cursor:crosshair!important}
body.move-mode .slide.active *:not(#anno-toggle):not(#move-toggle):hover{outline:2px dashed var(--amber)!important;outline-offset:2px;cursor:move!important}
body.move-mode .slide.active *{user-select:none}
/* Disarm anchor navigation while in move mode so clicks on links don't
   jump slides — the mousedown handler still catches the drag. */
body.move-mode .slide.active a{pointer-events:auto}
body.move-mode .slide.active a[href]{text-decoration:none}

.dragging{opacity:.85!important;outline:2px solid var(--amber)!important}
#anno-panel{position:fixed;top:70px;left:24px;z-index:1001;width:320px;max-height:70vh;background:rgba(10,12,24,.96);border:1px solid rgba(0,212,255,.3);border-radius:10px;padding:16px;font-family:var(--font);font-size:.78rem;color:var(--text);backdrop-filter:blur(12px);overflow-y:auto;display:none}
#anno-panel.visible{display:block}
#anno-panel h3{font-size:.68rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--teal);margin-bottom:10px}
#anno-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;max-height:300px;overflow-y:auto}
.anno-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:8px 10px;font-size:.72rem;line-height:1.4}
.anno-item .anno-meta{font-size:.6rem;color:var(--dim);margin-bottom:4px;font-weight:500}
.anno-item .anno-rm{float:right;color:var(--rose);cursor:pointer;font-size:.68rem;opacity:.6;margin-left:6px}
.anno-item .anno-rm:hover{opacity:1}
.anno-actions{display:flex;gap:8px}
.anno-btn{flex:1;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);color:var(--teal);font-family:var(--font);font-size:.65rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:8px;border-radius:5px;cursor:pointer;transition:all .15s}
.anno-btn:hover{background:rgba(0,212,255,.2)}
.anno-btn.danger{color:var(--rose);border-color:rgba(244,63,94,.3);background:rgba(244,63,94,.06)}
.anno-btn.danger:hover{background:rgba(244,63,94,.15)}
#anno-prompt{position:fixed;z-index:1002;background:rgba(10,12,24,.98);border:1px solid var(--teal);border-radius:8px;padding:12px;display:none;flex-direction:column;gap:8px;width:280px;backdrop-filter:blur(12px)}
#anno-prompt.visible{display:flex}

#anno-prompt textarea{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--text);font-family:var(--font);font-size:.78rem;padding:8px;border-radius:5px;resize:vertical;min-height:60px;outline:none}
#anno-prompt textarea:focus{border-color:var(--teal)}
#anno-prompt .anno-prompt-actions{display:flex;gap:6px;justify-content:flex-end}
#anno-empty{color:var(--dim);font-size:.7rem;font-style:italic;text-align:center;padding:14px 0}
#anno-toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--teal);color:#060810;padding:10px 18px;border-radius:6px;font-size:.72rem;font-weight:600;letter-spacing:.05em;z-index:1003;opacity:0;transition:opacity .3s;pointer-events:none}
#anno-toast.show{opacity:1}

<body>
<div class="bg"><div class="bg-gradient"></div><canvas id="stars"></canvas></div>
<div id="deck"></div>
<div id="tracker"><svg id="tracker-svg" viewBox="0 0 120 120"></svg></div>
<div id="counter"></div>
<div id="brand">Agile Lens · HXR 2026</div>
<div class="nav-arrows"><button class="nav-btn" id="btn-prev">←</button><button class="nav-btn" id="btn-next">→</button></div>

<!-- Slide jump grid (hover bottom of screen to reveal) -->
<div id="slide-grid-zone"></div>
<div id="slide-grid"></div>

<!-- Annotation overlay -->
<button id="anno-toggle" title="Toggle annotation mode (A)">📝 Annotate</button>
<button id="move-toggle" title="Toggle move mode (M) — drag elements to reposition them">✋ Move Mode</button>
<div id="move-hud">
  <button class="mh-btn" id="move-undo" title="Undo (⌘Z)" disabled>↶ Undo</button>
  <button class="mh-btn" id="move-redo" title="Redo (⌘⇧Z)" disabled>↷ Redo</button>
  <span class="mh-hint">Drag = move · <kbd>⇧</kbd>drag = scale · <kbd>⌥</kbd>drag = rotate</span>
</div>
<div id="anno-panel">
  <h3>Annotations</h3>
  <div id="anno-list"></div>
  <div class="anno-actions">
    <button class="anno-btn" id="anno-export">📋 Copy All</button>
    <button class="anno-btn danger" id="anno-clear">Clear</button>
  </div>
</div>

  <div class="anno-target" id="anno-target-text"></div>
  <textarea id="anno-text" placeholder="What should change?"></textarea>
  <div class="anno-prompt-actions">
    <button class="anno-btn" id="anno-cancel" style="flex:0">Cancel</button>
    <button class="anno-btn" id="anno-save" style="flex:0">Save</button>
  </div>
</div>
<div id="anno-toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════════════════
   ENGINE — slide generation, navigation, monocle tracker, map animation
   ═══════════════════════════════════════════════════════════════════════ */

// Stars
const cv=document.getElementById('stars'),sc=cv.getContext('2d');let st=[];
function initS(){cv.width=innerWidth;cv.height=innerHeight;st=Array.from({length:110},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height*.6,r:Math.random()*1.2+.2,o:Math.random()*.4+.05,d:(Math.random()-.5)*.013}))}
function drawS(){sc.clearRect(0,0,cv.width,cv.height);st.forEach(s=>{sc.beginPath();sc.arc(s.x,s.y,s.r,0,Math.PI*2);sc.fillStyle=`rgba(210,225,255,${s.o})`;sc.fill();s.o+=s.d;if(s.o<.04||s.o>.55)s.d*=-1});requestAnimationFrame(drawS)}
initS();drawS();addEventListener('resize',initS);

const deck=document.getElementById('deck'),allSlides=[],lessonIdxs=[];

// ── Build cover ──
const cov=document.createElement('div');cov.className='slide active';cov.dataset.type='cover';
cov.innerHTML=`<div class="event-tag">HXR · Harvard XR Conference · April 11, 2026</div>

(function buildVennSlide(){

  ap(-10, -7, 1, 18, '#a78bfa');   // flute

  ap(2,   -7, 3, 18, '#c4b5fd');   // col 3
  ap(3,   -7, 1, 18, '#a78bfa');
  ap(8,   -7, 3, 18, '#c4b5fd');   // col 4
  ap(9,   -7, 1, 18, '#a78bfa');
  // Steps (3 tiers)
  ap(-14, 11, 28, 2, '#a78bfa');
  ap(-15, 13, 30, 2, '#9370db');
  ap(-16, 15, 32, 2, '#7c5cbf');
  archG.style.shapeRendering = 'crispEdges';
  svg.appendChild(archG);

  // ── Theatre — proscenium arch with draped red curtains + spotlight ──
  const theatG = svgE('g', { id:'venn-theat', transform:`translate(${CX+170},${CY-90})` });
  const tp = (x,y,w,h,f) => theatG.appendChild(svgE('rect',{x:x*S,y:y*S,width:w*S,height:h*S,fill:f}));
  // Proscenium arch frame (gold/amber)
  tp(-16,-18, 32, 3, '#f59e0b');   // top bar
  tp(-16,-15, 3, 30, '#f59e0b');   // left pillar
  tp(13, -15, 3, 30, '#f59e0b');   // right pillar
  tp(-15,-17, 30, 1, '#fde68a');   // highlight
  // Stage opening (dark void)
  tp(-13,-15, 26, 27, '#0a0812');
  // Left curtain — draped with folds (3 shades)
  tp(-13,-15, 4, 25, '#dc2626');   // deep red
  tp(-9, -15, 3, 23, '#ef4444');   // mid red
  tp(-12,-15, 2, 25, '#b91c1c');   // dark fold
  tp(-7, -15, 2, 20, '#dc2626');   // inner drape
  // Right curtain — mirrored
  tp(9,  -15, 4, 25, '#dc2626');
  tp(6,  -15, 3, 23, '#ef4444');
  tp(10, -15, 2, 25, '#b91c1c');
  tp(5,  -15, 2, 20, '#dc2626');
  // Curtain swag across the top
  tp(-9, -15, 18, 3, '#dc2626');
  tp(-7, -13, 14, 2, '#ef4444');
  tp(-5, -11, 10, 1, '#dc2626');
  // Stage floor
  tp(-13, 12, 26, 3, '#8b6f47');   // wood boards
  tp(-13, 12, 26, 1, '#a0845c');   // highlight
  // Spotlight cone (faint triangle from top center)
  tp(-1, -12, 2, 3, 'rgba(255,255,200,.3)');
  tp(-2, -9,  4, 4, 'rgba(255,255,200,.15)');
  tp(-4, -5,  8, 6, 'rgba(255,255,200,.08)');
  tp(-6,  1, 12, 6, 'rgba(255,255,200,.04)');
  theatG.style.shapeRendering = 'crispEdges';
  svg.appendChild(theatG);

  // ── Realtime Tech — monitor with game scene (platformer) ──
  const techG = svgE('g', { id:'venn-tech', transform:`translate(${CX},${CY+110})` });
  const xp = (x,y,w,h,f) => techG.appendChild(svgE('rect',{x:x*S,y:y*S,width:w*S,height:h*S,fill:f}));
  // Monitor frame
  xp(-16,-16, 32, 24, '#1e293b');  // bezel
  xp(-14,-14, 28, 20, '#0f172a');  // screen
  xp(-14,-14, 28, 1, '#334155');   // top edge highlight

  xp(-8, 12, 16, 2, '#475569');

  // Beardless Alex sprite orbiting the center — hidden initially,
  // shown when startVennOrbit is called (prevents flash on slide entry)
  const orbitG = svgE('g', { id:'venn-orbit', opacity:'0' });

  buildAvatar(avInner, { withBeard: false });
  svg.appendChild(orbitG);

  // ── Icon reaction animations ──
  // Each icon shakes + does a unique micro-animation when the sprite arrives.

  // Shake via JS — avoids the SVG transform attribute vs CSS transform
  // conflict. Directly jiggles the translate in the SVG transform attribute.
  function shakeEl(el) {
    const origTf = el.getAttribute('transform') || '';
    const offsets = [
      [3,-2],[-4,2],[2,3],[-3,-1],[1,-2],[0,0]
    ];
    let i = 0;
    const step = () => {
      if (i >= offsets.length) { el.setAttribute('transform', origTf); return; }
      const [dx, dy] = offsets[i];
      el.setAttribute('transform', origTf + ` translate(${dx},${dy})`);
      i++;
      setTimeout(step, 65);
    };
    step();
  }

  // Architecture: columns crack briefly (dark lines appear, then vanish)
  function reactArch() {
    shakeEl(archG);
    const cracks = [];
    const addCrack = (x,y,w,h) => {
      const c = svgE('rect',{x:x*S,y:y*S,width:w*S,height:h*S,fill:'#2a1a3a',opacity:'0.8'});
      archG.appendChild(c); cracks.push(c);
    };
    addCrack(-10, -2, 1, 6);  // crack on col 1
    addCrack(-9, 1, 1, 3);
    addCrack(-4, -4, 1, 8);   // crack on col 2
    addCrack(3, -1, 1, 5);    // crack on col 3
    addCrack(9, -3, 1, 7);    // crack on col 4
    setTimeout(() => cracks.forEach(c => c.remove()), 600);
  }

  // Theatre: curtains shimmer (brightness pulses on curtain rects)
  function reactTheat() {
    shakeEl(theatG);
    const curtainRects = [...theatG.querySelectorAll('rect')].filter(r => {
      const f = r.getAttribute('fill') || '';
      return f.includes('dc2626') || f.includes('ef4444') || f.includes('b91c1c');
    });
    // Shimmer: rapidly alternate brightness
    let frame = 0;
    const shimmer = setInterval(() => {
      frame++;
      curtainRects.forEach((r,i) => {
        const bright = (frame + i) % 3 === 0;
        r.setAttribute('fill', bright ? '#ff6b6b' : r.dataset.origFill || r.getAttribute('fill'));
        if (!r.dataset.origFill) r.dataset.origFill = r.getAttribute('fill');
      });
      if (frame > 8) {
        clearInterval(shimmer);
        curtainRects.forEach(r => { if (r.dataset.origFill) r.setAttribute('fill', r.dataset.origFill); });
      }
    }, 70);
  }

  // Tech: screen activates — player runs right, coins blink
  function reactTech() {
    shakeEl(techG);
    // Find the player body rect (blue, inside the screen area)
    const screenRects = [...techG.querySelectorAll('rect')];
    const player = screenRects.filter(r => {
      const f = (r.getAttribute('fill')||'').toLowerCase();
      return f === '#3b82f6' || f === '#60a5fa' || f === '#1e40af';
    });
    const coins = screenRects.filter(r => (r.getAttribute('fill')||'').toLowerCase() === '#fbbf24');
    // Animate player moving right and back
    let frame = 0;
    const run = setInterval(() => {
      frame++;
      const dx = Math.sin(frame * 0.8) * 4 * S;
      player.forEach(r => {
        if (!r.dataset.origX) r.dataset.origX = r.getAttribute('x');
        r.setAttribute('x', parseFloat(r.dataset.origX) + dx);
      });
      // Blink coins
      coins.forEach((c,i) => {
        c.setAttribute('opacity', (frame + i) % 3 === 0 ? '0.3' : '1');
      });
      if (frame > 12) {
        clearInterval(run);
        player.forEach(r => { if (r.dataset.origX) r.setAttribute('x', r.dataset.origX); });
        coins.forEach(c => c.setAttribute('opacity', '1'));
      }
    }, 60);
  }

  // Map waypoint index → reaction function
  // waypoints[0]=architecture, [1]=theatre, [2]=realtime tech, [3]=center
  const reactions = [reactArch, reactTheat, reactTech, null];

  // Orbit animation — pinball between the three circle centers + center
  const waypoints = circles.map(c => ({ x: c.x, y: c.y }));
  waypoints.push({ x: CX, y: CY });
  let wpIdx = 0, orbX = waypoints[0].x, orbY = waypoints[0].y;
  let orbRunning = false;
  let dwellTimer = 0;
  const DWELL = 40; // frames to pause at each waypoint

  function orbStep() {
    if (!orbRunning) return;
    if (dwellTimer > 0) { dwellTimer--; requestAnimationFrame(orbStep); return; }
    const target = waypoints[wpIdx];
    const dx = target.x - orbX, dy = target.y - orbY;
    const dist = Math.hypot(dx, dy);
    if (dist < 4) {
      // Arrived — trigger reaction and dwell
      if (reactions[wpIdx]) reactions[wpIdx]();
      wpIdx = (wpIdx + 1) % waypoints.length;
      dwellTimer = DWELL;
    } else {
      const speed = 3;
      orbX += (dx / dist) * speed;
      orbY += (dy / dist) * speed;
    }
    orbitG.setAttribute('transform', `translate(${orbX},${orbY})`);
    requestAnimationFrame(orbStep);
  }

  window.startVennOrbit = () => { orbRunning = true; orbitG.setAttribute('opacity','1'); requestAnimationFrame(orbStep); };
  window.stopVennOrbit = () => { orbRunning = false; orbitG.setAttribute('opacity','0'); };

  svg.appendChild(q1);
  const q2 = svgE('text', { x: CX, y: 845, 'text-anchor':'middle', fill:'rgba(255,255,255,.2)',
    'font-family':'Space Grotesk,sans-serif', 'font-size':'13', 'letter-spacing':'2' });
  q2.textContent = '— 2010';
  svg.appendChild(q2);
})();

// Build the Mario-style power-up scene inside the intro-alex SVG
(function buildAlexIntroStage(){
  const svg = introAlex.querySelector('#intro-alex-svg');
  // Stage floor (a thin platform line at y=300)
  svg.appendChild(svgE('rect', { x:30, y:300, width:340, height:6, class:'stage-floor', rx:'2' }));
  // VR headset "?" block — two-group structure so the bob animation
  // doesn't clobber the positioning transform.
  // Outer = SVG transform attribute (positioning at viewBox 220, 180).
  // Inner = CSS animation target (introHeadsetBob via class on inner).
  // Block sits at (240, 200) — directly in the apex of the jumping avatar's
  // arc (introJump translates from 0 → 160px right and -55px up, starting
  // from outer position 80,270 → peak at viewBox 240, 215). The block is
  // 15px above the apex so the avatar's head reaches it.
  const blockPos = svgE('g', { class:'headset-block', id:'intro-block-pos', transform:'translate(240, 200)' });
  const blockG = svgE('g', { id:'intro-block-anim' });
  blockPos.appendChild(blockG);
  // Question block (Mario style) — drawn relative to inner group local 0,0
  blockG.appendChild(svgE('rect', { x:-22, y:-22, width:44, height:44, fill:'#f59e0b', stroke:'#b45309', 'stroke-width':'2', rx:'3' }));
  blockG.appendChild(svgE('rect', { x:-18, y:-18, width:36, height:36, fill:'none', stroke:'#fde68a', 'stroke-width':'1', rx:'1' }));
  // VR headset icon centered in the block
  blockG.appendChild(svgE('rect', { x:-13, y:-7, width:26, height:14, rx:'5', fill:'#1a1a26' }));
  blockG.appendChild(svgE('circle', { cx:-6, cy:0, r:'3', fill:'#00d4ff' }));
  blockG.appendChild(svgE('circle', { cx:6, cy:0, r:'3', fill:'#00d4ff' }));
  blockG.appendChild(svgE('rect', { x:-13, y:-9, width:26, height:2, fill:'#0a0a14' }));
  // Animation runs on the INNER group so the outer position stays put
  blockG.style.transformOrigin = 'center';
  blockG.style.animation = 'introHeadsetBob 1.6s ease-in-out infinite';
  svg.appendChild(blockPos);

  // Walker (Alex sprite) starts at left, walks in
  const walkerG = svgE('g', { id:'alex-intro-walker', class:'stage-walker', transform:'translate(80, 270)' });
  walkerG.style.transformOrigin = 'center';
  // Inner anim group so we can scale on power-up without clobbering position
  const walkerAnim = svgE('g', { id:'alex-intro-anim' });
  walkerG.appendChild(walkerAnim);
  buildAvatar(walkerAnim, { withBeard: false });  // 2016 Alex — no beard yet (beard comes in 2020)
  svg.appendChild(walkerG);

  // Particle burst for the power-up moment — 24 particles flying outward
  // from the headset block's position (240, 200) in random directions
  // with varying sizes and colors. Each particle stores its destination
  // delta in data-dx/dy so the CSS keyframe can use it.
  const sparkles = svgE('g', { id:'alex-intro-sparkles', opacity:'0' });
  const FW_COLORS = ['#fde68a','#00d4ff','#a78bfa','#f59e0b','#fff','#fb7185'];
  const BURST_X = 240, BURST_Y = 200;
  for (let i = 0; i < 24; i++) {
    // Slight angular jitter so the burst isn't a perfect circle
    const angle = (i / 24) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
    const dist = 55 + Math.random() * 45; // 55–100 viewBox units
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist;
    const r = (1.2 + Math.random() * 2.2).toFixed(1); // 1.2–3.4
    const sp = svgE('circle', {
      cx: BURST_X, cy: BURST_Y, r,
      fill: FW_COLORS[Math.floor(Math.random() * FW_COLORS.length)],
      'data-dx': dx.toFixed(1),
      'data-dy': dy.toFixed(1),
    });
    sp.style.transformOrigin = `${BURST_X}px ${BURST_Y}px`;
    sparkles.appendChild(sp);
  }
  svg.appendChild(sparkles);

  // Screen flash overlay — fills the viewBox with white for a brief flash
  // on hit. Fades in fast, fades out. opacity:0 by default.
  const flash = svgE('rect', {
    id: 'alex-intro-flash',
    x: 0, y: 0, width: 400, height: 400,
    fill: '#fff',
    opacity: '0',
    'pointer-events': 'none',
  });
  svg.appendChild(flash);
})();

// Web Audio API — Mario-style power-up SFX, generated on the fly.
// No audio files needed. Lazy-creates the AudioContext on first call
// (browsers require a user gesture before audio can play — slide nav
// counts as a gesture).
let _introAudioCtx = null;
function playIntroPowerUpSfx() {
  try {
    if (!_introAudioCtx) {
      _introAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    const ctx = _introAudioCtx;
    if (ctx.state === 'suspended') ctx.resume();
    const now = ctx.currentTime;
    // Helper to schedule a tone
    const tone = (freq, start, dur, type = 'square', volume = 0.12) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      osc.connect(gain);
      gain.connect(ctx.destination);
      gain.gain.setValueAtTime(volume, now + start);
      gain.gain.exponentialRampToValueAtTime(0.001, now + start + dur);
      osc.start(now + start);
      osc.stop(now + start + dur);
    };
    // Mario coin "ding" — two fast high notes
    tone(988, 0.00, 0.08, 'square', 0.10); // B5
    tone(1319, 0.08, 0.18, 'square', 0.10); // E6
    // Ascending power-up arpeggio
    tone(392, 0.25, 0.06, 'square', 0.10); // G4
    tone(523, 0.31, 0.06, 'square', 0.10); // C5
    tone(659, 0.37, 0.06, 'square', 0.10); // E5
    tone(784, 0.43, 0.06, 'square', 0.11); // G5
    tone(1047, 0.49, 0.06, 'square', 0.11); // C6
    tone(1319, 0.55, 0.18, 'square', 0.12); // E6
    // Final triumphant blip
    tone(1568, 0.80, 0.25, 'square', 0.13); // G6
  } catch (e) {
    // Audio blocked? silently fail — the visual animation still runs
  }
}

// Helper — paints a VR headset onto the avatar's face. Called after the

function paintWornHeadset(parentBody) {

  const hs = svgE('g', { class: 'worn-headset' });

  px(-13, -26, 26, 9, '#1a1a26');         // main body

function buildUE5Block(svg) {

// Fireball — spinning GoldAuthorized logo projectile with zap SFX
let _fbAudioCtx = null;
function playZapSfx() {
  try {
    if (!_fbAudioCtx) _fbAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = _fbAudioCtx; if (ctx.state === 'suspended') ctx.resume();
    const now = ctx.currentTime;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'sawtooth'; o.frequency.setValueAtTime(600, now);
    o.frequency.exponentialRampToValueAtTime(200, now + 0.15);
    o.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(0.06, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    o.start(now); o.stop(now + 0.15);
  } catch(e) {}
}

function shootFireball(svg, startX, startY, dir) {
  const fb = svgE('g', { transform:`translate(${startX},${startY})` });
  // Randomly pick between Gold Authorized (2x = 32px) and UE5 circle (1.5x = 24px)
  const isGold = Math.random() < 0.5;
  const logo = isGold ? 'GoldAuthorized.png' : 'ue5logo.png';
  const sz = isGold ? 32 : 24;
  const half = sz / 2;
  const img = svgE('image', { href:logo, x:-half, y:-half, width:sz, height:sz });
  fb.appendChild(img);
  svg.appendChild(fb);
  playZapSfx();
  let frame = 0;
  const speed = dir * 6;
  const spin = () => {
    frame++;
    const cx = startX + speed * frame;
    // Bouncy arc: initial upward launch then gravity-like bounce
    const bounce = -Math.abs(Math.sin(frame * 0.12)) * 18 * Math.max(0, 1 - frame/40);
    const cy = startY + bounce;
    fb.setAttribute('transform', `translate(${cx},${cy}) rotate(${frame * 12})`);
    if (frame < 35 && cx > 10 && cx < 390) requestAnimationFrame(spin);
    else fb.remove();
  };
  requestAnimationFrame(spin);
}

  setTimeout(() => { anim.style.opacity = '1'; }, 50);
  // Timing:
  //   0.0–2.0s  walk horizontally from off-stage left to under the block
  //   2.0–2.4s  jump straight up to the block
  //   2.4–3.2s  HIT: flash + particles + SFX + power-up grow (held at apex)

  //   3.8s      tallies begin counting up (on the intro-stats numbers)

    anim.style.animation = 'introJumpUp .4s cubic-bezier(.3,.7,.4,1) 0s 1 normal both';
  }, 2000);

    flash.style.animation = 'introFlash .45s ease-out forwards';

    sparkles.style.opacity = '1';

      p.style.setProperty('--tx', `${p.getAttribute('data-dx')}px`);

    anim.style.animation = 'introPowerUp .8s ease-out forwards';

  setTimeout(() => { if (avatarBody) paintWornHeadset(avatarBody); }, 2900);

  setTimeout(() => {
    anim.style.animation = 'introFallDown .55s cubic-bezier(.55,0,.8,1) forwards';

    anim.style.animation = 'none';

function introUE5PowerUp() {
  const svg = document.getElementById('intro-alex-svg');
  const anim = document.getElementById('alex-intro-anim');
  if (!svg || !anim) return;
  // Build UE5 block if not yet present
  if (!document.getElementById('intro-ue5-pos')) buildUE5Block(svg);
  const ue5Pos = document.getElementById('intro-ue5-pos');

  ue5Pos.style.opacity = '1';

  // Avatar is currently at translate(160, 0) scale(1.5) from step 0.
  // Walk LEFT to the UE5 block at x=80 → translate(0, 0) in anim coords
  // (since walker outer group is at x=80)
  anim.style.animation = 'none';
  anim.style.transition = 'transform 1.5s linear';
  anim.style.transform = 'translate(0, 0) scale(1.5)';

  // Jump up at 1.5s
  setTimeout(() => {

    void anim.offsetWidth;

    ue5Anim.style.animation = 'introHeadsetGrab .5s ease-out forwards';

  }, 1900);

  // Fall down at 2.7s
  setTimeout(() => {
    anim.style.animation = 'ue5FallDown .55s cubic-bezier(.55,0,.8,1) forwards';
  }, 2700);

  // Lock at 2x + run back and forth shooting fireballs
  setTimeout(() => {
    anim.style.animation = 'none';
    anim.style.transform = 'translate(0, 0) scale(2)';

    function runBurst(startX, withHop, onDone) {
      let runDir = 1;
      let runX = startX;
      let fbTimer = 0;
      let runFrame = 0;
      const loop = () => {
        if (runFrame > 180) { if (onDone) onDone(runX); return; }
        runFrame++;
        runX += runDir * 2.8;
        if (runX > 200) runDir = -1;
        if (runX < -20) runDir = 1;
        // Optional hop: small sine bounce while running
        const hopY = withHop ? -Math.abs(Math.sin(runFrame * 0.15)) * 8 : 0;
        anim.style.transform = `translate(${runX}px, ${hopY}px) scale(2)`;
        fbTimer++;
        if (fbTimer > 18 && Math.random() < 0.18) {

          shootFireball(svg, sx, 270 + hopY, runDir);
          fbTimer = 0;
        }
        requestAnimationFrame(loop);
      };

    runBurst(0, false, (endX) => {

      anim.style.transform = `translate(${90}px, 0) scale(2)`;
      setTimeout(() => {
        // Burst 2: run WITH hop
        runBurst(90, true, (endX2) => {
          anim.style.transform = `translate(${endX2}px, 0) scale(2)`;
        });
      }, 5000);
    });
  }, 3300);
}

// ── Tally count-up ──────────────────────────────────────────────
// Animates .num elements whose text is a whole number (optionally with +)
// from 0 → target over ~1s with a light hop + landing squash.
function animateTally(el){
  const orig = el.dataset.tally || el.textContent.trim();
  el.dataset.tally = orig;
  const m = orig.match(/^(\d+)(\+?)$/);
  if (!m) return;
  const target = parseInt(m[1],10);
  const suffix = m[2] || '';
  const dur = 1000;
  const start = performance.now();
  el.style.display = 'inline-block';
  el.style.willChange = 'transform';
  function frame(t){
    const k = Math.min(1, (t-start)/dur);
    const eased = 1 - Math.pow(1-k, 3);
    el.textContent = Math.round(eased*target) + (k>=1?suffix:'');
    // Light hop: up then land, plus tiny squash on landing
    let y = 0, sx = 1, sy = 1;
    if (k < 0.85) { y = -Math.sin((k/0.85)*Math.PI) * 14; }
    else {
      const lk = (k-0.85)/0.15; // 0→1 landing
      sy = 1 - 0.12*Math.sin(lk*Math.PI);
      sx = 1 + 0.12*Math.sin(lk*Math.PI);
    }
    el.style.transform = `translateY(${y.toFixed(2)}px) scale(${sx.toFixed(3)}, ${sy.toFixed(3)})`;
    if (k<1) requestAnimationFrame(frame);
    else el.style.transform = '';
  }
  requestAnimationFrame(frame);
}
function playTallies(slide){
  if (!slide) return;
  slide.querySelectorAll('.num').forEach(animateTally);
}
// Stash the final value and reset the display to "0" so the number

  if (!slide) return;

    const orig = el.dataset.tally || el.textContent.trim();
    el.dataset.tally = orig;
    if (/^\d+\+?$/.test(orig)) el.textContent = '0';
  });
}

// ── Sub-slide step system ──
// Slides can register steps: forward navigation advances steps before
// moving to the next slide. Backward always goes to previous slide.
const slideSteps = new Map(); // slideEl → { steps: [fn,...], current: 0 }
let currentStepState = null;

function advanceStep() {
  // Returns true if a step was consumed, false if slide should advance
  const slide = allSlides[current];
  const ss = slideSteps.get(slide);
  if (!ss || ss.current >= ss.steps.length) return false;
  ss.steps[ss.current]();
  ss.current++;
  return true;
}
function resetSteps(slide) {
  const ss = slideSteps.get(slide);
  if (ss) ss.current = 0;
}

let animating=false;
function goTo(n){
  if(n<0||n>=total||n===current||animating)return;
  animating=true;const fwd=n>current;
  const p=allSlides[current],nx=allSlides[n];
  // Ensure no stale active slides
  allSlides.forEach(s=>{if(s!==p&&s!==nx){s.classList.remove('active');s.style.animation='';s.style.cssText=''}});
  // Exit previous
  p.classList.remove('active');
  p.style.animation=(fwd?'slideOutFwd':'slideOutBwd')+' .45s cubic-bezier(.4,0,.2,1) forwards';
  setTimeout(()=>{p.style.animation='';p.style.cssText=''},500);
  // Enter next
  nx.style.animation=(fwd?'slideInFwd':'slideInBwd')+' .5s cubic-bezier(.4,0,.2,1) forwards';
  nx.classList.add('active');
  current=n;updateHUD();
  // Reset steps for the slide we're entering
  resetSteps(nx);
  // Reset one-shot flags so animations replay on every visit
  if (nx.dataset.type === 'map') { mapDone = false; }
  // Per-slide entry hooks
  const t = allSlides[current].dataset.type;
  if(t==='venn') setTimeout(()=>{ if(window.startVennOrbit) window.startVennOrbit(); }, 400);
  if(t!=='venn' && window.stopVennOrbit) window.stopVennOrbit();
  if(t==='intro-lens') setTimeout(()=>{ if(window.startLensOrbit) window.startLensOrbit(); }, 400);
  if(t!=='intro-lens' && window.stopLensOrbit) window.stopLensOrbit();
  // Beard evolution — trigger when entering the 2020 case or lesson slide
  const slideYear = parseInt(nx.dataset.year || 0);
  if (slideYear === 2020 && (t==='case' || t==='lesson')) {
    _evoPlayed = false; // reset so it replays on re-visit
    setTimeout(playBeardEvolution, 800);
  }
  if(t==='map') setTimeout(startMap, 400);
  // Clean up voxel renderer when leaving the map slide
  if (allSlides[n].dataset.type !== 'map' && window._voxelCleanup) { window._voxelCleanup(); window._voxelCleanup = null; }
  if(t==='intro-alex') { primeTallies(nx); setTimeout(playAlexIntro, 500); }
  // Tally count-up for any .num element that's purely numeric.
  // Skip on intro-alex — the tallies are triggered AFTER the avatar lands
  // inside playAlexIntro(), so the stats count up as Alex grows.
  if (t !== 'intro-alex') setTimeout(()=>playTallies(nx), 400);
  // Update URL hash so the slide is shareable / re-navigable
  if(history.replaceState) history.replaceState(null, '', '#' + (current + 1));
  setTimeout(()=>{animating=false},520);
}
document.getElementById('btn-prev').addEventListener('click',()=>goTo(current-1));
document.getElementById('btn-next').addEventListener('click',()=>goTo(current+1));
document.addEventListener('keydown',e=>{
  // Don't intercept keys when typing in inputs (annotation textarea)
  if(['INPUT','TEXTAREA'].includes(document.activeElement?.tagName))return;
  // Forward: arrows, space, PageDown, N (most clickers send PageDown)
  // Try to advance a sub-step first; if none remain, go to next slide.
  if(['ArrowRight','ArrowDown',' ','PageDown','n','N'].includes(e.key)){e.preventDefault();if(!advanceStep())goTo(current+1)}
  // Backward: arrows, PageUp, P
  if(['ArrowLeft','ArrowUp','PageUp','p','P'].includes(e.key)){e.preventDefault();goTo(current-1)}
  if(e.key==='Home'){e.preventDefault();goTo(0)}
  if(e.key==='End'){e.preventDefault();goTo(total-1)}
  // H = toggle presentation mode (hide all UI chrome for projector display)
  if(e.key==='h'||e.key==='H'){ e.preventDefault(); document.body.classList.toggle('presentation-mode'); }
});

// Hash routing — let the URL drive which slide we land on
function goToFromHash() {
  const m = (location.hash || '').match(/^#(\d+)$/);
  if (!m) return;
  const target = Math.max(0, Math.min(total - 1, parseInt(m[1], 10) - 1));
  if (target !== current) goTo(target);
}
window.addEventListener('hashchange', goToFromHash);
