    const body = avRoot.querySelector('.av-body');
    if (body) paintWornHeadset(body);
    // Start with arms up
    avRoot.classList.add('arm-up');
    svg.appendChild(lensAvG);
    // Fade in + spawn SFX
    lensAvG.style.opacity = '0';
    lensAvG.style.transition = 'opacity .5s';
    setTimeout(() => { lensAvG.style.opacity = '1'; playLensSpawnSfx(); }, 50);
    // Arms down after 1.5s
    setTimeout(() => { avRoot.classList.remove('arm-up'); }, 1500);
  }

  // FIVE_OCLOCK = eyepiece angle on the ring (where the cord meets the ring)
  // The avatar first lands on the eyepiece circle (ex,ey) which is OFFSHORE from
  // the ring, then dashes along a straight dashed line back to the ring edge,
  // then arcs clockwise to 6 o'clock.
  const FIVE_OCLOCK = eyeAngle; // ~0.77 rad — ring-edge at the eyepiece direction
  const SIX_OCLOCK = Math.PI / 2; // bottom of the ring, where 2016 goes

  // Step 3: Shrink from center → eyepiece circle (the small offshore ring)
  function playShrinkSfx() {
    try {
      if (!_humCtx) _humCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (_humCtx.state === 'suspended') _humCtx.resume();
      const ctx = _humCtx, now = ctx.currentTime;
      // Tiny descending chirp — three quick tones dropping an octave+fifth
      [[880,0],[587,0.09],[392,0.18]].forEach(([freq,t]) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.type = 'sine'; o.frequency.value = freq;
        o.connect(g); g.connect(ctx.destination);
        g.gain.setValueAtTime(0.08, now+t);
        g.gain.exponentialRampToValueAtTime(0.001, now+t+0.12);
        o.start(now+t); o.stop(now+t+0.13);
      });
    } catch(e) {}
  }
  window._playShrinkSfx = playShrinkSfx;

  function lensStep3() {
    if (!lensAvG) return;
    playShrinkSfx();
    const startTf = { x: CX, y: CY, s: 1.2 };
    const endTf   = { x: ex, y: ey, s: 0.4 }; // land ON the eyepiece
    const dur = 1500;
    const t0 = performance.now();
    function shrinkStep(now) {
      const k = Math.min(1, (now - t0) / dur);
      const ease = k < 0.5 ? 2*k*k : 1 - Math.pow(-2*k+2, 2)/2;
      const cx = startTf.x + (endTf.x - startTf.x) * ease;
      const cy = startTf.y + (endTf.y - startTf.y) * ease;
      const cs = startTf.s + (endTf.s - startTf.s) * ease;
      lensAvG.setAttribute('transform', `translate(${cx.toFixed(1)},${cy.toFixed(1)}) scale(${cs.toFixed(3)})`);
      if (k < 1) requestAnimationFrame(shrinkStep);
    }
    requestAnimationFrame(shrinkStep);
  }

  // Step 4: Chiptune plays, avatar dashes eyepiece → ring entry (dashed straight
  // line), then arcs clockwise 5 o'clock → 6 o'clock. "2016" label appears.
  let _chiptuneCtx = null;
  function playChiptune() {
    try {
      if (!_chiptuneCtx) _chiptuneCtx = new (window.AudioContext || window.webkitAudioContext)();
      const ctx = _chiptuneCtx; if (ctx.state === 'suspended') ctx.resume();
      const now = ctx.currentTime;
      const tone = (freq, start, dur, type='square', vol=0.05) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.type = type; o.frequency.value = freq;
        o.connect(g); g.connect(ctx.destination);
        g.gain.setValueAtTime(vol, now+start);
        g.gain.exponentialRampToValueAtTime(0.001, now+start+dur);
        o.start(now+start); o.stop(now+start+dur);
      };
      // Simple adventurous melody — walking theme
      const notes = [262,294,330,349,392,349,330,294,262,330,392,440];
      notes.forEach((f,i) => tone(f, i*0.22, 0.2, 'square', 0.04));
    } catch(e) {}
  }

  function lensStep4() {
    if (!lensAvG) return;
    playChiptune();

    // Ring-entry point at 5 o'clock
    const rx = CX + monocleR * Math.cos(FIVE_OCLOCK);
    const ry = CY + monocleR * Math.sin(FIVE_OCLOCK);

    // ── Phase A: straight dashed dash from eyepiece (ex,ey) → ring entry (rx,ry) ──
    const trailA = svgE('path', {
      d: '', fill:'none', stroke:'rgba(0,212,255,.4)',
      'stroke-width':'2', 'stroke-dasharray':'6 4', 'stroke-linecap':'round',
    });
    svg.insertBefore(trailA, lensAvG);
    const durA = 700;
    const t0A = performance.now();
    const ptsA = [];

    function phaseA(now) {
      const k = Math.min(1, (now - t0A) / durA);
      const ease = k < 0.5 ? 2*k*k : 1 - Math.pow(-2*k+2, 2)/2;
      const x = ex + (rx - ex) * ease;
      const y = ey + (ry - ey) * ease;
      lensAvG.setAttribute('transform', `translate(${x.toFixed(1)},${y.toFixed(1)}) scale(0.4)`);
      ptsA.push(`${x.toFixed(1)},${y.toFixed(1)}`);
      if (ptsA.length > 1) trailA.setAttribute('d', 'M' + ptsA.join(' L'));
      if (k < 1) { requestAnimationFrame(phaseA); return; }

      // ── Phase B: arc along ring from 5 o'clock → 6 o'clock ──
      const trailB = svgE('path', {
        d: '', fill:'none', stroke:'rgba(0,212,255,.4)',
        'stroke-width':'2', 'stroke-dasharray':'6 4', 'stroke-linecap':'round',
      });
      svg.insertBefore(trailB, lensAvG);
      const durB = 1940; // synced to chiptune melody end (durA 700 + durB 1940 = 2640ms = 12×0.22s)
      const t0B = performance.now();
      const ptsB = [];

      function phaseB(now) {
        const k = Math.min(1, (now - t0B) / durB);
        const ease = k < 0.5 ? 2*k*k : 1 - Math.pow(-2*k+2, 2)/2;
        const a = FIVE_OCLOCK + (SIX_OCLOCK - FIVE_OCLOCK) * ease;
        const x = CX + monocleR * Math.cos(a);
        const y = CY + monocleR * Math.sin(a);
        lensAvG.setAttribute('transform', `translate(${x.toFixed(1)},${y.toFixed(1)}) scale(0.4)`);
        ptsB.push(`${x.toFixed(1)},${y.toFixed(1)}`);
        if (ptsB.length > 1) trailB.setAttribute('d', 'M' + ptsB.join(' L'));
        if (k < 1) { requestAnimationFrame(phaseB); return; }
        // Arrived at 6 o'clock — show "2016" label (lowered for space)
        const lbl = svgE('text', {
          x: CX + monocleR * Math.cos(SIX_OCLOCK),
          y: CY + monocleR * Math.sin(SIX_OCLOCK) + 52,
          'text-anchor':'middle', fill:'rgba(0,212,255,.8)',
          'font-family':'Space Grotesk,sans-serif', 'font-size':'18',
          'font-weight':'600', 'letter-spacing':'2', id:'lens-2016-lbl',
        });
        lbl.textContent = '2016';
        lbl.style.opacity = '0';
        svg.appendChild(lbl);
        setTimeout(() => { lbl.style.transition = 'opacity .5s'; lbl.style.opacity = '1'; play2016Sfx(); }, 50);
      }
      requestAnimationFrame(phaseB);
    }
    requestAnimationFrame(phaseA);
  }

  // Step 2 (countdown): 2026 fades in center, counts back with ticks,
  // white→teal color + scale-down + opacity fade ending ~1950. Sounds stop before fade ends.
  function lensCountdown() {
    const yrEl = svgE('text', {
      x: CX, y: CY, 'text-anchor':'middle', 'dominant-baseline':'middle',
      fill:'rgba(255,255,255,.85)', 'font-family':'Space Grotesk,sans-serif',
      'font-size':'72', 'font-weight':'700', 'letter-spacing':'4',
      id: 'lens-year-counter',
    });
    yrEl.style.transformBox = 'fill-box';
    yrEl.style.transformOrigin = 'center';
    yrEl.textContent = '2026';
    yrEl.style.opacity = '0';
    svg.appendChild(yrEl);
    // Fade in 2026
    setTimeout(() => { yrEl.style.transition = 'opacity .4s'; yrEl.style.opacity = '1'; }, 50);
    // Start countdown after fade-in settles
    setTimeout(() => {
      yrEl.style.transition = '';
      const countDur = 3000;
      const t0 = performance.now();
      let lastYear = -1;
      let ticksActive = true;
      function tickSound() {
        try {
          if (!_humCtx) _humCtx = new (window.AudioContext || window.webkitAudioContext)();
          if (_humCtx.state === 'suspended') _humCtx.resume();
          const ctx = _humCtx, now = ctx.currentTime;
          const o = ctx.createOscillator(), g = ctx.createGain();
          o.type = 'square'; o.frequency.value = 1200 + Math.random() * 200;
          o.connect(g); g.connect(ctx.destination);
          g.gain.setValueAtTime(0.04, now);
          g.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
          o.start(now); o.stop(now + 0.04);
        } catch(e) {}
      }
      function countFrame(now) {
        const k = Math.min(1, (now - t0) / countDur);
        const cur = Math.round(2026 - k * 126); // 2026 → 1900
        yrEl.textContent = String(cur);
        if (cur !== lastYear) {
          if (ticksActive) tickSound();
          lastYear = cur;
        }
        // Stop ticks just before fade so last sound finishes before opacity drops
        if (cur <= 1975) ticksActive = false;
        // Color fade: white (255,255,255) → teal (0,212,255) across 2026 → 2010
        const colorT = Math.min(1, Math.max(0, (2026 - cur) / 16));
        const cr = Math.round(255 * (1 - colorT));
        const cg = Math.round(255 - 43 * colorT);
        yrEl.setAttribute('fill', `rgb(${cr},${cg},255)`);
        // Opacity/scale fade: 1970 → 1950
        if (cur <= 1970) {
          const t = Math.min(1, (1970 - cur) / 20);
          yrEl.style.opacity = (1 - t).toFixed(3);
          yrEl.style.transform = `scale(${(1 - 0.15 * t).toFixed(3)})`;
        }
        if (k < 1) requestAnimationFrame(countFrame);
        else yrEl.style.opacity = '0';
      }
      requestAnimationFrame(countFrame);
    }, 500);
  }

  // Register steps (runs after slideSteps is available)
  // Order: fade text → countdown → avatar → shrink → chiptune+2016
  setTimeout(() => {
    slideSteps.set(introLens, {
      current: 0,
      steps: [lensStep1, lensCountdown, lensStep2, lensStep3, lensStep4],
    });
  }, 0);

  // Reset function — restore all text when re-entering the slide
  window._lensReset = () => {
    lensTexts.forEach(el => { el.style.transition = 'none'; el.style.opacity = ''; });
    if (lensAvG) { lensAvG.remove(); lensAvG = null; }
    document.getElementById('lens-2016-lbl')?.remove();
    document.getElementById('lens-year-counter')?.remove();
    svg.querySelectorAll('path[stroke-dasharray]').forEach(p => p.remove());
  };
})();

// Recap slide steps + walker hop
(function(){
  const items=recapS.querySelectorAll('.recap-item');
  const titleEl=recapS.querySelector('.recap-title');
  const subEl=recapS.querySelector('.recap-sub');
  const waitEl=recapS.querySelector('.recap-wait');

  function recapReset(){
    titleEl.style.opacity='0';subEl.style.opacity='0';waitEl.style.opacity='0';
    items.forEach(it=>it.classList.remove('visible'));
  }

  function playDropSfx(){
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      const now=ctx.currentTime;
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine';o.frequency.value=660+Math.random()*200;
      o.connect(g);g.connect(ctx.destination);
      g.gain.setValueAtTime(0.06,now);
      g.gain.exponentialRampToValueAtTime(0.001,now+0.08);
      o.start(now);o.stop(now+0.09);
    }catch(e){}
  }

  function playTaDaSfx(){
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      const now=ctx.currentTime;
      [[523,0],[659,0.06],[784,0.12],[1047,0.18],[1319,0.24],[1568,0.30]].forEach(([freq,t])=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.type='triangle';o.frequency.value=freq;
        o.connect(g);g.connect(ctx.destination);
        g.gain.setValueAtTime(0.07,now+t);
        g.gain.exponentialRampToValueAtTime(0.001,now+t+0.2);
        o.start(now+t);o.stop(now+t+0.22);
      });
    }catch(e){}
  }

  // Step 11: "But wait..." text appears
  function showButWait(){
    playTaDaSfx();
    waitEl.style.opacity='1';
  }

  // Step 12: Big dramatic hops → walk to 2026 → year label SFX
  function walkerHopTo2026(){
    const walker=document.getElementById('tav');
    if(!walker) return;
    const inner=walker.querySelector('g');
    const wScale=0.22;
    let hopCount=0, hopFrame=0;
    const hopHeight=28; // tall noticeable hops

    function playHopSfx(pitch){
      try{
        const ctx=new(window.AudioContext||window.webkitAudioContext)();
        const now=ctx.currentTime;
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.type='sine';o.frequency.value=pitch;
        o.connect(g);g.connect(ctx.destination);
        g.gain.setValueAtTime(0.1,now);
        g.gain.exponentialRampToValueAtTime(0.001,now+0.15);
        o.start(now);o.stop(now+0.16);
      }catch(e){}
    }

    function playArrivalSfx(){
      try{
        const ctx=new(window.AudioContext||window.webkitAudioContext)();
        const now=ctx.currentTime;
        [[784,0],[988,0.08],[1319,0.16],[1568,0.24]].forEach(([freq,t])=>{
          const o=ctx.createOscillator(),g=ctx.createGain();
          o.type='triangle';o.frequency.value=freq;
          o.connect(g);g.connect(ctx.destination);
          g.gain.setValueAtTime(0.1,now+t);
          g.gain.exponentialRampToValueAtTime(0.001,now+t+0.25);
          o.start(now+t);o.stop(now+t+0.28);
        });
      }catch(e){}
    }

    // Two big hops, then walk to 2026
    function doHop(){
      hopFrame++;
      // Single big arc: sin over 30 frames
      const k=hopFrame/30;
      const bounceY=-Math.sin(k*Math.PI)*hopHeight;
      if(inner)inner.setAttribute('transform',`scale(${wScale}) translate(0,${(bounceY/wScale).toFixed(1)})`);
      if(hopFrame<30){
        requestAnimationFrame(doHop);
      } else {
        // Land
        if(inner)inner.setAttribute('transform',`scale(${wScale})`);
        hopCount++;
        hopFrame=0;
        playHopSfx(hopCount===1?880:1047);
        if(hopCount<2){
          // Pause briefly then second hop
          setTimeout(()=>requestAnimationFrame(doHop),200);
        } else {
          // Walk to 2026 position
          setTimeout(()=>{
            const tsvg=document.getElementById('tracker-svg');
            if(tsvg){
              const epx=parseFloat(tsvg.dataset.epx)||60;
              const epy=parseFloat(tsvg.dataset.epy)||60;
              walker.style.transition='transform 1s cubic-bezier(.4,0,.2,1)';
              walker.setAttribute('transform',`translate(${epx},${epy})`);
              setTimeout(()=>{
                walker.style.transition='';
                // Arrival SFX + year label change
                playArrivalSfx();
                const yrEl=document.getElementById('tracker-year');
                if(yrEl){
                  yrEl.style.transition='color .4s';
                  yrEl.textContent='2026';
                  yrEl.style.color='var(--amber)';
                  setTimeout(()=>{yrEl.style.transition='';yrEl.style.color='';},500);
                }
              },1050);
            }
          },300);
        }
      }
    }
    requestAnimationFrame(doHop);
  }

  const steps=[];
  for(let i=0;i<items.length;i++){
    steps.push(()=>{playDropSfx();items[i].classList.add('visible');});
  }
  steps.push(showButWait);
  steps.push(walkerHopTo2026);

  window._recapReset=recapReset;
  window._recapInit=function(){
    recapReset();
    setTimeout(()=>{titleEl.style.opacity='1';},200);
    setTimeout(()=>{subEl.style.opacity='1';},600);
  };

  setTimeout(()=>{slideSteps.set(recapS,{current:0,steps:steps});},0);
})();

(function(){
  // Pixel Alex — SVG avatar with arms up, flanking left of title
  const pixelSvg = document.createElement('div');
  pixelSvg.style.cssText = 'position:absolute;top:clamp(40px,8vh,120px);left:clamp(100px,14vw,240px);z-index:2;transform:translate(262px,175px)';
  pixelSvg.innerHTML = '<svg viewBox="-22 -46 44 76" style="width:140px;height:auto;overflow:visible;transform:scale(1.09)"></svg>';
  cls.appendChild(pixelSvg);
  const pSvg = pixelSvg.querySelector('svg');
  const pAvatar = buildAvatar(pSvg, { withBeard:true });
  // Lock arms up — inline style beats the CSS class rules
  const armsDown = pAvatar.querySelector('.av-arms-down');
  const armsUp = pAvatar.querySelector('.av-arms-up');
  if(armsDown) armsDown.style.visibility = 'hidden';
  if(armsUp) armsUp.style.visibility = 'visible';

  // Voxel Alex — Three.js canvas, flanking right of title
  const voxelDiv = document.createElement('div');
  voxelDiv.style.cssText = 'position:absolute;top:clamp(40px,8vh,120px);right:clamp(100px,14vw,240px);z-index:2;width:140px;height:200px;transform:translate(-251px,178px)';
  cls.appendChild(voxelDiv);
  const voxCanvas = document.createElement('canvas');
  voxCanvas.width = 256; voxCanvas.height = 360;
  voxCanvas.style.cssText = 'width:100%;height:100%;display:block;transform:translate(-60px,-63px) scale(0.66)';
  voxelDiv.appendChild(voxCanvas);

  let voxRunning = false, voxGroup = null, voxRenderer = null, voxScene = null, voxCamera = null;

  async function initCloseVoxel(){
    if(voxRunning) return;
    let THREE;
    try { THREE = await import('three'); } catch(e) { return; }
    voxScene = new THREE.Scene();
    voxCamera = new THREE.PerspectiveCamera(35, 256/360, 1, 500);
    voxCamera.position.set(0, 10, 120);
    voxCamera.lookAt(0, 7, 0);
    voxRenderer = new THREE.WebGLRenderer({ canvas:voxCanvas, alpha:true, antialias:true });
    voxRenderer.setSize(256, 360);
    voxRenderer.setClearColor(0x000000, 0);
    // Lights
    const amb = new THREE.AmbientLight(0x8888aa, 0.6);
    const dir = new THREE.DirectionalLight(0xffffff, 1.2);
    dir.position.set(3, 8, 5);
    voxScene.add(amb, dir);
    // Build voxel body from pixel avatar
    voxGroup = new THREE.Group();
    const tmpSvg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    tmpSvg.setAttribute('viewBox','-22 -46 44 76');
    document.body.appendChild(tmpSvg);
    const tmpAv = buildAvatar(tmpSvg, { withBeard:true });
    // Arms up
    const ad2 = tmpAv.querySelector('.av-arms-down'); if(ad2) ad2.style.display='none';
    const au2 = tmpAv.querySelector('.av-arms-up'); if(au2) au2.style.display='block';
    // Exclude hidden arms-down rects.
    const allRects = [...tmpSvg.querySelectorAll('rect')].filter(r => !ad2?.contains(r));
    allRects.forEach((r) => {
      const x=parseFloat(r.getAttribute('x')), y=parseFloat(r.getAttribute('y'));
      const w=parseFloat(r.getAttribute('width')), h=parseFloat(r.getAttribute('height'));
      const fill = r.getAttribute('fill') || '#888';
      const c = new THREE.Color(fill);
      const cx = x + w/2, cy = -(y + h/2);
      const area = w * h;
      // Face/hair/beard details are small rects in the head region. Push them
      // forward past the head/hair box fronts so they're visible.
      const isFaceDetail = area < 55 && Math.abs(cx) <= 16 && cy >= 10 && cy <= 45;
      const geo = new THREE.BoxGeometry(w, h, Math.min(w,h)*0.8);
      const mat = new THREE.MeshStandardMaterial({ color:c, roughness:0.7 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(cx, cy, isFaceDetail ? 13 : 0);
      voxGroup.add(mesh);
    });
    document.body.removeChild(tmpSvg);
    voxScene.add(voxGroup);
    voxRunning = true;
    function animate(){
      if(!voxRunning) return;
      voxGroup.rotation.y = Math.sin(performance.now()*0.0006)*0.3;
      voxRenderer.render(voxScene, voxCamera);
      requestAnimationFrame(animate);
    }
    animate();
  }

  // Particle burst system — random bursts from hands every few seconds
  const BURST_COLORS = ['#fde68a','#a78bfa','#00d4ff','#f43f5e','#fff','#f59e0b'];
  function spawnBurst(container, x, y) {
    for(let i=0;i<8;i++){
      const p = document.createElement('div');
      const angle = Math.random()*Math.PI*2;
      const dist = 30+Math.random()*50;
      const tx = Math.cos(angle)*dist, ty = Math.sin(angle)*dist - 20;
      p.style.cssText = `position:absolute;left:${x}px;top:${y}px;width:${3+Math.random()*4}px;height:${3+Math.random()*4}px;border-radius:50%;background:${BURST_COLORS[i%BURST_COLORS.length]};opacity:1;pointer-events:none;z-index:3;transition:all .8s ease-out`;
      container.appendChild(p);
      requestAnimationFrame(()=>{
        p.style.transform=`translate(${tx}px,${ty}px)`;
        p.style.opacity='0';
      });
      setTimeout(()=>p.remove(),900);
    }
  }

  let burstInterval = null;
  function startBursts(){
    if(burstInterval) return;
    function doBurst(){
      // Pixel Alex hands (arms up) — relative to pixelSvg position
      const pr = pixelSvg.getBoundingClientRect();
      const cr = cls.getBoundingClientRect();
      spawnBurst(cls, pr.left-cr.left+20, pr.top-cr.top+30);
      spawnBurst(cls, pr.left-cr.left+120, pr.top-cr.top+30);
      // Voxel Alex hands
      const vr = voxelDiv.getBoundingClientRect();
      spawnBurst(cls, vr.left-cr.left+20, vr.top-cr.top+30);
      spawnBurst(cls, vr.left-cr.left+120, vr.top-cr.top+30);
    }
    doBurst();
    burstInterval = setInterval(doBurst, 3000+Math.random()*2000);
  }
  function stopBursts(){ if(burstInterval){clearInterval(burstInterval);burstInterval=null;} }

  // Hook into goTo
  const origType = cls.dataset.type; // 'close'
  window._closeStart = function(){ initCloseVoxel(); setTimeout(startBursts, 800); };
  window._closeStop = function(){ stopBursts(); if(voxRunning){voxRunning=false; if(voxRenderer)voxRenderer.dispose();} };
})();

// ── Reusable cycling media player ─────────────────────────────────────────
// buildMediaCycler(slideEl, items, opts)
//   items: [{type:'image'|'video', src:'...'}]
//   opts:  imageDuration (ms), enterDur, revealDur, exitDur
// Each item: pixelated slide-in → de-pixelate + flash → hold → bing → pixelate + fly-left → next
function buildMediaCycler(slideEl, items, opts){
  const { imageDuration=6000, enterDur=700, revealDur=1600, exitDur=500, portrait=false } = opts||{};
  const mount = slideEl.querySelector('.media-cycler-mount');
  if (!mount) return;

  let CW = portrait ? 338 : 800, CH = portrait ? 600 : 500;
  if (portrait) {
    const ci = slideEl.querySelector('.case-image');
    if (ci) ci.classList.add('portrait');
  }
  const canvas = document.createElement('canvas');
  canvas.width = CW; canvas.height = CH;
  canvas.style.cssText = 'width:100%;height:auto;display:block;transition:none;border-radius:18px;';
  mount.appendChild(canvas);
  const ctx = canvas.getContext('2d');

  const off = document.createElement('canvas');
  const offCtx = off.getContext('2d');

  // Resize canvas to match source aspect ratio — no cropping, frame adapts
  function adaptCanvas(src) {
    const sw = src.naturalWidth || src.videoWidth || 0;
    const sh = src.naturalHeight || src.videoHeight || 0;
    if (sw > 0 && sh > 0) {
      const newCH = Math.round(CW * sh / sw);
      if (newCH !== CH) { CH = newCH; canvas.width = CW; canvas.height = CH; }
    }
  }
  // Load all media elements
  const sources = items.map(item => {
    if (item.type === 'video'){
      const v = document.createElement('video');
      v.src = item.src; v.muted = true; v.loop = !!item.loop; v.preload = 'auto';
      v.playsInline = true; v.style.display = 'none';
      document.body.appendChild(v);
      return v;
    } else {
      const img = new Image(); img.src = item.src; return img;
    }
  });
  // Pre-adapt canvas once each source loads (handles race condition)
  sources.forEach((src, i) => {
    if (src.tagName === 'IMG') {
      if (src.naturalWidth) { if (i === 0) adaptCanvas(src); }
      else src.addEventListener('load', () => { if (i === idx) adaptCanvas(src); }, {once:true});
    } else {
      src.addEventListener('loadedmetadata', () => { if (i === idx) adaptCanvas(src); }, {once:true});
    }
  });

  let idx = 0, phase = 'entering', phaseStart = 0;
  let pulseAlpha = 0, rafId = null, videoEnded = false;
  let manualMode = false;

  function goNext() {
    const src = sources[idx];
    if (src.tagName === 'VIDEO') { src.pause(); src.currentTime = 0; videoEnded = false; }
    playBing();
    idx = (idx + 1) % sources.length;
    phase = 'entering'; phaseStart = 0;
    canvas.style.transform = 'translateX(50%)';
    manualMode = true;
  }
  function goPrev() {
    const src = sources[idx];
    if (src.tagName === 'VIDEO') { src.pause(); src.currentTime = 0; videoEnded = false; }
    playBing();
    idx = (idx - 1 + sources.length) % sources.length;
    phase = 'entering'; phaseStart = 0;
    canvas.style.transform = 'translateX(-50%)';
    manualMode = true;
  }
  const cyclerAPI = {
    next: goNext, prev: goPrev,
    setManual() { manualMode = true; },
    setAuto()   { manualMode = false; },
  };

  function easeOut3(k){ return 1 - Math.pow(1-k, 3); }
  function easeIn2(k){ return k*k; }

  // Fill canvas — since canvas adapts to source aspect ratio, this is ~1:1
  function coverRect(sw, sh) {
    const scale = Math.max(CW / sw, CH / sh);
    const dw = sw * scale, dh = sh * scale;
    const dx = (CW - dw) / 2, dy = (CH - dh) / 2;
    return { dx, dy, dw, dh };
  }
  function drawPixelated(src, ps, flipH){
    const sw = src.naturalWidth || src.videoWidth || CW;
    const sh = src.naturalHeight || src.videoHeight || CH;
    const { dx, dy, dw, dh } = coverRect(sw, sh);
    ctx.clearRect(0, 0, CW, CH);
    if (flipH) { ctx.save(); ctx.scale(-1,1); ctx.translate(-CW,0); }
    if (ps <= 1.2){
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(src, dx, dy, dw, dh);
    } else {
      const bw = Math.max(1, Math.round(dw/ps));
      const bh = Math.max(1, Math.round(dh/ps));
      off.width = bw; off.height = bh;
      offCtx.drawImage(src, 0, 0, bw, bh);
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(off, dx, dy, dw, dh);
    }
    if (flipH) ctx.restore();
  }

  // Low soft bing — long fade, barely audible
  let _bingCtx = null;
  function playBing(){
    try {
      if (!_bingCtx) _bingCtx = new (window.AudioContext||window.webkitAudioContext)();
      if (_bingCtx.state==='suspended') _bingCtx.resume();
      const c=_bingCtx, t=c.currentTime;
      const o=c.createOscillator(), g=c.createGain();
      o.type='sine';
      // Deep sub-bass thud — mostly felt, barely heard
      o.frequency.setValueAtTime(72, t);
      o.frequency.exponentialRampToValueAtTime(38, t+0.18);
      o.connect(g); g.connect(c.destination);
      g.gain.setValueAtTime(0.007, t);
      g.gain.exponentialRampToValueAtTime(0.001, t+0.22);
      o.start(t); o.stop(t+0.23);
    } catch(e){}
  }

  function tick(now){
    if (!phaseStart) phaseStart = now;
    const el = now - phaseStart;
    const src = sources[idx];
    ctx.clearRect(0, 0, CW, CH);

    const _flip = items[idx]?.flipH || false;
    switch(phase){
      case 'entering': {
        adaptCanvas(src);
        const k = Math.min(1, el/enterDur);
        canvas.style.transform = `translateX(${((1-easeOut3(k))*50).toFixed(2)}%)`;
        drawPixelated(src, 32, _flip);
        if (k >= 1){ canvas.style.transform=''; phase='revealing'; phaseStart=now; pulseAlpha=0; }
        break;
      }
      case 'revealing': {
        const k = Math.min(1, el/revealDur);
        drawPixelated(src, Math.pow(2, (1-k)*5), _flip);
        if (k >= 1 && pulseAlpha === 0){
          pulseAlpha = 0.5;
          phase='holding'; phaseStart=now;
          if (src.tagName==='VIDEO'){
            videoEnded = false;
            src.currentTime=0;
            src.play().catch(()=>{});
            src.addEventListener('ended', ()=>{ videoEnded=true; }, {once:true});
          }
        }
        break;
      }
      case 'holding': {
        drawPixelated(src, 1, _flip);
        if (pulseAlpha > 0){
          ctx.save();
          ctx.globalCompositeOperation='lighter';
          ctx.fillStyle=`rgba(255,255,255,${pulseAlpha.toFixed(3)})`;
          ctx.fillRect(0,0,CW,CH);
          ctx.restore();
          pulseAlpha = Math.max(0, pulseAlpha - 0.022);
        }
        // Single-item: once flash fades...
        if (items.length === 1 && pulseAlpha <= 0) {
          if (src.tagName === 'VIDEO') {
            // Single video: keep rendering frames and loop
            if (!src.loop) { src.loop = true; }
            drawPixelated(src, 1, _flip);
            // continue rAF — don't return
          } else {
            // Single image: draw final frame and stop
            drawPixelated(src, 1, _flip);
            return; // stop rAF loop
          }
        }
        const isVid = src.tagName==='VIDEO';
        if (manualMode && isVid && videoEnded) {
          // Loop video in manual mode instead of advancing
          videoEnded = false;
          src.currentTime = 0;
          src.play().catch(()=>{});
          src.addEventListener('ended', ()=>{ videoEnded=true; }, {once:true});
        }
        const done = !manualMode && (isVid ? videoEnded : el >= (window._globalImageDuration||imageDuration));
        if (done){
          if (isVid){ src.pause(); src.currentTime=0; }
          playBing();
          phase='exiting'; phaseStart=now;
        }
        break;
      }
      case 'exiting': {
        const k = Math.min(1, el/exitDur);
        canvas.style.transform = `translateX(${(-easeIn2(k)*110).toFixed(2)}%)`;
        drawPixelated(src, Math.pow(2, k*5), _flip);
        if (k >= 1){
          canvas.style.transform = 'translateX(50%)';
          idx = (idx+1) % sources.length;
          phase='entering'; phaseStart=now;
        }
        break;
      }
    }
    rafId = requestAnimationFrame(tick);
  }

  function start(){ if (!rafId){ phaseStart=0; rafId=requestAnimationFrame(tick); } }
  function stop(){
    if (rafId){ cancelAnimationFrame(rafId); rafId=null; }
    canvas.style.transform='';
    const cur=sources[idx];
    if (cur?.tagName==='VIDEO'){ cur.pause(); cur.currentTime=0; }
    idx=0; phase='entering'; phaseStart=0; pulseAlpha=0; videoEnded=false;
  }

  new MutationObserver(()=>{
    if (slideEl.classList.contains('active')) {
      window._activeCycler = cyclerAPI;
      start();
    } else {
      if (window._activeCycler === cyclerAPI) window._activeCycler = null;
      manualMode = false; // reset to auto on slide exit
      stop();
    }
  }).observe(slideEl, {attributes:true, attributeFilter:['class']});
  if (slideEl.classList.contains('active')) { window._activeCycler = cyclerAPI; start(); }
}

  const GOLDS = ['#f59e0b','#fbbf24','#d97706','#fcd34d','#ca8a04','#eab308','#f5c518','#e8a010'];

  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:8';
  slide.appendChild(overlay);

  const COLS = 22;
  const pileH = new Float32Array(COLS);
  let running = false, tid = null, qi = 0, order = [];

  function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

  function spawnQuote() {
    if (!running) return;
    // Cycle through all quotes in shuffled order before repeating
    if (qi >= order.length) { order = shuffle([...Array(QUOTES.length).keys()]); qi = 0; }
    const q = QUOTES[order[qi++]];

    const rot = (Math.random() - 0.5) * 8;
    const color = GOLDS[Math.floor(Math.random() * GOLDS.length)];
    const fallDur = (1.5 + Math.random() * 1.4).toFixed(2);
    const len = q.t.length;
    const fs = len < 60 ? '0.66rem' : len < 140 ? '0.58rem' : '0.50rem';
    const maxW = len < 80 ? '210px' : '268px';

    const el = document.createElement('div');
    el.style.cssText = `position:absolute;visibility:hidden;max-width:${maxW};padding:4px 9px;

      color:${color};transform:rotate(${rot}deg);transform-origin:center top;pointer-events:none;`;
    el.innerHTML = `\u201c${q.t}\u201d<br><span style="font-size:0.85em;opacity:0.6">\u2014 ${q.a}</span>`;
    overlay.appendChild(el);

    requestAnimationFrame(() => {
      const slideW = overlay.offsetWidth || 900;
      const slideH = overlay.offsetHeight || 600;
      const qW = el.offsetWidth;
      const qH = el.offsetHeight;
      const colW = slideW / COLS;
      const spanCols = Math.max(1, Math.ceil((qW + 6) / colW));
      const maxStart = Math.max(0, COLS - spanCols);
      const startCol = Math.floor(Math.random() * (maxStart + 1));

      let maxPH = 0;
      for (let c = startCol; c < Math.min(startCol + spanCols, COLS); c++) maxPH = Math.max(maxPH, pileH[c]);
      const landFromBottom = maxPH + qH + 4 + Math.random() * 6;
      const landTop = slideH - landFromBottom;

      // Only pile up if there's room — stop adding to columns that have filled past 60% height
      if (landTop > slideH * 0.08) {
        for (let c = startCol; c < Math.min(startCol + spanCols, COLS); c++) pileH[c] = landFromBottom;
      }

      el.style.left = `${startCol * colW}px`;
      el.style.top = `${-(qH + 20)}px`;
      el.style.visibility = 'visible';

      requestAnimationFrame(() => {
        el.style.transition = `top ${fallDur}s cubic-bezier(0.25,0.05,0.8,1)`;
        el.style.top = `${Math.max(slideH * 0.08, landTop)}px`;
      });
    });
  }

  // Frenzy: spawn quotes rapidly anywhere on screen at varied scales
  function spawnFrenzyQuote() {
    if (qi >= order.length) { order = shuffle([...Array(QUOTES.length).keys()]); qi = 0; }
    const q = QUOTES[order[qi++]];
    const rot   = (Math.random() - 0.5) * 30;
    const scale = 0.7 + Math.random() * 1.0; // 0.7× to 1.7×
    const color = GOLDS[Math.floor(Math.random() * GOLDS.length)];
    const dur   = (0.28 + Math.random() * 0.4).toFixed(2);
    const len   = q.t.length;
    const fs    = len < 60 ? '0.66rem' : len < 140 ? '0.58rem' : '0.50rem';
    const maxW  = len < 80 ? '210px' : '268px';

    const el = document.createElement('div');
    el.style.cssText = `position:absolute;visibility:hidden;max-width:${maxW};padding:4px 9px;
      border-radius:5px;background:rgba(0,0,0,0.52);
      font-family:'Space Grotesk',sans-serif;font-size:${fs};line-height:1.35;font-weight:500;
      color:${color};transform:rotate(${rot}deg) scale(${scale});transform-origin:center center;pointer-events:none;`;
    el.innerHTML = `\u201c${q.t}\u201d<br><span style="font-size:0.85em;opacity:0.6">\u2014 ${q.a}</span>`;
    overlay.appendChild(el);

    requestAnimationFrame(() => {
      const sW = overlay.offsetWidth || 900, sH = overlay.offsetHeight || 600;
      const qW = el.offsetWidth, qH = el.offsetHeight;
      const landX = Math.random() * Math.max(1, sW - qW);
      const landY = Math.random() * Math.max(1, sH - qH);
      // Fly in from a random edge
      const edge = Math.floor(Math.random() * 3);
      const startX = edge === 1 ? -(qW+20) : edge === 2 ? sW+20 : landX;
      const startY = edge === 0 ? -(qH+20) : landY + (Math.random()-0.5)*80;
      el.style.left = `${startX}px`;
      el.style.top  = `${startY}px`;
      el.style.visibility = 'visible';
      requestAnimationFrame(() => {
        el.style.transition = `left ${dur}s ease-out, top ${dur}s cubic-bezier(0.2,0,0.6,1.15)`;
        el.style.left = `${landX}px`;
        el.style.top  = `${landY}px`;
      });
    });
  }

  // Register as a slide step so rain starts on click, not automatically
  setTimeout(() => {
    slideSteps.set(slide, { current: 0, steps: [
      () => window._quoteRain.start(),
      () => window._quoteRain.frenzy(),
    ]});
  }, 0);

  window._quoteRain = {
    start() {
      if (running) return;
      running = true;
      overlay.innerHTML = '';
      pileH.fill(0);
      qi = 0;
      order = shuffle([...Array(QUOTES.length).keys()]);
      spawnQuote();
      tid = setInterval(spawnQuote, 370);
    },
    frenzy() {
      // Inject shake keyframe once
      if (!document.getElementById('qs-kf')) {
        const s = document.createElement('style'); s.id='qs-kf';
        s.textContent = '@keyframes quoteShake{0%,100%{translate:0 0}15%{translate:-10px 5px}30%{translate:9px -6px}45%{translate:-7px 8px}60%{translate:10px -5px}75%{translate:-8px 6px}90%{translate:6px -8px}}';
        document.head.appendChild(s);
      }
      // Shake the pile
      const piled = [...overlay.querySelectorAll('div')];
      piled.forEach(el => { el.style.animation = 'quoteShake 0.1s ease-in-out 9'; });
      // After shake, scatter pile quotes to random positions across full screen
      setTimeout(() => {
        const sW = overlay.offsetWidth, sH = overlay.offsetHeight;
        piled.forEach(el => {
          el.style.animation = '';
          const sc = 0.8 + Math.random() * 0.8;
          const ro = (Math.random() - 0.5) * 26;
          const nx = Math.random() * Math.max(1, sW - el.offsetWidth);
          const ny = Math.random() * Math.max(1, sH - el.offsetHeight);
          el.style.transition = 'left 0.45s cubic-bezier(0.34,1.5,0.64,1), top 0.45s cubic-bezier(0.34,1.5,0.64,1), transform 0.45s';
          el.style.left = `${nx}px`;
          el.style.top  = `${ny}px`;
          el.style.transform = `rotate(${ro}deg) scale(${sc})`;
        });
      }, 900);
      // Rapid full-screen spray
      clearInterval(tid);
      running = true;
      let fc = 0;
      const fTid = setInterval(() => {
        if (!running) { clearInterval(fTid); return; }
        spawnFrenzyQuote();
        if (++fc >= 55) clearInterval(fTid);
      }, 50);
    },
    stop() {
      running = false;
      clearInterval(tid);
    }
  };
})();

(function buildIntermission(){

  // INTERMISSION title
  const imTitle = svgE('text',{ x:CX, y:100, 'text-anchor':'middle',

  // Compute tracker center in intermission SVG coords
  function trackerSvgPos() {

    const tRect = tEl.getBoundingClientRect();
    const svgRect = svg.getBoundingClientRect();
    const svgScale = Math.min(svgRect.width / 1600, svgRect.height / 900);
    const svgOffX = (svgRect.width - 1600 * svgScale) / 2;
    const svgOffY = (svgRect.height - 900 * svgScale) / 2;
    return {
      x: (tRect.left + tRect.width / 2 - svgRect.left - svgOffX) / svgScale,
      y: (tRect.top + tRect.height / 2 - svgRect.top - svgOffY) / svgScale,

  // Ascending chirp — reverse of playShrinkSfx (392→587→880)
  function playGrowSfx() {

      const dur=2000, t0=performance.now();
      function growFrame(now){
        const k=Math.min(1,(now-t0)/dur);

        const s=0.22+(HOLD_SCALE-0.22)*ease;

        avG.setAttribute('transform',`translate(${x.toFixed(1)},${y.toFixed(1)})`);

        if(k<1) requestAnimationFrame(growFrame); else startBeardFlash();

      requestAnimationFrame(growFrame);

  };

  window._imReset = imReset;
  setTimeout(()=>{ slideSteps.set(slide,{ current:0, steps:[imStep1] }); },0);
})();

let _tallyCtx = null;
function _getTallyCtx() {

// Short high tick — called each time the displayed number increments visibly

    o.type = 'square'; o.frequency.value = 1200 + Math.random() * 200;
    o.connect(g); g.connect(ctx.destination);

function playTallyChing() {

    [[1047,0],[1319,0.04],[1568,0.09],[2093,0.14]].forEach(([freq,t]) => {

// ── Tally count-up ──────────────────────────────────────────────
// Animates .num elements whose text is a whole number (optionally with +)
// from 0 → target over ~1s with a light hop + landing squash.
function animateTally(el){
  const orig = el.dataset.tally || el.textContent.trim();
  el.dataset.tally = orig;
  const m = orig.match(/^(\d+)(\+?)$/);
  if (!m) return;
  const target = parseInt(m[1],10);
  const suffix = m[2] || '';
  const dur = 1000;
  const start = performance.now();
  el.style.display = 'inline-block';
  el.style.willChange = 'transform';
  let _lastTickVal = -1;
  function frame(t){
    const k = Math.min(1, (t-start)/dur);
    const eased = 1 - Math.pow(1-k, 3);
    const cur = Math.round(eased*target);
    el.textContent = cur + (k>=1?suffix:'');
    // Tick on each new integer value
    if (cur !== _lastTickVal && k < 1) { playTallyTick(); _lastTickVal = cur; }
    // Light hop: up then land, plus tiny squash on landing
    let y = 0, sx = 1, sy = 1;
    if (k < 0.85) { y = -Math.sin((k/0.85)*Math.PI) * 14; }
    else {
      const lk = (k-0.85)/0.15; // 0→1 landing
      sy = 1 - 0.12*Math.sin(lk*Math.PI);
      sx = 1 + 0.12*Math.sin(lk*Math.PI);
    }
    el.style.transform = `translateY(${y.toFixed(2)}px) scale(${sx.toFixed(3)}, ${sy.toFixed(3)})`;
    if (k<1) requestAnimationFrame(frame);
    else { el.style.transform = ''; playTallyChing(); }
  }
  requestAnimationFrame(frame);
}

  if (!slide) return;

}

}

// ── Sub-slide step system ──
// Slides can register steps: forward navigation advances steps before
// moving to the next slide. Backward always goes to previous slide.
const slideSteps = new Map(); // slideEl → { steps: [fn,...], current: 0 }
let currentStepState = null;

function updateStepIndicator() {
  const el = document.getElementById('step-indicator');
  if (!el) return;
  const ss = slideSteps.get(allSlides[current]);
  if (ss && ss.steps.length > 0 && ss.current > 0) {
    el.textContent = `STEP ${ss.current} / ${ss.steps.length}`;
  } else {
    el.textContent = '';
  }
}
function advanceStep() {
  // Returns true if a step was consumed, false if slide should advance
  const slide = allSlides[current];
  const ss = slideSteps.get(slide);
  if (!ss || ss.current >= ss.steps.length) return false;
  ss.steps[ss.current]();
  ss.current++;
  updateStepIndicator();
  return true;
}
function resetSteps(slide) {
  const ss = slideSteps.get(slide);
  if (ss) ss.current = 0;
}

let animating=false;

  p.classList.remove('active');

  if(t!=='intermission' && window._imReset && fwd===false) window._imReset();
  // Beard evolution — fire once when first reaching 2020 (intermission already sets it up;
  // for direct navigation to a 2020 slide, fire if not already played this visit).
  // Reset when navigating back before 2020 so it replays on the next forward pass.

  if(t==='close') setTimeout(()=>{ if(window._closeStart) window._closeStart(); },400);

  // Quote rain — stop when leaving Community slide
  { const isComm = nx.querySelector?.('.case-title')?.textContent.includes('A Christmas Carol VR — Five Seasons Running');
    if (window._quoteRain && !isComm) window._quoteRain.stop(); }

  if(t==='intro-alex') { const _aw=document.getElementById('alex-intro-anim'); if(_aw){_aw.style.transition='none';_aw.style.opacity='0';} primeTallies(nx); setTimeout(playAlexIntro, 500); }
  // Tally count-up for any .num element that's purely numeric.

// ── Skip hidden slides during navigation ──
function nextVisible(from,dir){
  let n=from+dir;
  while(n>=0&&n<total){if(!allSlides[n].dataset.hidden)return n;n+=dir;}
  return -1;
}

document.addEventListener('keydown',e=>{
  // Don't intercept keys when typing in inputs, annotation textarea, or contenteditable edit-text
  if(['INPUT','TEXTAREA'].includes(document.activeElement?.tagName)||document.activeElement?.isContentEditable)return;
  // Shift+Arrow = media cycler manual controls (case study slides with MEDIA_CYCLER)
  if(e.shiftKey && e.key==='ArrowRight'){ e.preventDefault(); window._activeCycler?.next(); return; }
  if(e.shiftKey && e.key==='ArrowLeft') { e.preventDefault(); window._activeCycler?.prev(); return; }
  if(e.shiftKey && e.key==='ArrowDown') { e.preventDefault(); window._activeCycler?.setManual(); return; }
  if(e.shiftKey && e.key==='ArrowUp')   { e.preventDefault(); window._activeCycler?.setAuto(); return; }
  // Forward: arrows, space, PageDown, N (most clickers send PageDown)
  // Try to advance a sub-step first; if none remain, go to next visible slide.
  if(['ArrowRight','ArrowDown',' ','PageDown','n','N'].includes(e.key)){e.preventDefault();if(!advanceStep()){const n=nextVisible(current,1);if(n>=0)goTo(n);}}
  // Backward: arrows, PageUp, P
  if(['ArrowLeft','ArrowUp','PageUp','p','P'].includes(e.key)){e.preventDefault();const n=nextVisible(current,-1);if(n>=0)goTo(n);}
  if(e.key==='Home'){e.preventDefault();goTo(0)}
  if(e.key==='End'){e.preventDefault();goTo(total-1)}
  // H = toggle presentation mode (hide all UI chrome for projector display)
  if(e.key==='h'||e.key==='H'){ e.preventDefault(); document.body.classList.toggle('presentation-mode'); }
});

    if(e.ctrlKey||e.metaKey){
      e.preventDefault();
      const hidden=!!s.dataset.hidden;
      if(hidden){delete s.dataset.hidden;}else{s.dataset.hidden='1';}
      t.classList.toggle('slide-hidden',!hidden);
      return;
    }
    goTo(i);
  });
  sgEl.appendChild(t);
});

// ── Drag-to-reorder slides in the carousel ──
// Drag a thumbnail to swap its slide with the drop target.
// Reorders allSlides[], the deck DOM, and the grid thumbnails.
// Generates an annotation so you can share the new order.
(function initGridDrag(){
  let dragThumb = null, dragIdx = -1, placeholder = null;

  sgEl.addEventListener('dragstart', e => {
    const t = e.target.closest('.sg-thumb');
    if (!t) return;
    dragThumb = t;
    dragIdx = parseInt(t.dataset.idx);
    t.style.opacity = '0.4';
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', dragIdx);
  });

  sgEl.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const t = e.target.closest('.sg-thumb');
    if (t && t !== dragThumb) {
      t.style.borderColor = 'var(--teal)';
      t.style.background = 'rgba(0,212,255,.15)';
    }
  });

  sgEl.addEventListener('dragleave', e => {
    const t = e.target.closest('.sg-thumb');
    if (t) { t.style.borderColor = ''; t.style.background = ''; }
  });

  sgEl.addEventListener('drop', e => {
    e.preventDefault();
    const t = e.target.closest('.sg-thumb');
    if (!t || t === dragThumb) return;
    const dropIdx = parseInt(t.dataset.idx);
    t.style.borderColor = ''; t.style.background = '';

    // Swap in allSlides array
    const tmp = allSlides[dragIdx];
    allSlides[dragIdx] = allSlides[dropIdx];
    allSlides[dropIdx] = tmp;

    // Reorder deck DOM to match
    const deck = document.getElementById('deck');
    deck.innerHTML = '';
    allSlides.forEach(s => deck.appendChild(s));

    // Rebuild grid thumbnails
    rebuildGrid();

    // Update current index to follow the active slide
    const activeSlide = document.querySelector('.slide.active');
    if (activeSlide) {
      const newIdx = allSlides.indexOf(activeSlide);
      if (newIdx >= 0) current = newIdx;
    }
    updateHUD();

    // Save as annotation so the user can export it
    const orderStr = allSlides.map((s,i) => {
      const type = s.dataset.type || '?';
      const yr = s.dataset.year || '';
      const ln = s.dataset.ln ? 'L'+s.dataset.ln : '';
      return `${i+1}:${[type,yr,ln].filter(Boolean).join(' ')}`;
    }).join(', ');
    const arr = annoLoad();
    // Replace any existing REORDER annotation
    const existing = arr.findIndex(a => a.text.startsWith('REORDER '));
    const entry = { selector: '#deck', text: `REORDER [${orderStr}]`, context: 'deck', ts: Date.now() };
    if (existing >= 0) arr[existing] = entry; else arr.push(entry);
    annoSave(arr); annoRender();
    if (typeof annoToast === 'function') annoToast(`Swapped slides ${dragIdx+1} ↔ ${dropIdx+1}`);
  });

  sgEl.addEventListener('dragend', () => {
    if (dragThumb) dragThumb.style.opacity = '1';
    dragThumb = null; dragIdx = -1;
  });

  // Make thumbnails draggable
  sgEl.querySelectorAll('.sg-thumb').forEach(t => t.setAttribute('draggable', 'true'));
})();

function rebuildGrid(){
  sgEl.innerHTML = '';
  allSlides.forEach((s, i) => {
    const t = document.createElement('div');
    const type = s.dataset.type;
    t.className = 'sg-thumb sg-' + type;
    if(s.dataset.hidden) t.classList.add('slide-hidden');
    t.dataset.idx = i;
    t.setAttribute('draggable', 'true');
    let label = '';
    if(type==='settings') label='⚙ Config';
    else if(type==='cover') label='Cover';
    else if(type==='venn') label='Venn';
    else if(type==='intro-alex') label='Alex';
    else if(type==='intro-lens') label='Lens';
    else if(type==='case') label=s.dataset.year+' ▸';
    else if(type==='lesson') label='L'+(s.dataset.ln||'?')+' '+(s.dataset.year||'');
    else if(type==='bonus') label='★ Bonus';
    else if(type==='map') label='Map';
    else if(type==='close') label='Thank You';
    else label = type || '?';
    t.innerHTML = `<div class="sg-num">${String(i+1).padStart(2,'0')}</div><div class="sg-label">${label}</div>`;
    t.addEventListener('click', e => {
      if(e.ctrlKey||e.metaKey){
        e.preventDefault();
        const hidden=!!s.dataset.hidden;
        if(hidden){delete s.dataset.hidden;}else{s.dataset.hidden='1';}
        t.classList.toggle('slide-hidden',!hidden);
        return;
      }
      goTo(i);
    });
    sgEl.appendChild(t);
  });
  // Re-highlight active
  sgEl.querySelectorAll('.sg-thumb').forEach((t,i) => t.classList.toggle('active', i===current));
}

// ── Slide search ─────────────────────────────────────────────────────────────
let _searchIndex=[];
function buildSearchIndex(){
  _searchIndex=allSlides.map((s,i)=>{
    const type=s.dataset.type;
    if(type==='settings'||type==='intermission'||type==='map'||type==='recap')return null;
    let title='',label='',bodyParts=[];
    if(type==='lesson'){
      title=(s.querySelector('.lesson-title')?.textContent||'').replace(/\s+/g,' ').trim();
      label=`Lesson ${s.dataset.ln||'?'} · ${s.dataset.year||''}`;
      bodyParts=[s.querySelector('.lesson-tagline')?.textContent,s.querySelector('.lesson-tags')?.textContent];
    } else if(type==='case'){
      title=(s.querySelector('.case-title')?.textContent||'').replace(/\s+/g,' ').trim();
      label=`${s.dataset.year||''} case`;
      bodyParts=[s.querySelector('.case-sub')?.textContent,...[...s.querySelectorAll('.case-bl li')].map(li=>li.textContent)];
    } else if(type==='cover'){
      title=(s.querySelector('.talk-title')?.textContent||'Cover').replace(/\s+/g,' ').trim();
      label='Cover';
      bodyParts=[s.querySelector('.talk-subtitle')?.textContent,s.querySelector('.event-tag')?.textContent];
    } else if(type==='bonus'){
      title=(s.querySelector('.lesson-title')?.textContent||'Bonus').replace(/\s+/g,' ').trim();
      label='Bonus';
      bodyParts=[s.querySelector('.lesson-tagline')?.textContent];
    } else if(type==='close'){
      title='Thank You / Contact'; label='Close'; bodyParts=[];
    } else { return null; }
    const body=bodyParts.filter(Boolean).map(t=>t.replace(/\s+/g,' ').trim()).join(' · ');
    return {idx:i,title,label,body,full:(title+' '+body).toLowerCase()};
  }).filter(Boolean);
}
function _esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function _hl(text,q){
  if(!q||!text)return _esc(text||'');
  return _esc(text).replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');
}
function _snip(body,q){
  if(!body)return'';
  const lo=body.toLowerCase(),pos=lo.indexOf(q);
  if(pos<0)return body.slice(0,110)+(body.length>110?'…':'');
  const s=Math.max(0,pos-40),e=Math.min(body.length,pos+q.length+90);
  return(s>0?'…':'')+body.slice(s,e)+(e<body.length?'…':'');
}
let _srSel=0;
const _srOverlay=document.getElementById('search-overlay');
const _srInput=document.getElementById('search-input');
const _srList=document.getElementById('srch-results');
const _srCount=document.getElementById('srch-count');
function openSearch(){
  if(!_searchIndex.length)buildSearchIndex();
  _srOverlay.classList.add('open');
  _srInput.value='';_srSel=0;
  _srList.innerHTML='<div class="srch-empty">Type to search clients, projects, years, topics…</div>';
  _srCount.textContent='';
  setTimeout(()=>_srInput.focus(),40);
}
function closeSearch(){_srOverlay.classList.remove('open');}
function _srSelUpdate(){
  [..._srList.querySelectorAll('.sr')].forEach((el,i)=>el.classList.toggle('sel',i===_srSel));
  _srList.querySelector('.sr.sel')?.scrollIntoView({block:'nearest'});
}
function _srRender(q){
  const qt=q.trim().toLowerCase();
  if(!qt){_srList.innerHTML='<div class="srch-empty">Type to search clients, projects, years, topics…</div>';_srCount.textContent='';return;}
  const hits=_searchIndex.filter(r=>r.full.includes(qt));
  _srCount.textContent=hits.length?`${hits.length} result${hits.length===1?'':'s'}`:'';
  if(!hits.length){_srList.innerHTML=`<div class="srch-empty">No results for "${_esc(q)}"</div>`;return;}
  _srList.innerHTML=hits.map(r=>`<div class="sr" data-idx="${r.idx}">
    <div class="sr-num">${String(r.idx+1).padStart(2,'0')}</div>
    <div class="sr-body">
      <div class="sr-title">${_hl(r.title,qt)}</div>
      ${r.body?`<div class="sr-snip">${_hl(_snip(r.body,qt),qt)}</div>`:''}
      <span class="sr-badge">${_esc(r.label)}</span>
    </div></div>`).join('');
  _srList.querySelectorAll('.sr').forEach(el=>{
    el.addEventListener('click',()=>{goTo(parseInt(el.dataset.idx));closeSearch();});
  });
  _srSel=0;_srSelUpdate();
}
_srInput.addEventListener('input',()=>{_srSel=0;_srRender(_srInput.value);});
_srInput.addEventListener('keydown',e=>{
  const rows=[..._srList.querySelectorAll('.sr')];
  if(e.key==='ArrowDown'){e.preventDefault();_srSel=Math.min(_srSel+1,rows.length-1);_srSelUpdate();}
  else if(e.key==='ArrowUp'){e.preventDefault();_srSel=Math.max(_srSel-1,0);_srSelUpdate();}
  else if(e.key==='Enter'&&rows[_srSel]){goTo(parseInt(rows[_srSel].dataset.idx));closeSearch();}
  else if(e.key==='Escape'){closeSearch();}
});
_srOverlay.addEventListener('mousedown',e=>{if(e.target===_srOverlay)closeSearch();});
document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA'].includes(document.activeElement?.tagName)||document.activeElement?.isContentEditable)return;
  if((e.metaKey||e.ctrlKey)&&e.key==='f'){e.preventDefault();openSearch();return;}
  if(e.key==='/'&&!_srOverlay.classList.contains('open')){e.preventDefault();openSearch();}
});
buildSearchIndex();

/* ═══════════════════════════════════════════════════════════════════════
   Shared Stardew avatar builder
   ═══════════════════════════════════════════════════════════════════════
   buildAvatar(parent, opts) — appends a chunky pixel-art figure to `parent`
   Coordinates are LOCAL (centered on 0,0 in the parent's coordinate system).
   Figure spans roughly y=-38 (top of hair) to y=+28 (bottom of boots),
   x=-18 to +18.

   opts:
     scale:     number — uniform scale (default 1)
     withBeard: bool   — adds facial hair (default false)
     id:        string — root group id (used for animation targeting)

   The figure has TWO arm states (down + up) toggled via CSS class
   `arm-up` on the parent. Default is arm-down. Adding `arm-up` shows the
   raised fist pose.
   ═══════════════════════════════════════════════════════════════════════ */
function buildAvatar(parent, opts = {}) {
  const scale = opts.scale || 1;
  const withBeard = !!opts.withBeard;
  const root = svgE('g', { class: 'avatar', ...(opts.id ? { id: opts.id } : {}) });
  root.style.shapeRendering = 'crispEdges';
  if (scale !== 1) root.setAttribute('transform', `scale(${scale})`);
  parent.appendChild(root);

  // Color palette (Stardew-inspired) — HAIR has 3 tones for shading depth
  const SKIN='#f2c79b', SKIN_DARK='#d9a77a';
  const HAIR_LIGHT='#a8602f', HAIR='#8b4a2a', HAIR_DARK='#5e2f1a', HAIR_SHADOW='#3a1c08';
  const BEARD='#6e3a1e', BEARD_LIGHT='#8a4f2a';
  const SHIRT='#6a8fd6', SHIRT_DARK='#4a6fb8';
  const PANTS='#3f3025', BOOTS='#1f150c';
  const EYE='#1a1a26';

  const px = (g, x,y,w,h,fill) => g.appendChild(svgE('rect', {x, y, width:w, height:h, fill}));

  // ── Body group (head + torso + legs + DOWN-arms) ──
  const body = svgE('g', { class: 'av-body' });

  // Head (drawn first so hair can overlap it naturally on top)
  px(body, -12, -34, 24, 22, SKIN);                          // rect 1
  px(body, -12, -16, 24, 4, SKIN_DARK);                      // rect 2 chin shadow

  // ── Hair — tousled dome with 3D shading ──
  // Shadow layer (outer silhouette)
  px(body, -13, -40, 26, 2, HAIR_SHADOW);                    // rect 3
  px(body, -15, -38, 30, 3, HAIR_SHADOW);                    // rect 4
  px(body, -16, -36, 32, 4, HAIR_SHADOW);                    // rect 5
  px(body, -9, -42, 5, 2, HAIR_SHADOW);                      // rect 6
  px(body, 3,  -42, 4, 2, HAIR_SHADOW);                      // rect 7
  px(body, -2, -43, 5, 1, HAIR_SHADOW);                      // rect 8
  // Dark base
  px(body, -12, -40, 24, 2, HAIR_DARK);                      // rect 9
  px(body, -14, -38, 28, 3, HAIR_DARK);                      // rect 10
  px(body, -13, -34, 30, 3, HAIR_DARK);                      // rect 11 — baked Δ(+2,+2)
  px(body, -8, -42, 4, 2, HAIR_DARK);                        // rect 12
  px(body, 4,  -42, 3, 2, HAIR_DARK);                        // rect 13
  px(body, -1, -43, 3, 1, HAIR_DARK);                        // rect 14
  // Main hair color
  px(body, -11, -41, 22, 1, HAIR);                           // rect 15 — baked Δ(0,-1)
  px(body, -13, -38, 26, 2, HAIR);                           // rect 16
  px(body, -14, -36, 28, 2, HAIR);                           // rect 17
  px(body, -8, -41, 4, 1, HAIR);                             // rect 18
  px(body, 4,  -41, 3, 1, HAIR);                             // rect 19
  // Side wisps
  px(body, -13, -34, 2, 3, HAIR_DARK);                       // rect 20 — baked Δ(+3,+1)
  px(body, 12,  -33, 2, 3, HAIR_DARK);                       // rect 21 — baked Δ(-2,+2)
  px(body, -14, -31, 2, 4, HAIR);                            // rect 22 — baked Δ(+1,+3) · scale ×2.03
  px(body, 10,  -31, 1, 2, HAIR);                            // rect 23 — baked Δ(-4,+3)
  // Highlights
  px(body, -8, -40, 3, 1, HAIR_LIGHT);                       // rect 24
  px(body, 4,  -40, 2, 1, HAIR_LIGHT);                       // rect 25
  px(body, -10, -38, 2, 1, HAIR_LIGHT);                      // rect 26
  px(body, -2, -42, 2, 1, HAIR_LIGHT);                       // rect 27
  px(body, -7, -41, 2, 1, HAIR_LIGHT);                       // rect 28
  // Front fringe — uneven bangs
  px(body, -12, -34, 5, 3, HAIR_DARK);                       // rect 29
  px(body, -11, -33, 4, 2, HAIR);                            // rect 30
  px(body, -7,  -34, 3, 2, HAIR_DARK);                       // rect 31
  px(body, -7,  -33, 2, 1, HAIR);                            // rect 32
  px(body, -4,  -34, 2, 4, HAIR_DARK);                       // rect 33
  px(body, -4,  -33, 1, 3, HAIR);                            // rect 34
  px(body, -1,  -34, 3, 2, HAIR_DARK);                       // rect 35
  px(body, -1,  -33, 2, 1, HAIR);                            // rect 36
  px(body, 3,   -34, 4, 3, HAIR_DARK);                       // rect 37
  px(body, 3,   -33, 3, 2, HAIR);                            // rect 38
  px(body, 7,   -34, 5, 4, HAIR_DARK);                       // rect 39
  px(body, 10,  -31, 3, 3, HAIR);                            // rect 40 — baked Δ(+2,+2)
  // Fringe highlights
  px(body, -12, -31, 2, 1, HAIR_LIGHT);                      // rect 41 — baked Δ(-2,+2)
  px(body, 8,   -33, 2, 1, HAIR_LIGHT);                      // rect 42
  // ── Eyebrows — thick, prominent (baked from annotation scales) ──
  px(body, -8, -27, 8, 3, HAIR_DARK);                        // rect 43 — baked scale ×1.54
  px(body, 3,  -28, 9, 4, HAIR_DARK);                        // rect 44 — baked Δ(0,-1) · scale ×1.81
  // Eyes
  px(body, -7, -24, 3, 4, EYE);                              // rect 45
  px(body, 4,  -24, 3, 4, EYE);                              // rect 46
  px(body, -6, -23, 1, 2, '#fff');                            // rect 47
  px(body, 5,  -23, 1, 2, '#fff');                            // rect 48
  // Mouth
  px(body, -3, -17, 6, 1, '#9c5040');                         // rect 49
  // Beard
  if (withBeard) {
    px(body, -12, -22, 4, 5, BEARD);
    px(body, 8,   -22, 4, 5, BEARD);
    px(body, -12, -20, 5, 3, BEARD);
    px(body, 7,   -20, 5, 3, BEARD);
    px(body, -12, -17, 4, 1, BEARD);
    px(body, 8,   -17, 4, 1, BEARD);
    px(body, -7,  -19, 14, 2, BEARD);
    px(body, -6,  -19, 12, 1, BEARD_LIGHT);
    px(body, -2,  -16, 4,  1, BEARD);
    px(body, -12, -16, 24, 2, BEARD);
    px(body, -12, -14, 24, 2, BEARD);
    px(body, -10, -12, 20, 1, BEARD);
  }
  // Neck
  px(body, -4, -12, 8, 3, SKIN_DARK);
  // Shirt body
  px(body, -12, -9, 24, 18, SHIRT);
  px(body, -12, -9, 24, 3, SHIRT_DARK);
  px(body, -12, 6, 24, 3, SHIRT_DARK);
  // Pants
  px(body, -12, 9, 12, 14, PANTS);
  px(body, 0, 9, 12, 14, PANTS);
  px(body, -2, 9, 4, 14, '#2a1f18');
  // Boots
  px(body, -12, 23, 12, 5, BOOTS);
  px(body, 0, 23, 12, 5, BOOTS);
  root.appendChild(body);

  // ── Arms DOWN frame (default) ──
  const armsDown = svgE('g', { class: 'av-arms-down' });
  px(armsDown, -18, -8, 6, 14, SHIRT);   // left arm at side
  px(armsDown, -18, 4, 6, 4, SKIN);      // left hand
  px(armsDown, 12, -8, 6, 14, SHIRT);    // right arm at side
  px(armsDown, 12, 4, 6, 4, SKIN);       // right hand
  root.appendChild(armsDown);

  // ── Arms UP frame (fist pump pose) ──
  const armsUp = svgE('g', { class: 'av-arms-up' });
  px(armsUp, -18, -22, 6, 14, SHIRT);    // left arm raised
  px(armsUp, -18, -26, 6, 6, SKIN);      // left fist
  px(armsUp, 12, -22, 6, 14, SHIRT);     // right arm raised
  px(armsUp, 12, -26, 6, 6, SKIN);       // right fist
  root.appendChild(armsUp);

  return root;
}

// Tracker uses the same SECTION_START_DEG so the mini-monocle matches the
// big map. 2016 (i=0) at 6 o'clock so 2025 (i=9) lands at the cord exit.
const TR_START_DEG = 90;
const TR_STEP_DEG = 36;
function tPos(i){
  const a = (TR_START_DEG + i*TR_STEP_DEG) * Math.PI / 180;
  return { x: TCX + TR*Math.cos(a), y: TCY + TR*Math.sin(a) };
}

(function buildTracker(){
  // ── Agile Lens monocle-white.png as the ring backdrop ──
  // Source PNG geometry (same constants as the slide-4 monocle):
  //   image:    852 × 877 px
  //   ring centre in image: (407, 432)
  //   ring radius in image: 374 px
  // Scale so the ring radius matches TR (34), centred on (TCX, TCY).
  const _imgW=852, _imgH=877, _mCX=407, _mCY=432, _mR=374;
  const _ms = TR / _mR; // ≈ 0.0909
  tsvg.appendChild(svgE('image',{
    href:'monocle-white.png',
    x:(TCX - _mCX*_ms).toFixed(2),
    y:(TCY - _mCY*_ms).toFixed(2),
    width:(_imgW*_ms).toFixed(2),
    height:(_imgH*_ms).toFixed(2),
    opacity:'0.42',
  }));

  // 2026 bonus pip — sits at the monocle's own eyepiece circle.
  // Eyepiece centre in source image: (775, 788) relative to image origin.
  const _epX = (TCX + (775-_mCX)*_ms).toFixed(2);
  const _epY = (TCY + (788-_mCY)*_ms).toFixed(2);
  tsvg.appendChild(svgE('circle',{cx:_epX,cy:_epY,r:'3',fill:'none',stroke:'rgba(245,158,11,.3)','stroke-width':'1',id:'tb'}));
  // Store eyepiece coords for walker placement on bonus slide
  tsvg.dataset.epx = _epX;
  tsvg.dataset.epy = _epY;

  // Year dots — placed on the ring, matching tPos() geometry
  for(let i=0;i<10;i++){
    const p = tPos(i);
    tsvg.appendChild(svgE('circle',{cx:p.x,cy:p.y,r:'2.5',fill:'rgba(255,255,255,.12)',id:`td${i}`}));
  }
  // Walker — small Stardew sprite that walks around the mini-monocle.
  // We build TWO versions (clean-shaven for 2016-2019, bearded for 2020+)
  // and toggle visibility based on the current slide's year.
  const walker = svgE('g', { id:'tav', transform:`translate(${TCX},${TCY-TR})` });
  // The mini-tracker is small (120×120 viewBox) so we scale the avatar way down.
  // The avatar's natural footprint is ~36×66 px; we scale to ~14×26.
  const wScale = 0.22;

// ── Beard Evolution — Pokemon-style transformation on the 2020 slide ──
// Flashes white faster and faster, sprite becomes a silhouette, then
// reveals the bearded version with a particle burst + triumphant SFX.
let _evoPlayed = false;
let _evoAudioCtx = null;

function playEvoSfx() {
  try {
    if (!_evoAudioCtx) _evoAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = _evoAudioCtx;
    if (ctx.state === 'suspended') ctx.resume();
    const now = ctx.currentTime;
    const tone = (freq, start, dur, type='square', vol=0.08) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = type; o.frequency.value = freq;
      o.connect(g); g.connect(ctx.destination);
      g.gain.setValueAtTime(vol, now+start);
      g.gain.exponentialRampToValueAtTime(0.001, now+start+dur);
      o.start(now+start); o.stop(now+start+dur);
    };
    // Accelerating blips (matching the flash rhythm)
    const blips = [0,.15,.35,.52,.66,.78,.88,.96,1.02,1.07,1.11,1.14,1.17,1.19];
    blips.forEach((t,i) => tone(440 + i*40, t, 0.06, 'square', 0.06 + i*0.005));
    // Hold — sustained high tone during the white-out
    tone(880, 1.2, 0.8, 'sawtooth', 0.07);
    tone(1320, 1.2, 0.8, 'square', 0.04);
    // Resolution — triumphant descending arpeggio
    tone(1047, 2.1, 0.12, 'square', 0.10); // C6
    tone(784, 2.22, 0.12, 'square', 0.10);  // G5
    tone(659, 2.34, 0.12, 'square', 0.10);  // E5
    tone(523, 2.46, 0.25, 'square', 0.12);  // C5 (held)
    // Final power chord
    tone(262, 2.75, 0.4, 'square', 0.10);
    tone(330, 2.75, 0.4, 'square', 0.08);
    tone(392, 2.75, 0.4, 'square', 0.08);
  } catch(e) {}
}

function playBeardEvolution() {
  if (_evoPlayed) return;
  _evoPlayed = true;
  window._evoRunning = true;

  const tracker = document.getElementById('tracker-svg');
  if (!tracker) return;

  // Create a flash overlay inside the tracker SVG
  const flash = svgE('rect', {
    x:0, y:0, width:120, height:120, fill:'#fff', opacity:'0',
    'pointer-events':'none'
  });
  tracker.appendChild(flash);

  // Create particle burst around the avatar position
  const walker = document.getElementById('tav');
  const wtf = walker?.getAttribute('transform') || '';
  const tm = wtf.match(/translate\(([\d.]+),([\d.]+)\)/);
  const avX = tm ? parseFloat(tm[1]) : 60;
  const avY = tm ? parseFloat(tm[2]) : 30;
  const burstG = svgE('g', { opacity:'0' });
  const EVO_COLORS = ['#fde68a','#a78bfa','#00d4ff','#f43f5e','#fff','#f59e0b'];
  for (let i = 0; i < 18; i++) {
    const angle = (i/18) * Math.PI * 2;
    const dist = 15 + Math.random() * 15;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist;
    const p = svgE('circle', {
      cx: avX, cy: avY, r: (0.8 + Math.random()*1.5).toFixed(1),
      fill: EVO_COLORS[i % EVO_COLORS.length],
      'data-tx': dx.toFixed(1), 'data-ty': dy.toFixed(1),
    });
    p.style.transformOrigin = `${avX}px ${avY}px`;
    burstG.appendChild(p);
  }
  tracker.appendChild(burstG);

  // Get the clean and beard sprite groups
  const clean = document.getElementById('tav-clean');
  const beard = document.getElementById('tav-beard');

  // Start SFX
  playEvoSfx();

  // Phase 1: Flash overlay accelerates (0–2s)
  flash.style.animation = 'evoFlash 2.2s ease-in forwards';

  // Phase 2: Clean sprite glows white mid-evolution (0.8–2s)
  if (clean) clean.style.animation = 'evoGlow 2.2s ease-in forwards';

  // Phase 3: At the peak white-out (1.5s), swap clean→beard
  setTimeout(() => {
    if (clean) clean.setAttribute('visibility', 'hidden');
    if (beard) beard.setAttribute('visibility', 'visible');
    if (beard) beard.style.animation = 'evoGlow 2.2s ease-in forwards';
    // Sync the beard glow to the tail end — start from 70%
    if (beard) beard.style.animationDelay = '-1.54s';
  }, 1500);

  // Phase 4: Particle burst (2s)
  setTimeout(() => {
    burstG.style.opacity = '1';
    burstG.querySelectorAll('circle').forEach(p => {
      p.style.setProperty('--tx', `${p.getAttribute('data-tx')}px`);
      p.style.setProperty('--ty', `${p.getAttribute('data-ty')}px`);
      p.style.animation = 'evoBurst 1s ease-out forwards';
    });
  }, 2000);

  // Phase 5: Clean up (3.5s)
  setTimeout(() => {
    flash.remove();
    burstG.remove();
    if (clean) clean.style.animation = '';
    if (beard) { beard.style.animation = ''; beard.style.animationDelay = ''; }
    window._evoRunning = false;
  }, 3500);
}

// ── Map animation ──
// Monocle geometry: ring center, radius, year nodes rotated so 2025 lands at
// the cord exit position (5 o'clock area). The cord then hangs OUTSIDE the
// monocle from 2025 to a 2026 eyepiece beyond the ring.
const LSHORT=SECTIONS.map(s=>s.lesson.title.replace('\n',' '));
const MX=500,MY=290,MR=200;
// SECTION_START_DEG controls where 2016 (i=0) sits on the constellation.
// 90° = 6 o'clock (bottom). Years walk clockwise from there. With 10
// sections at 36° each, 2025 (i=9) lands at exactly 5 o'clock (54°),
// which is where the real Agile Lens monocle's cord attaches to the lens.
// The cord then curves outward to 2026 sitting INSIDE the monocle's
// eyepiece — and the white monocle PNG overlay aligns with this layout.
const SECTION_START_DEG = 90;
const SECTION_STEP_DEG = 36;
function mPos(i){
  const a=(SECTION_START_DEG + i*SECTION_STEP_DEG) * Math.PI / 180;
  return{x:MX+MR*Math.cos(a), y:MY+MR*Math.sin(a)};
}
// Cord starts AT the 2025 node (i=9, lower-right) and ends at the monocle's
// eyepiece — computed from the actual PNG eyepiece coordinates so the
// bonus 2026 dot lands exactly inside the monocle's small circle.
// Monocle logo overlay geometry — aligns monocle-white.png so its circular
// lens overlaps with our constellation circle. The PNG is 852×877. Measured
// values from inspecting the actual pixels (Python+PIL):
//   ring center: (407, 432)
//   stroke-center radius: 374
//   eyepiece center: ~(775, 788)
// We scale by MR/374 so the PNG's ring matches the constellation circle.
const PNG_RING_CX = 407, PNG_RING_CY = 432, PNG_RING_R = 374;
const LOGO_SCALE = MR / PNG_RING_R;
const LOGO_W = 852 * LOGO_SCALE;
const LOGO_H = 877 * LOGO_SCALE;
const LOGO_X = MX - PNG_RING_CX * LOGO_SCALE;
const LOGO_Y = MY - PNG_RING_CY * LOGO_SCALE;

// Cord starts AT the 2025 node (i=9, lower-right) and ends at the monocle's
// eyepiece — computed from the actual PNG eyepiece coordinates so the
// bonus 2026 dot lands exactly inside the monocle's small circle.
const CORD_A = mPos(9);
const PNG_EYE_CX = 775, PNG_EYE_CY = 788;
const CORD_B = {
  x: LOGO_X + PNG_EYE_CX * LOGO_SCALE,
  y: LOGO_Y + PNG_EYE_CY * LOGO_SCALE,
};

// Constellation line pairs (connecting non-adjacent nodes for star pattern)
const CONSTELLATION_LINES=[[0,3],[1,5],[2,7],[3,8],[4,9],[5,0],[6,1],[7,2],[8,4],[9,6]];

function startMap(){
  if(mapDone)return;mapDone=true;

  // Faint guide circle (slightly stronger so the monocle outline is always visible)
  svg.appendChild(svgE('circle',{cx:MX,cy:MY,r:MR,fill:'none',stroke:'rgba(0,212,255,.12)','stroke-width':'1.5'}));

  // Constellation lines (thin, connecting non-adjacent nodes — appear with a delay)
  const constLines=[];
  CONSTELLATION_LINES.forEach(([a,b])=>{
    const pa=mPos(a),pb=mPos(b);
    const line=svgE('line',{x1:pa.x,y1:pa.y,x2:pb.x,y2:pb.y,stroke:'rgba(0,212,255,.10)','stroke-width':'0.7',filter:'url(#gl2)',opacity:'0'});
    line.style.transition='opacity .6s';
    svg.appendChild(line);
    constLines.push(line);
  });

  // Animated ring — the monocle's lens. Bright stroke + glow so it reads
  // clearly. SVG circles draw their stroke starting from angle 0 (3 o'clock).
  // Rotating by +90° puts the start at the bottom (6 o'clock), which is where
  // 2016 (i=0) lives. The draw animation then unfolds clockwise around the
  // ring, lighting each year node in sync with the section appearance timing.
  const ring=svgE('circle',{cx:MX,cy:MY,r:MR,fill:'none',stroke:'rgba(0,212,255,.85)','stroke-width':'3',
    'stroke-dasharray':CIRC,'stroke-dashoffset':CIRC,'stroke-linecap':'round',
    transform:`rotate(90 ${MX} ${MY})`,filter:'url(#gl)'});
  svg.appendChild(ring);

  // Cord path (from ~5 o'clock on ring to bonus eyepiece)
  const cordCtrl={x:CORD_A.x+55,y:CORD_A.y+60};
  const cord=svgE('path',{d:`M${CORD_A.x} ${CORD_A.y} Q${cordCtrl.x} ${cordCtrl.y} ${CORD_B.x} ${CORD_B.y}`,
    fill:'none',stroke:'rgba(245,158,11,.55)','stroke-width':'1.8',
    'stroke-dasharray':'200','stroke-dashoffset':'200','stroke-linecap':'round',filter:'url(#gl)'});
  svg.appendChild(cord);

  // Year nodes (on the ring)
  const nEls=[];
  for(let i=0;i<10;i++){
    const p=mPos(i),dx=p.x-MX,dy=p.y-MY,len=Math.hypot(dx,dy);
    const labelDist = p.x < MX - 20 ? 70 : 34; // push left-side labels further out to clear monocle
    const lx=p.x+(dx/len)*labelDist,ly=p.y+(dy/len)*labelDist;
    const anc=p.x>MX+20?'start':p.x<MX-20?'end':'middle';
    const g=svgE('g',{opacity:'0',class:'recap-pill'});g.style.transition='opacity .4s';g.dataset.lesson=i;
    // star glow
    g.appendChild(svgE('circle',{cx:p.x,cy:p.y,r:'16',fill:'rgba(0,212,255,.02)',stroke:'rgba(0,212,255,.08)','stroke-width':'0.5'}));
    // center star
    g.appendChild(svgE('circle',{cx:p.x,cy:p.y,r:'4.5',fill:'rgba(0,212,255,.15)',stroke:'rgba(0,212,255,.65)','stroke-width':'1.5'}));
    // Per-node nudges (baked from annotation pass)
    const _yn=[[0,0],[5,-23],[21,-15],[21,16],[13,31],[-9,-2],[27,0],[3,3],[3,0],[-34+(-2),6+8]]; // year: [dx,dy]
    const _tn=[[0,0],[9,-22],[25,-14],[26,15],[15,28],[-11,-3],[25,1],[0,0],[0,0],[-60,14]]; // title: [dx,dy]
    const yrOffX=_yn[i][0], yrOffY=_yn[i][1];

      'font-family':'Space Grotesk,sans-serif','font-size':'10.5','font-weight':'600','letter-spacing':'1.2'});
    yr.textContent=2016+i;g.appendChild(yr);

  // Bonus node (the eyepiece circle of the monocle)
  const bG=svgE('g',{opacity:'0'});bG.style.transition='opacity .5s';
  bG.appendChild(svgE('circle',{cx:CORD_B.x,cy:CORD_B.y,r:'18',fill:'rgba(245,158,11,.02)',stroke:'rgba(245,158,11,.1)','stroke-width':'0.5'}));
  bG.appendChild(svgE('circle',{cx:CORD_B.x,cy:CORD_B.y,r:'6',fill:'rgba(245,158,11,.15)',stroke:'rgba(245,158,11,.65)','stroke-width':'1.5'}));
  const bYr=svgE('text',{x:CORD_B.x+40+8,y:CORD_B.y-5,'text-anchor':'start',fill:'rgba(245,158,11,.85)',
    'font-family':'Space Grotesk,sans-serif','font-size':'10.5','font-weight':'600','letter-spacing':'1.2'});
  bYr.textContent='2026';bG.appendChild(bYr);
  const bTt=svgE('text',{x:CORD_B.x+40+5,y:CORD_B.y+10-2,'text-anchor':'start',fill:'rgba(255,255,255,.35)',
    'font-family':'Space Grotesk,sans-serif','font-size':'8'});
  bTt.textContent='Everything Changes. Ship Anyway.';bG.appendChild(bTt);
  svg.appendChild(bG);

  const cL=svgE('text',{x:MX,y:MY-4,'text-anchor':'middle','dominant-baseline':'middle',fill:'rgba(255,255,255,0)',

  const avPos = svgE('g', { id:'map-av-pos', transform:`translate(${MX},${MY-50})`, opacity:'0' });

  const FW_COLORS = ['#00d4ff','#a78bfa','#f59e0b','#f43f5e','#fde68a'];
  const fwGroups = [];
  // 5 burst origins: dead center, plus four points around the avatar
  const fwOrigins = [
    {x:MX, y:MY+10},
    {x:MX-60, y:MY-30},
    {x:MX+60, y:MY-30},

  fwOrigins.forEach((origin, gi) => {

      const dx = Math.cos(angle) * 60;

  // ── Animation sequence ──
  const DLY=300, CDUR=3200, STP=CDUR/10;

  let rs=null;
  function aR(ts){if(!rs)rs=ts;const p=Math.min((ts-rs)/CDUR,1);const e=p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;ring.setAttribute('stroke-dashoffset',CIRC*(1-e));if(p<1)requestAnimationFrame(aR)}

  // Steps 8-10 are now registered as click-triggered steps
  // Step 1: avatar + fireworks
  function mapStep1() {
    avPos.style.opacity = '1';
    avG.querySelector('.avatar')?.classList.add('pumping');
