<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>10 Lessons from 10 Years — Alex Coulombe @ HXR 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060810;--teal:#00d4ff;--purple:#a78bfa;--amber:#f59e0b;
  --text:#f0f4ff;--dim:rgba(240,244,255,.5);
  --font:'Space Grotesk',system-ui,sans-serif;
}
html,body{width:1200px;height:630px;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font)}

.bg{position:absolute;inset:0;overflow:hidden}
.bg-gradient{position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 15% 50%,rgba(124,58,237,.22) 0%,transparent 55%),
             radial-gradient(ellipse 60% 70% at 85% 20%,rgba(0,212,255,.16) 0%,transparent 55%),
             linear-gradient(180deg,#060810 0%,#0b0820 50%,#060810 100%);
}
canvas{position:absolute;inset:0}

/* Monocle constellation on the right (10 nodes + cord to bonus) */
.constellation{position:absolute;top:50%;right:40px;transform:translateY(-50%);width:380px;height:380px}
.constellation svg{width:100%;height:100%;overflow:visible}
.cnode{fill:rgba(0,212,255,.55);stroke:rgba(0,212,255,.9);stroke-width:1.5}
.bnode{fill:rgba(245,158,11,.55);stroke:rgba(245,158,11,.95);stroke-width:1.5}
.cring{fill:none;stroke:rgba(0,212,255,.55);stroke-width:1.8}
.cline{stroke:rgba(0,212,255,.16);stroke-width:.6}
.cord{fill:none;stroke:rgba(245,158,11,.6);stroke-width:1.8}

/* Content */
.content{position:absolute;top:50%;left:72px;transform:translateY(-50%);max-width:680px;z-index:10}
.tag{
  font-size:13px;font-weight:600;letter-spacing:.32em;text-transform:uppercase;
  color:var(--teal);opacity:.9;margin-bottom:22px;
}
.title{
  font-size:80px;font-weight:700;line-height:.94;letter-spacing:-.03em;
  background:linear-gradient(130deg,#fff 20%,#a5d8ff 55%,#9b8cff 90%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:18px;
}
.subtitle{
  font-size:22px;font-weight:400;color:var(--dim);line-height:1.4;
  max-width:600px;margin-bottom:36px;
}
.speaker-card{
  display:inline-flex;align-items:center;gap:18px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.13);
  border-radius:60px;padding:14px 28px;backdrop-filter:blur(12px);
}
.spk-name{font-size:18px;font-weight:600;color:var(--text)}
.spk-co{font-size:12px;color:var(--dim);margin-top:2px}
.sep{width:1px;height:38px;background:rgba(255,255,255,.18)}
.event{font-size:11px;color:var(--dim);line-height:1.5;text-align:left}

/* Footer brand mark */
.footer{
  position:absolute;bottom:30px;left:72px;right:72px;
  display:flex;justify-content:space-between;align-items:center;
  font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(255,255,255,.3);
}
</style>
</head>
<body>
<div class="bg">
  <div class="bg-gradient"></div>
  <canvas id="stars"></canvas>
</div>

<!-- Monocle constellation: 10 nodes on a circle + cord to bonus 2026 -->
<div class="constellation">
  <svg viewBox="0 0 380 380">
    <!-- Constellation lines (each node to node+3) -->
    <line class="cline" x1="190" y1="40" x2="40" y2="190"/>
    <line class="cline" x1="278" y1="68" x2="102" y2="278"/>
    <line class="cline" x1="340" y1="140" x2="190" y2="340"/>
    <line class="cline" x1="340" y1="240" x2="278" y2="68"/>
    <line class="cline" x1="278" y1="312" x2="340" y2="140"/>
    <line class="cline" x1="190" y1="340" x2="340" y2="240"/>
    <line class="cline" x1="102" y1="312" x2="278" y2="312"/>
    <line class="cline" x1="40" y1="240" x2="190" y2="340"/>
    <line class="cline" x1="40" y1="140" x2="102" y2="312"/>
    <line class="cline" x1="102" y1="68" x2="40" y2="240"/>
    <!-- Ring -->
    <circle class="cring" cx="190" cy="190" r="150"/>
    <!-- 10 nodes evenly spaced -->
    <circle class="cnode" cx="190" cy="40" r="6"/>
    <circle class="cnode" cx="278" cy="68" r="6"/>
    <circle class="cnode" cx="340" cy="140" r="6"/>
    <circle class="cnode" cx="340" cy="240" r="6"/>
    <circle class="cnode" cx="278" cy="312" r="6"/>
    <circle class="cnode" cx="190" cy="340" r="6"/>
    <circle class="cnode" cx="102" cy="312" r="6"/>
    <circle class="cnode" cx="40" cy="240" r="6"/>
    <circle class="cnode" cx="40" cy="140" r="6"/>
    <circle class="cnode" cx="102" cy="68" r="6"/>
    <!-- Cord from 5 o'clock to bonus -->
    <path class="cord" d="M 320 280 Q 360 320 380 360"/>
    <circle class="bnode" cx="380" cy="360" r="6"/>
    <!-- Center brand text -->
    <text x="190" y="186" text-anchor="middle" dominant-baseline="middle" fill="rgba(255,255,255,.75)" font-family="Space Grotesk,sans-serif" font-size="16" font-weight="600" letter-spacing="3">AGILE LENS</text>
    <text x="190" y="208" text-anchor="middle" dominant-baseline="middle" fill="rgba(255,255,255,.4)" font-family="Space Grotesk,sans-serif" font-size="11" font-weight="400" letter-spacing="2">2016 – 2026</text>
  </svg>
</div>

<div class="content">
  <div class="tag">HXR · Harvard XR · April 11, 2026</div>
  <h1 class="title">10 Lessons<br>from 10 Years</h1>
  <p class="subtitle">Running an XR Enterprise Studio. Closing keynote at the Harvard XR Conference.</p>
  <div class="speaker-card">
    <div>
      <div class="spk-name">Alex Coulombe</div>
      <div class="spk-co">CEO, Agile Lens</div>
    </div>
    <div class="sep"></div>
    <div class="event">Closing Keynote<br>Gund Hall, Harvard</div>
  </div>
</div>

<div class="footer">
  <span>Agile Lens · agilelens.com</span>
  <span>ibrews.github.io/harvardxr-keynote</span>
</div>

<script>
const cv=document.getElementById('stars'),sc=cv.getContext('2d');
cv.width=1200;cv.height=630;
const stars=Array.from({length:90},()=>({
  x:Math.random()*1200,y:Math.random()*630,
  r:Math.random()*1.4+.3,o:Math.random()*.5+.15
}));
sc.clearRect(0,0,1200,630);
stars.forEach(s=>{
  sc.beginPath();sc.arc(s.x,s.y,s.r,0,Math.PI*2);
  sc.fillStyle=`rgba(210,225,255,${s.o})`;sc.fill();
});
</script>
</body>
</html>
