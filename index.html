    }, 2100);
    // Fireworks cascade
    fwGroups.forEach((burst, gi) => {
      setTimeout(() => {
        burst.style.opacity = '1';
        burst.querySelectorAll('circle').forEach(p => {
          p.style.setProperty('--tx', `${p.getAttribute('data-tx')}px`);
          p.style.setProperty('--ty', `${p.getAttribute('data-ty')}px`);
          p.style.animation = 'fwParticle 1.2s ease-out forwards';
        });
        setTimeout(() => { burst.style.opacity = '0'; }, 1300);
      }, 500 + gi * 250);
    });
  }

  // Step 2: Pixel → Voxel morph
  function mapStep2() {
    if (window.startVoxelMorph) window.startVoxelMorph();
  }

  setTimeout(() => {
    slideSteps.set(mapS, { current: 0, steps: [mapStep1, mapStep2] });
  }, 0);
}

/* ═══════════════════════════════════════════════════════════════════════
   QR CODES — close slide, all 4 codes via qrserver.com API
   ═══════════════════════════════════════════════════════════════════════ */
(function drawAllQR(){
  const codes = [
    { id:'qr-agilelens', url:'https://agilelens.com' },
    { id:'qr-slides',    url:'https://ibrews.github.io/harvardxr-keynote/' },
    { id:'qr-discord',   url:'https://discord.gg/qBqnPM5W7M' },
    { id:'qr-training',  url:'https://www.alexcoulombepresents.com/' },
  ];
  codes.forEach(({ id, url }) => {
    const canvas = document.getElementById(id);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const SZ = canvas.width;
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, SZ, SZ);
      ctx.drawImage(img, 0, 0, SZ, SZ);
    };
    img.onerror = () => {
      ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, SZ, SZ);
      ctx.fillStyle = '#555'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(url.replace('https://',''), SZ/2, SZ/2);
    };
    img.src = `https://api.qrserver.com/v1/create-qr-code/?size=${SZ}x${SZ}&data=${encodeURIComponent(url)}&margin=0`;
  });
})();

/* ═══════════════════════════════════════════════════════════════════════
   VOXEL MORPH — Pixel → Voxel transformation on the map slide
   Three.js extrudes each pixel rect from the 2D avatar into a 3D cube.
   Triggered after the heroic jump finishes; crossfades SVG → WebGL canvas.
   ═══════════════════════════════════════════════════════════════════════ */
try { (function initVoxelMorph(){
  // Canvas overlay — positioned dynamically at ring center when triggered
  const canvas = document.createElement('canvas');
  canvas.id = 'voxel-canvas';
  canvas.width = 512; canvas.height = 512;
  canvas.style.cssText = 'position:absolute;pointer-events:none;opacity:0;z-index:5;transition:opacity .8s ease-in';
  mapS.style.position = 'relative';
  mapS.appendChild(canvas);

  // SELF-ACTUALIZED label — styled like INTERMISSION, appears after voxel pops in
  const selfLabel = document.createElement('div');
  selfLabel.id = 'self-actualized-label';
  selfLabel.textContent = 'SELF-ACTUALIZED';
  selfLabel.style.cssText = 'position:absolute;left:50%;top:calc(88% + 200px);transform:translateX(-50%);font-family:"Space Grotesk",sans-serif;font-size:clamp(1.4rem,3vw,2.8rem);font-weight:700;letter-spacing:.22em;color:var(--amber);opacity:0;pointer-events:none;z-index:6;white-space:nowrap;text-shadow:0 0 40px rgba(245,158,11,.6)';
  mapS.appendChild(selfLabel);

  // SFX helpers (standalone ctx so they don't stomp other audio)
  function voxelSfx(fn) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      fn(ctx); setTimeout(() => ctx.close(), 4000);
    } catch(e) {}
  }
  function playVoxelSpawn() {
    voxelSfx(ctx => {
      const now = ctx.currentTime;
      // Rising shimmer — materializing sound
      [[220,0],[330,.06],[440,.12],[587,.19],[784,.27],[1047,.36]].forEach(([f,t]) => {
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.type='sine'; o.frequency.value=f;
        o.connect(g); g.connect(ctx.destination);
        g.gain.setValueAtTime(0.06,now+t);
        g.gain.exponentialRampToValueAtTime(0.001,now+t+0.25);
        o.start(now+t); o.stop(now+t+0.26);
      });
    });
  }
  function playVoxelPop() {
    voxelSfx(ctx => {
      const now = ctx.currentTime;
      // Deep thud + metallic ting
      [[80,0,'sine',0.15],[160,0,'sine',0.08],[1200,.05,'square',0.04],[2400,.05,'square',0.02]].forEach(([f,t,type,vol]) => {
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.type=type; o.frequency.value=f;
        o.connect(g); g.connect(ctx.destination);
        g.gain.setValueAtTime(vol,now+t);
        g.gain.exponentialRampToValueAtTime(0.001,now+t+0.5);
        o.start(now+t); o.stop(now+t+0.51);
      });
    });
  }
  function playSelfActualized() {
    voxelSfx(ctx => {
      const now = ctx.currentTime;
      // Triumphant fanfare — four rising notes + power chord
      [[523,.0,'square',0.08],[659,.12,'square',0.08],[784,.24,'square',0.09],[1047,.38,'square',0.10],
       [523,.55,'square',0.07],[659,.55,'square',0.06],[784,.55,'square',0.06]].forEach(([f,t,type,vol]) => {
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.type=type; o.frequency.value=f;
        o.connect(g); g.connect(ctx.destination);
        g.gain.setValueAtTime(vol,now+t);
        g.gain.exponentialRampToValueAtTime(0.001,now+t+0.35);
        o.start(now+t); o.stop(now+t+0.36);
      });
    });
  }

  window.startVoxelMorph = async function() {
    let THREE;
    try { THREE = await import('three'); } catch(e) { console.warn('Three.js not available'); return; }

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(35, 1, 0.1, 200);
    camera.position.set(0, 2, 48);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setSize(512, 512);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0);

    // Lighting
    scene.add(new THREE.AmbientLight(0xffffff, 0.55));
    const dir = new THREE.DirectionalLight(0xffffff, 0.9); dir.position.set(5,10,8); scene.add(dir);
    const rim = new THREE.DirectionalLight(0x00d4ff, 0.35); rim.position.set(-5,-3,-5); scene.add(rim);
    const fill = new THREE.DirectionalLight(0xffa060, 0.2); fill.position.set(0,-8,4); scene.add(fill);

    // ── Color sets ──
    const HAIR_COLORS  = new Set(['#3a1c08','#5e2f1a','#8b4a2a','#a8602f']);
    const BEARD_COLORS = new Set(['#6e3a1e','#8a4f2a']);
    const EYE_COLORS   = new Set(['#1a1a26','#ffffff','#fff']);
    const SKIN_COLORS  = new Set(['#f2c79b','#d9a77a']);
    const HEAD_Y_MIN=-44, HEAD_Y_MAX=-12;
    const HEAD_X_MIN=-12, HEAD_X_MAX=11; // strict: excludes hand pixels at x≤-13 and x≥12

    // Role → (depth, Z-center) in SVG-pixel units (×SCALE for 3D)
    // head:    skin in head zone — thick volume connecting to hair
    //          Z -5→+3 (front of skin at +3)
    // hair:    full dome wrapping back+top
    //          Z -9→+1 (hair front at +1, behind skin front at +3 ✓)
    // feature: eyes, brows, beard, mouth — protrude from skin surface
    //          Z +3→+5 (attach at skin front ✓, protrude forward)
    // body:    torso/legs/hands — centered at Z=0
    const ROLE_DEPTH = { hair:10, head:8, feature:2, body:5 };
    const ROLE_Z     = { hair:-4, head:-1, feature:4, body:0 };

    function cellRole(color, cx, cy) {
      const inHead  = cy >= HEAD_Y_MIN && cy <= HEAD_Y_MAX;
      const inHeadX = cx >= HEAD_X_MIN && cx <= HEAD_X_MAX;
      if (BEARD_COLORS.has(color)) return 'feature';
      if (EYE_COLORS.has(color) || color === '#9c5040') return 'feature';
      // Hair-colored cells: eyebrows when inside head zone and below brow line
      if (HAIR_COLORS.has(color) && inHead && inHeadX) return 'feature';
      // Skin in head silhouette → head volume (NOT hands, which are outside HEAD_X)
      if (SKIN_COLORS.has(color) && inHead && inHeadX) return 'head';
      return 'body';
    }

    // Rasterize SVG group → Map<"x,y" → color> (painter's algo, last rect wins)
    function rasterize(svgGroup) {
      const grid = new Map();
      if (!svgGroup) return grid;
      svgGroup.querySelectorAll('rect').forEach(r => {
        const rx=Math.round(parseFloat(r.getAttribute('x'))||0);
        const ry=Math.round(parseFloat(r.getAttribute('y'))||0);
        const rw=Math.round(parseFloat(r.getAttribute('width'))||0);
        const rh=Math.round(parseFloat(r.getAttribute('height'))||0);
        const fill=(r.getAttribute('fill')||'#888').toLowerCase();
        if(rw<1||rh<1) return;
        for(let py=ry;py<ry+rh;py++) for(let px=rx;px<rx+rw;px++) grid.set(`${px},${py}`,fill);
      });
      return grid;
    }

    const avBody = document.querySelector('#map-av .av-body');
    const armsUpG = document.querySelector('#map-av .av-arms-up');
    if (!avBody) return;
    const bodyGrid = rasterize(avBody);
    rasterize(armsUpG).forEach((c,k) => bodyGrid.set(k,c));

    const SCALE = 0.16;
    const group = new THREE.Group();
    const headZoneCells = []; // ALL cells in head XY zone → used for back-fill dome

    bodyGrid.forEach((color, key) => {
      const [cx, cy] = key.split(',').map(Number);
      const role  = cellRole(color, cx, cy);
      const depth = ROLE_DEPTH[role];
      const zOff  = ROLE_Z[role];
      // Track every cell in the head zone for back-fill (hair + skin)
      const inHeadZone = cy >= HEAD_Y_MIN && cy <= HEAD_Y_MAX && cx >= HEAD_X_MIN && cx <= HEAD_X_MAX;
      if (inHeadZone) headZoneCells.push({ cx, cy });
      const geo = new THREE.BoxGeometry(SCALE, SCALE, depth * SCALE);
      const mat = new THREE.MeshStandardMaterial({ color: new THREE.Color(color), roughness:0.6, metalness:0.1 });
      const cube = new THREE.Mesh(geo, mat);
      cube.position.set((cx+0.5)*SCALE, -(cy+0.5)*SCALE, zOff*SCALE);
      group.add(cube);
    });

    // Back-of-head hair fill — adds hair volume BEHIND each skin cell so the
    // head reads as a full dome when rotated (not hollow on the back side)
    const backColors = ['#3a1c08','#5e2f1a','#8b4a2a','#a8602f'].map(c=>new THREE.Color(c));
    headZoneCells.forEach(({ cx, cy }) => {
      const yNorm = (cy - HEAD_Y_MIN) / (HEAD_Y_MAX - HEAD_Y_MIN);
      const xEdge = Math.abs(cx) > 10 ? -1 : 0;
      const shade  = Math.max(0, Math.min(3, Math.floor(yNorm * 12) % 4 + xEdge));
      // Back-fill abuts head back face (head: center=-1, depth=8 → back at Z=-5)
      // So back-fill: front=Z=-5, depth=4 → center=-7, back=-9. No overlap with head.
      const BACK_DEPTH = 4, BACK_Z = -7;
      const geo = new THREE.BoxGeometry(SCALE, SCALE, BACK_DEPTH * SCALE);
      const mat = new THREE.MeshStandardMaterial({ color: backColors[shade], roughness:0.6, metalness:0.1 });
      const cube = new THREE.Mesh(geo, mat);
      cube.position.set((cx+0.5)*SCALE, -(cy+0.5)*SCALE, BACK_Z*SCALE);
      group.add(cube);
    });

    // Center group at origin
    const box = new THREE.Box3().setFromObject(group);
    group.position.sub(box.getCenter(new THREE.Vector3()));
    scene.add(group);
    group.scale.z = 0.01; // start flat — pops to full depth

    // ── Position canvas centered on the Agile Lens ring ──
    // MX/MY are SVG viewBox coords (0 0 1000 600). Compute screen offset.
    const svgEl = document.getElementById('map-svg');
    const svgRect = svgEl.getBoundingClientRect();
    const mapRect = mapS.getBoundingClientRect();
    const svgScale = Math.min(svgRect.width/1000, svgRect.height/600);
    const svgOffX  = (svgRect.width  - 1000*svgScale) / 2;
    const svgOffY  = (svgRect.height -  600*svgScale) / 2;
    const ringScreenX = MX*svgScale + svgOffX + (svgRect.left - mapRect.left);
    const ringScreenY = MY*svgScale + svgOffY + (svgRect.top  - mapRect.top);

    // Start size matches the sprite visual size (~36 SVG px × scale), grow to 200%
    const FINAL_PX = 680;
    const startPx  = Math.round(36 * svgScale);
    canvas.style.left   = `${ringScreenX}px`;
    canvas.style.top    = `${ringScreenY}px`;
    canvas.style.transform = 'translate(-50%,-50%)';
    canvas.style.width  = `${startPx}px`;
    canvas.style.height = `${startPx}px`;

    // Position above the ring — ring top in screen coords = ringScreenY - MR*svgScale
    const ringTopY = ringScreenY - MR * svgScale;
    selfLabel.style.top  = `${Math.max(8, ringTopY - 56)}px`;
    selfLabel.style.left = `${ringScreenX}px`;
    selfLabel.style.transform = 'translateX(-50%)';

    // ── Glow blast SVG ring (radial flash at transformation moment) ──
    const mapSvg = document.getElementById('map-svg');
    const glowRing = svgE('circle', { cx:MX, cy:MY, r:'30',
      fill:'rgba(0,212,255,0)', stroke:'rgba(255,255,255,0)',
      'stroke-width':'4', id:'voxel-glow-ring' });
    mapSvg.appendChild(glowRing);

    // ── Crossfade sprite → canvas ──
    playVoxelSpawn();
    const avPos = document.getElementById('map-av-pos');
    if (avPos) { avPos.style.transition='opacity .6s ease-out'; avPos.style.opacity='0'; }

    // Glow blast: brief radial pulse emanating outward
    setTimeout(() => {
      playVoxelPop();
      glowRing.style.transition = 'none';
      glowRing.setAttribute('fill','rgba(0,212,255,0.18)');
      glowRing.setAttribute('stroke','rgba(255,255,255,0.9)');
      glowRing.style.transition = 'r 0.6s ease-out, stroke-opacity 0.6s, fill-opacity 0.6s';
      let gr=30, grRunning=true;
      (function glowExpand(now){
        if(!grRunning) return;
        gr = Math.min(gr+4, MR+20);
        const op = Math.max(0, 1-(gr-30)/(MR+20-30));
        glowRing.setAttribute('r', gr);
        glowRing.setAttribute('stroke',`rgba(255,255,255,${(op*0.9).toFixed(2)})`);
        glowRing.setAttribute('fill',`rgba(0,212,255,${(op*0.12).toFixed(2)})`);
        if(gr < MR+20) requestAnimationFrame(glowExpand);
        else { glowRing.remove(); }
      })();
    }, 300);

    // Show canvas and animate: scaleZ 0→1, CSS size startPx→FINAL_PX
    setTimeout(() => {
      canvas.style.opacity = '1';
      const popStart = performance.now();
      const POP_DUR = 1400, GROW_DUR = 1800;
      function popIn(now) {
        const t = Math.min((now-popStart)/POP_DUR, 1);
        group.scale.z = 0.01 + (1-Math.pow(1-t,3))*0.99;
        const tg = Math.min((now-popStart)/GROW_DUR, 1);
        const easeg = tg<.5?2*tg*tg:1-Math.pow(-2*tg+2,2)/2;
        const sz = startPx + (FINAL_PX-startPx)*easeg;
        canvas.style.width = canvas.style.height = `${sz.toFixed(0)}px`;
        if(t<1||tg<1) requestAnimationFrame(popIn);
      }
      requestAnimationFrame(popIn);
    }, 400);

    // SELF-ACTUALIZED: fade in, hold 2s, fade out, gone
    setTimeout(() => {
      playSelfActualized();
      selfLabel.style.transition = 'opacity .7s ease-out';
      selfLabel.style.opacity = '1';
      setTimeout(() => {
        selfLabel.style.transition = 'opacity 1s ease-in';
        selfLabel.style.opacity = '0';
      }, 700 + 2000);
    }, 400 + 1800);

    // Continuous slow rotation
    let running = true;
    function animate() {
      if (!running) return;
      group.rotation.y += 0.008;
      group.rotation.x = Math.sin(performance.now()*0.0003)*0.15;
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    animate();

    window._voxelCleanup = () => {
      running = false;
      renderer.dispose();
      canvas.style.opacity = '0';
      selfLabel.style.opacity = '0'; selfLabel.style.animation = '';
      glowRing.remove?.();
      if (avPos) { avPos.style.transition='none'; avPos.style.opacity='1'; }
    };
  };
})(); } catch(e) { console.error('VoxelMorph init error:', e); }

/* ═══════════════════════════════════════════════════════════════════════
   ANNOTATION OVERLAY — click elements to leave notes, export as markdown
   ═══════════════════════════════════════════════════════════════════════ */
const ANNO_KEY = 'hxr-keynote-annotations';
let annoMode = false;
let pendingTarget = null;

function annoLoad(){ try{return JSON.parse(localStorage.getItem(ANNO_KEY)||'[]')}catch(e){return []} }
function annoSave(arr){ localStorage.setItem(ANNO_KEY, JSON.stringify(arr)) }

function annoToast(msg){
  const t=document.getElementById('anno-toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

// Build a stable selector for an element
function annoSelector(el){
  if(el.id) return '#'+el.id;
  const path=[];
  let cur=el, depth=0;
  while(cur && cur!==document.body && depth<5){
    let part=cur.tagName.toLowerCase();
    if(cur.id){ part='#'+cur.id; path.unshift(part); break; }
    if(cur.classList.length){
      const cls=Array.from(cur.classList).filter(c=>!['active','exit-fwd','exit-bwd'].includes(c)).slice(0,2).join('.');
      if(cls) part+='.'+cls;
    }
    // nth-of-type if siblings exist
    const sibs=Array.from(cur.parentNode?.children||[]).filter(s=>s.tagName===cur.tagName);
    if(sibs.length>1){ part+=':nth-of-type('+(sibs.indexOf(cur)+1)+')'; }
    path.unshift(part);
    cur=cur.parentElement; depth++;
  }
  return path.join(' > ');
}

// Get slide context (year/type) for the element if it lives inside a slide
function annoContext(el){
  const slide=el.closest('.slide');
  if(!slide) return null;
  const type=slide.dataset.type||'?';
  const year=slide.dataset.year||'';
  const idx=[...document.querySelectorAll('#deck > .slide')].indexOf(slide);
  const num=idx>=0 ? `#${idx+1}` : '';
  const base=year ? `${type} ${year}` : type;
  return num ? `${base} ${num}` : base;
}

function annoRender(){
  const list=document.getElementById('anno-list');
  const items=annoLoad();
  if(items.length===0){
    list.innerHTML='<div id="anno-empty">No annotations yet.<br>Click any element on the page.</div>';
    return;
  }
  list.innerHTML=items.map((a,i)=>`
    <div class="anno-item">
      <span class="anno-rm" data-i="${i}">×</span>
      <div class="anno-meta">${a.context||'—'} · <code>${a.selector}</code></div>
      <div>${a.text.replace(/</g,'&lt;')}</div>
    </div>`).join('');
  list.querySelectorAll('.anno-rm').forEach(b=>b.addEventListener('click',e=>{
    const i=+e.target.dataset.i;
    const arr=annoLoad(); arr.splice(i,1); annoSave(arr); annoRender();
  }));
}

function annoToggleMode(on){
  annoMode = on===undefined ? !annoMode : on;
  document.body.classList.toggle('annotate-mode',annoMode);
  document.getElementById('anno-toggle').classList.toggle('active',annoMode);
  document.getElementById('anno-toggle').textContent=annoMode?'✕ Exit Annotate':'📝 Annotate';
  document.getElementById('anno-panel').classList.toggle('visible',annoMode);
  if(annoMode) annoRender();
  if(!annoMode) document.getElementById('anno-prompt').classList.remove('visible');
}

document.getElementById('anno-toggle').addEventListener('click',()=>annoToggleMode());

// Keyboard shortcut: A toggles annotate mode
document.addEventListener('keydown',e=>{
  if(e.key==='a'||e.key==='A'){
    if(['INPUT','TEXTAREA'].includes(document.activeElement?.tagName)||document.activeElement?.isContentEditable)return;
    e.preventDefault(); annoToggleMode();
  }
});

// Click handler in annotate mode
document.addEventListener('click',e=>{
  if(!annoMode)return;
  // Ignore clicks on the annotation UI itself
  if(e.target.closest('#anno-toggle')||e.target.closest('#anno-panel')||e.target.closest('#anno-prompt')||e.target.closest('#anno-toast'))return;
  e.preventDefault(); e.stopPropagation();
  pendingTarget=e.target;
  const sel=annoSelector(e.target);
  const ctx=annoContext(e.target);
  document.getElementById('anno-target-text').textContent=(ctx?ctx+' → ':'')+sel;
  const prompt=document.getElementById('anno-prompt');
  // Position prompt near click
  const x=Math.min(e.clientX+10, innerWidth-300);
  const y=Math.min(e.clientY+10, innerHeight-200);
  prompt.style.left=x+'px'; prompt.style.top=y+'px';
  prompt.classList.add('visible');
  document.getElementById('anno-text').value='';
  setTimeout(()=>document.getElementById('anno-text').focus(),50);
},true);

document.getElementById('anno-cancel').addEventListener('click',()=>{
  document.getElementById('anno-prompt').classList.remove('visible');
  pendingTarget=null;
});

document.getElementById('anno-save').addEventListener('click',()=>{
  const text=document.getElementById('anno-text').value.trim();
  if(!text||!pendingTarget)return;
  const arr=annoLoad();
  arr.push({
    selector: annoSelector(pendingTarget),
    context: annoContext(pendingTarget),
    text,
    timestamp: new Date().toISOString()
  });
  annoSave(arr);
  document.getElementById('anno-prompt').classList.remove('visible');
  pendingTarget=null;
  annoRender();
  annoToast('Annotation saved');
});

// Cmd/Ctrl+Enter to save in textarea
document.getElementById('anno-text').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&(e.metaKey||e.ctrlKey)){ e.preventDefault(); document.getElementById('anno-save').click(); }
  if(e.key==='Escape'){ document.getElementById('anno-cancel').click(); }
});

document.getElementById('anno-export').addEventListener('click',()=>{
  const arr=annoLoad();
  if(arr.length===0){ annoToast('Nothing to copy'); return; }
  const md='# Keynote Annotations\n\n'+arr.map((a,i)=>
    `## ${i+1}. ${a.context||'—'}\n**Selector:** \`${a.selector}\`\n**Note:** ${a.text}\n`
  ).join('\n');
  navigator.clipboard.writeText(md).then(()=>annoToast(`Copied ${arr.length} annotation${arr.length>1?'s':''} to clipboard`));
});

document.getElementById('anno-clear').addEventListener('click',()=>{
  if(!confirm('Clear all annotations?'))return;
  annoSave([]); annoRender(); annoToast('Cleared');
});

/* ═══════════════════════════════════════════════════════════════════════
   MOVE MODE v2 — full transform engine: translate / scale / rotate
   ═══════════════════════════════════════════════════════════════════════
   Drag any element on the active slide to reposition it. SVG paths and
   lines work too — they're transformed via the standard CSS `transform`
   property which is honored by SVG geometry.

   Modifier keys:
     - Just drag         → translate (move)
     - Shift + drag      → scale (drag away from center to grow, toward to shrink)
     - Alt/Option + drag → rotate (drag in a circle around center)

   Each element stores its current transform state in `transformMap`.
   Transforms compose as `translate(...) rotate(...) scale(...)`.

   Undo/Redo:
     - History stack records each completed drag with prev + new state
     - Cmd/Ctrl + Z      → undo last transform
     - Cmd/Ctrl + Shift+Z → redo
     - Onscreen Undo/Redo buttons in the move-mode toolbar
   ═══════════════════════════════════════════════════════════════════════ */

let moveMode = false;
let drag = null;  // { el, mode, startX, startY, startState, center, prevState }

// Map: element → { tx, ty, scale, rot } — the cumulative transform we apply
const transformMap = new WeakMap();

// Undo / redo history. Each entry: { el, prev, next, sel }
const moveHistory = [];
const moveHistoryRedo = [];
const MAX_HISTORY = 50;

function getXform(el) {
  return transformMap.get(el) || { tx: 0, ty: 0, scale: 1, rot: 0 };
}

function setXform(el, t) {
  transformMap.set(el, t);
  // Compose: translate + rotate + scale, anchored at the element's own center
  // so rotation/scale feel natural. For SVG elements, transform-origin
  // defaults to the SVG canvas origin (0,0) which means scaling shoots
  // them off toward the upper-left of the document. transform-box: fill-box
  // makes transform-origin: center mean "center of THIS element's bounding
  // box" which is what users expect.
  el.style.transformBox = 'fill-box';
  el.style.transformOrigin = 'center center';
  el.style.transform = `translate(${t.tx}px, ${t.ty}px) rotate(${t.rot}deg) scale(${t.scale})`;
}

function elCenter(el) {
  const r = el.getBoundingClientRect();
  return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
}

function moveModeToggle(on) {
  moveMode = on === undefined ? !moveMode : on;
  if (moveMode && annoMode) annoToggleMode(false);
  document.body.classList.toggle('move-mode', moveMode);
  document.getElementById('move-toggle').classList.toggle('active', moveMode);
  document.getElementById('move-toggle').textContent = moveMode ? '✕ Exit Move' : '✋ Move Mode';
  document.getElementById('move-hud').classList.toggle('visible', moveMode);
  if (window.scrubShow) window.scrubShow(moveMode);
  if (moveMode) {
    annoToast('Move mode · drag=move · ⇧scale · ⌥rotate · ⌘click=parent · ⌘Z=undo');
  }
}

// ── Move-mode timeline scrubber ────────────────────────────────
// Lets you freeze + scrub CSS animations on the active slide while
// debugging layout mid-animation. Covers WAAPI animations; JS-timer
// sequences (map build, Alex intro) can be re-triggered via Replay.
(function buildScrubber(){
  const bar = document.createElement('div');
  bar.id = 'anim-scrub-bar';
  bar.style.cssText = 'position:fixed;bottom:72px;left:50%;transform:translateX(-50%);z-index:1100;display:none;align-items:center;gap:10px;background:rgba(6,8,16,.92);border:1px solid rgba(245,158,11,.4);border-radius:10px;padding:10px 14px;backdrop-filter:blur(10px);font-family:var(--font);font-size:.7rem;color:var(--amber);letter-spacing:.1em;text-transform:uppercase';
  bar.innerHTML = `
    <button id="scrub-replay" style="background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.4);border-radius:5px;padding:5px 10px;font:inherit;cursor:pointer">↻ Replay</button>
    <button id="scrub-playpause" style="background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.4);border-radius:5px;padding:5px 10px;font:inherit;cursor:pointer;width:70px">⏸ Pause</button>
    <input id="scrub-range" type="range" min="0" max="5000" value="0" step="10" style="width:360px;accent-color:var(--amber)">
    <span id="scrub-time" style="min-width:60px;text-align:right;color:rgba(245,158,11,.8)">0 ms</span>
  `;
  document.body.appendChild(bar);
  const range = bar.querySelector('#scrub-range');
  const timeLbl = bar.querySelector('#scrub-time');
  const pp = bar.querySelector('#scrub-playpause');
  const replay = bar.querySelector('#scrub-replay');
  let paused = false;
  function slideAnims(){
    const s = allSlides[current];
    if (!s || !s.getAnimations) return [];
    return s.getAnimations({subtree:true});
  }
  function maxDur(){
    let m = 2000;
    slideAnims().forEach(a=>{
      const t = a.effect?.getComputedTiming?.();
      const d = (t?.delay||0) + (t?.duration||0) * (t?.iterations||1);
      if (isFinite(d) && d > m) m = d;
    });
    return Math.ceil(m);
  }
  function refreshRange(){
    range.max = maxDur();
  }
  range.addEventListener('input', ()=>{
    paused = true; pp.textContent = '▶ Play';
    const v = +range.value;
    timeLbl.textContent = v + ' ms';
    slideAnims().forEach(a=>{
      a.pause();
      try { a.currentTime = Math.min(v, (a.effect?.getComputedTiming?.().endTime) || v); } catch(e){}
    });
  });
  pp.addEventListener('click', ()=>{
    paused = !paused;
    if (paused) { slideAnims().forEach(a=>a.pause()); pp.textContent='▶ Play'; }
    else { slideAnims().forEach(a=>a.play()); pp.textContent='⏸ Pause'; }
  });
  replay.addEventListener('click', ()=>{
    paused = false; pp.textContent='⏸ Pause';
    const n = current;
    // Nudge away and back so the entry hooks re-fire
    if (n > 0) { goTo(n-1); setTimeout(()=>goTo(n), 560); }
    else if (total > 1) { goTo(n+1); setTimeout(()=>goTo(n), 560); }
    setTimeout(refreshRange, 1200);
  });
  window.scrubShow = (on)=>{ bar.style.display = on ? 'flex' : 'none'; if (on) setTimeout(refreshRange,100); };
})();

// Suppress link navigation while move mode is on — so editing an <a>
// doesn't jump the browser. Also suppress while editing text.
document.addEventListener('click', e => {
  if (!moveMode) return;
  const a = e.target.closest('a');
  if (a && !a.closest('#move-hud,#anno-panel,#anim-scrub-bar')) {
    e.preventDefault(); e.stopPropagation();
  }
}, true);

// Double-click in move mode = enter text-edit mode on the clicked element.
// Click outside or press Escape to exit. Edits are saved as annotations so
// they survive reloads and can be exported with the rest.
let editingEl = null;
function endTextEdit(save){
  if (!editingEl) return;
  const el = editingEl;
  el.removeAttribute('contenteditable');
  el.blur();
  if (save) {
    const txt = el.innerText;
    if (txt !== (el.dataset.origText||'')) {
      // Persist as an annotation entry keyed by selector
      const sel = annoSelector(el);
      const arr = annoLoad();
      const existing = arr.find(a=>a.selector===sel && a.text.startsWith('TEXT '));
      const entry = { selector: sel, text: `TEXT "${txt.replace(/"/g,'\\"')}"`, context: annoContext(el), ts: Date.now() };
      if (existing) Object.assign(existing, entry); else arr.push(entry);
      annoSave(arr); annoRender();
      annoToast('Text saved');
    }
  }
  editingEl = null;
  document.body.classList.remove('edit-text');
}
document.addEventListener('dblclick', e => {
  if (!moveMode) return;
  if (e.target.closest('#move-hud,#anno-panel,#anim-scrub-bar,#slide-grid,#move-toggle,#anno-toggle')) return;
  // Only text-bearing leaf-ish elements. Skip SVG nodes (not editable).
  const el = e.target;
  if (el.closest('svg')) { annoToast('SVG text not editable yet'); return; }
  e.preventDefault(); e.stopPropagation();
  if (editingEl && editingEl !== el) endTextEdit(true);
  editingEl = el;
  el.dataset.origText = el.innerText;
  el.setAttribute('contenteditable','true');
  document.body.classList.add('edit-text');
  el.focus();
  // Select all text for quick replacement
  const r = document.createRange(); r.selectNodeContents(el);
  const s = window.getSelection(); s.removeAllRanges(); s.addRange(r);
}, true);
document.addEventListener('keydown', e => {
  if (!editingEl) return;
  if (e.key === 'Escape') { e.preventDefault(); endTextEdit(false); }
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); endTextEdit(true); }
  // Enter inside a bullet <li> → save current, add new bullet after, edit it
  if (e.key === 'Enter' && !e.metaKey && !e.ctrlKey && editingEl.tagName === 'LI') {
    e.preventDefault();
    endTextEdit(true);
    const li = document.createElement('li');
    li.textContent = '';
    editingEl.after(li);
    // Start editing the new bullet
    editingEl = li;
    li.dataset.origText = '';
    li.setAttribute('contenteditable','true');
    document.body.classList.add('edit-text');
    li.focus();
  }
  // Backspace on empty bullet → delete it, edit the previous bullet
  if (e.key === 'Backspace' && editingEl.tagName === 'LI' && editingEl.innerText.trim() === '') {
    e.preventDefault();
    const prev = editingEl.previousElementSibling;
    const el = editingEl;
    el.removeAttribute('contenteditable');
    editingEl = null;
    el.parentElement.removeChild(el);
    if (prev) {
      editingEl = prev;
      prev.dataset.origText = prev.innerText;
      prev.setAttribute('contenteditable','true');
      document.body.classList.add('edit-text');
      prev.focus();
      const r = document.createRange(); r.selectNodeContents(prev); r.collapse(false);
      const s = window.getSelection(); s.removeAllRanges(); s.addRange(r);
    } else {
      document.body.classList.remove('edit-text');
    }
  }
}, true);
// Clicking outside the edited element commits the edit
document.addEventListener('mousedown', e => {
  if (editingEl && !e.target.closest('[contenteditable="true"]')) endTextEdit(true);
}, true);
// Re-apply saved TEXT annotations on slide load so edits persist
function applyTextAnnotations(){
  annoLoad().filter(a=>a.text.startsWith('TEXT ')).forEach(a=>{
    try {
      const m = a.text.match(/^TEXT "(.*)"$/s);
      if (!m) return;
      const el = document.querySelector(a.selector);
      if (el) el.innerText = m[1].replace(/\\"/g,'"');
    } catch(_) {}
  });
}
setTimeout(applyTextAnnotations, 300);

// ── Drag-and-drop image swap (move mode only) ───────────────────
// Drag an image file from Finder onto any <img> while in move mode.
// The file is read as a data URI, the <img> src is swapped, and the
// new src is persisted as an annotation so it survives reloads.
function applyImageAnnotations(){
  annoLoad().filter(a=>a.text.startsWith('IMG ')).forEach(a=>{
    try {
      const m = a.text.match(/^IMG (data:[^\s]+)$/);
      if (!m) return;
      const el = document.querySelector(a.selector);
      if (el && el.tagName === 'IMG') el.src = m[1];
    } catch(_) {}
  });
}
setTimeout(applyImageAnnotations, 400);

// Accept the drop globally but only act when move mode is on
document.addEventListener('dragover', e => {
  if (!moveMode) return;
  const img = e.target.closest('img');
  if (!img) return;
  e.preventDefault();
  img.style.outline = '3px dashed var(--teal)';
  img.style.outlineOffset = '2px';
});
document.addEventListener('dragleave', e => {
  const img = e.target.closest('img'); if (img) img.style.outline = '';
});
document.addEventListener('drop', e => {
  if (!moveMode) return;
  const img = e.target.closest('img');
  if (!img) return;
  e.preventDefault(); e.stopPropagation();
  img.style.outline = '';
  const file = e.dataTransfer?.files?.[0];
  if (!file || !file.type.startsWith('image/')) { annoToast('Drop an image file'); return; }
  const reader = new FileReader();
  reader.onload = () => {
    img.src = reader.result;
    const sel = annoSelector(img);
    const arr = annoLoad();
    const existing = arr.find(a=>a.selector===sel && a.text.startsWith('IMG '));
    const entry = { selector: sel, text: `IMG ${reader.result}`, context: annoContext(img), ts: Date.now() };
    if (existing) Object.assign(existing, entry); else arr.push(entry);
    annoSave(arr); annoRender();
    annoToast(`Image swapped (${(file.size/1024).toFixed(0)} KB)`);
  };
  reader.readAsDataURL(file);
}, true);

document.getElementById('move-toggle').addEventListener('click', () => moveModeToggle());
document.getElementById('move-undo').addEventListener('click', () => moveUndo());
document.getElementById('move-redo').addEventListener('click', () => moveRedo());

document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA'].includes(document.activeElement?.tagName)||document.activeElement?.isContentEditable) return;
  if (e.key === 'm' || e.key === 'M') { e.preventDefault(); moveModeToggle(); return; }
  // Cmd/Ctrl + Z = undo, Cmd/Ctrl + Shift + Z = redo
  if ((e.metaKey || e.ctrlKey) && (e.key === 'z' || e.key === 'Z')) {
    e.preventDefault();
    if (e.shiftKey) moveRedo(); else moveUndo();
  }
});

// ── Drag handlers ──
document.addEventListener('mousedown', e => {
  if (!moveMode) return;
  if (e.target.closest('#move-toggle') || e.target.closest('#anno-toggle') ||
      e.target.closest('#slide-grid') || e.target.closest('#slide-grid-zone') ||
      e.target.closest('#anno-panel') || e.target.closest('#anno-prompt') ||
      e.target.closest('#move-hud') || e.target.closest('#anim-scrub-bar') ||
      e.target.closest('#anno-toast')) return;
  // Ignore anything inside a contenteditable being edited — let the browser handle text selection.
  if (e.target.closest('[contenteditable="true"]')) return;
  e.preventDefault(); e.stopPropagation();
  // Cmd/Ctrl+click climbs ONE parent level from the clicked target so you
  // can grab a whole group (e.g. the avatar body + headset) instead of just
  // the leaf rect you happened to click. Hold Cmd/Ctrl multiple times on
  // successive clicks to climb further (each click goes up one more level).
  let el = e.target;
  if (e.metaKey || e.ctrlKey) {
    const p = el.parentElement;
    if (p && p.tagName !== 'BODY' && !p.closest('#move-hud,#anno-panel,#anim-scrub-bar')) {
      el = p;
    }
  }
  const startState = { ...getXform(el) };
  drag = {
    el,
    mode: e.shiftKey ? 'scale' : (e.altKey ? 'rotate' : 'translate'),
    startX: e.clientX,
    startY: e.clientY,
    startState,
    prevState: { ...startState },
    center: elCenter(el),
  };
  el.classList.add('dragging');
}, true);

document.addEventListener('mousemove', e => {
  if (!drag) return;
  const el = drag.el;
  const next = { ...drag.startState };
  if (drag.mode === 'translate') {
    next.tx = drag.startState.tx + (e.clientX - drag.startX);
    next.ty = drag.startState.ty + (e.clientY - drag.startY);
  } else if (drag.mode === 'scale') {
    const startDist = Math.hypot(drag.startX - drag.center.x, drag.startY - drag.center.y) || 1;
    const currDist = Math.hypot(e.clientX - drag.center.x, e.clientY - drag.center.y);
    const factor = currDist / startDist;
    next.scale = Math.max(0.1, drag.startState.scale * factor);
  } else if (drag.mode === 'rotate') {
    const startA = Math.atan2(drag.startY - drag.center.y, drag.startX - drag.center.x);
    const currA = Math.atan2(e.clientY - drag.center.y, e.clientX - drag.center.x);
    next.rot = drag.startState.rot + (currA - startA) * 180 / Math.PI;
  }
  setXform(el, next);
}, true);

document.addEventListener('mouseup', e => {
  if (!drag) return;
  const el = drag.el;
  el.classList.remove('dragging');
  const next = getXform(el);
  const prev = drag.prevState;
  // Only push to history if something actually changed
  const changed = next.tx !== prev.tx || next.ty !== prev.ty ||
                  next.scale !== prev.scale || next.rot !== prev.rot;
  if (changed) {
    pushMoveHistory(el, prev, next);
    saveMoveAnnotation(el, prev, next);
  }
  drag = null;
}, true);

function pushMoveHistory(el, prev, next) {
  moveHistory.push({ el, prev: {...prev}, next: {...next}, sel: annoSelector(el) });
  if (moveHistory.length > MAX_HISTORY) moveHistory.shift();
  moveHistoryRedo.length = 0; // any new action clears the redo branch
  updateMoveButtons();
}

function moveUndo() {
  if (moveHistory.length === 0) { annoToast('Nothing to undo'); return; }
  const action = moveHistory.pop();
  setXform(action.el, action.prev);
  moveHistoryRedo.push(action);
  // Remove the corresponding annotation
  removeMoveAnnotation(action.sel, action.next);
  // If the prev state isn't identity, save a new annotation reflecting prev
  if (action.prev.tx || action.prev.ty || action.prev.scale !== 1 || action.prev.rot) {
    saveMoveAnnotation(action.el, { tx:0, ty:0, scale:1, rot:0 }, action.prev);
  }
  annoToast('Undone');
  updateMoveButtons();
}

function moveRedo() {
  if (moveHistoryRedo.length === 0) { annoToast('Nothing to redo'); return; }
  const action = moveHistoryRedo.pop();
  setXform(action.el, action.next);
  moveHistory.push(action);
  removeMoveAnnotation(action.sel, action.prev);
  saveMoveAnnotation(action.el, action.prev, action.next);
  annoToast('Redone');
  updateMoveButtons();
}

function updateMoveButtons() {
  const u = document.getElementById('move-undo');
  const r = document.getElementById('move-redo');
  if (u) u.disabled = moveHistory.length === 0;
  if (r) r.disabled = moveHistoryRedo.length === 0;
}

function saveMoveAnnotation(el, prev, next) {
  const sel = annoSelector(el);
  const ctx = annoContext(el);
  const arr = annoLoad();
  // Replace any existing move annotation for this selector with the latest state
  const existing = arr.findIndex(a => a.type === 'move' && a.selector === sel);
  const parts = [];
  if (next.tx || next.ty) {
    parts.push(`translate Δ(${next.tx >= 0 ? '+' : ''}${Math.round(next.tx)}px, ${next.ty >= 0 ? '+' : ''}${Math.round(next.ty)}px)`);
  }
  if (Math.abs(next.scale - 1) > 0.01) {
    parts.push(`scale ×${next.scale.toFixed(2)}`);
  }
  if (Math.abs(next.rot) > 0.5) {
    parts.push(`rotate ${Math.round(next.rot)}°`);
  }
  if (parts.length === 0) {
    // identity — remove any existing annotation
    if (existing >= 0) { arr.splice(existing, 1); annoSave(arr); annoRender(); }
    return;
  }
  const note = {
    selector: sel,
    context: ctx,
    text: 'TRANSFORM ' + parts.join(' · '),
    timestamp: new Date().toISOString(),
    type: 'move',
    transform: { tx: Math.round(next.tx), ty: Math.round(next.ty), scale: +next.scale.toFixed(3), rot: Math.round(next.rot) },
  };
  if (existing >= 0) arr[existing] = note; else arr.push(note);
  annoSave(arr);
  annoRender();
}

function removeMoveAnnotation(sel, state) {
  const arr = annoLoad();
  const idx = arr.findIndex(a => a.type === 'move' && a.selector === sel);
  if (idx >= 0) { arr.splice(idx, 1); annoSave(arr); annoRender(); }
}
</script>
</body>
