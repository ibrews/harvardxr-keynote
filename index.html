<script>
/* ═══════════════════════════════════════════════════════════════════════
   PRESENTATION CONFIG — EDIT THIS SECTION TO CHANGE CONTENT
   ═══════════════════════════════════════════════════════════════════════
   Each section = a year of Agile Lens (2016–2025).
   Contains 1-3 case study slides → then a lesson slide.

   To swap a project: change title/subtitle/img/bullets in the cases array.
   To swap an image:   replace the img URL (or "" for gradient placeholder).
   To change a lesson: edit the lesson.title and lesson.tagline.
   ═══════════════════════════════════════════════════════════════════════ */
const SECTIONS = [
  {
    year: 2016, accent: 'teal',
    cases: [
      { title:'The Shed @\nHudson Yards', subtitle:'My first major USA VR architecture project',
        img:'MEDIA_CYCLER',
        bullets:['Custom internal VR design apps for a $500M cultural venue','Parametric design options and solutions for Fisher Dachs','We weren\'t doing film. We weren\'t doing games.\nWe were doing stagecraft and looking for quick wins.'] },
      { title:'Kenneth Branagh\'s Macbeth\n@ The Park Avenue Armory', subtitle:'Shakespeare\'s Scottish Play, previz\'d in 3D and VR',
        img:'MEDIA_CYCLER',
        bullets:['Transfer from Manchester, England with tight timeline','Tested & adjusted sightlines, sets, & even actor blocking','Immediately useful to experience human scale'] },
      { title:'The Late Show @\nThe Ed Sullivan Theater', subtitle:'"The Church of Stephen Colbert" without damaging an historic dome.',
        img:'MEDIA_CYCLER',
        bullets:['Bravo Media saw the potential of my code for a new purpose','Saved valuable time','Just another sightline !'] },
    ],
    lesson: { title:'VR Is Theater.\nNot Film. Not Games.', tagline:'Film hands you cuts, wide shots, and montage to control where the audience looks. Games demand controller literacy and active participation. Theater is spatial, live, and trusts an audience to look anywhere they want — exactly like VR.<br><br>Stop borrowing from cinema. Start borrowing from stagecraft.', short:'VR IS THEATER', tags:'THE SHED · MACBETH · THE LATE SHOW' },
  },
  {
    year: 2017, accent: 'purple',
    cases: [
      { title:'ArchViz & R&D', subtitle:'One thing leads to another',
        img:'MEDIA_CYCLER',
        bullets:['Trying Archviz with Unreal Engine','R&D with Tilt Brush','Leads to Autodesk University','Leads to Epic Games relationship'] },
    ],
    lesson: { title:"It's OK to Pivot!\nDon't Forget Your Calling.", tagline:"Architects don't have any money.<br>Some will be game to collaborate, but most can't afford the risk.<br><br>We pivoted from Unity + design focus to UE + archviz focus.<br><br>With R&D to keep it fresh, it led to attracting valuable eyes, led to a relationship with Epic Games, and then...", short:"It's OK to Pivot", tags:'ArchViz · R&D · Speaking Engagements · Press' },
  },
  {
    year: 2018, accent: 'teal',
    cases: [
      { title:'Intel — Project Arena', subtitle:'Huge client that we made zero effort to acquire.',
        img:'MEDIA_CYCLER',
        bullets:['Subcontracted by The Glimpse Group (who also runs NYVR)','Delivered a world-class virtual arena with thousands of attendees and complex particle effects to show off power of i9 before public.','Then nothing. No follow-up. No repeat contract. Inbound feels like winning. But it isn\'t a pipeline.'] },
      { title:'Samsung — Event360', subtitle:'Nancy Bennett recommended us then we dove into a phone / GearVR experience.',
        img:'MEDIA_CYCLER',
        bullets:['Team wasn\'t big enough at start and we didn\'t get paid until project was complete.','Low fee for a month of hard work — I named a number before understanding the scope.','Being chosen felt like validation, but we also felt like we could easily be replaced.'] },
      { title:'High Fidelity —\nAlive in Plasticland', subtitle:'What is the ideal VR live performance?',
        img:'MEDIA_CYCLER',
        bullets:['Philip Rosedale asked me to assemble a NYC live-VR dream team.','How do you distribute fees to contractors? How do you delegate?','Nearly every client we\'ve had in 10 years found us first. No cold calls. No outbound. Pure inbound. The blessing is real. So is the curse: when the phone stops ringing, we have no sales muscle to fall back on.'] },
    ],
    lesson: { title:'Being Sought-After Is\na Blessing and a Curse', tagline:'It\'s incredible to be chased by killer clients. It also means we\'ve never learned how to sell. Inbound is feast-or-famine.<br><br>Being sought-after and being able to pitch are different skills.', short:'INBOUND IS TRICKY', tags:'Intel Project Arena · Samsung · High Fidelity' },
  },
  {
    year: 2019, accent: 'amber',
    cases: [
      { title:'JetBlue Terminal 5 — Rockwell Group', subtitle:'First lesson: architecture is theater at scale (but in 2008)',
        img:'media/interdisciplinary/jetblue_terminal.jpg',
        bullets:['Rockwell Group also draws from theater and regularly hires non-standard consultants to improve design.'] },
      { title:'Connective Corridor — Syracuse University', subtitle:'Civic technology as public art',
        img:'media/interdisciplinary/connectivecorridor_ribbon.jpg',
        bullets:['School of Interdisciplinary Design to bring myriad designers together','Weekend-long charrette (design hackathon)','Reminiscent of ETC at Carnegie Mellon'] },
      { title:'Equus — Syracuse\nBlack Box Players', subtitle:'Set design is the middle of the architecture/theater Venn diagram',
        img:'media/interdisciplinary/equus.png',
        bullets:['Just like VR; consider scale and create only what they\'ll see','VR would have been amazing in 2008 to test more variations quicker'] },
      { title:'Ghosted — With Kevin Laibson & Allyson Morgan', subtitle:'Where all of it came together for the first time',
        img:'MEDIA_CYCLER',
        bullets:['Magic Leap experience that turns limitations into features','Creative-first approach with 90% of team being non-technical','Digital Twin + VR is perfect previz of an MR experience'] },
    ],
    lesson: { title:'Great XR Comes From\nOutside XR', tagline:'XR is still too new to have native experts,<br>so you build them from everywhere.<br><br>The best XR teams look nothing like tech teams — architects, directors, lighting designers, journalists, choreographers,<br>all in the same room as engineers.', short:'OUTSIDE-IN IS THE EDGE', tags:'JetBlue T5 · Connective Corridor · Equus · Ghosted' },
  },
  {
    year: 2020, accent: 'rose',
    cases: [
      { title:'OnboardXR', subtitle:'A pandemic pivot that proved WebXR could work',
        img:'MEDIA_CYCLER',
        bullets:['COVID shut down every live venue. We built OnboardXR with Brendan Bradley — a WebXR one act festival that lives in a browser.','No app store. No headset required. Accessible by default. That constraint forced more thoughtful design.','OnboardXR became the proving ground for every live-performance idea we wanted to test quickly with a wide range of devices.'] },
      { title:'The Unreal Engine Bet', subtitle:'All-in on an all-in-one engine. No more Unity. No more hedging.',
        img:'MEDIA_CYCLER',
        bullets:['Going all-in on Unreal Engine — including Gold Authorized Instructor certification — wasn\'t a technical decision. It was a five-year bet on which skills would still be valuable.','Studios that chased the latest shiny (NFTs, then "the metaverse," then generative AI) lost their XR muscle memory. We didn\'t.','Platform lock-in is real — but so is platform mastery. From bespoke one-offs to a scalable pipeline, UE became the foundation.'] },
      { title:'Agony × Xsens × Lenovo', subtitle:'Sometimes the hardware just shows up at your door',
        img:'media/xsens-agony/xsens_agony.png',
        bullets:['Xsens sent us two full mocap suits. Lenovo sent workstations. They saw the work and wanted us using their gear.','We tested the Xsens suit on "Agony" from Into the Woods to see how live performance felt in VR with Metahumans. Most clients wouldn\'t have thought to ask for this but we saw potential.','Free hardware doesn\'t mean free. It means someone believes your R&D is their best marketing. Use it that way. And show gratitude!'] },
      { title:'Blueprint Immersive (BPI)', subtitle:'From bespoke projects to scalable product',
        img:'MEDIA_CYCLER',
        bullets:['After years of building one-off visualization tools for individual clients, we started to look for common threads where clients needed the same core capabilities.','Blueprint Immersive is our own UE-based design and visualization product. One tool that addresses many clients\' needs at once.','Hold onto your IP and you can build amazing things from it.'] },
    ],
    lesson: { title:'Your Tool Choices Are\nBusiness Strategy', tagline:'Don\'t let platform lock-in kill you — but don\'t be a tourist either.<br>Going all-in on Unreal Engine wasn\'t a technical decision — it was a five-year bet on which skills would still be valuable.<br><br>Sometimes the tools come to you: free hardware, free software.<br>The question isn\'t whether to use them; it\'s whether they serve the pipeline you\'re building or distract from it.', short:'TOOLS ARE STRATEGY', tags:'OnboardXR · Unreal Engine · Blueprint Immersive · Xsens Agony' },
  },
  {
    year: 2021, accent: 'purple',
    cases: [
      { title:'Christmas Carol VR —\nThe ATL Upsell', subtitle:'A small ask becomes our annual flagship',
        img:'MEDIA_CYCLER',
        bullets:['Actors Theatre of Louisville asked us for production assets — Metahumans and some good videos. Not a full VR project.','We did the R&D, then flipped the brief: "As long as we\'re building sets and characters and costumes for you — how about we just do a full VR production?"','That upsell became our annual production, our R&D vehicle, several SIGGRAPH talks and papers, and endless experience with live shows.'] },
      { title:'The Orchard —\nOff-Broadway', subtitle:'Protect your IP — not just deliverables, but the knowledge they generate. This was an OSC masterclass!',
        img:'MEDIA_CYCLER',
        bullets:['An Off-Broadway production where we brought our real-time pipeline to live theater — not as a tech demo, but as craft.','The pandemic cash crunch taught us: protect your IP. If the only asset is a client\'s build, you own nothing when the project ends.','Find common ground among clients to productize bespoke services. The Orchard proved our tools had a life beyond one engagement.'] },
    ],
    lesson: { title:'Require a Deposit.\nBefore You Build.', tagline:'The single best operational decision we ever made.<br>The first check separates the curious from the committed, gives you runway to actually staff the work, and buys you the ability to say "we\'re not sure yet" instead of pretending you have all the answers.<br><br>It filters out tire-kickers, protects the team from scope creep, and means your R&D never happens on your own dime.<br><br>Your services are valuable — sort out the serious clients<br>from those seeking free consulting.', short:'REQUIRE A DEPOSIT', tags:'Christmas Carol VR · The Orchard' },
  },
  {
    year: 2022, accent: 'amber',
    cases: [
      { title:'Waldorf Astoria Miami', subtitle:'Luxury archviz with a live mocap host',
        img:'MEDIA_CYCLER',
        bullets:['Rokoko motion capture pipeline running inside an archviz tour. A virtual host walks prospective residents through the space.','The client found us after SIGGRAPH talk I gave entirely about Christmas Carol, wanting our live performance system in archviz.','One 5 minute talk about theater work generated an enterprise archviz client. Specialist reputation compounds in unexpected directions.'] },
      { title:'David Geffen Hall — Lincoln Center', subtitle:'A real railing as an immersion multiplier',
        img:'MEDIA_CYCLER',
        bullets:['We built a physical railing into the VR experience — when stakeholders leaned on something real while seeing the virtual space, belief skyrocketed.','That one tactile detail changed every conversation. Decision-makers stopped debating renderings and started making decisions.','The result: significantly fewer change orders downstream. R&D on immersion multipliers paid for itself many times over.'] },
      { title:'Four Seasons Lake Austin', subtitle:'When innovating, build R&D into budgets explicitly',
        img:'MEDIA_CYCLER',
        bullets:['We could not have executed this project without the runway to explore what was possible.','Bake off with 9 other studios. Agile Lens finally was able to bring on a full time staff.','The wrong move is pretending you already have the answers. The right move is getting paid to figure them out.'] },
      { title:'Body of Mine', subtitle:'Full-body VR — Producers Guild Innovation Award',
        img:'MEDIA_CYCLER',
        bullets:['Body, face, and eye tracking — inhabit another gender. BAFTA, SXSW, Games for Change awards supporting Cameron Kostopoulos.','Help people who need help. Body of Mine happened because Cameron saw our other work and asked for advice before he got a grant.','Don\'t bet on tech that isn\'t there yet — but when the tech IS there, move fast: in this case? The Meta Movement SDK.'] },
      { title:'Vodafone Car Sales\n→ AI Dickens', subtitle:'Paid client work becomes internal R&D becomes published research',
        img:'MEDIA_CYCLER',
        bullets:['London Tech Week: Infinite Reality hires us to build a talking Metahuman car salesman. We learn the Inworld + mocap pipeline on their dime for PCVR.','We turn it into AI Dickens — an LLM-driven Charles Dickens who handles pre-show audience onboarding for Christmas Carol VR.','That R&D became "Directing AI Performers" — a Contemporary Theatre Review paper. Cash cow funding our IP. Clients get licenses.'] },
    ],
    lesson: { title:'Protect Time for\n"We\'re Not Sure Yet"', tagline:'Our most common brief starts with "I don\'t know if this is possible, but…" The honest answer is "us neither — let\'s find out together."<br><br>That only works if Phase 1 of every project is explicitly dedicated to R&D, with the discovery budget baked into the contract from day one.<br><br>Don\'t bet on tech that isn\'t there yet. But when the tech IS there, move fast. R&D keeps you at the bleeding edge — try everything, take advantage of companies that will give you early access.', short:'PROTECT R&D TIME', tags:'David Geffen Hall · Waldorf Astoria · Four Seasons · Body of Mine · AI Dickens' },
  },
  {
    year: 2023, accent: 'teal',
    cases: [
      { title:'Four Seasons Lake Austin', subtitle:'Spatial design that had to feel like luxury, not a tech demo',
        img:'MEDIA_CYCLER',
        bullets:['$300M of amenities in an 82×65-foot wireless holodeck. Optitrack + Antilatency: room-scale multi-user, no tether.','XR\'s evolving tech makes it harder to say no than in other design fields. Every new tracking system, every new headset — "we could" vs "we should."','Spatial Design Is Its Own Discipline — theatrical staging, sightlines, audience focus direction. The orange floating into view at the right moment.'] },
      { title:'La Pasion XR', subtitle:'Immersive storytelling at the intersection of faith and technology',
        img:'MEDIA_CYCLER',
        bullets:['A large-scale immersive XR experience bringing a centuries-old tradition into spatial computing.','Complex multi-stakeholder project with cultural sensitivity requirements that no tech brief could capture.','Scope definition was everything — the more meaningful the project, the harder it is to draw boundaries.'] },
      { title:'Your Mind, Girls — The Scope Creep Story', subtitle:'How $0 of revenue funded a genuinely excellent piece',
        img:'',
        bullets:['Hope Hutman approached us asking for a small Blueprint script. We said yes, planning to hand it off and take a small credit.','Each yes spawned 5 new problems. Sony Mocopi was the new shiny in the room. We thought we were killing two birds. Kevin: "We were just being sat on by a giant bird."','We ended up as full co-producers. 30 people in headsets watching a real actor in a virtual space. Beautiful work. Zero dollars.'] },
    ],
    lesson: { title:'Complex Projects Are Thrilling —\nand Perfect Breeding Grounds for Scope Creep', tagline:'The most dangerous projects are the ones that hit the bullseye of everything you\'ve been wanting to try. New hardware in the room plus a brief that fits your ambitions plus a creative collaborator you like = sunk cost fallacy by month two. XR\'s evolving tech makes it harder to say no. Learn to distinguish "we could" from "we should." The fix isn\'t saying no to thrilling projects. It\'s saying yes only with hard scope boundaries before the work starts.', short:'SCOPE CREEP WILL FIND YOU', tags:'FSLA · La Pasion XR · Your Mind, Girls · Sony Mocopi' },
  },
  {
    year: 2024, accent: 'purple',
    cases: [
      { title:'Royal Caribbean', subtitle:'When the demo breaks at sea, there\'s no IT department to call',
        img:'MEDIA_CYCLER',
        bullets:['Deploying XR experiences on a cruise ship — the most constrained environment imaginable. Satellite Wi-Fi, salt air, motion sickness that\'s real.','The demo WILL break. Have contingencies. Build graceful fallbacks into every moment of the experience.','Nobody knows what you envisioned. When something fails, pivot gracefully — the audience experiences what you show them, not what you planned.'] },
      { title:'Stage Presence × RSC', subtitle:'The Royal Shakespeare Company in VR',
        img:'MEDIA_CYCLER',
        bullets:['Actors rehearse in a 1:1 LIDAR-scanned Swan Theatre in VR. We tried virtual scripts on spring arms, attached to wrists, floating in space.','Every actor wanted the same thing: a script they could hold in their hand and put down on the floor. Same as paper.','VR UX is best when it adapts existing spatial workflows 1:1 — not when it tries to reinvent them.'] },
      { title:'DBOX Holodeck — The 98% Incident', subtitle:'A 98 at Harvard isn\'t something you apologize for',
        img:'MEDIA_CYCLER',
        bullets:['On a recent holodeck project, one of our partners was about to apologize to the client for the 2% of imperfections we could see but they couldn\'t.','The client\'s response: "This is amazing. My only notes are about our own work, not yours."','Stop apologizing for the difference between 98 and 100. The audience experiences "best they\'ve ever seen." Let them.'] },
    ],
    lesson: { title:'Perfect Is the Enemy of Best.\nDon\'t Tell the Client About the Gap.', tagline:'It takes 20% of the time to get 80% of the way there, and 80% of the time to chase the last 20% — and most of that last 20% is invisible to anyone without your trained eye. The demo WILL break — have contingencies. Nobody knows what you envisioned — pivot gracefully and they just see the result. Stop apologizing for the difference between 98 and 100.', short:'98% IS ENOUGH', tags:'Royal Caribbean · Stage Presence × RSC · DBOX Holodeck' },
  },
  {
    year: 2025, accent: 'rose',
    cases: [
      { title:'A Christmas Carol VR — Five Seasons Running', subtitle:'The R&D vehicle that keeps on giving',
        img:'MEDIA_CYCLER',
        bullets:['What started as an upsell in 2021 is now in its fifth season. Each year we push the tech: multi-avatar, AI Dickens, new venues.','Christmas Carol proves the model: a funded annual production that doubles as our R&D lab.','Get people excited about what you\'re building. The best marketing is work people can experience firsthand.'] },
      { title:'Unreal NYC & HalcyonVR', subtitle:'Guerrilla demos and genuine feedback from real humans',
        img:'MEDIA_CYCLER',
        bullets:['Co-founded the ACC VR community and helped launch Unreal Engine NYC — bringing developers and artists together around real-time tech.','Do guerrilla demos. Put headsets on people who\'ve never tried VR. Their reactions teach you more than any QA team.','The best XR quality assurance comes from a wide range of people, not a narrow team of experts. Solicit genuine feedback.'] },
    ],
    lesson: { title:'Build a Community!', tagline:'The most underrated business strategy in XR: get people in the room. Not investors, not press — actual humans experiencing actual work. Guerrilla demos, meetups, open studios. Solicit genuine feedback from the widest possible range of people. Your best QA comes from someone who\'s never worn a headset before. Build the community you wish existed, and the pipeline follows.', short:'BUILD A COMMUNITY', tags:'Christmas Carol VR · Unreal NYC · HalcyonVR · ACC VR' },
  },
];

const BONUS = { year:2026, title:'Every Three Years,\nEverything Changes.\nShip Anyway.',
  tagline:'2016: room-scale VR was the future. 2019: enterprise pivoted to AR. 2022: "the metaverse" consumed all oxygen. 2025: spatial computing and AI are rewriting every assumption. The cycle is accelerating, but the lesson is the same — ship with what exists today. The studios that survive aren\'t the ones that predict the next wave. They\'re the ones that ship through the turbulence. Learn to roll with the punches. Where do we go from here? The same place we always go — into the next wave, with the lessons from the last ten.' };
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060810;--teal:#00d4ff;--purple:#a78bfa;--amber:#f59e0b;--rose:#f43f5e;--text:#f0f4ff;--dim:rgba(240,244,255,.45);--font:'Space Grotesk',system-ui,sans-serif;--para-gap:.35em;--tagline-scale:1;--title-scale:1}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font)}

.bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg-gradient{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 15% 50%,rgba(124,58,237,.18) 0%,transparent 55%),radial-gradient(ellipse 60% 70% at 85% 20%,rgba(0,212,255,.12) 0%,transparent 55%),linear-gradient(180deg,#060810 0%,#0b0820 50%,#060810 100%)}
canvas#stars{position:absolute;inset:0}

#deck{position:relative;z-index:1;width:100%;height:100%;overflow:hidden}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:clamp(40px,5vw,80px);text-align:center;opacity:0;pointer-events:none}
.slide.active{opacity:1;pointer-events:all}
@keyframes slideInFwd{from{opacity:0;transform:translateX(6%) scale(.97)}to{opacity:1;transform:none}}
@keyframes slideInBwd{from{opacity:0;transform:translateX(-6%) scale(.97)}to{opacity:1;transform:none}}
@keyframes slideOutFwd{from{opacity:1;transform:none}to{opacity:0;transform:translateX(-6%) scale(.97)}}
@keyframes slideOutBwd{from{opacity:1;transform:none}to{opacity:0;transform:translateX(6%) scale(.97)}}

/* Cover */
.event-tag{font-size:clamp(.7rem,1.4vw,1.05rem);font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:var(--teal);margin-bottom:36px;opacity:.85}
.talk-title{font-size:clamp(3.2rem,8vw,8.5rem);font-weight:700;line-height:1;letter-spacing:-.03em;background:linear-gradient(130deg,#fff 20%,#a5d8ff 55%,#9b8cff 85%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:24px}
.talk-subtitle{font-size:clamp(1.1rem,2.4vw,1.9rem);font-weight:400;color:var(--dim);margin-bottom:64px}
.speaker-card{display:flex;align-items:center;gap:24px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:80px;padding:18px 40px;backdrop-filter:blur(12px)}
.speaker-name{font-size:clamp(1rem,1.4vw,1.4rem);font-weight:600}.speaker-co{font-size:clamp(.78rem,1.1vw,1.05rem);color:var(--dim);margin-top:3px}
.card-sep{width:1px;height:48px;background:rgba(255,255,255,.15)}
.event-detail{font-size:clamp(.78rem,1.1vw,1.05rem);color:var(--dim);line-height:1.6}

/* Case study — sized for 1920×1080 projector */
.case-slide{flex-direction:row;gap:clamp(36px,4.5vw,90px);text-align:left;padding:clamp(50px,5vw,110px) clamp(80px,9vw,180px)}
.case-image{flex:0 0 48%;max-width:860px;border-radius:18px;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center}
.case-image img{width:100%;display:block;border-radius:18px}
.case-image.portrait{flex:0 0 auto;aspect-ratio:9/16;max-width:none;width:auto;height:clamp(320px,75vh,860px)}
.case-image .ph{width:100%;height:100%;background:linear-gradient(135deg,rgba(0,212,255,.12),rgba(124,58,237,.12));display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.12);font-size:.85rem;letter-spacing:.1em;text-transform:uppercase}
.case-content{flex:1;display:flex;flex-direction:column;justify-content:center;gap:12px}
.case-ytag{font-size:clamp(.65rem,.95vw,.95rem);font-weight:600;letter-spacing:.25em;text-transform:uppercase;color:var(--teal);opacity:.6}
.case-title{font-size:clamp(1.8rem,3.6vw,3.8rem);font-weight:700;letter-spacing:-.02em;line-height:1.1}
.case-sub{font-size:clamp(.95rem,1.4vw,1.4rem);color:var(--dim);margin-bottom:14px}
.case-bl{list-style:none;display:flex;flex-direction:column;gap:14px}
.case-bl li{font-size:clamp(.92rem,1.3vw,1.3rem);color:rgba(240,244,255,.7);line-height:1.55;padding-left:24px;position:relative}
.case-bl li::before{content:'';position:absolute;left:0;top:.65em;width:7px;height:7px;border-radius:50%;background:var(--teal);opacity:.6}
.accent-purple .case-ytag{color:var(--purple)}.accent-purple .case-bl li::before{background:var(--purple)}
.accent-amber .case-ytag{color:var(--amber)}.accent-amber .case-bl li::before{background:var(--amber)}
.accent-rose .case-ytag{color:var(--rose)}.accent-rose .case-bl li::before{background:var(--rose)}

/* Lesson — sized for 1920×1080 projector */
.slide-lesson{padding-bottom:clamp(80px,10vh,140px)}
.year-ghost{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(10rem,24vw,26rem);font-weight:700;letter-spacing:-.06em;line-height:1;color:rgba(255,255,255,.028);pointer-events:none;user-select:none}
.lesson-ey{display:flex;align-items:center;justify-content:center;gap:14px;font-size:clamp(.7rem,1.1vw,1rem);font-weight:600;letter-spacing:.26em;text-transform:uppercase;margin-bottom:30px}
.ey-yr{color:rgba(255,255,255,.4)}.ey-sep{color:rgba(255,255,255,.15)}.ey-badge{color:var(--teal)}
.lesson-title{font-size:calc(clamp(2.4rem,5.8vw,6.2rem)*var(--title-scale));font-weight:700;letter-spacing:-.025em;line-height:1.06;max-width:1300px;margin-bottom:32px;white-space:pre-line}
.lesson-tagline{font-size:calc(clamp(1rem,1.7vw,1.6rem)*var(--tagline-scale));color:var(--dim);max-width:880px;line-height:1.7}
.lesson-tagline .para-gap{display:block;height:var(--para-gap)}
/* Settings slide */
.slide-settings{background:rgba(3,5,12,.98)}
.cfg-panel{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:52px 64px;max-width:860px;width:90%;backdrop-filter:blur(20px)}
.cfg-title{font-size:1.6rem;font-weight:700;letter-spacing:-.02em;color:#fff;margin-bottom:6px}
.cfg-subtitle{font-size:.75rem;color:var(--dim);letter-spacing:.12em;text-transform:uppercase;margin-bottom:44px;opacity:.7}
.cfg-grid{display:grid;grid-template-columns:1fr 1fr;gap:32px 56px;margin-bottom:36px}
.cfg-row{display:flex;flex-direction:column;gap:10px}
.cfg-label{font-size:.68rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.45)}
.cfg-control{display:flex;align-items:center;gap:14px}
.cfg-control input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:3px;background:rgba(255,255,255,.14);border-radius:2px;outline:none;cursor:pointer}
.cfg-control input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--teal);cursor:pointer;box-shadow:0 0 10px rgba(0,212,255,.5);transition:transform .1s}
.cfg-control input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.3)}
.cfg-val{min-width:3.8em;font-size:.82rem;color:var(--teal);font-weight:700;font-variant-numeric:tabular-nums;text-align:right}
.cfg-hint{font-size:.65rem;color:rgba(255,255,255,.2);letter-spacing:.06em;text-align:center;border-top:1px solid rgba(255,255,255,.06);padding-top:20px;line-height:1.8}
.sg-thumb.sg-settings{background:rgba(0,212,255,.06);border-color:rgba(0,212,255,.2)}
/* ── Search overlay ── */
#search-overlay{position:fixed;inset:0;z-index:500;background:rgba(3,5,12,.82);backdrop-filter:blur(18px);display:flex;align-items:flex-start;justify-content:center;padding-top:11vh;opacity:0;pointer-events:none;transition:opacity .18s}
#search-overlay.open{opacity:1;pointer-events:all}
#search-box{width:min(700px,90vw);background:rgba(14,16,28,.98);border:1px solid rgba(255,255,255,.12);border-radius:16px;overflow:hidden;box-shadow:0 32px 96px rgba(0,0,0,.7),0 0 0 1px rgba(0,212,255,.05)}
.srch-input-row{display:flex;align-items:center;gap:12px;padding:15px 20px;border-bottom:1px solid rgba(255,255,255,.07)}
.srch-icon{color:rgba(255,255,255,.35);font-size:1.05rem;flex-shrink:0;line-height:1}
#search-input{flex:1;background:none;border:none;outline:none;color:#fff;font-family:var(--font);font-size:1.05rem;font-weight:500;caret-color:var(--teal)}
#search-input::placeholder{color:rgba(255,255,255,.22)}
.srch-kbd{font-size:.6rem;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);border-radius:4px;padding:2px 7px;color:rgba(255,255,255,.32);font-family:var(--font);letter-spacing:.05em;flex-shrink:0}
#srch-results{max-height:56vh;overflow-y:auto;padding:6px}
#srch-results::-webkit-scrollbar{width:4px}
#srch-results::-webkit-scrollbar-thumb{background:rgba(0,212,255,.2);border-radius:2px}
.srch-empty{padding:38px 24px;text-align:center;color:rgba(255,255,255,.2);font-size:.82rem;letter-spacing:.04em}
.sr{display:flex;align-items:flex-start;gap:12px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:background .1s}
.sr:hover,.sr.sel{background:rgba(0,212,255,.1)}
.sr-num{font-size:.6rem;font-weight:700;color:rgba(255,255,255,.25);min-width:24px;padding-top:3px;font-variant-numeric:tabular-nums;flex-shrink:0}
.sr-body{flex:1;min-width:0}
.sr-title{font-size:.88rem;font-weight:600;color:#e8eeff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.sr-snip{font-size:.72rem;color:rgba(255,255,255,.4);line-height:1.55;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:4px}
.sr-snip mark{background:none;color:var(--teal);font-weight:600}
.sr-badge{display:inline-block;font-size:.56rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(0,212,255,.55);background:rgba(0,212,255,.07);border:1px solid rgba(0,212,255,.18);border-radius:3px;padding:1px 5px}
.srch-footer{padding:6px 18px 10px;font-size:.6rem;color:rgba(255,255,255,.2);letter-spacing:.06em;display:flex;justify-content:space-between;border-top:1px solid rgba(255,255,255,.06)}

.lesson-rule{width:64px;height:4px;border-radius:2px;background:var(--teal);margin:32px auto 0;opacity:.7}
.lesson-tags{margin-top:18px;font-size:clamp(.6rem,.9vw,.85rem);font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.18)}
.accent-purple .ey-badge{color:var(--purple)}.accent-purple .lesson-rule{background:var(--purple)}
.accent-amber .ey-badge{color:var(--amber)}.accent-amber .lesson-rule{background:var(--amber)}
.accent-rose .ey-badge{color:var(--rose)}.accent-rose .lesson-rule{background:var(--rose)}
.slide-bonus .ey-badge{color:var(--amber)}.slide-bonus .lesson-rule{background:var(--amber)}.slide-bonus .year-ghost{color:rgba(245,158,11,.04)}
/* Recap slide — "That's it! 10 Lessons from 10 Years" */
.slide-recap{justify-content:center;align-items:center;text-align:center}
.recap-title{font-size:clamp(2.4rem,5.8vw,5.5rem);font-weight:700;letter-spacing:-.02em;line-height:1.1;opacity:0;transition:opacity .8s}
.recap-sub{font-size:clamp(1rem,2vw,1.8rem);color:var(--dim);margin-top:12px;opacity:0;transition:opacity .8s .4s}
.recap-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 48px;margin-top:clamp(28px,4vh,52px);max-width:1000px;text-align:left}
.recap-item{display:flex;align-items:baseline;gap:14px;opacity:0;transform:translateY(-18px);transition:opacity .4s,transform .4s cubic-bezier(.2,0,.4,1.15)}
.recap-item.visible{opacity:1;transform:none}
.recap-num{font-size:clamp(.8rem,1.1vw,1rem);font-weight:700;letter-spacing:.15em;color:var(--teal);min-width:28px}
.recap-label{font-size:clamp(.85rem,1.3vw,1.2rem);font-weight:600;color:rgba(240,244,255,.8);letter-spacing:.08em}
.recap-wait{font-size:clamp(1.1rem,1.8vw,1.6rem);color:var(--amber);margin-top:clamp(20px,3vh,40px);opacity:0;transition:opacity .6s;font-style:italic}

/* Monocle tracker */
#tracker-year{text-align:center;font-size:clamp(.5rem,.65vw,.68rem);font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--teal);opacity:.9;line-height:1;margin-bottom:3px}
#tracker{position:fixed;bottom:24px;right:24px;z-index:25;width:clamp(120px,9vw,170px);height:clamp(120px,9vw,170px);opacity:0;transition:opacity .4s;pointer-events:none}
#tracker.visible{opacity:1}
#tracker svg{width:100%;height:100%}

/* Map */
.slide-map{padding:clamp(20px,2.5vw,48px)}
.map-label{font-size:clamp(.7rem,1.1vw,1rem);font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:16px;align-self:flex-start;text-align:left}
#map-svg{width:100%;height:100%;max-height:84vh}
.recap-pill{cursor:pointer}
.recap-pill:hover circle:first-child{fill:rgba(0,212,255,.12)!important}

/* Slide grid (jump-to-slide hover strip) */
#slide-grid-zone{position:fixed;bottom:0;left:0;right:0;height:38px;z-index:35;pointer-events:auto}
#slide-grid{position:fixed;bottom:0;left:0;right:0;z-index:36;padding:14px 24px 18px;background:linear-gradient(180deg,transparent 0%,rgba(6,8,16,.92) 50%,rgba(6,8,16,.98) 100%);backdrop-filter:blur(10px);display:flex;gap:6px;overflow-x:auto;overflow-y:hidden;justify-content:flex-start;flex-wrap:nowrap;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);scrollbar-width:thin}
#slide-grid.visible{transform:translateY(0)}
#slide-grid::-webkit-scrollbar{height:4px}
#slide-grid::-webkit-scrollbar-thumb{background:rgba(0,212,255,.3);border-radius:2px}
.sg-thumb{flex:0 0 auto;min-width:64px;height:46px;border:1px solid rgba(255,255,255,.12);border-radius:6px;background:rgba(255,255,255,.03);padding:5px 8px;cursor:pointer;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:2px;font-family:var(--font);transition:all .15s;position:relative}
.sg-thumb:hover{background:rgba(0,212,255,.12);border-color:rgba(0,212,255,.4);transform:translateY(-2px)}
.sg-thumb.active{background:rgba(0,212,255,.18);border-color:var(--teal);box-shadow:0 0 12px rgba(0,212,255,.3)}
.sg-thumb.slide-hidden{opacity:.3;border-style:dashed}
.sg-thumb.slide-hidden .sg-num{text-decoration:line-through}
.sg-num{font-size:.62rem;font-weight:600;color:rgba(255,255,255,.55);letter-spacing:.05em}
.sg-thumb.active .sg-num{color:var(--teal)}
.sg-label{font-size:.52rem;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.sg-thumb.active .sg-label{color:rgba(0,212,255,.7)}
.sg-thumb.sg-cover{background:rgba(124,58,237,.06);border-color:rgba(124,58,237,.2)}
.sg-thumb.sg-bonus{background:rgba(245,158,11,.06);border-color:rgba(245,158,11,.2)}
.sg-thumb.sg-bonus.active{background:rgba(245,158,11,.18);border-color:var(--amber);box-shadow:0 0 12px rgba(245,158,11,.3)}
.sg-thumb.sg-bonus.active .sg-num,.sg-thumb.sg-bonus.active .sg-label{color:var(--amber)}
.sg-thumb.sg-map{background:rgba(167,139,250,.06);border-color:rgba(167,139,250,.2)}
.sg-thumb.sg-close{background:rgba(244,63,94,.06);border-color:rgba(244,63,94,.2)}

/* Close — sized for 1920×1080 projector */
.close-monocle-bg{position:absolute;width:130vmin;height:134vmin;left:calc(50% - 62vmin);top:calc(50% - 66vmin);opacity:.07;pointer-events:none;z-index:0}
.close-ey{font-size:clamp(.7rem,1.4vw,1.05rem);font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:var(--amber);margin-bottom:36px;opacity:.85}
.close-title{font-size:clamp(3.2rem,7.5vw,7.5rem);font-weight:700;letter-spacing:-.03em;line-height:1;background:linear-gradient(130deg,#fff 20%,#fde68a 60%,#f59e0b 90%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:28px}
.close-sub{font-size:clamp(1.1rem,2vw,1.7rem);color:var(--dim);margin-bottom:56px}
.contact-row{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.contact-pill{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:48px;padding:14px 28px;font-size:clamp(.95rem,1.3vw,1.2rem)}
.contact-pill .lbl{opacity:.4;font-size:clamp(.65rem,.9vw,.85rem);text-transform:uppercase;letter-spacing:.1em}
.close-qr-row{display:flex;gap:24px;justify-content:center;align-items:flex-start;margin-top:36px;flex-wrap:wrap}
.qr-card{display:flex;flex-direction:column;align-items:center;gap:8px;width:176px}
.qr-card canvas{border-radius:10px;background:#fff;padding:8px;display:block}
.qr-label{font-size:clamp(.72rem,1vw,.9rem);color:rgba(255,255,255,.6);letter-spacing:.1em;font-weight:500;text-align:center}
.qr-badge{font-size:clamp(.58rem,.78vw,.76rem);font-weight:600;letter-spacing:.08em;text-align:center;line-height:1.35}
.qr-badge.b-amber{color:var(--amber);animation:qrP1 2.1s ease-in-out infinite}
.qr-badge.b-teal {color:var(--teal); animation:qrP2 1.9s ease-in-out infinite}
.qr-badge.b-purple{color:var(--purple);animation:qrP3 2.3s ease-in-out infinite}
.qr-badge.b-rose {color:var(--rose); animation:qrP4 2.0s ease-in-out infinite}
@keyframes qrP1{0%,100%{opacity:.7;transform:rotate(-3deg) scale(1)}50%{opacity:1;transform:rotate(-3deg) scale(1.08)}}
@keyframes qrP2{0%,100%{opacity:.7;transform:rotate(2.5deg) scale(1)}50%{opacity:1;transform:rotate(2.5deg) scale(1.08)}}
@keyframes qrP3{0%,100%{opacity:.7;transform:rotate(-4.5deg) scale(1)}50%{opacity:1;transform:rotate(-4.5deg) scale(1.09)}}
@keyframes qrP4{0%,100%{opacity:.7;transform:rotate(3.5deg) scale(1)}50%{opacity:1;transform:rotate(3.5deg) scale(1.07)}}

/* HUD */
#counter{position:fixed;top:32px;right:48px;z-index:20;font-size:clamp(.72rem,1vw,.95rem);font-weight:500;letter-spacing:.12em;color:rgba(255,255,255,.25)}
#brand{position:fixed;bottom:28px;left:48px;z-index:20;font-size:clamp(.68rem,.95vw,.9rem);font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.18)}
.nav-arrows{position:fixed;bottom:24px;right:160px;z-index:20;display:flex;gap:10px}
#step-indicator{position:fixed;bottom:82px;right:160px;z-index:20;font-size:.6rem;font-weight:600;letter-spacing:.14em;color:rgba(255,255,255,.3);text-align:center;width:102px;pointer-events:none}
.nav-btn{width:46px;height:46px;border:1px solid rgba(255,255,255,.18);border-radius:10px;background:rgba(255,255,255,.03);color:rgba(255,255,255,.5);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(8px)}
.nav-btn:hover{background:rgba(0,212,255,.12);border-color:rgba(0,212,255,.3);color:var(--teal)}

/* ── Presentation mode — H key hides every UI element so the projector
   shows only the slide content. Toggle off again to restore. ── */
body.presentation-mode #counter,
body.presentation-mode #brand,
body.presentation-mode #step-indicator,
body.presentation-mode .nav-arrows,
body.presentation-mode #slide-grid,
body.presentation-mode #slide-grid-zone,
body.presentation-mode #anno-toggle,
body.presentation-mode #move-toggle,
body.presentation-mode #anno-panel,
body.presentation-mode #move-hud,
body.presentation-mode #anno-prompt,
body.presentation-mode #search-overlay {
  display: none !important;
}

/* ── Intro slides (Alex + Agile Lens) ── */
.slide-lens { padding:0!important; overflow:hidden; }
.slide-lens svg { position:absolute; inset:0; width:100%; height:100%; }
.slide-venn { padding:0!important; overflow:hidden; }
.slide-venn svg { position:absolute; inset:0; width:100%; height:100%; }
@keyframes vennShake {
  0%,100% { transform:var(--venn-base); }
  10% { transform:var(--venn-base) translate(3px,-2px) rotate(1.5deg); }
  30% { transform:var(--venn-base) translate(-4px,2px) rotate(-2deg); }
  50% { transform:var(--venn-base) translate(2px,3px) rotate(1deg); }
  70% { transform:var(--venn-base) translate(-3px,-1px) rotate(-1.5deg); }
  90% { transform:var(--venn-base) translate(1px,-2px) rotate(.5deg); }
}
.slide-intro { padding: clamp(40px,5vw,100px) clamp(60px,8vw,160px); }
.intro-grid { display:flex; align-items:center; gap:clamp(40px,5vw,90px); width:100%; max-width:1500px; }
.intro-stage { flex:0 0 42%; max-width:560px; aspect-ratio:1/1; position:relative; }
.intro-stage svg { width:100%; height:100%; }
.intro-content { flex:1; text-align:left; }
.intro-eyebrow {
  font-size:clamp(.7rem,1.2vw,1rem); font-weight:600; letter-spacing:.3em;
  text-transform:uppercase; color:var(--teal); margin-bottom:24px;
}
.intro-title {
  font-size:clamp(2.6rem,5.5vw,5.2rem); font-weight:700; line-height:1.02;
  letter-spacing:-.02em; margin-bottom:24px;
  background:linear-gradient(130deg,#fff 20%,#a5d8ff 55%,#9b8cff 90%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.intro-sub {
  font-size:clamp(1rem,1.6vw,1.4rem); color:var(--dim); line-height:1.55;
  margin-bottom:32px; max-width:600px;
}
.intro-stats { display:flex; gap:20px; flex-wrap:wrap; }
.intro-stat {
  background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.12);
  border-radius:12px; padding:18px 28px; min-width:170px;
}
.intro-stat .num {
  display:block; font-size:clamp(1.4rem,2.2vw,2rem); font-weight:700;
  color:var(--teal); letter-spacing:-.02em; margin-bottom:6px;
}
.intro-stat .lbl {
  display:block;
  font-size:clamp(.62rem,.85vw,.78rem); font-weight:500; letter-spacing:.16em;
  text-transform:uppercase; color:rgba(255,255,255,.5); white-space:nowrap;
}
.intro-purple .intro-eyebrow { color:var(--purple); }
.intro-purple .intro-stat .num { color:var(--purple); }

/* Mario power-up animation for the Alex intro stage */
@keyframes introWalk {
  0%   { transform: translate(-180px, 0); }
  100% { transform: translate(160px, 0); }
}
@keyframes introJumpUp {
  0%   { transform: translate(160px, 0)    scale(1,1); }
  30%  { transform: translate(160px, -20px) scale(.95, 1.05); }
  100% { transform: translate(160px, -95px) scale(1,1); }
}
@keyframes introFallDown {
  0%   { transform: translate(160px, -95px) scale(1.5); }
  100% { transform: translate(160px, 0)     scale(1.5); }
}
@keyframes introHeadsetBob {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-8px); }
}
@keyframes introHeadsetGrab {
  0%   { opacity: 1; transform: translateY(0)   scale(1); }
  40%  { opacity: 1; transform: translateY(-6px) scale(1.4); }
  100% { opacity: 0; transform: translateY(-30px) scale(0); }
}
/* Power-up keyframes preserve the translate(160px, 0) end-state of introJump
   so the avatar grows in place at the headset block instead of snapping
   back to the origin. */
@keyframes introPowerUp {
  0%   { transform: translate(160px, -95px) scale(1);    filter: brightness(1); }
  30%  { transform: translate(160px, -95px) scale(1.2);  filter: brightness(1.7); }
  55%  { transform: translate(160px, -95px) scale(.95);  filter: brightness(1.3); }
  100% { transform: translate(160px, -95px) scale(1.5);  filter: brightness(1); }
}
/* Particle burst — flies outward using per-element --tx/--ty CSS vars.
   Pops up to full scale briefly then tapers out as it travels. */
@keyframes introSparkle {
  0%   { opacity: 0; transform: translate(0, 0)                                    scale(.3); }
  10%  { opacity: 1; transform: translate(calc(var(--tx) * .15), calc(var(--ty) * .15)) scale(1.6); }
  50%  { opacity: 1; transform: translate(calc(var(--tx) * .6),  calc(var(--ty) * .6))  scale(1); }
  100% { opacity: 0; transform: translate(var(--tx), var(--ty))                     scale(.3); }
}

/* Screen flash — white overlay pops on hit, fades fast */
@keyframes introFlash {
  0%   { opacity: 0; }
  8%   { opacity: .75; }
  100% { opacity: 0; }
}
.intro-stage .stage-floor {
  fill: rgba(0,212,255,.12); stroke: rgba(0,212,255,.3); stroke-width: 1;
}
.intro-stage .stage-walker { transform-origin: center bottom; }
#alex-intro-anim { transform-box: fill-box; transform-origin: center bottom; }
.intro-stage .headset-block { transform-origin: center; }

/* Avatar arm frame toggle — DOWN visible by default, UP hidden. Adding the
   `arm-up` class to the avatar root flips them. The fistPumpFrames animation
   below toggles `visibility` on a schedule to create a 2-frame pump. */
.avatar .av-arms-up { visibility: hidden; }
.avatar.arm-up .av-arms-down { visibility: hidden; }
.avatar.arm-up .av-arms-up { visibility: visible; }

/* 2-frame fist pump — alternates arm-down / arm-up via animation that toggles
   visibility instantly at each keyframe (no interpolation between states). */
@keyframes fistPumpFrames {
  0%, 49.9%   { opacity: 1; }
  50%, 100%   { opacity: 1; }
}
.avatar .av-arms-down { animation: armDownFrames 0.6s steps(1, end) infinite; }
.avatar .av-arms-up   { animation: armUpFrames   0.6s steps(1, end) infinite; }
@keyframes armDownFrames {
  0%, 49% { visibility: visible; }
  50%, 100% { visibility: hidden; }
}
@keyframes armUpFrames {
  0%, 49% { visibility: hidden; }
  50%, 100% { visibility: visible; }
}
/* Pause the cycling unless the avatar is "pumping" */
.avatar:not(.pumping) .av-arms-down { animation: none; visibility: visible; }
.avatar:not(.pumping) .av-arms-up   { animation: none; visibility: hidden; }
.avatar.pumping.arm-up-only .av-arms-down { visibility: hidden; }
.avatar.pumping.arm-up-only .av-arms-up   { visibility: visible; animation: none; }

/* Heroic jump for the map-slide avatar — squash, leap, peak, land, settle */
@keyframes mapHeroJump {
  0%   { transform: translateY(0)    scale(1, 1); }
  10%  { transform: translateY(4px)  scale(1.08, .9); }
  25%  { transform: translateY(-30px) scale(.94, 1.08); }
  45%  { transform: translateY(-55px) scale(1, 1); }
  60%  { transform: translateY(-45px) scale(1, 1); }
  80%  { transform: translateY(2px)  scale(1.1, .88); }
  100% { transform: translateY(0)    scale(1, 1); }
}
/* Pokemon evolution flash — white overlay blinks faster and faster */
@keyframes evoFlash {
  0%   { opacity:0 }
  5%   { opacity:.7 } 8%   { opacity:0 }
  15%  { opacity:.8 } 19%  { opacity:0 }
  28%  { opacity:.85 } 32%  { opacity:0 }
  40%  { opacity:.9 } 43%  { opacity:.1 }
  50%  { opacity:.95 } 52%  { opacity:.15 }
  58%  { opacity:1 } 60%  { opacity:.2 }

  71%  { opacity:1 } 72%  { opacity:.4 }

}
/* Evolution silhouette glow — the sprite becomes a white silhouette mid-flash */
@keyframes evoGlow {
  0%   { filter:brightness(1) }
  40%  { filter:brightness(1) }
  50%  { filter:brightness(8) saturate(0) }
  85%  { filter:brightness(8) saturate(0) }
  100% { filter:brightness(1) }
}
/* Intermission title pulse */
@keyframes intermissionFlash {

}
/* Evolution particle burst */
@keyframes evoBurst {
  0%   { opacity:0; transform:translate(0,0) scale(.5) }
  15%  { opacity:1; transform:translate(calc(var(--tx)*.2),calc(var(--ty)*.2)) scale(1.5) }
  60%  { opacity:1; transform:translate(calc(var(--tx)*.7),calc(var(--ty)*.7)) scale(1) }
  100% { opacity:0; transform:translate(var(--tx),var(--ty)) scale(.2) }
}
/* UE5 power-up — from x=0, block at y=140 so jump goes higher (-130px) */
@keyframes ue5JumpUp {

}

  30%  { transform: translate(0, -130px) scale(1.8);  filter: brightness(1.7); }
  55%  { transform: translate(0, -130px) scale(1.4);  filter: brightness(1.3); }

@keyframes ue5FallDown {

  100% { transform: translate(0, 0)      scale(2); }
}
/* Firework particle — radial fly-out with ease, scale up briefly then fade */
@keyframes fwParticle {
  0%   { transform: translate(0, 0) scale(.4); opacity: 1; }
  15%  { transform: translate(calc(var(--tx) * .2), calc(var(--ty) * .2)) scale(1.1); opacity: 1; }

}

(function(){
  const SZ=64, S=1.8, OX=16*S, OY=44*S;
  const cv=document.createElement('canvas'); cv.width=SZ; cv.height=SZ;
  const x=cv.getContext('2d');
  x.imageSmoothingEnabled=false;
  function px(lx,ly,lw,lh,f){
    x.fillStyle=f;
    x.fillRect(Math.round(lx*S+OX),Math.round(ly*S+OY),Math.max(1,Math.round(lw*S)),Math.max(1,Math.round(lh*S)));
  }
  // bg
  x.fillStyle='#060810';
  x.beginPath(); if(x.roundRect) x.roundRect(0,0,SZ,SZ,10); else x.rect(0,0,SZ,SZ); x.fill();
  // skin
  px(-12,-34,24,22,'#f2c79b'); px(-12,-16,24,4,'#d9a77a');
  // hair shadow outer
  px(-13,-40,26,2,'#3a1c08'); px(-15,-38,30,3,'#3a1c08'); px(-16,-36,32,4,'#3a1c08');
  px(-9,-42,5,2,'#3a1c08'); px(3,-42,4,2,'#3a1c08'); px(-2,-43,5,1,'#3a1c08');

  px(-12,-40,24,2,'#5e2f1a'); px(-14,-38,28,3,'#5e2f1a'); px(-13,-34,30,3,'#5e2f1a');
  // hair main
  px(-11,-41,22,1,'#8b4a2a'); px(-13,-38,26,2,'#8b4a2a'); px(-14,-36,28,2,'#8b4a2a');
  px(-13,-34,2,3,'#5e2f1a'); px(12,-33,2,3,'#5e2f1a'); px(-14,-31,2,4,'#8b4a2a');

  px(-8,-40,3,1,'#a8602f'); px(4,-40,2,1,'#a8602f'); px(-10,-38,2,1,'#a8602f');

  px(-1,-34,3,2,'#5e2f1a'); px(3,-34,4,3,'#5e2f1a'); px(7,-34,5,4,'#5e2f1a');

  px(-8,-27,8,3,'#5e2f1a'); px(3,-28,9,4,'#5e2f1a');

<script>
/* ═══════════════════════════════════════════════════════════════════════
   ENGINE — slide generation, navigation, monocle tracker, map animation
   ═══════════════════════════════════════════════════════════════════════ */

// Stars
const cv=document.getElementById('stars'),sc=cv.getContext('2d');let st=[];
function initS(){cv.width=innerWidth;cv.height=innerHeight;st=Array.from({length:110},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height*.6,r:Math.random()*1.2+.2,o:Math.random()*.4+.05,d:(Math.random()-.5)*.013}))}
function drawS(){sc.clearRect(0,0,cv.width,cv.height);st.forEach(s=>{sc.beginPath();sc.arc(s.x,s.y,s.r,0,Math.PI*2);sc.fillStyle=`rgba(210,225,255,${s.o})`;sc.fill();s.o+=s.d;if(s.o<.04||s.o>.55)s.d*=-1});requestAnimationFrame(drawS)}
initS();drawS();addEventListener('resize',initS);

const deck=document.getElementById('deck'),allSlides=[],lessonIdxs=[];

// ── Settings slide (slot 0, hidden by default — UI mode only) ──
(function(){
  const DEFAULTS={paraGap:.35,taglineScale:1,titleScale:1,imgDur:6};
  const saved=JSON.parse(localStorage.getItem('keynote-cfg')||'{}');
  const C={...DEFAULTS,...saved};
  function applyAll(){
    document.documentElement.style.setProperty('--para-gap',C.paraGap+'em');
    document.documentElement.style.setProperty('--tagline-scale',C.taglineScale);
    document.documentElement.style.setProperty('--title-scale',C.titleScale);
    window._globalImageDuration=C.imgDur*1000;
  }
  applyAll();
  const s=document.createElement('div');
  s.className='slide slide-settings';s.dataset.type='settings';s.dataset.hidden='1';
  s.innerHTML=`<div class="cfg-panel">
    <div class="cfg-title">⚙ Presentation Settings</div>
    <div class="cfg-subtitle">Changes apply live · hidden from presentation mode</div>
    <div class="cfg-grid">
      <div class="cfg-row">
        <label class="cfg-label">Paragraph gap</label>
        <div class="cfg-control"><input type="range" id="cfg-para-gap" min="0" max="1.2" step="0.05" value="${C.paraGap}"><span class="cfg-val" id="v-para-gap">${C.paraGap.toFixed(2)}em</span></div>
      </div>
      <div class="cfg-row">
        <label class="cfg-label">Image hold time</label>
        <div class="cfg-control"><input type="range" id="cfg-img-dur" min="2" max="15" step="0.5" value="${C.imgDur}"><span class="cfg-val" id="v-img-dur">${C.imgDur.toFixed(1)}s</span></div>
      </div>
      <div class="cfg-row">
        <label class="cfg-label">Tagline size</label>
        <div class="cfg-control"><input type="range" id="cfg-tagline-scale" min="0.6" max="1.5" step="0.05" value="${C.taglineScale}"><span class="cfg-val" id="v-tagline-scale">${Math.round(C.taglineScale*100)}%</span></div>
      </div>
      <div class="cfg-row">
        <label class="cfg-label">Title size</label>
        <div class="cfg-control"><input type="range" id="cfg-title-scale" min="0.6" max="1.3" step="0.05" value="${C.titleScale}"><span class="cfg-val" id="v-title-scale">${Math.round(C.titleScale*100)}%</span></div>
      </div>
    </div>
    <div class="cfg-hint">Ctrl/⌘-click any carousel thumbnail to hide · H = toggle presentation mode · changes saved to localStorage</div>
  </div>`;
  deck.appendChild(s);allSlides.push(s);
  // Wire sliders
  const wire=(id,valId,get,set,fmt)=>{
    const el=s.querySelector('#'+id),vl=s.querySelector('#'+valId);
    el.addEventListener('input',()=>{set(parseFloat(el.value));applyAll();vl.textContent=fmt(parseFloat(el.value));localStorage.setItem('keynote-cfg',JSON.stringify(C));});
  };
  wire('cfg-para-gap','v-para-gap',()=>C.paraGap,v=>{C.paraGap=v;},v=>v.toFixed(2)+'em');
  wire('cfg-img-dur','v-img-dur',()=>C.imgDur,v=>{C.imgDur=v;},v=>v.toFixed(1)+'s');
  wire('cfg-tagline-scale','v-tagline-scale',()=>C.taglineScale,v=>{C.taglineScale=v;},v=>Math.round(v*100)+'%');
  wire('cfg-title-scale','v-title-scale',()=>C.titleScale,v=>{C.titleScale=v;},v=>Math.round(v*100)+'%');
})();

// ── Build cover ──
const cov=document.createElement('div');cov.className='slide active';cov.dataset.type='cover';
cov.innerHTML=`<div class="event-tag">HXR · Harvard XR Conference · April 11, 2026</div>
<h1 class="talk-title">10 Lessons<br>from 10 Years</h1>
<p class="talk-subtitle">Running an XR Enterprise Studio</p>
<div class="speaker-card"><div><div class="speaker-name">Alex Coulombe</div><div class="speaker-co">CEO, Agile Lens</div></div><div class="card-sep"></div><div class="event-detail">Closing Keynote<br>Gund Hall, Harvard</div></div>`;
deck.appendChild(cov);allSlides.push(cov);

// ── Slide 2: Venn Diagram — 2010 Alex bouncing between passions ──
const vennSlide = document.createElement('div');
vennSlide.className = 'slide slide-venn';
vennSlide.dataset.type = 'venn';
vennSlide.innerHTML = `<svg id="venn-svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet"></svg>`;
deck.appendChild(vennSlide);
allSlides.push(vennSlide);

(function buildVennSlide(){
  const svg = vennSlide.querySelector('#venn-svg');
  const CX = 800, CY = 380;

  // Three overlapping circles — architecture, theatre, realtime tech
  const circles = [
    { x: CX - 170, y: CY - 90, label: 'Architecture', color: 'rgba(167,139,250,.15)', stroke: 'rgba(167,139,250,.4)' },
    { x: CX + 170, y: CY - 90, label: 'Theatre',      color: 'rgba(244,63,94,.12)',   stroke: 'rgba(244,63,94,.4)' },
    { x: CX,       y: CY + 110,label: 'Realtime Tech', color: 'rgba(0,212,255,.12)',   stroke: 'rgba(0,212,255,.4)' },
  ];
  const R = 220;
  circles.forEach(c => {
    svg.appendChild(svgE('circle', { cx:c.x, cy:c.y, r:R, fill:c.color, stroke:c.stroke, 'stroke-width':'1.5' }));
    // Label inside the circle — top two get label in upper portion,
    // bottom one gets label in lower portion
    const isBottom = c.y > CY;
    const ly = isBottom ? c.y + R * 0.6 : c.y - R * 0.6;
    const lbl = svgE('text', { x:c.x, y:ly, 'text-anchor':'middle', fill:'rgba(255,255,255,.7)',
      'font-family':'Space Grotesk,sans-serif', 'font-size':'18', 'font-weight':'600', 'letter-spacing':'2' });
    lbl.textContent = c.label.toUpperCase();
    svg.appendChild(lbl);
  });

  // Pixel-art icons — detailed enough to read without labels
  const S = 2.2; // pixel scale

  // ── Architecture — Greek temple with triangular pediment, 4 columns, steps ──
  const archG = svgE('g', { id:'venn-arch', transform:`translate(${CX-170},${CY-90})` });
  const ap = (x,y,w,h,f) => archG.appendChild(svgE('rect',{x:x*S,y:y*S,width:w*S,height:h*S,fill:f}));
  // Pediment (triangle approximation — stacked rows narrowing upward)
  ap(-1, -20, 2, 2, '#c4b5fd');   // peak
  ap(-3, -18, 6, 2, '#c4b5fd');
  ap(-6, -16, 12, 2, '#a78bfa');
  ap(-9, -14, 18, 2, '#a78bfa');
  ap(-12,-12, 24, 2, '#9370db');   // pediment base
  // Entablature (wide bar under pediment)
  ap(-13,-10, 26, 2, '#a78bfa');
  ap(-13, -8, 26, 1, '#7c5cbf');   // shadow line
  // Four columns with fluting
  ap(-11, -7, 3, 18, '#c4b5fd');   // col 1
  ap(-10, -7, 1, 18, '#a78bfa');   // flute
  ap(-5,  -7, 3, 18, '#c4b5fd');   // col 2
  ap(-4,  -7, 1, 18, '#a78bfa');
  ap(2,   -7, 3, 18, '#c4b5fd');   // col 3
  ap(3,   -7, 1, 18, '#a78bfa');
  ap(8,   -7, 3, 18, '#c4b5fd');   // col 4
  ap(9,   -7, 1, 18, '#a78bfa');
  // Steps (3 tiers)
  ap(-14, 11, 28, 2, '#a78bfa');
  ap(-15, 13, 30, 2, '#9370db');
  ap(-16, 15, 32, 2, '#7c5cbf');
  archG.style.shapeRendering = 'crispEdges';
  svg.appendChild(archG);

  // Shake via JS — avoids the SVG transform attribute vs CSS transform
  // conflict. Directly jiggles the translate in the SVG transform attribute.
  function shakeEl(el) {
    const origTf = el.getAttribute('transform') || '';
    const offsets = [
      [3,-2],[-4,2],[2,3],[-3,-1],[1,-2],[0,0]
    ];
    let i = 0;
    const step = () => {
      if (i >= offsets.length) { el.setAttribute('transform', origTf); return; }
      const [dx, dy] = offsets[i];
      el.setAttribute('transform', origTf + ` translate(${dx},${dy})`);
      i++;
      setTimeout(step, 65);
    };
    step();
  }

  // Architecture: columns crack briefly (dark lines appear, then vanish)
  function reactArch() {
    shakeEl(archG);
    const cracks = [];
    const addCrack = (x,y,w,h) => {
      const c = svgE('rect',{x:x*S,y:y*S,width:w*S,height:h*S,fill:'#2a1a3a',opacity:'0.8'});

    addCrack(-9, 1, 1, 3);
    addCrack(-4, -4, 1, 8);   // crack on col 2
    addCrack(3, -1, 1, 5);    // crack on col 3
    addCrack(9, -3, 1, 7);    // crack on col 4
    setTimeout(() => cracks.forEach(c => c.remove()), 600);
  }

  // Theatre: curtains shimmer (brightness pulses on curtain rects)
  function reactTheat() {
    shakeEl(theatG);
    const curtainRects = [...theatG.querySelectorAll('rect')].filter(r => {
      const f = r.getAttribute('fill') || '';
      return f.includes('dc2626') || f.includes('ef4444') || f.includes('b91c1c');
    });
    // Shimmer: rapidly alternate brightness
    let frame = 0;
    const shimmer = setInterval(() => {
      frame++;
      curtainRects.forEach((r,i) => {
        const bright = (frame + i) % 3 === 0;
        r.setAttribute('fill', bright ? '#ff6b6b' : r.dataset.origFill || r.getAttribute('fill'));
        if (!r.dataset.origFill) r.dataset.origFill = r.getAttribute('fill');
      });
      if (frame > 8) {
        clearInterval(shimmer);
        curtainRects.forEach(r => { if (r.dataset.origFill) r.setAttribute('fill', r.dataset.origFill); });
      }
    }, 70);
  }

  // Tech: screen activates — player runs right, coins blink
  function reactTech() {
    shakeEl(techG);
    // Find the player body rect (blue, inside the screen area)
    const screenRects = [...techG.querySelectorAll('rect')];
    const player = screenRects.filter(r => {
      const f = (r.getAttribute('fill')||'').toLowerCase();
      return f === '#3b82f6' || f === '#60a5fa' || f === '#1e40af';
    });
    const coins = screenRects.filter(r => (r.getAttribute('fill')||'').toLowerCase() === '#fbbf24');
    // Animate player moving right and back
    let frame = 0;
    const run = setInterval(() => {
      frame++;
      const dx = Math.sin(frame * 0.8) * 4 * S;
      player.forEach(r => {
        if (!r.dataset.origX) r.dataset.origX = r.getAttribute('x');
        r.setAttribute('x', parseFloat(r.dataset.origX) + dx);
      });
      // Blink coins
      coins.forEach((c,i) => {
        c.setAttribute('opacity', (frame + i) % 3 === 0 ? '0.3' : '1');
      });
      if (frame > 12) {
        clearInterval(run);
        player.forEach(r => { if (r.dataset.origX) r.setAttribute('x', r.dataset.origX); });
        coins.forEach(c => c.setAttribute('opacity', '1'));
      }
    }, 60);
  }

  // Pitched pluck SFX — Am · G · F · E (one per waypoint: arch, theat, tech, center)
  // Each is a soft sine pluck with a quick attack and ~0.4 s decay.
  let _vennSfxCtx = null;
  const VENN_NOTES = [220, 196, 174.6, 164.8]; // A2, G2, F2, E2
  function playVennNote(idx) {
    try {
      if (!_vennSfxCtx) _vennSfxCtx = new (window.AudioContext || window.webkitAudioContext)();
      const ctx = _vennSfxCtx; if (ctx.state === 'suspended') ctx.resume();
      const now = ctx.currentTime;
      const freq = VENN_NOTES[idx] || 220;
      // Sine body
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'sine'; o.frequency.value = freq;
      o.connect(g); g.connect(ctx.destination);
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(0.14, now + 0.012);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
      o.start(now); o.stop(now + 0.46);
      // Soft noise click for attack texture
      const bufLen = Math.floor(ctx.sampleRate * 0.03);
      const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < bufLen; i++) d[i] = (Math.random()*2-1) * (1 - i/bufLen);
      const ns = ctx.createBufferSource(); ns.buffer = buf;
      const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = freq*2; bp.Q.value = 1.5;
      const ng = ctx.createGain(); ng.gain.value = 0.07;
      ns.connect(bp); bp.connect(ng); ng.connect(ctx.destination);
      ns.start(now); ns.stop(now + 0.03);
    } catch(e) {}
  }

  // Map waypoint index → reaction function
  // waypoints[0]=architecture, [1]=theatre, [2]=realtime tech, [3]=center
  const reactions = [reactArch, reactTheat, reactTech, null];

  // Orbit animation — sprite pinballs between icons + center with random routing
  const waypoints = circles.map(c => ({ x: c.x, y: c.y }));
  waypoints.push({ x: CX, y: CY }); // index 3 = center
  let wpIdx = 0, orbX = waypoints[0].x, orbY = waypoints[0].y;
  let orbRunning = false;
  let dwellTimer = 0;
  const DWELL = 40;
  let legSpeed = 3; // varied per leg

  // Pick the next waypoint index given where we just arrived.
  // At an icon (0-2): 1/3 → center, 1/3 → each of the other two icons.
  // At center (3):    equal chance of any of the three icons.
  function pickNext(arrived) {
    if (arrived === 3) {
      // From center → random icon
      return Math.floor(Math.random() * 3);
    }
    // From icon → center OR one of the other two icons (equal thirds)
    const others = [0, 1, 2].filter(i => i !== arrived);
    const roll = Math.random();
    if (roll < 1/3) return 3;              // center
    if (roll < 2/3) return others[0];
    return others[1];
  }

  function orbStep() {
    if (!orbRunning) return;
    if (dwellTimer > 0) { dwellTimer--; requestAnimationFrame(orbStep); return; }
    const target = waypoints[wpIdx];
    const dx = target.x - orbX, dy = target.y - orbY;
    const dist = Math.hypot(dx, dy);
    if (dist < 4) {
      // Arrived — trigger reaction + pitched note
      if (reactions[wpIdx]) { reactions[wpIdx](); }
      playVennNote(wpIdx);
      // Choose next destination + randomise leg speed (0.6×–1.2× of base 3)
      wpIdx = pickNext(wpIdx);
      legSpeed = 3 * (0.6 + Math.random() * 0.6);
      dwellTimer = DWELL;
    } else {
      orbX += (dx / dist) * legSpeed;
      orbY += (dy / dist) * legSpeed;
    }
    orbitG.setAttribute('transform', `translate(${orbX},${orbY})`);
    requestAnimationFrame(orbStep);
  }

  window.startVennOrbit = () => { orbRunning = true; orbitG.setAttribute('opacity','1'); requestAnimationFrame(orbStep); };
  window.stopVennOrbit = () => { orbRunning = false; orbitG.setAttribute('opacity','0'); };

  // Name + quote at the bottom
  const nameT = svgE('text', { x: CX, y: 775, 'text-anchor':'middle', fill:'rgba(255,255,255,.7)',
    'font-family':'Space Grotesk,sans-serif', 'font-size':'28', 'font-weight':'600', 'letter-spacing':'3' });
  nameT.textContent = 'ALEX COULOMBE';

  blockG.appendChild(svgE('rect', { x:-22, y:-22, width:44, height:44, fill:'#f59e0b', stroke:'#b45309', 'stroke-width':'2', rx:'3' }));

// Web Audio API — Mario-style power-up SFX, generated on the fly.
// No audio files needed. Lazy-creates the AudioContext on first call
// (browsers require a user gesture before audio can play — slide nav
// counts as a gesture).
let _introAudioCtx = null;
function playIntroPowerUpSfx() {
  try {
    if (!_introAudioCtx) {
      _introAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    const ctx = _introAudioCtx;
    if (ctx.state === 'suspended') ctx.resume();
    const now = ctx.currentTime;
    // Helper to schedule a tone
    const tone = (freq, start, dur, type = 'square', volume = 0.12) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      osc.connect(gain);
      gain.connect(ctx.destination);
      gain.gain.setValueAtTime(volume, now + start);
      gain.gain.exponentialRampToValueAtTime(0.001, now + start + dur);
      osc.start(now + start);
      osc.stop(now + start + dur);
    };
    // Mario coin "ding" — two fast high notes
    tone(988, 0.00, 0.08, 'square', 0.10); // B5
    tone(1319, 0.08, 0.18, 'square', 0.10); // E6
    // Ascending power-up arpeggio
    tone(392, 0.25, 0.06, 'square', 0.10); // G4
    tone(523, 0.31, 0.06, 'square', 0.10); // C5
    tone(659, 0.37, 0.06, 'square', 0.10); // E5
    tone(784, 0.43, 0.06, 'square', 0.11); // G5
    tone(1047, 0.49, 0.06, 'square', 0.11); // C6
    tone(1319, 0.55, 0.18, 'square', 0.12); // E6
    // Final triumphant blip
    tone(1568, 0.80, 0.25, 'square', 0.13); // G6
  } catch (e) {
    // Audio blocked? silently fail — the visual animation still runs
  }
}

// ── Slide-advance whoosh — subtle air/page-turn sound ──
let _whooshCtx = null;
function playWhoosh() {
  try {
    if (!_whooshCtx) _whooshCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = _whooshCtx; if (ctx.state === 'suspended') ctx.resume();
    const now = ctx.currentTime;
    // White-noise burst filtered through a bandpass — airy whoosh
    const bufLen = ctx.sampleRate * 0.25;
    const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const bp = ctx.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 900; bp.Q.value = 0.6;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.08, now + 0.04);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
    src.connect(bp); bp.connect(gain); gain.connect(ctx.destination);
    src.start(now); src.stop(now + 0.25);
  } catch(e) {}
}

// Fireball — spinning GoldAuthorized logo projectile with zap SFX
let _fbAudioCtx = null;
function playZapSfx() {
  try {
    if (!_fbAudioCtx) _fbAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = _fbAudioCtx; if (ctx.state === 'suspended') ctx.resume();
    const now = ctx.currentTime;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'sawtooth'; o.frequency.setValueAtTime(600, now);
    o.frequency.exponentialRampToValueAtTime(200, now + 0.15);
    o.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(0.06, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    o.start(now); o.stop(now + 0.15);
  } catch(e) {}
}

function shootFireball(svg, startX, startY, dir) {
  const fb = svgE('g', { transform:`translate(${startX},${startY})` });
  // Randomly pick between Gold Authorized (2x = 32px) and UE5 circle (1.5x = 24px)
  const isGold = Math.random() < 0.5;
  const logo = isGold ? 'GoldAuthorized.png' : 'ue5logo.png';
  const sz = isGold ? 32 : 24;
  const half = sz / 2;
  const img = svgE('image', { href:logo, x:-half, y:-half, width:sz, height:sz });
  fb.appendChild(img);
  svg.appendChild(fb);
  playZapSfx();
  let frame = 0;
  const speed = dir * 6;
  const spin = () => {
    frame++;
    const cx = startX + speed * frame;
    // Bouncy arc: initial upward launch then gravity-like bounce
    const bounce = -Math.abs(Math.sin(frame * 0.12)) * 18 * Math.max(0, 1 - frame/40);
    const cy = startY + bounce;
    fb.setAttribute('transform', `translate(${cx},${cy}) rotate(${frame * 12})`);
    if (frame < 35 && cx > 10 && cx < 390) requestAnimationFrame(spin);
    else fb.remove();
  };
  requestAnimationFrame(spin);
}

function playAlexIntro() {
  const walker = document.getElementById('alex-intro-walker');
  const anim = document.getElementById('alex-intro-anim');
  // The headset has its own outer-position + inner-anim split. All animations
  // run on the inner group; the outer keeps its SVG positioning transform.

  const sparkles = document.getElementById('alex-intro-sparkles');
  const flash = document.getElementById('alex-intro-flash');
  if (!walker || !anim || !blockAnim || !sparkles || !flash) return;
  // Find the avatar's body group so we can paint a worn headset onto it
  const avatarBody = anim.querySelector('.av-body');
  // Reset everything
  anim.style.animation = 'none';
  blockPos.style.opacity = '1';
  blockAnim.style.opacity = '1';
  blockAnim.style.animation = 'introHeadsetBob 1.6s ease-in-out infinite';
  sparkles.style.opacity = '0';
  sparkles.querySelectorAll('circle').forEach(c => c.style.animation = 'none');
  flash.style.animation = 'none';
  flash.style.opacity = '0';
  avatarBody?.querySelector('.worn-headset')?.remove();
  // Hide everything initially to prevent flash of stale final state
  anim.style.opacity = '0';
  // Reset all text/stats to hidden (in case navigating back)
  ['intro-eyebrow','intro-title','intro-sub','intro-sub-ue5'].forEach(id => {
    const el = document.getElementById(id); if(el) el.style.opacity='0';
  });
  const statsRow = document.getElementById('intro-stats-row');
  if (statsRow) statsRow.style.opacity = '0';
  // Remove any UE5 block from previous play
  document.getElementById('intro-ue5-pos')?.remove();
  // Reset steps
  resetSteps(introAlex);
  // Force reflow then start the sequence
  void anim.offsetWidth;
  anim.style.transformOrigin = 'center bottom';
  // Empty stage for 2s before avatar enters
  const DELAY = 2000;
  setTimeout(() => { anim.style.opacity = '1'; }, DELAY);
  // Timing (all offset by DELAY):
  //   +0.0–2.0s  walk horizontally from off-stage left to under the block
  //   +2.0–2.4s  jump straight up to the block
  //   +2.4–3.2s  HIT: flash + particles + SFX + power-up grow (held at apex)
  //   +3.2–3.7s  fall back down to ground (now bigger), land with squash
  setTimeout(() => {
    anim.style.animation = 'introWalk 2s linear 0s 1 normal both';
  }, DELAY);
  // Jump up
  setTimeout(() => {
    anim.style.animation = 'introJumpUp .4s cubic-bezier(.3,.7,.4,1) 0s 1 normal both';
  }, DELAY + 2000);
  // HIT — at apex
  setTimeout(() => {
    flash.style.animation = 'introFlash .45s ease-out forwards';
    blockAnim.style.animation = 'introHeadsetGrab .5s ease-out forwards';
    sparkles.style.opacity = '1';
    sparkles.querySelectorAll('circle').forEach(p => {
      p.style.setProperty('--tx', `${p.getAttribute('data-dx')}px`);
      p.style.setProperty('--ty', `${p.getAttribute('data-dy')}px`);
      p.style.animation = 'introSparkle 1.1s ease-out forwards';
    });
    playIntroPowerUpSfx();
    anim.style.animation = 'introPowerUp .8s ease-out forwards';
  }, DELAY + 2400);
  // Paint worn headset mid-powerup
  setTimeout(() => { if (avatarBody) paintWornHeadset(avatarBody); }, DELAY + 2900);
  // Fall back down — gentle gravity curve, no squash
  setTimeout(() => {
    anim.style.animation = 'introFallDown .55s cubic-bezier(.55,0,.8,1) forwards';
  }, DELAY + 3200);
  // After fall, lock the final resting transform so nothing drifts
  setTimeout(() => {
    anim.style.animation = 'none';
    anim.style.transform = 'translate(160px, 0) scale(1.5)';
  }, DELAY + 3780);
  // Step 0 is done — tallies and bio are triggered by subsequent steps
}

function introUE5PowerUp() {
  const svg = document.getElementById('intro-alex-svg');
  const anim = document.getElementById('alex-intro-anim');
  if (!svg || !anim) return;
  // Build UE5 block if not yet present
  if (!document.getElementById('intro-ue5-pos')) buildUE5Block(svg);
  const ue5Pos = document.getElementById('intro-ue5-pos');
  const ue5Anim = document.getElementById('intro-ue5-anim');
  ue5Pos.style.opacity = '1';

  // Avatar is currently at translate(160, 0) scale(1.5) from step 0.
  // Walk LEFT to the UE5 block at x=80 → translate(0, 0) in anim coords
  // (since walker outer group is at x=80)
  anim.style.animation = 'none';
  anim.style.transition = 'transform 1.5s linear';
  anim.style.transform = 'translate(0, 0) scale(1.5)';

  // Jump up at 1.5s
  setTimeout(() => {
    anim.style.transition = 'none';
    void anim.offsetWidth;
    // Jump from x=0 (under the UE5 block)
    anim.style.animation = 'ue5JumpUp .4s cubic-bezier(.3,.7,.4,1) forwards';
  }, 1500);

  // HIT at 1.9s — flash, block absorbed, grow to 2x
  setTimeout(() => {
    const flash = document.getElementById('alex-intro-flash');
    if (flash) { flash.style.opacity = '0'; void flash.offsetWidth; flash.style.animation = 'introFlash .45s ease-out forwards'; }
    ue5Anim.style.animation = 'introHeadsetGrab .5s ease-out forwards';
    playIntroPowerUpSfx();
    anim.style.animation = 'ue5PowerUp .8s ease-out forwards';
  }, 1900);

  // Fall down at 2.7s
  setTimeout(() => {
    anim.style.animation = 'ue5FallDown .55s cubic-bezier(.55,0,.8,1) forwards';
  }, 2700);

  // Reveal UE5 bio line once the powerup lands
  setTimeout(() => {
    const ue5sub = document.getElementById('intro-sub-ue5');
    if (ue5sub) ue5sub.style.opacity = '1';
  }, 3300);

  // Lock at 2x + run back and forth shooting fireballs
  setTimeout(() => {
    anim.style.animation = 'none';
    anim.style.transform = 'translate(0, 0) scale(2)';

    function runBurst(startX, withHop, onDone) {
      let runDir = 1;
      let runX = startX;
      let fbTimer = 0;
      let runFrame = 0;
      const loop = () => {
        if (runFrame > 180) { if (onDone) onDone(runX); return; }
        runFrame++;
        runX += runDir * 2.8;
        if (runX > 200) runDir = -1;
        if (runX < -20) runDir = 1;
        // Optional hop: small sine bounce while running
        const hopY = withHop ? -Math.abs(Math.sin(runFrame * 0.15)) * 8 : 0;
        anim.style.transform = `translate(${runX}px, ${hopY}px) scale(2)`;
        fbTimer++;
        if (fbTimer > 18 && Math.random() < 0.18) {
          const sx = 80 + runX + (runDir > 0 ? 25 : -25);
          shootFireball(svg, sx, 270 + hopY, runDir);
          fbTimer = 0;
        }
        requestAnimationFrame(loop);
      };
      requestAnimationFrame(loop);
    }

    // Burst 1: run without hop
    runBurst(0, false, (endX) => {
      // Park in center for 5s
      anim.style.transform = `translate(${90}px, 0) scale(2)`;
      setTimeout(() => {
        // Burst 2: run WITH hop
        runBurst(90, true, (endX2) => {
          anim.style.transform = `translate(${endX2}px, 0) scale(2)`;
        });
      }, 5000);
    });
  }, 3300);
}
