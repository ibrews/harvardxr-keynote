<script>
/* ═══════════════════════════════════════════════════════════════════════
   PRESENTATION CONFIG — EDIT THIS SECTION TO CHANGE CONTENT
   ═══════════════════════════════════════════════════════════════════════
   Each section = a year of Agile Lens (2016–2025).
   Contains 1-3 case study slides → then a lesson slide.

   To swap a project: change title/subtitle/img/bullets in the cases array.
   To swap an image:   replace the img URL (or "" for gradient placeholder).
   To change a lesson: edit the lesson.title and lesson.tagline.
   ═══════════════════════════════════════════════════════════════════════ */
const SECTIONS = [
  {
    year: 2016, accent: 'teal',
    cases: [
      { title:'Four Seasons Lake Austin — The Spike Tape Story', subtitle:'A 5¢ solution to a $5,000 problem',
        img:'https://website-ivory-omega-78.vercel.app/portfolio/four-seasons-holodeck.jpg',
        bullets:['Mid-experience, guests sit in a physical chair that also exists in VR. Jonathan asked: "If only there was a way to make sure the chair was placed in exactly the right spot every time…"','Kevin Laibson: "Jonathan, I can\'t wait for you to meet our thousand-year-old invention — spike tape."','"It\'s not a VR experience that is similar to theater. It\'s a theater experience that has VR in it." — Kevin'] },
      { title:'The Shed @ Hudson Yards', subtitle:'Our first major VR architecture project',
        img:'https://website-ivory-omega-78.vercel.app/portfolio/the-shed.png',
        bullets:['Custom AR & VR walkthroughs for a $475M cultural venue','Parametric design options explored in real-time VR','We weren\'t doing film. We weren\'t doing games. We were doing stagecraft.'] },
    ],
    lesson: { title:'VR Is Theater.\nNot Film. Not Games.', tagline:'Film hands you cuts, wide shots, and montage to control where the audience looks. Games demand controller literacy and active participation. Theater is spatial, live, and trusts an audience to look anywhere they want — exactly like VR. Stop borrowing from cinema. Start borrowing from stagecraft.', tags:'Four Seasons · Christmas Carol VR · Stage Presence · RSC' },
  },
  {
    year: 2017, accent: 'purple',
    cases: [
      { title:'High Fidelity Live VR — The Improv Test', subtitle:'When the avatar arm breaks, what does an actor do?',
        img:'',
        bullets:['2019: Philip Rosedale asks Alex to assemble a NYC live-VR super-team. Alex\'s instinct: "I don\'t want CS graduates. I want theater people."','Improv-trained actors yes-and a broken avatar arm into the scene like it was intentional. Shakespeare-trained actors freeze and ask "can we fix my arm?"','In a live VR show there is no "check the gate, let\'s shoot another take." Live is live. Theater people get this in their bones.'] },
      { title:'Four Seasons — The 10-Studio Bake-Off', subtitle:'Pure Blink won on visuals. Agile Lens won on methodology.',
        img:'https://website-ivory-omega-78.vercel.app/portfolio/four-seasons-holodeck.jpg',
        bullets:['Jonathan pitched the same brief to 10 different studios. He hired two: Pure Blink for visual fidelity, Agile Lens for our particular method of problem-solving.','Diverse teams don\'t win on what they ship. They win on how they think.','Architects, theater directors, lighting designers, motion capture artists, choreographers — in the same room as engineers.'] },
    ],
    lesson: { title:'The Best XR Teams Look\nNothing Like Tech Teams', tagline:'XR is too new to have native experts, so we build them from everywhere. But don\'t go to zero on traditional engineers either — our early years without dedicated devs cost us in source control, QA, and project discipline. The principle is theater-first, engineering-second. Never engineering-zero.', tags:'Stage Presence · High Fidelity 2019 · Fisher Dachs Associates · Fisher Marantz Stone' },
  },
  {
    year: 2018, accent: 'amber',
    cases: [
      { title:'Infinite Reality → AI Dickens', subtitle:'Paid client work becomes internal R&D becomes published research',
        img:'',
        bullets:['London Tech Week 2023: Infinite Reality hires us to build a talking metahuman car salesman. We learn the Inworld + mocap pipeline on their dime.','We turn it into AI Dickens — an LLM-driven Charles Dickens who handles pre-show audience onboarding for Christmas Carol VR, then theatrically hands off to the human Ari Tarr at showtime.','That R&D became "Directing AI Performers" — a Contemporary Theatre Review paper. Cash cow funded our IP.'] },
      { title:'Intel Project Arena', subtitle:'Enterprise marketing pays for the art',
        img:'https://website-ivory-omega-78.vercel.app/portfolio/intel-project-arena.png',
        bullets:['Virtual arena showcasing Core i9 capabilities to thousands of attendees','Big-budget enterprise work pays the salaries — and stocks the war chest','City of Apparition, Salle d\'Or, Christmas Carol — none of those passion projects exist without the archviz that bankrolls them'] },
    ],
    lesson: { title:'Know Which Work Pays\nthe Bills. Do Both.', tagline:'Real estate visualization pays our salaries. VR theater and mixed-reality art installations make us worth hiring. The trick isn\'t picking one — it\'s building a cash cow specifically so you can bankroll the ambitious, low-margin work that nobody else will fund. You need both, or you eventually lose both.', tags:'Infinite Reality · Christmas Carol · Diriyah Gate · City of Apparition · Salle d\'Or' },
  },
  {
    year: 2019, accent: 'teal',
    cases: [
      { title:'Four Seasons — The 17-Person Chain', subtitle:'How a single client found us through a chain of 17 people',
        img:'',
        bullets:['Kim Bauman Larson → Paul Debevec → Jeff Model → Matthew Bannister → Jeff Powers → Jonathan. Roughly 17 people independently said "you should talk to Alex."','We never pitched Jonathan. We never sent a deck. We never made a cold call. He found us anyway.','That\'s the blessing. Now the curse: we have no business development muscle. Zero. We can\'t pitch because we\'ve never had to.'] },
      { title:'Royal Caribbean — Be The Second Studio', subtitle:'When the first team taps out, we\'re the call',
        img:'',
        bullets:['Framestore and Build had built the heavy PC-VR experience. Royal Caribbean needed it standalone, multiplayer, on a cruise ship.','We took it from "running on a dev workstation" to "running on a cruise ship." Same pattern as SK-II and Kiehl\'s.','Sometimes being sought-after means being the rescue call. That\'s a niche too.'] },
    ],
    lesson: { title:'Being Sought-After Is\na Blessing and a Curse', tagline:'Disney, the Kennedy Center, the Royal Shakespeare Company — they all found us. That\'s incredible. It also means we\'ve never had to learn how to sell. Inbound is feast-or-famine: when work shows up it\'s great, but no one calls when no one calls. Being sought-after and being able to pitch are different skills. Only one compounds.', tags:'Disney · Kennedy Center · RSC · Royal Caribbean · SK-II · Kiehl\'s' },
  },
  {
    year: 2020, accent: 'rose',
    cases: [
      { title:'October 2022 — The $60K Ask', subtitle:'The moment Agile Lens became a real company',
        img:'',
        bullets:['I was giving the longest talk of Unreal Fest 2022. Simultaneously running Waldorf Astoria solo. June had left for a German training company. I was burning out.','When Jonathan started the Four Seasons conversation, I mustered the courage for the first time to say: "Yes — but only if you pay us $60,000 up front for one month of R&D."','I didn\'t know he was talking to 9 other studios. He said yes. That retainer paid for June\'s first full-time role. Agile Lens stopped being me + contractors and became a real studio.'] },
      { title:'Samsung 2018 — The Counter-Example', subtitle:'$19,000 for a month of hard work',
        img:'',
        bullets:['No retainer. No R&D phase. I pretended I had all the answers because I thought asking for a discovery period made me look weak.','We finished the project. We undercharged by an order of magnitude. I burned out three contractors who were waiting on Samsung to pay us.','Every "what should I have done differently" answer points to one practice: ask for the deposit first.'] },
    ],
    lesson: { title:'Require a Deposit.\nBefore You Write a Line of Code.', tagline:'The single best operational decision we ever made. The first check separates the curious from the committed, gives you runway to actually staff the work, and buys you the right to say "we\'re not sure yet" instead of pretending you have all the answers. It filters out tire-kickers, protects the team from scope creep, and means your R&D never happens on your own dime.', tags:'Four Seasons · Samsung 360 · Weapons Free' },
  },
  {
    year: 2021, accent: 'purple',
    cases: [
      { title:'Christmas Carol VR — The ATL Upsell', subtitle:'A small ask becomes our annual flagship',
        img:'https://website-ivory-omega-78.vercel.app/portfolio/xmas-carol.jpg',
        bullets:['Actors Theatre Louisville asked us for production assets — metahumans and some good videos. Not a VR project.','We did the R&D, then flipped the brief: "As long as we\'re building sets and characters and costumes for you — how about we just do a full VR production?"','That upsell became our annual production, our R&D vehicle, the SIGGRAPH multi-avatar paper, and the AI Dickens lineage. None of it happens without that R&D-first phase.'] },
      { title:'Space Opera & Salle d\'Or', subtitle:'"I don\'t know if this is possible, but…"',
        img:'',
        bullets:['8+ co-located players in a 30×30 LBVR space with live actors and branching narrative. Mixed reality immersive ruin in MR ("Sleep No More meets The Little Prince").','Both projects started with the client saying "we don\'t know if this is possible." We said: "honestly, us neither — let\'s find out together."','Phase 1 was pure R&D. The client paid for us to figure it out. That\'s the deal.'] },
    ],
    lesson: { title:'Protect Time for\n"We\'re Not Sure Either"', tagline:'Our most common brief starts with "I don\'t know if this is possible, but…" The honest answer is "us neither — let\'s find out together." That only works if Phase 1 of every project is explicitly dedicated to R&D, with the discovery budget baked into the contract from day one. The wrong move is pretending you already have the answers.', tags:'Christmas Carol VR · AI Dickens · SIGGRAPH Multi-Avatar · Space Opera · Salle d\'Or' },
  },
  {
    year: 2022, accent: 'amber',
    cases: [
      { title:'The Unreal Engine Bet', subtitle:'Specialist focus in a market full of tourists',
        img:'',
        bullets:['Going all-in on Unreal Engine — including Gold Authorized Instructor certification — wasn\'t a technical decision. It was a five-year bet on which skills would still be valuable.','Every studio that chased the latest shiny (NFTs, then "the metaverse," then generative AI) lost their XR muscle memory. We didn\'t.','The companies that quit XR became our clients\' second studios. We were the first call.'] },
      { title:'Waldorf Astoria Miami', subtitle:'Luxury archviz with a live mocap host',
        img:'',
        bullets:['Rokoko motion capture pipeline running inside an archviz tour. A virtual host walks prospective residents through the space.','The client found us after a SIGGRAPH talk I gave entirely about Christmas Carol — they wanted to inject our live performance system into archviz.','One paid talk about theater work generated an enterprise archviz client. Specialist reputation compounds in unexpected directions.'] },
    ],
    lesson: { title:'Your Tool Choices Are\nBusiness Strategy', tagline:'Going all-in on Unreal Engine wasn\'t a technical decision — it was a five-year bet on which skills would still be valuable. Every major pipeline choice has a long tail. The corollary: be a specialist, not a tourist. The companies that chased every shiny new platform are gone. We\'re still here because we doubled down when everyone else was pivoting.', tags:'Unreal Engine · Waldorf Astoria · Christmas Carol' },
  },
  {
    year: 2023, accent: 'teal',
    cases: [
      { title:'Stage Presence × RSC — The Script in the Hand', subtitle:'Don\'t reinvent the wheel. Adapt what already works.',
        img:'',
        bullets:['Actors rehearse in a 1:1 LIDAR-scanned Swan Theatre in VR. We tried virtual scripts on spring arms, attached to wrists, floating in space.','Every actor wanted the same thing: a script they could hold in their hand and put down on the floor when they needed both hands free. Same as paper.','VR UX is best when it adapts existing spatial workflows 1:1 — not when it tries to reinvent them. Theater knows how scripts work.'] },
      { title:'Four Seasons Lake Austin', subtitle:'Spatial design that had to feel like luxury, not a tech demo',
        img:'https://website-ivory-omega-78.vercel.app/portfolio/four-seasons-holodeck.jpg',
        bullets:['$300M of amenities in an 82×65-foot wireless holodeck','Optitrack + Antilatency: room-scale multi-user, no tether','Theatrical staging — sightlines, audience focus direction, the orange floating into view at the right moment — driven by people who think spatially first'] },
    ],
    lesson: { title:'Spatial Design Is\nIts Own Discipline', tagline:'It\'s not UX with depth. The best spatial thinkers we\'ve hired came from theater, not software — because they already understood blocking, sightlines, presence, and audience agency. Stop borrowing screen-design patterns. Stop reinventing wheels that already work. Hire for spatial thinking directly.', tags:'Stage Presence · RSC · Four Seasons · Onboard XR' },
  },
  {
    year: 2024, accent: 'purple',
    cases: [
      { title:'The Holodeck 98% Incident', subtitle:'A 98 at Harvard isn\'t something you apologize for',
        img:'',
        bullets:['On a recent holodeck project, one of our partners was about to lead the witness — apologize to the client for the 2% of imperfections we could see but they couldn\'t.','The client\'s response when they saw the experience: "This is amazing. My only notes are about our own work, not yours."','We had to remind ourselves: this is already the best VR experience this client will ever have had in their life. Don\'t teach them to see flaws they wouldn\'t notice on their own.'] },
      { title:'Body of Mine', subtitle:'Full-body VR — Producers Guild Innovation Award',
        img:'https://website-ivory-omega-78.vercel.app/portfolio/body-of-mine.jpg',
        bullets:['Body, face, and eye tracking — inhabit another gender','BAFTA, SXSW, Games for Change recognition','We could see every imperfection. The audience saw a transformative experience.'] },
    ],
    lesson: { title:'Perfect Is the Enemy of Best.\nDon\'t Tell the Client About the Gap.', tagline:'It takes 20% of the time to get 80% of the way there, and 80% of the time to chase the last 20% — and most of that last 20% is invisible to anyone without your trained eye. If you\'re already shipping the best work in the industry, stop apologizing for the difference between 98 and 100. The audience experiences "best they\'ve ever seen." Let them.', tags:'Holodeck Anywhere · Body of Mine · Royal Caribbean' },
  },
  {
    year: 2025, accent: 'rose',
    cases: [
      { title:'Your Mind, Girls — The Scope Creep Story', subtitle:'How $0 of revenue funded a genuinely excellent piece',
        img:'',
        bullets:['Hope Hutman approached us asking for a small blueprint script. We said yes, planning to hand it off and take a small credit.','Each yes spawned 5 new problems. Sony Mocopi was the new shiny in the room. We thought we were killing two birds. Kevin: "We were just being sat on by a giant bird."','We ended up as full co-producers. 30 people in headsets watching a real actor in a virtual space. Beautiful work. Zero dollars.'] },
      { title:'Multi-Avatar Performance (SIGGRAPH 2025)', subtitle:'When discipline pays off',
        img:'',
        bullets:['One actor plays all roles in Christmas Carol VR — abandoned avatars frozen in pose on stage','Third-person self-monitoring system solves the "many bodies" problem','Tightly scoped, properly funded, published at SIGGRAPH. The opposite of Your Mind, Girls.'] },
    ],
    lesson: { title:'Complex Projects Are Thrilling —\nand Perfect Breeding Grounds for Scope Creep', tagline:'The most dangerous projects are the ones that hit the bullseye of everything you\'ve been wanting to try. New hardware in the room (Sony Mocopi for us) plus a brief that fits your ambitions plus a creative collaborator you like = sunk cost fallacy by month two. The fix isn\'t saying no to thrilling projects. It\'s saying yes only with hard scope boundaries before the work starts.', tags:'Your Mind, Girls · Sony Mocopi · SIGGRAPH 2025 · Christmas Carol' },
  },
];

const BONUS = { year:2026, title:'The Demo Will Break.\nBudget for It.',
  tagline:'In ten years — at Harvard, at SIGGRAPH, at the Kennedy Center — something has gone wrong every single time. A headset dies. The Wi-Fi drops. A character\'s head detaches from their body mid-show. The audience doesn\'t remember the glitch. They remember how the moment made them feel.' };
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060810;--teal:#00d4ff;--purple:#a78bfa;--amber:#f59e0b;--rose:#f43f5e;--text:#f0f4ff;--dim:rgba(240,244,255,.45);--font:'Space Grotesk',system-ui,sans-serif}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font)}

.bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg-gradient{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 15% 50%,rgba(124,58,237,.18) 0%,transparent 55%),radial-gradient(ellipse 60% 70% at 85% 20%,rgba(0,212,255,.12) 0%,transparent 55%),linear-gradient(180deg,#060810 0%,#0b0820 50%,#060810 100%)}
canvas#stars{position:absolute;inset:0}

#deck{position:relative;z-index:1;width:100%;height:100%;overflow:hidden}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:clamp(40px,5vw,80px);text-align:center;opacity:0;pointer-events:none}
.slide.active{opacity:1;pointer-events:all}
@keyframes slideInFwd{from{opacity:0;transform:translateX(6%) scale(.97)}to{opacity:1;transform:none}}
@keyframes slideInBwd{from{opacity:0;transform:translateX(-6%) scale(.97)}to{opacity:1;transform:none}}
@keyframes slideOutFwd{from{opacity:1;transform:none}to{opacity:0;transform:translateX(-6%) scale(.97)}}
@keyframes slideOutBwd{from{opacity:1;transform:none}to{opacity:0;transform:translateX(6%) scale(.97)}}

/* Cover */
.event-tag{font-size:clamp(.7rem,1.4vw,1.05rem);font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:var(--teal);margin-bottom:36px;opacity:.85}
.talk-title{font-size:clamp(3.2rem,8vw,8.5rem);font-weight:700;line-height:1;letter-spacing:-.03em;background:linear-gradient(130deg,#fff 20%,#a5d8ff 55%,#9b8cff 85%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:24px}
.talk-subtitle{font-size:clamp(1.1rem,2.4vw,1.9rem);font-weight:400;color:var(--dim);margin-bottom:64px}
.speaker-card{display:flex;align-items:center;gap:24px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:80px;padding:18px 40px;backdrop-filter:blur(12px)}
.speaker-name{font-size:clamp(1rem,1.4vw,1.4rem);font-weight:600}.speaker-co{font-size:clamp(.78rem,1.1vw,1.05rem);color:var(--dim);margin-top:3px}
.card-sep{width:1px;height:48px;background:rgba(255,255,255,.15)}
.event-detail{font-size:clamp(.78rem,1.1vw,1.05rem);color:var(--dim);line-height:1.6}

/* Case study — sized for 1920×1080 projector */
.case-slide{flex-direction:row;gap:clamp(36px,4.5vw,90px);text-align:left;padding:clamp(50px,5vw,110px) clamp(80px,9vw,180px)}
.case-image{flex:0 0 44%;max-width:780px;aspect-ratio:16/10;border-radius:18px;overflow:hidden}
.case-image img{width:100%;height:100%;object-fit:cover;display:block}
.case-image .ph{width:100%;height:100%;background:linear-gradient(135deg,rgba(0,212,255,.12),rgba(124,58,237,.12));display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.12);font-size:.85rem;letter-spacing:.1em;text-transform:uppercase}
.case-content{flex:1;display:flex;flex-direction:column;justify-content:center;gap:12px}
.case-ytag{font-size:clamp(.65rem,.95vw,.95rem);font-weight:600;letter-spacing:.25em;text-transform:uppercase;color:var(--teal);opacity:.6}
.case-title{font-size:clamp(1.8rem,3.6vw,3.8rem);font-weight:700;letter-spacing:-.02em;line-height:1.1}
.case-sub{font-size:clamp(.95rem,1.4vw,1.4rem);color:var(--dim);margin-bottom:14px}
.case-bl{list-style:none;display:flex;flex-direction:column;gap:14px}
.case-bl li{font-size:clamp(.92rem,1.3vw,1.3rem);color:rgba(240,244,255,.7);line-height:1.55;padding-left:24px;position:relative}
.case-bl li::before{content:'';position:absolute;left:0;top:.65em;width:7px;height:7px;border-radius:50%;background:var(--teal);opacity:.6}
.accent-purple .case-ytag{color:var(--purple)}.accent-purple .case-bl li::before{background:var(--purple)}
.accent-amber .case-ytag{color:var(--amber)}.accent-amber .case-bl li::before{background:var(--amber)}
.accent-rose .case-ytag{color:var(--rose)}.accent-rose .case-bl li::before{background:var(--rose)}

/* Lesson — sized for 1920×1080 projector */
.slide-lesson{padding-bottom:clamp(80px,10vh,140px)}
.year-ghost{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(10rem,24vw,26rem);font-weight:700;letter-spacing:-.06em;line-height:1;color:rgba(255,255,255,.028);pointer-events:none;user-select:none}
.lesson-ey{display:flex;align-items:center;justify-content:center;gap:14px;font-size:clamp(.7rem,1.1vw,1rem);font-weight:600;letter-spacing:.26em;text-transform:uppercase;margin-bottom:30px}
.ey-yr{color:rgba(255,255,255,.4)}.ey-sep{color:rgba(255,255,255,.15)}.ey-badge{color:var(--teal)}
.lesson-title{font-size:clamp(2.4rem,5.8vw,6.2rem);font-weight:700;letter-spacing:-.025em;line-height:1.06;max-width:1300px;margin-bottom:32px;white-space:pre-line}
.lesson-tagline{font-size:clamp(1rem,1.7vw,1.6rem);color:var(--dim);max-width:880px;line-height:1.7}
.lesson-rule{width:64px;height:4px;border-radius:2px;background:var(--teal);margin:32px auto 0;opacity:.7}
.lesson-tags{margin-top:18px;font-size:clamp(.6rem,.9vw,.85rem);font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.18)}
.accent-purple .ey-badge{color:var(--purple)}.accent-purple .lesson-rule{background:var(--purple)}
.accent-amber .ey-badge{color:var(--amber)}.accent-amber .lesson-rule{background:var(--amber)}
.accent-rose .ey-badge{color:var(--rose)}.accent-rose .lesson-rule{background:var(--rose)}
.slide-bonus .ey-badge{color:var(--amber)}.slide-bonus .lesson-rule{background:var(--amber)}.slide-bonus .year-ghost{color:rgba(245,158,11,.04)}

/* Monocle tracker */
#tracker{position:fixed;bottom:24px;right:24px;z-index:25;width:clamp(120px,9vw,170px);height:clamp(120px,9vw,170px);opacity:0;transition:opacity .4s;pointer-events:none}
#tracker.visible{opacity:1}
#tracker svg{width:100%;height:100%}

/* Map */
.slide-map{padding:clamp(20px,2.5vw,48px)}
.map-label{font-size:clamp(.7rem,1.1vw,1rem);font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:16px}

.recap-pill{cursor:pointer}

/* Slide grid (jump-to-slide hover strip) */

#slide-grid{position:fixed;bottom:0;left:0;right:0;z-index:36;padding:14px 24px 18px;background:linear-gradient(180deg,transparent 0%,rgba(6,8,16,.92) 50%,rgba(6,8,16,.98) 100%);backdrop-filter:blur(10px);display:flex;gap:6px;overflow-x:auto;overflow-y:hidden;justify-content:flex-start;flex-wrap:nowrap;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);scrollbar-width:thin}

#slide-grid::-webkit-scrollbar{height:4px}

.sg-thumb{flex:0 0 auto;min-width:64px;height:46px;border:1px solid rgba(255,255,255,.12);border-radius:6px;background:rgba(255,255,255,.03);padding:5px 8px;cursor:pointer;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:2px;font-family:var(--font);transition:all .15s;position:relative}
.sg-thumb:hover{background:rgba(0,212,255,.12);border-color:rgba(0,212,255,.4);transform:translateY(-2px)}
.sg-thumb.active{background:rgba(0,212,255,.18);border-color:var(--teal);box-shadow:0 0 12px rgba(0,212,255,.3)}
.sg-num{font-size:.62rem;font-weight:600;color:rgba(255,255,255,.55);letter-spacing:.05em}
.sg-thumb.active .sg-num{color:var(--teal)}
.sg-label{font-size:.52rem;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.sg-thumb.active .sg-label{color:rgba(0,212,255,.7)}

/* ── Intro slides (Alex + Agile Lens) ── */
.slide-intro { padding: clamp(40px,5vw,100px) clamp(60px,8vw,160px); }
.intro-grid { display:flex; align-items:center; gap:clamp(40px,5vw,90px); width:100%; max-width:1500px; }
.intro-stage { flex:0 0 42%; max-width:560px; aspect-ratio:1/1; position:relative; }
.intro-stage svg { width:100%; height:100%; }

.intro-purple .intro-eyebrow { color:var(--purple); }

/* Mario power-up animation for the Alex intro stage */
@keyframes introWalk {
  0%   { transform: translateX(-180px); }
  100% { transform: translateX(0); }
}
@keyframes introJump {
  0%   { transform: translate(0, 0)      scale(1, 1); }
  20%  { transform: translate(40px, -10px)  scale(1, 1); }
  50%  { transform: translate(80px, -120px) scale(1.05, .95); }
  80%  { transform: translate(120px, -10px) scale(1, 1); }
  100% { transform: translate(160px, 0)     scale(1, 1); }
}
@keyframes introHeadsetBob {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-8px); }
}
@keyframes introHeadsetGrab {
  0%   { opacity: 1; transform: translateY(0)   scale(1); }
  40%  { opacity: 1; transform: translateY(-6px) scale(1.4); }
  100% { opacity: 0; transform: translateY(-30px) scale(0); }
}
/* Power-up keyframes preserve the translate(160px, 0) end-state of introJump
   so the avatar grows in place at the headset block instead of snapping
   back to the origin. */
@keyframes introPowerUp {
  0%   { transform: translate(160px, 0) scale(1); }
  20%  { transform: translate(160px, 0) scale(1.1);  filter: brightness(1.5); }
  40%  { transform: translate(160px, 0) scale(.95);  filter: brightness(1); }
  60%  { transform: translate(160px, 0) scale(1.3);  filter: brightness(1.7); }
  80%  { transform: translate(160px, 0) scale(1.45); filter: brightness(1.2); }
  100% { transform: translate(160px, 0) scale(1.5);  filter: brightness(1); }
}
@keyframes introSparkle {
  0%   { opacity: 0; transform: scale(.4) rotate(0deg); }
  50%  { opacity: 1; transform: scale(1.2) rotate(180deg); }
  100% { opacity: 0; transform: scale(.6) rotate(360deg); }
}
.intro-stage .stage-floor {
  fill: rgba(0,212,255,.12); stroke: rgba(0,212,255,.3); stroke-width: 1;
}
.intro-stage .stage-walker { transform-origin: center bottom; }
.intro-stage .headset-block { transform-origin: center; }

/* Avatar arm frame toggle — DOWN visible by default, UP hidden. Adding the
   `arm-up` class to the avatar root flips them. The fistPumpFrames animation
   below toggles `visibility` on a schedule to create a 2-frame pump. */
.avatar .av-arms-up { visibility: hidden; }
.avatar.arm-up .av-arms-down { visibility: hidden; }
.avatar.arm-up .av-arms-up { visibility: visible; }

/* 2-frame fist pump — alternates arm-down / arm-up via animation that toggles
   visibility instantly at each keyframe (no interpolation between states). */
@keyframes fistPumpFrames {
  0%, 49.9%   { opacity: 1; }
  50%, 100%   { opacity: 1; }
}
.avatar .av-arms-down { animation: armDownFrames 0.6s steps(1, end) infinite; }
.avatar .av-arms-up   { animation: armUpFrames   0.6s steps(1, end) infinite; }
@keyframes armDownFrames {
  0%, 49% { visibility: visible; }
  50%, 100% { visibility: hidden; }
}
@keyframes armUpFrames {
  0%, 49% { visibility: hidden; }
  50%, 100% { visibility: visible; }
}
/* Pause the cycling unless the avatar is "pumping" */
.avatar:not(.pumping) .av-arms-down { animation: none; visibility: visible; }
.avatar:not(.pumping) .av-arms-up   { animation: none; visibility: hidden; }
.avatar.pumping.arm-up-only .av-arms-down { visibility: hidden; }
.avatar.pumping.arm-up-only .av-arms-up   { visibility: visible; animation: none; }

/* Heroic jump for the map-slide avatar — squash, leap, peak, land, settle */
@keyframes mapHeroJump {
  0%   { transform: translateY(0)    scale(1, 1); }
  10%  { transform: translateY(4px)  scale(1.08, .9); }
  25%  { transform: translateY(-30px) scale(.94, 1.08); }
  45%  { transform: translateY(-55px) scale(1, 1); }
  60%  { transform: translateY(-45px) scale(1, 1); }
  80%  { transform: translateY(2px)  scale(1.1, .88); }
  100% { transform: translateY(0)    scale(1, 1); }
}
/* Firework particle — radial fly-out with ease, scale up briefly then fade */
@keyframes fwParticle {
  0%   { transform: translate(0, 0) scale(.4); opacity: 1; }
  15%  { transform: translate(calc(var(--tx) * .2), calc(var(--ty) * .2)) scale(1.1); opacity: 1; }
  60%  { transform: translate(calc(var(--tx) * .8), calc(var(--ty) * .8)) scale(.8); opacity: .85; }
  100% { transform: translate(var(--tx), var(--ty)) scale(.2); opacity: 0; }
}

<body>
<div class="bg"><div class="bg-gradient"></div><canvas id="stars"></canvas></div>
<div id="deck"></div>
<div id="tracker"><svg id="tracker-svg" viewBox="0 0 120 120"></svg></div>
<div id="counter"></div>
<div id="brand">Agile Lens · HXR 2026</div>
<div class="nav-arrows"><button class="nav-btn" id="btn-prev">←</button><button class="nav-btn" id="btn-next">→</button></div>

<!-- Slide jump grid (hover bottom of screen to reveal) -->
<div id="slide-grid-zone"></div>
<div id="slide-grid"></div>

<!-- Annotation overlay -->
<button id="anno-toggle" title="Toggle annotation mode (A)">📝 Annotate</button>
<button id="move-toggle" title="Toggle move mode (M) — drag elements to reposition them">✋ Move Mode</button>
<div id="move-hud">
  <button class="mh-btn" id="move-undo" title="Undo (⌘Z)" disabled>↶ Undo</button>
  <button class="mh-btn" id="move-redo" title="Redo (⌘⇧Z)" disabled>↷ Redo</button>
  <span class="mh-hint">Drag = move · <kbd>⇧</kbd>drag = scale · <kbd>⌥</kbd>drag = rotate</span>
</div>
<div id="anno-panel">
  <h3>Annotations</h3>
  <div id="anno-list"></div>
  <div class="anno-actions">
    <button class="anno-btn" id="anno-export">📋 Copy All</button>
    <button class="anno-btn danger" id="anno-clear">Clear</button>
  </div>
</div>
<div id="anno-prompt">
  <div class="anno-target" id="anno-target-text"></div>
  <textarea id="anno-text" placeholder="What should change?"></textarea>
  <div class="anno-prompt-actions">
    <button class="anno-btn" id="anno-cancel" style="flex:0">Cancel</button>
    <button class="anno-btn" id="anno-save" style="flex:0">Save</button>
  </div>
</div>
<div id="anno-toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════════════════
   ENGINE — slide generation, navigation, monocle tracker, map animation
   ═══════════════════════════════════════════════════════════════════════ */

// Stars
const cv=document.getElementById('stars'),sc=cv.getContext('2d');let st=[];
function initS(){cv.width=innerWidth;cv.height=innerHeight;st=Array.from({length:110},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height*.6,r:Math.random()*1.2+.2,o:Math.random()*.4+.05,d:(Math.random()-.5)*.013}))}
function drawS(){sc.clearRect(0,0,cv.width,cv.height);st.forEach(s=>{sc.beginPath();sc.arc(s.x,s.y,s.r,0,Math.PI*2);sc.fillStyle=`rgba(210,225,255,${s.o})`;sc.fill();s.o+=s.d;if(s.o<.04||s.o>.55)s.d*=-1});requestAnimationFrame(drawS)}
initS();drawS();addEventListener('resize',initS);

const deck=document.getElementById('deck'),allSlides=[],lessonIdxs=[];

// ── Build cover ──
const cov=document.createElement('div');cov.className='slide active';cov.dataset.type='cover';
cov.innerHTML=`<div class="event-tag">HXR · Harvard XR Conference · April 11, 2026</div>
<h1 class="talk-title">10 Lessons<br>from 10 Years</h1>
<p class="talk-subtitle">Running an XR Enterprise Studio</p>
<div class="speaker-card"><div><div class="speaker-name">Alex Coulombe</div><div class="speaker-co">CEO, Agile Lens</div></div><div class="card-sep"></div><div class="event-detail">Closing Keynote<br>Gund Hall, Harvard</div></div>`;
deck.appendChild(cov);allSlides.push(cov);

// ── Slide 2: Alex Coulombe intro (with Mario power-up animation) ──
const introAlex = document.createElement('div');
introAlex.className = 'slide slide-intro';
introAlex.dataset.type = 'intro-alex';
introAlex.innerHTML = `
  <div class="intro-grid">
    <div class="intro-stage">
      <svg viewBox="0 0 400 400" id="intro-alex-svg"></svg>
    </div>
    <div class="intro-content">
      <div class="intro-eyebrow">Your Speaker</div>
      <h1 class="intro-title">Alex<br>Coulombe</h1>
      <p class="intro-sub">CEO of Agile Lens. Architect-turned-XR-pioneer who has spent the last decade building spatial experiences for the world's most ambitious clients — Disney, the Royal Shakespeare Company, the Kennedy Center, and the Four Seasons.</p>
      <div class="intro-stats">
        <div class="intro-stat"><span class="num">14</span><span class="lbl">Years in XR</span></div>
        <div class="intro-stat"><span class="num">10</span><span class="lbl">Years at Agile Lens</span></div>
        <div class="intro-stat"><span class="num">100+</span><span class="lbl">Projects Shipped</span></div>
      </div>
    </div>
  </div>`;
deck.appendChild(introAlex);
allSlides.push(introAlex);

// Build the Mario-style power-up scene inside the intro-alex SVG
(function buildAlexIntroStage(){
  const svg = introAlex.querySelector('#intro-alex-svg');
  // Stage floor (a thin platform line at y=300)
  svg.appendChild(svgE('rect', { x:30, y:300, width:340, height:6, class:'stage-floor', rx:'2' }));
  // VR headset "?" block — hovers above the stage waiting to be hit
  const blockG = svgE('g', { class:'headset-block', transform:'translate(220, 180)' });
  // Question block (Mario style)
  blockG.appendChild(svgE('rect', { x:-22, y:-22, width:44, height:44, fill:'#f59e0b', stroke:'#b45309', 'stroke-width':'2', rx:'3' }));
  blockG.appendChild(svgE('rect', { x:-18, y:-18, width:36, height:36, fill:'none', stroke:'#fde68a', 'stroke-width':'1', rx:'1' }));
  // VR headset icon centered in the block
  blockG.appendChild(svgE('rect', { x:-13, y:-7, width:26, height:14, rx:'5', fill:'#1a1a26' }));
  blockG.appendChild(svgE('circle', { cx:-6, cy:0, r:'3', fill:'#00d4ff' }));
  blockG.appendChild(svgE('circle', { cx:6, cy:0, r:'3', fill:'#00d4ff' }));
  blockG.appendChild(svgE('rect', { x:-13, y:-9, width:26, height:2, fill:'#0a0a14' }));
  blockG.style.transformOrigin = 'center';
  blockG.style.animation = 'introHeadsetBob 1.6s ease-in-out infinite';
  svg.appendChild(blockG);

  // Walker (Alex sprite) starts at left, walks in
  const walkerG = svgE('g', { id:'alex-intro-walker', class:'stage-walker', transform:'translate(80, 270)' });
  walkerG.style.transformOrigin = 'center';
  // Inner anim group so we can scale on power-up without clobbering position
  const walkerAnim = svgE('g', { id:'alex-intro-anim' });
  walkerG.appendChild(walkerAnim);
  buildAvatar(walkerAnim, { withBeard: true });  // Alex with his pandemic beard
  svg.appendChild(walkerG);

  // Sparkle particles for power-up moment (hidden initially)
  const sparkles = svgE('g', { id:'alex-intro-sparkles', opacity:'0' });
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2;
    const sp = svgE('circle', {
      cx: 80 + Math.cos(a) * 50, cy: 270 + Math.sin(a) * 50,
      r: '3', fill: ['#fde68a','#00d4ff','#a78bfa','#f59e0b'][i % 4],
    });
    sp.style.transformOrigin = `${80 + Math.cos(a) * 50}px ${270 + Math.sin(a) * 50}px`;
    sparkles.appendChild(sp);
  }
  svg.appendChild(sparkles);
})();

// Trigger the Alex intro animation whenever this slide becomes active.
// Reset on entry so it can replay if you navigate back.
//
// IMPORTANT: animations are applied to the INNER `anim` group, not the outer
// `walker` group. The outer group's `transform="translate(80,270)"` is the
// stage anchor — if we apply CSS animations there, they'd overwrite that
// transform and the sprite would jump to viewBox (0,0).
function playAlexIntro() {
  const walker = document.getElementById('alex-intro-walker');
  const anim = document.getElementById('alex-intro-anim');

/* ═══════════════════════════════════════════════════════════════════════
   Shared Stardew avatar builder
   ═══════════════════════════════════════════════════════════════════════
   buildAvatar(parent, opts) — appends a chunky pixel-art figure to `parent`
   Coordinates are LOCAL (centered on 0,0 in the parent's coordinate system).
   Figure spans roughly y=-38 (top of hair) to y=+28 (bottom of boots),
   x=-18 to +18.

   opts:
     scale:     number — uniform scale (default 1)
     withBeard: bool   — adds facial hair (default false)
     id:        string — root group id (used for animation targeting)

   The figure has TWO arm states (down + up) toggled via CSS class
   `arm-up` on the parent. Default is arm-down. Adding `arm-up` shows the
   raised fist pose.
   ═══════════════════════════════════════════════════════════════════════ */
function buildAvatar(parent, opts = {}) {
  const scale = opts.scale || 1;
  const withBeard = !!opts.withBeard;
  const root = svgE('g', { class: 'avatar', ...(opts.id ? { id: opts.id } : {}) });
  root.style.shapeRendering = 'crispEdges';
  if (scale !== 1) root.setAttribute('transform', `scale(${scale})`);
  parent.appendChild(root);

  // Color palette (Stardew-inspired)
  const SKIN='#f2c79b', SKIN_DARK='#d9a77a';
  const HAIR='#8b4a2a', HAIR_DARK='#5e2f1a';
  const BEARD='#6e3a1e';
  const SHIRT='#6a8fd6', SHIRT_DARK='#4a6fb8';
  const PANTS='#3f3025', BOOTS='#1f150c';
  const EYE='#1a1a26';

  const px = (g, x,y,w,h,fill) => g.appendChild(svgE('rect', {x, y, width:w, height:h, fill}));

  // ── Body group (head + torso + legs + DOWN-arms) ──
  const body = svgE('g', { class: 'av-body' });
  // Hair back layer
  px(body, -14, -38, 28, 6, HAIR_DARK);
  px(body, -16, -34, 32, 4, HAIR);
  // Head
  px(body, -12, -34, 24, 22, SKIN);
  px(body, -12, -16, 24, 4, SKIN_DARK); // chin shadow
  // Hair front fringe
  px(body, -14, -34, 32, 6, HAIR);
  px(body, -12, -30, 6, 4, HAIR);
  px(body, 6, -30, 6, 4, HAIR);
  // Eyes
  px(body, -7, -24, 3, 4, EYE);
  px(body, 4, -24, 3, 4, EYE);
  px(body, -6, -23, 1, 2, '#fff');
  px(body, 5, -23, 1, 2, '#fff');
  // Mouth
  px(body, -3, -17, 6, 1, '#9c5040');
  // Beard (only if requested) — full chin coverage that connects sideburns
  // down to the jawline at full head width. Mouth stays visible.
  if (withBeard) {
    // Sideburns running down from the hair into the cheek area
    px(body, -12, -22, 4, 5, BEARD);   // left sideburn
    px(body, 8,   -22, 4, 5, BEARD);   // right sideburn
    // Cheek beard around the eye / upper-face level
    px(body, -12, -20, 5, 3, BEARD);   // left cheek
    px(body, 7,   -20, 5, 3, BEARD);   // right cheek
    // Sides of mouth (mouth at y=-17 stays visible)
    px(body, -12, -17, 4, 1, BEARD);
    px(body, 8,   -17, 4, 1, BEARD);
    // Moustache (above the mouth line)
    px(body, -6,  -18, 12, 1, BEARD);
    // Lower lip / chin band — full head width
    px(body, -12, -16, 24, 2, BEARD);  // jaw band
    px(body, -12, -14, 24, 2, BEARD);  // chin band
    px(body, -10, -12, 20, 1, BEARD);  // chin tip taper
  }
  // Neck
  px(body, -4, -12, 8, 3, SKIN_DARK);
  // Shirt body
  px(body, -12, -9, 24, 18, SHIRT);
  px(body, -12, -9, 24, 3, SHIRT_DARK);
  px(body, -12, 6, 24, 3, SHIRT_DARK);
  // Pants
  px(body, -12, 9, 12, 14, PANTS);
  px(body, 0, 9, 12, 14, PANTS);
  px(body, -2, 9, 4, 14, '#2a1f18');
  // Boots
  px(body, -12, 23, 12, 5, BOOTS);
  px(body, 0, 23, 12, 5, BOOTS);
  root.appendChild(body);

  // ── Arms DOWN frame (default) ──
  const armsDown = svgE('g', { class: 'av-arms-down' });
  px(armsDown, -18, -8, 6, 14, SHIRT);   // left arm at side
  px(armsDown, -18, 4, 6, 4, SKIN);      // left hand
  px(armsDown, 12, -8, 6, 14, SHIRT);    // right arm at side
  px(armsDown, 12, 4, 6, 4, SKIN);       // right hand
  root.appendChild(armsDown);

  // ── Arms UP frame (fist pump pose) ──
  const armsUp = svgE('g', { class: 'av-arms-up' });
  px(armsUp, -18, -22, 6, 14, SHIRT);    // left arm raised
  px(armsUp, -18, -26, 6, 6, SKIN);      // left fist
  px(armsUp, 12, -22, 6, 14, SHIRT);     // right arm raised
  px(armsUp, 12, -26, 6, 6, SKIN);       // right fist
  root.appendChild(armsUp);

  return root;
}

// Tracker uses the same SECTION_START_DEG so the mini-monocle matches the
// big map. 2016 (i=0) at 6 o'clock so 2025 (i=9) lands at the cord exit.
const TR_START_DEG = 90;
const TR_STEP_DEG = 36;
function tPos(i){
  const a = (TR_START_DEG + i*TR_STEP_DEG) * Math.PI / 180;
  return { x: TCX + TR*Math.cos(a), y: TCY + TR*Math.sin(a) };
}

(function buildTracker(){
  // Faint guide ring
  tsvg.appendChild(svgE('circle',{cx:TCX,cy:TCY,r:TR,fill:'none',stroke:'rgba(255,255,255,.08)','stroke-width':'1.5'}));
  // Cord exits at 2025 (i=9) and curves outward to a 2026 pip beyond the ring
  const cordStart = tPos(9);
  const cordEndAngle = (TR_START_DEG + 9*TR_STEP_DEG + 12) * Math.PI / 180;
  const cordEnd = { x: TCX + (TR+14) * Math.cos(cordEndAngle), y: TCY + (TR+14) * Math.sin(cordEndAngle) };
  const ctrl = { x: (cordStart.x + cordEnd.x) / 2 + 4, y: (cordStart.y + cordEnd.y) / 2 + 4 };
  tsvg.appendChild(svgE('path',{d:`M${cordStart.x} ${cordStart.y} Q${ctrl.x} ${ctrl.y} ${cordEnd.x} ${cordEnd.y}`,fill:'none',stroke:'rgba(245,158,11,.18)','stroke-width':'1.5','stroke-linecap':'round'}));
  tsvg.appendChild(svgE('circle',{cx:cordEnd.x,cy:cordEnd.y,r:'3',fill:'none',stroke:'rgba(245,158,11,.3)','stroke-width':'1',id:'tb'}));
  // Year dots
  for(let i=0;i<10;i++){
    const p = tPos(i);
    tsvg.appendChild(svgE('circle',{cx:p.x,cy:p.y,r:'2.5',fill:'rgba(255,255,255,.12)',id:`td${i}`}));
  }
  // Walker — small Stardew sprite that walks around the mini-monocle.
  // We build TWO versions (clean-shaven for 2016-2019, bearded for 2020+)
  // and toggle visibility based on the current slide's year.
  const walker = svgE('g', { id:'tav', transform:`translate(${TCX},${TCY-TR})` });
  // The mini-tracker is small (120×120 viewBox) so we scale the avatar way down.
  // The avatar's natural footprint is ~36×66 px; we scale to ~14×26.
  const wScale = 0.22;
  const walkerInner = svgE('g', { transform: `scale(${wScale})` });
  walker.appendChild(walkerInner);
  // No-beard version (visible 2016-2019)
  const walkerClean = svgE('g', { id:'tav-clean' });
  walkerInner.appendChild(walkerClean);
  buildAvatar(walkerClean, { withBeard: false });
  // Bearded version (visible 2020+)
  const walkerBeard = svgE('g', { id:'tav-beard', visibility:'hidden' });
  walkerInner.appendChild(walkerBeard);
  buildAvatar(walkerBeard, { withBeard: true });
  tsvg.appendChild(walker);
})();

function updateTracker(){
  const type=allSlides[current].dataset.type;
  const show=type==='case'||type==='lesson'||type==='bonus';
  trackerEl.classList.toggle('visible',show);if(!show)return;
  const si=parseInt(allSlides[current].dataset.section??-1);
  const isBonus=type==='bonus';
  // lesson dots
  for(let i=0;i<10;i++){
    const d=document.getElementById(`td${i}`);
    if(!d)continue;
    const past=i<si||(i===si&&type==='lesson')||isBonus;
    d.setAttribute('fill',past?'rgba(0,212,255,.65)':i===si?'rgba(0,212,255,.35)':'rgba(255,255,255,.12)');
    d.setAttribute('r',i===si&&!isBonus?'3.5':'2.5');
  }
  const tb=document.getElementById('tb');
  if(tb) tb.setAttribute('fill',isBonus?'rgba(245,158,11,.7)':'none');
  // Walker position
  const walker = document.getElementById('tav');
  if (!walker) return;
  // Determine target position
  let tx, ty;
  if (isBonus) {
    const cordEndAngle = (TR_START_DEG + 9*TR_STEP_DEG + 12) * Math.PI / 180;
    tx = TCX + (TR + 14) * Math.cos(cordEndAngle);
    ty = TCY + (TR + 14) * Math.sin(cordEndAngle);
  } else {
    const idx = Math.max(0, Math.min(si, 9));
    const p = tPos(idx);
    tx = p.x; ty = p.y;
  }
  walker.setAttribute('transform', `translate(${tx},${ty})`);
  // Beard logic — show beard from 2020 onward
  const yr = parseInt(allSlides[current].dataset.year || 2016);
  const showBeard = yr >= 2020;
  document.getElementById('tav-clean').setAttribute('visibility', showBeard ? 'hidden' : 'visible');
  document.getElementById('tav-beard').setAttribute('visibility', showBeard ? 'visible' : 'hidden');
}

// ── Map animation ──
// Monocle geometry: ring center, radius, year nodes rotated so 2025 lands at
// the cord exit position (5 o'clock area). The cord then hangs OUTSIDE the
// monocle from 2025 to a 2026 eyepiece beyond the ring.
const LSHORT=SECTIONS.map(s=>s.lesson.title.replace('\n',' '));
const MX=440,MY=290,MR=200;
// SECTION_START_DEG controls where 2016 (i=0) sits on the constellation.
// 90° = 6 o'clock (bottom). Years walk clockwise from there. With 10
// sections at 36° each, 2025 (i=9) lands at exactly 5 o'clock (54°),
// which is where the real Agile Lens monocle's cord attaches to the lens.
// The cord then curves outward to 2026 sitting INSIDE the monocle's
// eyepiece — and the white monocle PNG overlay aligns with this layout.
const SECTION_START_DEG = 90;
const SECTION_STEP_DEG = 36;
function mPos(i){
  const a=(SECTION_START_DEG + i*SECTION_STEP_DEG) * Math.PI / 180;
  return{x:MX+MR*Math.cos(a), y:MY+MR*Math.sin(a)};
}
// Cord starts AT the 2025 node (i=9, lower-right) and ends at the monocle's
// eyepiece — the small circle at the bottom-right of the white logo PNG.
const CORD_A = mPos(9);
const CORD_B = { x: 619, y: 528 }; // matches PNG eyepiece location after alignment

// Constellation line pairs (connecting non-adjacent nodes for star pattern)
const CONSTELLATION_LINES=[[0,3],[1,5],[2,7],[3,8],[4,9],[5,0],[6,1],[7,2],[8,4],[9,6]];

// Monocle logo overlay geometry — aligns the monocle-white.png so its
// circular lens overlaps with our constellation circle. The PNG is 852×877
// with the ring's stroke centerline at roughly (415, 380) in image coords
// and a radius of ~360. We scale by MR/360 to match the constellation.
const LOGO_SCALE = MR / 360;
const LOGO_W = 852 * LOGO_SCALE;
const LOGO_H = 877 * LOGO_SCALE;
const LOGO_X = MX - 415 * LOGO_SCALE;
const LOGO_Y = MY - 380 * LOGO_SCALE;

let mapDone=false;
function startMap(){
  if(mapDone)return;mapDone=true;
  const svg=document.getElementById('map-svg');svg.innerHTML='';
  const CIRC=2*Math.PI*MR;

  // defs
  const defs=svgE('defs');
  const f=svgE('filter',{id:'gl',x:'-40%',y:'-40%',width:'180%',height:'180%'});
  f.appendChild(svgE('feGaussianBlur',{stdDeviation:'3',result:'b'}));
  const mg=svgE('feMerge');mg.appendChild(svgE('feMergeNode',{in:'b'}));mg.appendChild(svgE('feMergeNode',{in:'SourceGraphic'}));
  f.appendChild(mg);defs.appendChild(f);
  // softer glow for constellation lines
  const f2=svgE('filter',{id:'gl2',x:'-50%',y:'-50%',width:'200%',height:'200%'});
  f2.appendChild(svgE('feGaussianBlur',{stdDeviation:'1.5',result:'b2'}));
  const mg2=svgE('feMerge');mg2.appendChild(svgE('feMergeNode',{in:'b2'}));mg2.appendChild(svgE('feMergeNode',{in:'SourceGraphic'}));
  f2.appendChild(mg2);defs.appendChild(f2);
  svg.appendChild(defs);

  // White monocle logo overlay — fades in behind the constellation at the end
  // of the animation as the brand reveal. Aligned to the v4 layout.
  const logoImg = svgE('image', {
    href: 'monocle-white.png',
    x: LOGO_X, y: LOGO_Y, width: LOGO_W, height: LOGO_H,
    opacity: '0',
  });
  logoImg.style.transition = 'opacity 1.6s ease-in';
  svg.appendChild(logoImg);

  // Faint guide circle (slightly stronger so the monocle outline is always visible)
  svg.appendChild(svgE('circle',{cx:MX,cy:MY,r:MR,fill:'none',stroke:'rgba(0,212,255,.12)','stroke-width':'1.5'}));

  // Constellation lines (thin, connecting non-adjacent nodes — appear with a delay)
  const constLines=[];
  CONSTELLATION_LINES.forEach(([a,b])=>{
    const pa=mPos(a),pb=mPos(b);
    const line=svgE('line',{x1:pa.x,y1:pa.y,x2:pb.x,y2:pb.y,stroke:'rgba(0,212,255,.10)','stroke-width':'0.7',filter:'url(#gl2)',opacity:'0'});
    line.style.transition='opacity .6s';
    svg.appendChild(line);
    constLines.push(line);
  });

  // Animated ring — the monocle's lens. Bright stroke + glow so it reads
  // clearly. SVG circles draw their stroke starting from angle 0 (3 o'clock).
  // Rotating by +90° puts the start at the bottom (6 o'clock), which is where
  // 2016 (i=0) lives. The draw animation then unfolds clockwise around the
  // ring, lighting each year node in sync with the section appearance timing.
  const ring=svgE('circle',{cx:MX,cy:MY,r:MR,fill:'none',stroke:'rgba(0,212,255,.85)','stroke-width':'3',
    'stroke-dasharray':CIRC,'stroke-dashoffset':CIRC,'stroke-linecap':'round',
    transform:`rotate(90 ${MX} ${MY})`,filter:'url(#gl)'});
  svg.appendChild(ring);

  // Cord path (from ~5 o'clock on ring to bonus eyepiece)
  const cordCtrl={x:CORD_A.x+55,y:CORD_A.y+60};
  const cord=svgE('path',{d:`M${CORD_A.x} ${CORD_A.y} Q${cordCtrl.x} ${cordCtrl.y} ${CORD_B.x} ${CORD_B.y}`,
    fill:'none',stroke:'rgba(245,158,11,.55)','stroke-width':'1.8',
    'stroke-dasharray':'200','stroke-dashoffset':'200','stroke-linecap':'round',filter:'url(#gl)'});
  svg.appendChild(cord);

  // Year nodes (on the ring)
  const nEls=[];
  for(let i=0;i<10;i++){
    const p=mPos(i),dx=p.x-MX,dy=p.y-MY,len=Math.hypot(dx,dy);
    const lx=p.x+(dx/len)*34,ly=p.y+(dy/len)*34;
    const anc=p.x>MX+20?'start':p.x<MX-20?'end':'middle';
    const g=svgE('g',{opacity:'0',class:'recap-pill'});g.style.transition='opacity .4s';g.dataset.lesson=i;
    // star glow
    g.appendChild(svgE('circle',{cx:p.x,cy:p.y,r:'16',fill:'rgba(0,212,255,.02)',stroke:'rgba(0,212,255,.08)','stroke-width':'0.5'}));
    // center star
    g.appendChild(svgE('circle',{cx:p.x,cy:p.y,r:'4.5',fill:'rgba(0,212,255,.15)',stroke:'rgba(0,212,255,.65)','stroke-width':'1.5'}));
    // year label
    const yr=svgE('text',{x:lx,y:ly-(p.y<MY?12:0),'text-anchor':anc,fill:'rgba(0,212,255,.8)',
      'font-family':'Space Grotesk,sans-serif','font-size':'10.5','font-weight':'600','letter-spacing':'1.2'});
    yr.textContent=2016+i;g.appendChild(yr);
    // lesson label
    const tt=svgE('text',{x:lx,y:ly+(p.y<MY?3:14),'text-anchor':anc,fill:'rgba(255,255,255,.38)',
      'font-family':'Space Grotesk,sans-serif','font-size':'8','font-weight':'400'});
    tt.textContent=LSHORT[i];g.appendChild(tt);
    g.addEventListener('click',()=>{if(lessonIdxs[i]!==undefined)goTo(lessonIdxs[i])});
    svg.appendChild(g);nEls.push(g);
  }

  // Bonus node (the eyepiece circle of the monocle)
  const bG=svgE('g',{opacity:'0'});bG.style.transition='opacity .5s';
  bG.appendChild(svgE('circle',{cx:CORD_B.x,cy:CORD_B.y,r:'18',fill:'rgba(245,158,11,.02)',stroke:'rgba(245,158,11,.1)','stroke-width':'0.5'}));
  bG.appendChild(svgE('circle',{cx:CORD_B.x,cy:CORD_B.y,r:'6',fill:'rgba(245,158,11,.15)',stroke:'rgba(245,158,11,.65)','stroke-width':'1.5'}));
  const bYr=svgE('text',{x:CORD_B.x+22,y:CORD_B.y-5,'text-anchor':'start',fill:'rgba(245,158,11,.85)',
    'font-family':'Space Grotesk,sans-serif','font-size':'10.5','font-weight':'600','letter-spacing':'1.2'});
  bYr.textContent='2026';bG.appendChild(bYr);
  const bTt=svgE('text',{x:CORD_B.x+22,y:CORD_B.y+10,'text-anchor':'start',fill:'rgba(255,255,255,.35)',
    'font-family':'Space Grotesk,sans-serif','font-size':'8'});
  bTt.textContent='The Demo Will Break';bG.appendChild(bTt);
  svg.appendChild(bG);

  // Center text
  const cL=svgE('text',{x:MX,y:MY-4,'text-anchor':'middle','dominant-baseline':'middle',fill:'rgba(255,255,255,0)',
    'font-family':'Space Grotesk,sans-serif','font-size':'20','font-weight':'600','letter-spacing':'4'});
  cL.textContent='AGILE LENS';svg.appendChild(cL);
  const cS=svgE('text',{x:MX,y:MY+20,'text-anchor':'middle','dominant-baseline':'middle',fill:'rgba(255,255,255,0)',
    'font-family':'Space Grotesk,sans-serif','font-size':'10','font-weight':'400','letter-spacing':'2.5'});
  cS.textContent='2016 – 2026';svg.appendChild(cS);

  // Stardew-style avatar — chunky pixel-art character with a 2-frame fist-pump
  // sprite animation. Three-group structure:
  //   avPos  → outer SVG <g> with positioning transform attribute
  //   avG    → inner <g> with CSS animation (vertical bob/jump)
  //   inside avG: body group + arm-down group + arm-up group (two arms toggle
  //              via CSS visibility to create the fist-pump frame swap)
  const avPos = svgE('g', { id:'map-av-pos', transform:`translate(${MX},${MY-50})`, opacity:'0' });
  avPos.style.transition = 'opacity .6s';
  const avG = svgE('g', { id:'map-av' });
  avG.style.shapeRendering = 'crispEdges';
  avG.style.transformOrigin = 'center';
  avPos.appendChild(avG);

  // Use the shared avatar builder so the same sprite appears here, in the
  // tracker, and on the intro slide. Pass "withBeard:true" to add facial hair.
  buildAvatar(avG, { scale: 1, withBeard: true });
  svg.appendChild(avPos);

  // ── Fireworks — N starbursts of M particles each. Each particle is a tiny
  // colored circle that flies radially outward from its burst center, fades,
  // and shrinks. Bursts are staggered so the celebration cascades.
  const FW_COLORS = ['#00d4ff','#a78bfa','#f59e0b','#f43f5e','#fde68a'];
  const fwGroups = [];
  // 5 burst origins: dead center, plus four points around the avatar
  const fwOrigins = [
    {x:MX, y:MY+10},
    {x:MX-60, y:MY-30},
    {x:MX+60, y:MY-30},
    {x:MX-50, y:MY+40},
    {x:MX+50, y:MY+40},
  ];
  fwOrigins.forEach((origin, gi) => {
    const burst = svgE('g', { id:`fw-${gi}`, opacity:'0' });
    const PARTICLES = 12;
    for (let i = 0; i < PARTICLES; i++) {
      const angle = (i / PARTICLES) * Math.PI * 2;
      const dx = Math.cos(angle) * 60;
      const dy = Math.sin(angle) * 60;
      const color = FW_COLORS[(gi + i) % FW_COLORS.length];
      const p = svgE('circle', {
        cx: origin.x, cy: origin.y, r: '3', fill: color,
        'data-tx': dx, 'data-ty': dy,
      });
      p.style.transformOrigin = `${origin.x}px ${origin.y}px`;
      burst.appendChild(p);
    }
    svg.appendChild(burst);
    fwGroups.push(burst);
  });

  // ── Animation sequence ──
  const DLY=300, CDUR=3200, STP=CDUR/10;

  // 1. Ring draws (0.3s – 3.5s)
  let rs=null;
  function aR(ts){if(!rs)rs=ts;const p=Math.min((ts-rs)/CDUR,1);const e=p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;ring.setAttribute('stroke-dashoffset',CIRC*(1-e));if(p<1)requestAnimationFrame(aR)}
  setTimeout(()=>requestAnimationFrame(aR),DLY);

  // 2. Nodes appear as ring passes through (star by star)
  nEls.forEach((g,i)=>setTimeout(()=>{g.style.opacity='1'},DLY+i*STP+80));

  // 3. Constellation lines fade in after their nodes appear
  constLines.forEach((line,i)=>{
    const [a,b]=CONSTELLATION_LINES[i];
    const t=DLY+Math.max(a,b)*STP+200;
    setTimeout(()=>{line.style.opacity='1'},t);
  });

  // 4. Cord draws after ring completes
  const cStart=DLY+CDUR+250;
  let cs2=null;
  function aC(ts){if(!cs2)cs2=ts;const p=Math.min((ts-cs2)/800,1);cord.setAttribute('stroke-dashoffset',200*(1-p));if(p<1)requestAnimationFrame(aC)}
  setTimeout(()=>requestAnimationFrame(aC),cStart);

  // 5. Bonus node appears
  setTimeout(()=>{bG.style.opacity='1'},cStart+800);

  // 6. Center text fades in
  setTimeout(()=>{
    cL.setAttribute('fill','rgba(255,255,255,.65)');cL.style.transition='fill 1s';
    cS.setAttribute('fill','rgba(255,255,255,.22)');cS.style.transition='fill 1s';
  },cStart+1100);

  // 7. White monocle PNG ghost — fades in behind everything for the brand reveal
  if (logoImg) setTimeout(()=>{ logoImg.style.opacity='0.22'; }, cStart + 1500);

  // 8. Avatar appears (centered) and starts the heroic jump + 2-frame fist pump
  setTimeout(()=>{
    avPos.style.opacity = '1';
    // Toggle the arm-up frames on a fast cycle for the duration of the jumps
    avG.querySelector('.avatar')?.classList.add('pumping');
    // Run the jump twice in sequence (1s each)
    avG.style.animation = 'mapHeroJump 1s ease-out 0s 2 normal both';
    // Stop the pumping cycle once the jumps finish, leave arm-up as the rest pose
    setTimeout(() => {
      const a = avG.querySelector('.avatar');
      if (a) { a.classList.remove('pumping'); a.classList.add('arm-up'); }
    }, 2100);
  }, cStart + 1800);

  // 9. Fireworks cascade — staggered bursts around the avatar
  fwGroups.forEach((burst, gi) => {
    setTimeout(() => {
      burst.style.opacity = '1';
      // Animate each particle: fly outward + fade
      burst.querySelectorAll('circle').forEach(p => {
        const tx = p.getAttribute('data-tx');
        const ty = p.getAttribute('data-ty');
        p.style.setProperty('--tx', `${tx}px`);
        p.style.setProperty('--ty', `${ty}px`);
        p.style.animation = 'fwParticle 1.2s ease-out forwards';
      });
      // Clear opacity after burst so it can fire again on re-entry
      setTimeout(() => { burst.style.opacity = '0'; }, 1300);
    }, cStart + 2000 + gi * 250);
  });
}

/* ═══════════════════════════════════════════════════════════════════════
   ANNOTATION OVERLAY — click elements to leave notes, export as markdown
   ═══════════════════════════════════════════════════════════════════════ */
const ANNO_KEY = 'hxr-keynote-annotations';
let annoMode = false;
let pendingTarget = null;

function annoLoad(){ try{return JSON.parse(localStorage.getItem(ANNO_KEY)||'[]')}catch(e){return []} }
function annoSave(arr){ localStorage.setItem(ANNO_KEY, JSON.stringify(arr)) }

function annoToast(msg){
  const t=document.getElementById('anno-toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

// Build a stable selector for an element
function annoSelector(el){
  if(el.id) return '#'+el.id;
  const path=[];
  let cur=el, depth=0;
  while(cur && cur!==document.body && depth<5){
    let part=cur.tagName.toLowerCase();
    if(cur.id){ part='#'+cur.id; path.unshift(part); break; }
    if(cur.classList.length){
      const cls=Array.from(cur.classList).filter(c=>!['active','exit-fwd','exit-bwd'].includes(c)).slice(0,2).join('.');
      if(cls) part+='.'+cls;
    }
    // nth-of-type if siblings exist
    const sibs=Array.from(cur.parentNode?.children||[]).filter(s=>s.tagName===cur.tagName);
    if(sibs.length>1){ part+=':nth-of-type('+(sibs.indexOf(cur)+1)+')'; }
    path.unshift(part);
    cur=cur.parentElement; depth++;
  }
  return path.join(' > ');
}

// Get slide context (year/type) for the element if it lives inside a slide
function annoContext(el){
  const slide=el.closest('.slide');
  if(!slide) return null;
  const type=slide.dataset.type||'?';
  const year=slide.dataset.year||'';
  return year ? `${type} ${year}` : type;
}

function annoRender(){
  const list=document.getElementById('anno-list');
  const items=annoLoad();
  if(items.length===0){
    list.innerHTML='<div id="anno-empty">No annotations yet.<br>Click any element on the page.</div>';
    return;
  }
  list.innerHTML=items.map((a,i)=>`
    <div class="anno-item">
      <span class="anno-rm" data-i="${i}">×</span>
      <div class="anno-meta">${a.context||'—'} · <code>${a.selector}</code></div>
      <div>${a.text.replace(/</g,'&lt;')}</div>
    </div>`).join('');
  list.querySelectorAll('.anno-rm').forEach(b=>b.addEventListener('click',e=>{
    const i=+e.target.dataset.i;
    const arr=annoLoad(); arr.splice(i,1); annoSave(arr); annoRender();
  }));
}

function annoToggleMode(on){
  annoMode = on===undefined ? !annoMode : on;
  document.body.classList.toggle('annotate-mode',annoMode);
  document.getElementById('anno-toggle').classList.toggle('active',annoMode);
  document.getElementById('anno-toggle').textContent=annoMode?'✕ Exit Annotate':'📝 Annotate';
  document.getElementById('anno-panel').classList.toggle('visible',annoMode);
  if(annoMode) annoRender();
  if(!annoMode) document.getElementById('anno-prompt').classList.remove('visible');
}

document.getElementById('anno-toggle').addEventListener('click',()=>annoToggleMode());

// Keyboard shortcut: A toggles annotate mode
document.addEventListener('keydown',e=>{
  if(e.key==='a'||e.key==='A'){
    if(['INPUT','TEXTAREA'].includes(document.activeElement?.tagName))return;
    e.preventDefault(); annoToggleMode();
  }
});

// Click handler in annotate mode
document.addEventListener('click',e=>{
  if(!annoMode)return;
  // Ignore clicks on the annotation UI itself
  if(e.target.closest('#anno-toggle')||e.target.closest('#anno-panel')||e.target.closest('#anno-prompt')||e.target.closest('#anno-toast'))return;
  e.preventDefault(); e.stopPropagation();
  pendingTarget=e.target;
  const sel=annoSelector(e.target);
  const ctx=annoContext(e.target);
  document.getElementById('anno-target-text').textContent=(ctx?ctx+' → ':'')+sel;
  const prompt=document.getElementById('anno-prompt');
  // Position prompt near click
  const x=Math.min(e.clientX+10, innerWidth-300);
  const y=Math.min(e.clientY+10, innerHeight-200);
  prompt.style.left=x+'px'; prompt.style.top=y+'px';
  prompt.classList.add('visible');
  document.getElementById('anno-text').value='';
  setTimeout(()=>document.getElementById('anno-text').focus(),50);
},true);

document.getElementById('anno-cancel').addEventListener('click',()=>{
  document.getElementById('anno-prompt').classList.remove('visible');
  pendingTarget=null;
});

document.getElementById('anno-save').addEventListener('click',()=>{
  const text=document.getElementById('anno-text').value.trim();
  if(!text||!pendingTarget)return;
  const arr=annoLoad();
  arr.push({
    selector: annoSelector(pendingTarget),
    context: annoContext(pendingTarget),
    text,
    timestamp: new Date().toISOString()
  });
  annoSave(arr);
  document.getElementById('anno-prompt').classList.remove('visible');
  pendingTarget=null;
  annoRender();
  annoToast('Annotation saved');
});

// Cmd/Ctrl+Enter to save in textarea
document.getElementById('anno-text').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&(e.metaKey||e.ctrlKey)){ e.preventDefault(); document.getElementById('anno-save').click(); }
  if(e.key==='Escape'){ document.getElementById('anno-cancel').click(); }
});

document.getElementById('anno-export').addEventListener('click',()=>{
  const arr=annoLoad();
  if(arr.length===0){ annoToast('Nothing to copy'); return; }
  const md='# Keynote Annotations\n\n'+arr.map((a,i)=>
    `## ${i+1}. ${a.context||'—'}\n**Selector:** \`${a.selector}\`\n**Note:** ${a.text}\n`
  ).join('\n');
  navigator.clipboard.writeText(md).then(()=>annoToast(`Copied ${arr.length} annotation${arr.length>1?'s':''} to clipboard`));
});

document.getElementById('anno-clear').addEventListener('click',()=>{
  if(!confirm('Clear all annotations?'))return;
  annoSave([]); annoRender(); annoToast('Cleared');
});

/* ═══════════════════════════════════════════════════════════════════════
   MOVE MODE v2 — full transform engine: translate / scale / rotate
   ═══════════════════════════════════════════════════════════════════════
   Drag any element on the active slide to reposition it. SVG paths and
   lines work too — they're transformed via the standard CSS `transform`
   property which is honored by SVG geometry.

   Modifier keys:
     - Just drag         → translate (move)
     - Shift + drag      → scale (drag away from center to grow, toward to shrink)
     - Alt/Option + drag → rotate (drag in a circle around center)

   Each element stores its current transform state in `transformMap`.
   Transforms compose as `translate(...) rotate(...) scale(...)`.

   Undo/Redo:
     - History stack records each completed drag with prev + new state
     - Cmd/Ctrl + Z      → undo last transform
     - Cmd/Ctrl + Shift+Z → redo
     - Onscreen Undo/Redo buttons in the move-mode toolbar
   ═══════════════════════════════════════════════════════════════════════ */

let moveMode = false;
let drag = null;  // { el, mode, startX, startY, startState, center, prevState }

// Map: element → { tx, ty, scale, rot } — the cumulative transform we apply
const transformMap = new WeakMap();

// Undo / redo history. Each entry: { el, prev, next, sel }
const moveHistory = [];
const moveHistoryRedo = [];
const MAX_HISTORY = 50;

function getXform(el) {
  return transformMap.get(el) || { tx: 0, ty: 0, scale: 1, rot: 0 };
}

function setXform(el, t) {
  transformMap.set(el, t);
  // Compose: translate + rotate + scale, anchored at the element's own center
  // (transform-origin: center) so rotation/scale feel natural.
  el.style.transformOrigin = 'center center';
  el.style.transform = `translate(${t.tx}px, ${t.ty}px) rotate(${t.rot}deg) scale(${t.scale})`;
}

function elCenter(el) {
  const r = el.getBoundingClientRect();
  return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
}

function moveModeToggle(on) {
  moveMode = on === undefined ? !moveMode : on;
  if (moveMode && annoMode) annoToggleMode(false);
  document.body.classList.toggle('move-mode', moveMode);
  document.getElementById('move-toggle').classList.toggle('active', moveMode);
  document.getElementById('move-toggle').textContent = moveMode ? '✕ Exit Move' : '✋ Move Mode';
  document.getElementById('move-hud').classList.toggle('visible', moveMode);
  if (moveMode) {
    annoToast('Move mode · drag = move · ⇧drag = scale · ⌥drag = rotate · ⌘Z = undo');
  }
}

document.getElementById('move-toggle').addEventListener('click', () => moveModeToggle());
document.getElementById('move-undo').addEventListener('click', () => moveUndo());
document.getElementById('move-redo').addEventListener('click', () => moveRedo());

document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA'].includes(document.activeElement?.tagName)) return;
  if (e.key === 'm' || e.key === 'M') { e.preventDefault(); moveModeToggle(); return; }
  // Cmd/Ctrl + Z = undo, Cmd/Ctrl + Shift + Z = redo
  if ((e.metaKey || e.ctrlKey) && (e.key === 'z' || e.key === 'Z')) {
    e.preventDefault();
    if (e.shiftKey) moveRedo(); else moveUndo();
  }
});

// ── Drag handlers ──
document.addEventListener('mousedown', e => {
  if (!moveMode) return;
  if (e.target.closest('#move-toggle') || e.target.closest('#anno-toggle') ||
      e.target.closest('#slide-grid') || e.target.closest('#slide-grid-zone') ||
      e.target.closest('#anno-panel') || e.target.closest('#anno-prompt') ||
      e.target.closest('#move-hud')) return;
  e.preventDefault(); e.stopPropagation();
  const el = e.target;
  const startState = { ...getXform(el) };
  drag = {
    el,
    mode: e.shiftKey ? 'scale' : (e.altKey ? 'rotate' : 'translate'),
    startX: e.clientX,
    startY: e.clientY,
    startState,
    prevState: { ...startState },
    center: elCenter(el),
  };
  el.classList.add('dragging');
}, true);

document.addEventListener('mousemove', e => {
  if (!drag) return;
  const el = drag.el;
  const next = { ...drag.startState };
  if (drag.mode === 'translate') {
    next.tx = drag.startState.tx + (e.clientX - drag.startX);
    next.ty = drag.startState.ty + (e.clientY - drag.startY);
  } else if (drag.mode === 'scale') {
    const startDist = Math.hypot(drag.startX - drag.center.x, drag.startY - drag.center.y) || 1;
    const currDist = Math.hypot(e.clientX - drag.center.x, e.clientY - drag.center.y);
    const factor = currDist / startDist;
    next.scale = Math.max(0.1, drag.startState.scale * factor);
  } else if (drag.mode === 'rotate') {
    const startA = Math.atan2(drag.startY - drag.center.y, drag.startX - drag.center.x);
    const currA = Math.atan2(e.clientY - drag.center.y, e.clientX - drag.center.x);
    next.rot = drag.startState.rot + (currA - startA) * 180 / Math.PI;
  }
  setXform(el, next);
}, true);

document.addEventListener('mouseup', e => {
  if (!drag) return;
  const el = drag.el;
  el.classList.remove('dragging');
  const next = getXform(el);
  const prev = drag.prevState;
  // Only push to history if something actually changed
  const changed = next.tx !== prev.tx || next.ty !== prev.ty ||
                  next.scale !== prev.scale || next.rot !== prev.rot;
  if (changed) {
    pushMoveHistory(el, prev, next);
    saveMoveAnnotation(el, prev, next);
  }
  drag = null;
}, true);

function pushMoveHistory(el, prev, next) {
  moveHistory.push({ el, prev: {...prev}, next: {...next}, sel: annoSelector(el) });
  if (moveHistory.length > MAX_HISTORY) moveHistory.shift();
  moveHistoryRedo.length = 0; // any new action clears the redo branch
  updateMoveButtons();
}

function moveUndo() {
  if (moveHistory.length === 0) { annoToast('Nothing to undo'); return; }
  const action = moveHistory.pop();
  setXform(action.el, action.prev);
  moveHistoryRedo.push(action);
  // Remove the corresponding annotation
  removeMoveAnnotation(action.sel, action.next);
  // If the prev state isn't identity, save a new annotation reflecting prev
  if (action.prev.tx || action.prev.ty || action.prev.scale !== 1 || action.prev.rot) {
    saveMoveAnnotation(action.el, { tx:0, ty:0, scale:1, rot:0 }, action.prev);
  }
  annoToast('Undone');
  updateMoveButtons();
}

function moveRedo() {
  if (moveHistoryRedo.length === 0) { annoToast('Nothing to redo'); return; }
  const action = moveHistoryRedo.pop();
  setXform(action.el, action.next);
  moveHistory.push(action);
  removeMoveAnnotation(action.sel, action.prev);
  saveMoveAnnotation(action.el, action.prev, action.next);
  annoToast('Redone');
  updateMoveButtons();
}

function updateMoveButtons() {
  const u = document.getElementById('move-undo');
  const r = document.getElementById('move-redo');
  if (u) u.disabled = moveHistory.length === 0;
  if (r) r.disabled = moveHistoryRedo.length === 0;
}

function saveMoveAnnotation(el, prev, next) {
  const sel = annoSelector(el);
  const ctx = annoContext(el);
  const arr = annoLoad();
  // Replace any existing move annotation for this selector with the latest state
  const existing = arr.findIndex(a => a.type === 'move' && a.selector === sel);
  const parts = [];
  if (next.tx || next.ty) {
    parts.push(`translate Δ(${next.tx >= 0 ? '+' : ''}${Math.round(next.tx)}px, ${next.ty >= 0 ? '+' : ''}${Math.round(next.ty)}px)`);
  }
  if (Math.abs(next.scale - 1) > 0.01) {
    parts.push(`scale ×${next.scale.toFixed(2)}`);
  }
  if (Math.abs(next.rot) > 0.5) {
    parts.push(`rotate ${Math.round(next.rot)}°`);
  }
  if (parts.length === 0) {
    // identity — remove any existing annotation
    if (existing >= 0) { arr.splice(existing, 1); annoSave(arr); annoRender(); }
    return;
  }
  const note = {
    selector: sel,
    context: ctx,
    text: 'TRANSFORM ' + parts.join(' · '),
    timestamp: new Date().toISOString(),
    type: 'move',
    transform: { tx: Math.round(next.tx), ty: Math.round(next.ty), scale: +next.scale.toFixed(3), rot: Math.round(next.rot) },
  };
  if (existing >= 0) arr[existing] = note; else arr.push(note);
  annoSave(arr);
  annoRender();
}

function removeMoveAnnotation(sel, state) {
  const arr = annoLoad();
  const idx = arr.findIndex(a => a.type === 'move' && a.selector === sel);
  if (idx >= 0) { arr.splice(idx, 1); annoSave(arr); annoRender(); }
}
</script>
